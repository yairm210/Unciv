name: ReCiv release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-info:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      tag: ${{ steps.info.outputs.tag }}
      prerelease: ${{ steps.info.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version and release notes
        id: info
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            prerelease=false
          else
            tag="${{ inputs.tag }}"
            version="${tag#v}"
            prerelease="${{ inputs.prerelease }}"
          fi

          if [[ "$tag" != v* ]]; then
            echo "::error::Release tag must start with v, for example v0.1.0"
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must use SemVer, for example 0.1.0 or 0.1.0-beta.1"
            exit 1
          fi

          if grep -qE "^## ${version}(\\s|-|$)" RECIV_CHANGELOG.md; then
            awk -v version="$version" '
              $0 ~ "^## " version "([[:space:]]|-|$)" { capture=1; next }
              capture && /^## / { exit }
              capture { print }
            ' RECIV_CHANGELOG.md > release-notes.md
          else
            awk '
              /^## Unreleased[[:space:]]*$/ { capture=1; next }
              capture && /^## / { exit }
              capture { print }
            ' RECIV_CHANGELOG.md > release-notes.md
          fi

          if [[ ! -s release-notes.md ]]; then
            echo "ReCiv ${version}" > release-notes.md
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "RECIV_VERSION=${version}" > release-version.env

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: reciv-release-notes
          path: release-notes.md
          retention-days: 1

      - name: Upload version
        uses: actions/upload-artifact@v4
        with:
          name: reciv-release-version
          path: release-version.env
          retention-days: 1

  android:
    name: Build Android APK
    needs: release-info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: reciv-release-version

      - uses: actions/setup-java@v5
        with:
          cache: gradle
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Apply release version
        shell: bash
        run: |
          set -euo pipefail
          source release-version.env
          python3 tools/releases/apply_reciv_version.py "$RECIV_VERSION"

      - name: Generate Reciv vanilla content
        run: python3 tools/mods/mod_repo_manager.py generate-reciv-vanilla

      - name: Prepare Android signing key
        shell: bash
        env:
          RECIV_ANDROID_KEYSTORE_BASE64: ${{ secrets.RECIV_ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$RECIV_ANDROID_KEYSTORE_BASE64" ]; then
            echo "No Android release keystore secret configured; release APK will be unsigned."
            exit 0
          fi
          echo "$RECIV_ANDROID_KEYSTORE_BASE64" | base64 --decode > android/reciv-release.keystore

      - name: Build debug and release APKs
        env:
          RECIV_ANDROID_KEYSTORE_PATH: android/reciv-release.keystore
          RECIV_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.RECIV_ANDROID_KEYSTORE_PASSWORD }}
          RECIV_ANDROID_KEY_ALIAS: ${{ secrets.RECIV_ANDROID_KEY_ALIAS }}
          RECIV_ANDROID_KEY_PASSWORD: ${{ secrets.RECIV_ANDROID_KEY_PASSWORD }}
          RECIV_ANDROID_KEYSTORE_BASE64: ${{ secrets.RECIV_ANDROID_KEYSTORE_BASE64 }}
        run: |
          ./gradlew :android:assembleDebug
          ./gradlew :android:assembleRelease

      - name: Stage Android artifacts
        env:
          RECIV_ANDROID_KEYSTORE_BASE64: ${{ secrets.RECIV_ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p release-artifacts
          cp android/build/outputs/apk/debug/*.apk "release-artifacts/ReCiv-${{ needs.release-info.outputs.version }}-android-debug.apk"
          if [ -n "$RECIV_ANDROID_KEYSTORE_BASE64" ]; then
            cp android/build/outputs/apk/release/*.apk "release-artifacts/ReCiv-${{ needs.release-info.outputs.version }}-android-release-signed.apk"
          else
            cp android/build/outputs/apk/release/*.apk "release-artifacts/ReCiv-${{ needs.release-info.outputs.version }}-android-release-unsigned.apk"
          fi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reciv-android
          path: release-artifacts/*.apk

  windows:
    name: Build Windows portable ZIP
    needs: release-info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: reciv-release-version

      - uses: actions/setup-java@v5
        with:
          cache: gradle
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Apply release version
        shell: bash
        run: |
          set -euo pipefail
          source release-version.env
          python3 tools/releases/apply_reciv_version.py "$RECIV_VERSION"

      - name: Generate Reciv vanilla content
        run: python3 tools/mods/mod_repo_manager.py generate-reciv-vanilla

      - name: Build desktop JAR
        run: ./gradlew desktop:dist

      - name: Build Windows package with Packr
        run: |
          wget -q -O packr-all-4.0.0.jar https://github.com/libgdx/packr/releases/download/4.0.0/packr-all-4.0.0.jar
          wget -q -O jdk-windows-64.zip https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse
          ./gradlew desktop:packrWindows64

      - name: Stage Windows artifact
        run: |
          mkdir -p release-artifacts
          cp deploy/ReCiv-Windows64.zip "release-artifacts/ReCiv-${{ needs.release-info.outputs.version }}-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: reciv-windows
          path: release-artifacts/*.zip

  linux:
    name: Build Linux portable ZIP
    needs: release-info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: reciv-release-version

      - uses: actions/setup-java@v5
        with:
          cache: gradle
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Apply release version
        shell: bash
        run: |
          set -euo pipefail
          source release-version.env
          python3 tools/releases/apply_reciv_version.py "$RECIV_VERSION"

      - name: Generate Reciv vanilla content
        run: python3 tools/mods/mod_repo_manager.py generate-reciv-vanilla

      - name: Build desktop JAR
        run: ./gradlew desktop:dist

      - name: Build Linux package with Packr
        run: |
          wget -q -O packr-all-4.0.0.jar https://github.com/libgdx/packr/releases/download/4.0.0/packr-all-4.0.0.jar
          wget -q -O jre-linux-64.tar.gz https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jre/hotspot/normal/eclipse
          ./gradlew desktop:packrLinux64

      - name: Stage Linux artifact
        run: |
          mkdir -p release-artifacts
          cp deploy/ReCiv-Linux64.zip "release-artifacts/ReCiv-${{ needs.release-info.outputs.version }}-linux-x64.zip"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: reciv-linux
          path: release-artifacts/*.zip

  macos:
    name: Build macOS portable ZIP
    needs: release-info
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: reciv-release-version

      - uses: actions/setup-java@v5
        with:
          cache: gradle
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Apply release version
        shell: bash
        run: |
          set -euo pipefail
          source release-version.env
          python3 tools/releases/apply_reciv_version.py "$RECIV_VERSION"

      - name: Generate Reciv vanilla content
        run: python3 tools/mods/mod_repo_manager.py generate-reciv-vanilla

      - name: Build desktop JAR
        run: ./gradlew desktop:dist

      - name: Build macOS package with Packr
        run: |
          wget -q -O packr-all-4.0.0.jar https://github.com/libgdx/packr/releases/download/4.0.0/packr-all-4.0.0.jar
          wget -q -O jre-macOS.tar.gz https://api.adoptium.net/v3/binary/latest/21/ga/mac/x64/jre/hotspot/normal/eclipse
          ./gradlew desktop:packrMacOS

      - name: Stage macOS artifact
        run: |
          mkdir -p release-artifacts
          cp deploy/ReCiv-MacOS.zip "release-artifacts/ReCiv-${{ needs.release-info.outputs.version }}-macos-x64.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: reciv-macos
          path: release-artifacts/*.zip

  publish:
    name: Publish GitHub release
    needs:
      - release-info
      - android
      - windows
      - linux
      - macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: reciv-release-notes

      - uses: actions/download-artifact@v4
        with:
          name: reciv-android
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: reciv-windows
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: reciv-linux
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: reciv-macos
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-info.outputs.tag }}
          name: ReCiv ${{ needs.release-info.outputs.version }}
          body_path: release-notes.md
          prerelease: ${{ needs.release-info.outputs.prerelease }}
          files: release-artifacts/*
