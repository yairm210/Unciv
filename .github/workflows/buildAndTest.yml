# Jobs to test the code base and build the client and server app
name: Build and test

on:
  # Triggers the workflow on any push or pull request
  push:
  pull_request_target:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # We only need the minimum

  code-checks:
    name: Check code and run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          cache: 'gradle'
          distribution: 'temurin'
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate Reciv vanilla content
        run: python3 tools/mods/mod_repo_manager.py generate-reciv-vanilla

      - name: Compile kotlin and build classes
        run: ./gradlew classes

      - name: Run code checks
        id: run_checks
        continue-on-error: true
        run: |
          ./gradlew check --stacktrace 2>&1 | tee check_output.log
          echo "check_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Extract test failures
        if: steps.run_checks.outputs.check_exit_code != '0'
        id: extract_failures
        run: |
          # Extract relevant failure information from check output, falling back to the tail when Gradle does not emit test-style markers.
          awk '/FAILED|FAILURE:|Execution failed|Exception|STANDARD_OUT|> Task .* FAILED/{p=1} p{print} /^[[:space:]]*$/ && p{p=0}' check_output.log | head -200 > test_failures.txt

          if [ ! -s test_failures.txt ]; then
            tail -200 check_output.log > test_failures.txt
          fi

          {
            echo "## Gradle check failure excerpt"
            echo
            echo '```text'
            cat test_failures.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          cat test_failures.txt

          # Create multiline output for GitHub
          echo "failures<<EOF" >> $GITHUB_OUTPUT
          cat test_failures.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload check output
        if: steps.run_checks.outputs.check_exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: reciv-gradle-check-output
          path: check_output.log
          retention-days: 7

      - name: Comment test failures on PR
        if: steps.run_checks.outputs.check_exit_code != '0' && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ACTIONS_ACCESS_TOKEN }}
          script: |
            const fs = require('fs');
            const failures = fs.readFileSync('test_failures.txt', 'utf8');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## Test Failures Detected

            The following tests failed in this PR:

            \`\`\`
            ${failures}
            \`\`\`

            [View full test output](${runUrl})
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Fail workflow if checks failed
        if: steps.run_checks.outputs.check_exit_code != '0'
        run: exit 1
