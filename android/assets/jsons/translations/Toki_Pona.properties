Tutorial Task: [Move unit] = nasin kama sona Task: [Move unit]
Move a unit! = tawa!
Click on a unit → Click on a destination → Click the arrow popup. = o pilin lon tawa → o pilin lon → o pilin ijo lipu lili.

Found a city! = alasa ma tomo!
Select the Settler → Click on 'Found city'. = o alasa e jan open ma tomo → o pilin lon 'alasa ma tomo.

Enter the city screen! = pana ma tomo lipu lukin!
Click the city button twice. = o pilin ma tomo nena.

Pick a technology to research! = alasa sona sin tawa kama sona!
Click on the tech button → Select technology → Click 'Research' (bottom right). = o pilin lon sona sin nena → anu sona sin → o pilin 'kama sona (poka pona).

Pick a construction! = alasa pali!
Enter city screen → Click on a unit or building → Click 'add to queue'. = pana ma tomo lipu lukin → o pilin lon tawa anu tomo → o pilin 'pana tawa linja pali.

Pass a turn! = Pass tenpo musi!
Cycle through units with 'Next unit' → Click 'Next turn'. = tawa sike kepeken tawa poka 'kama tawa → o pilin 'kama tenpo musi.

Reassign worked tiles! = o alasa sin e ma lili pali!
Enter city screen → Click the assigned tile to unassign → Click an unassigned tile to assign population. = pana ma tomo lipu lukin → o pilin pana ma lili tawa → o pilin ijo ma lili tawa pana mute jan.

Got it = kama jo ona
Meet another civilization! = o kama lukin e kulupu ma ante!
Explore the map until you encounter another civilization! = Explore lipu ma ijo sina ante kulupu ma!

Open the options dialog! = open nasin!
Click the menu button (top left) → Click 'Options'. = o pilin lipu alasa nena (poka ante) → o pilin 'nasin.

Construct an improvement! = pali pali ma!
Construct a Worker unit → Move it to a Plains or Grassland tile → Click 'Construct improvement' → Choose the farm → Leave the worker there until it's finished. = pali jan pali tawa → tawa ona tawa ma supa anu ma kasi lili ma lili → o pilin 'pali pali ma → anu ma moku → Leave jan pali lon ni ijo ona pini.

Create a trade route! = o pali esun nasin!
Construct roads between your capital and another city. Or, automate your worker and let him get to that eventually. = pali nasin lon insa sina ma tomo lawa en ante ma tomo. anu, ijo jan sina pali en o ken e ona kama jo tawa ni.

Conquer a city! = kama jo ma tomo!
Bring an enemy city down to low health → Enter the city with a melee unit. = Bring jan utala ante ma tomo tawa pona sijelo → pana ma tomo poka tawa.

Move an air unit! = tawa kon tawa!
Select an air unit → Select another city within range → Move the unit to the other city. = o alasa e kon tawa → anu ante ma tomo ijo ma pi ken → tawa ante ma tomo.

See your stats breakdown! = o lukin e sona nanpa sina!
Enter the Overview screen (top right corner) → Click on 'Stats'. = pana lukin ale lipu lukin (poka pona ijo) → o pilin lon 'sona nanpa.


