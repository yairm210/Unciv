#################### Lines from Global Tutorials ####################

Welcome to Unciv!\nBecause this is a complex game, there are basic tasks to help familiarize you with the game.\nThese are completely optional, and you're welcome to explore the game on your own! = kama pona tawa Unciv!\ntan ni la ni li musi, lon ni li tawa pana sona ijo sina poka musi.\nni mute li, en sina li kama pona tawa musi lon sina!

Welcome to Unciv! = kama pona tawa Unciv!
Because this is a complex game, there are some tutorials to help familiarize you with it. These can be disabled in the Options -> Display menu, but please hang on if you're new here! = tan ni la ni li musi, lon ni li mute lipu sona tawa pana sona ijo sina poka ona. ni mute ken ken ala lon nasin -> lukin lipu alasa, taso lon la sina li sin lon ni!
Your first mission is to found your capital city. This is actually an important task because your capital city will probably be your most prosperous. Many game bonuses apply only to your capital city, and it will be the center of your empire. = sina open li tawa alasa sina ma tomo lawa ma tomo. ni li tan ni la sina ma tomo lawa ma tomo li kama ijo sina suli mute. mute musi pana namako ijo taso tawa sina ma tomo lawa ma tomo, en ona li kama insa pi sina kulupu ma.
How do you know a city location is appropriate? Luckily, the game has already chosen a good location for you. You can settle in this place, or maybe move a turn to found on a Hill (for Production and defence) or next to a Mountain (to gain access to the Observatory building later on). = nasin seme pali sina sona ma tomo li? Luckily, musi li jo e lon tenpo pini la alasa pona tawa sina. sina ken lon ni, anu ken la tawa tenpo musi tawa alasa lon nena (tawa pali en awen) anu kama tawa nena suli (tawa kama jo kama jo tawa Observatory tomo lon).
You'll likely want more cities later on. For these cities, you must go and find a good place. Looking for and founding on or near Luxury resources is a good rule of thumb. = tenpo kama la sina wile jo e ma tomo mute. tawa ma tomo ni la o alasa e ma pona. ma poka ijo pona li pona tawa open ma tomo.
Luxury resources are tiles that have things like Gems, Cotton, or Silk (indicated by a yellow background of the resource icon). These resources make your civilization happy. You should also keep an eye out for resources needed to build units, such as Iron. Cities cannot be built within 3 tiles of existing cities, which is another thing to keep in mind! = ijo tawa en kulupu utala li awen e ma sina. o kepeken ona kepeken sona lon utala en lon awen.
Cities will house Citizens, which can work tiles up to 3 tiles away from the city. This means you don’t have to settle cities right on or next to good tiles. Let’s say, for example, that you want access to some Iron – but the resource is in a desert area. You don’t have to settle your city in the desert. You can settle a few tiles away in more prosperous lands. Your city will grow and eventually gain access to the resource. You only need to settle right on top of resources if you need them immediately. = ma tomo li insa suli pi kulupu ma. o pali e tomo, o lawa e jan, o pana e pali tawa kama pona.
The first thing coming out of your city depends on the strategy you want to follow, but the 'classic' build order is to build first two Scouts, then a Shrine, and three Settlers, and adopt Tradition, to explore the map quickly (Scouts ignore terrain cost), and to get an early Pantheon (if you're playing with religion enabled). = ma tomo li insa suli pi kulupu ma. o pali e tomo, o lawa e jan, o pana e pali tawa kama pona.
But feel free to experiment with your own build orders! = taso ijo mani ala tawa poka sina pali nasin lawa!

In your first couple of turns, you will have very little options, but as your civilization grows, so do the number of things requiring your attention. = jan lawa o, kulupu jan sina li toki pona tawa sina. tenpo pini sina li jo e wawa mute e sona mute. sina ken ala ken lawa e kulupu ma sina tawa kama pona lon tenpo kama?

Culture and Policies = nasin en nasin lawa
Each turn, the culture you gain from all your cities is added to your Civilization's culture.\nWhen you have enough culture, you may pick a Social Policy, each one giving you a certain bonus. = ale tenpo musi, nasin sina kama jo tan ale sina ma tomo li pana tawa sina kulupu ma pi nasin.\nla sina jo e nasin, sina ken alasa kulupu jan nasin lawa, ale wan pana ijo sina pana namako.
The policies are organized into branches, with each branch providing a bonus ability when all policies in the branch have been adopted. = nasin lawa li tawa insa, poka ale ijo pana pana namako ken la ale nasin lawa lon jo e kama jo.
With each policy adopted, and with each city built,\n  the cost of adopting another policy rises - so choose wisely! = poka ale nasin lawa kama jo, en poka ale ma tomo pali,\nmani wile pi ante nasin lawa ijo - ni la anu!

City Expansion = ma tomo Expansion
Once a city has gathered enough Culture, it will expand into a neighboring tile.\nYou have no control over the tile it will expand into, but tiles with resources and higher yields are prioritized. = ma tomo li jo e nasin mute la ona li suli tawa ma lili poka.\nsina lawa ala e ma lili ni, taso ma lili jo e ijo jo en pana suli li nanpa open.
Each additional tile will require more culture, but generally your first cities will eventually expand to a wide tile range. = ale ijo ma lili kama wile mute ante nasin, taso ijo sina open ma tomo li kama tawa ma lili ma pi ken.
Although your city will keep expanding forever, your citizens can only work 3 tiles away from city center.\nThis should be taken into account when placing new cities. = taso sina ma tomo li kama lon tenpo ale, jan sina ma ken taso pali 3 ma lili tan ma tomo insa.\nni ken kama jo tawa insa poki la sin ma tomo.

Food is the resource fundamental to your Cities', and as a result Nation's, population and health. = moku li jo tawa sina ma tomo, en sama ijo kulupu ma pi, mute jan en pona sijelo.
Every Citizen in each City consumes Food per turn. Any left over is considered Growth and is stored in the City Center. Once enough accumulates, the City Grows and a new Citizen is added. = ale jan ma lon ale ma tomo ijo moku ijo tenpo musi. ale poka ante lon sewi li lukin kama suli en li lon ma tomo insa. lon tenpo wan, ma tomo Grows en sin jan ma li pana.
Initially your main source of Food is the City Center itself and working a surrounding tile with a Citizen. You can increase how much is generated by gaining more Citizens to work more tiles, improving the tiles so that they yield more Food, and eventually Buildings and Policies. = ma tomo li insa suli pi kulupu ma. o pali e tomo, o lawa e jan, o pana e pali tawa kama pona.
Since a city's number of Citizens, or Population, determines how many tiles a City can work, Food is often the most important Resource. = tan tenpo ni la ma tomo pi nanpa pi jan ma, anu mute jan, ijo nasin seme mute ma lili ma tomo ken pali, moku li suli mute ijo jo.

Production is the resource that lets a City Center build new things. = pali jo ni o ken e ma tomo insa pali sin.
This can be new Buildings that are added to the City Center, or new Units that can go out across the World Map to advance your Nation's goals. = ni ken tomo sin lon insa ma tomo, anu ijo tawa sin pi tawa lon lipu ma tawa wile kulupu ma sina.
Everything you can build has a Production Cost. Every turn each City generates a certain amount of Production and puts it towards whatever is at the top of the Build Queue. Once the total cost is collected, the Building or Unit is built! = ma tomo li insa suli pi kulupu ma. o pali e tomo, o lawa e jan, o pana e pali tawa kama pona.
Any excess Production after something is built is overflowed to the next thing the City builds. Up to it's total Production Cost. = pali namako pi ijo pini li tawa ijo kama pi ma tomo. taso ona li ken tawa mute pi pali wile ona taso.
Since this determines how quickly you can build more stuff, your Nation's Production Capacity is crucial to it's advancement and survival. = tan tenpo ni la ni ijo nasin seme ijo sina ken pali mute ante, sina kulupu ma pi pali Capacity li tawa ona pi en.

⍾Science is the resource that unlocks new and exciting Technologies for your Nation. = ⍾sona li jo ni ijo sin en ijo sona sin tawa sina kulupu ma.
Once you've Founded your Capital, you'll be prompted to Pick a Technology to Research. = lon tenpo wan ijo pali open sina ma tomo lawa, tawa alasa sona sin tawa kama sona.
Every Technology costs an amount of ⍾Science. Every turn the ⍾Science your Nation produces is paid towards Researching your chosen Technology. = ale sona sin mani wile mute pi ⍾sona. ale tenpo musi ⍾sona sina kulupu ma li tawa Researching sina alasa sona sin.
Once a Technology has it's cost fully paid, you unlock the benefits for your Nation! This could be new Units, Buildings, or other advantages. Any surplus will overflow into the next Technology you pick to Research. = lon tenpo wan sona sin li jo e ona pi mani wile, ijo sina tawa sina kulupu ma! ni ken sin tawa, tomo, anu ante. ale li kama tawa insa kama sona sin sina alasa tawa kama sona.
Researching a Technology in the next Era will advance you into that Era and trigger a notification to other Nations about how amazing you are! = sona en nasin li open e ken sin. o alasa e sona pona tawa nasin musi sina.
Since new Technologies tend to give access to better Units, Buildings, and even unlock powerful new Policies, staying ahead of the competition is one of the best ways to secure your Victory! = sona sin li open e ijo tawa pona, tomo pona, en nasin lawa wawa. sina awen lon sinpin jan ante la nasin pi kama pona sina li wawa.

Ah Gold. The Universal Medium of Exchange. Everyone loves Gold! They say it can't buy Happiness, but nuclear submarines are almost as good. = a, mani. jan ale li wile e mani lon esun. ona li toki e ni: mani li ken ala esun e pilin pona. taso tomo tawa telo pi wawa suno li pona mute kin.
You can earn more Gold from Tiles, Resources, Improvements, and eventually Buildings, Specialists, and Trade Routes. Ancient Ruins, meeting new City-States, and Pillaging are also great sources of Gold. During a Golden Age every Tile that already yields Gold will yield an additional Gold! = pilin pona li suli tawa kulupu ma sina. pilin ike li mute la musi li kama ike; o pali e tomo pona anu o kama jo e ijo pona.
Gold is how you pay for Building Maintenance, Transportation Upkeep, and Unit Upkeep. If you run out of Gold, first you'll receive penalties to your ⍾Science production, then eventually your Units will start Disbanding as you can't pay their upkeep. = mani li tawa mani awen pi tomo, nasin tawa, en ijo tawa. mani li weka la sina kama jo e ike tawa pali sona; lon tenpo kama la ijo tawa sina li weka tan mani awen ala.
Gold can be used to Buy Buildings and Units, helping bring up a new City or quickly build an Army. It can also buy Tiles to add to your City. It's also used to Upgrade your units from their older, obsolete forms to new, stronger versions. And investing it into a Research Agreement is a great way to convert it into ⍾Science. = sina ken kepeken mani tawa esun e tomo en ijo tawa, tawa pona e ma tomo sin anu pali wawa e kulupu utala. sina ken esun e ma lili, kama wawa e ijo tawa majuna, anu pana e mani lon lipu kama sona tawa kama jo e sona.
Gold is also very valuable in Diplomacy. You can directly Gift Gold to City-States to gain their favor. Use it to balance a Trade Deal with other Nations. Or demand every last drop after a successful war and your enemy sues for peace. = mani li suli kin lon toki kulupu. sina ken pana e mani tawa ma tomo lili tawa kama pona lon pilin ona. sina ken kepeken mani tawa sama e esun poka kulupu ma ante, anu wile e mani tan jan utala lon pini utala.
Ironically, some may consider Gold to be one of the less important Resources. But it's flexible nature and importance to keep your Nation running makes it a precious thing to pay attention to. After all, everyone loves Gold. = jan mute ken pilin e ni: mani li ijo jo lili suli. taso mani li ken pali mute li awen e kulupu ma sina. tan ni la ona li ijo suli. jan ale li olin e mani.
Not to be confused with the Resource of the same name, Gold Ore = o pana ala sama e ni poka ijo jo nimi sama: kiwen mani
Trade Route = nasin esun
See also: [param] = o lukin kin e [param]
Research Agreements = lipu wile pi kama sona

As cities grow in size and influence, you have to deal with a happiness mechanic that is no longer tied to each individual city.\nInstead, your entire empire shares the same level of satisfaction.\nAs your cities grow in population you’ll find that it is more and more difficult to keep your empire happy. = ma tomo li kama suli la pilin pona li kama suli tawa kulupu ma ale.\nma tomo wan taso ala li jo e pilin pona; kulupu ma ale li jo e pilin sama.\njan ma li mute la awen e pilin pona li kama pali suli.
In addition, you can’t even build any city improvements that increase happiness until you’ve done the appropriate research.\nIf your empire’s happiness ever goes below zero the growth rate of your cities will be hurt.\nIf your empire becomes severely unhappy (as indicated by the smiley-face icon at the top of the interface)\n  your armies will have a big penalty slapped on to their overall combat effectiveness. = sona sin wile li lon ala la sina ken ala pali e tomo pi pilin pona.\npilin pona pi kulupu ma li anpa tan 0 la kama suli pi ma tomo li kama ike.\npilin ike li mute mute la sitelen pilin lon sewi pi lukin ilo li toki e ni:\n  wawa utala pi kulupu utala sina li kama anpa mute.
This means that it is very difficult to expand quickly in Unciv.\nIt isn’t impossible, but as a new player you probably shouldn't do it.\nSo what should you do? Chill out, scout, and improve the land that you do have by building Workers.\nOnly build new cities once you have found a spot that you believe is appropriate. = tan ni la pali ma tomo sin lon tenpo lili li ike lon Unciv.\nken la sina pali e ni, taso jan sin o pali ala e ni.\no awen, o alasa sona e ma, o pona e ma sina kepeken jan pali.\no pali e ma tomo sin taso lon ma pona sina alasa.

Unhappiness = pilin ike
It seems that your citizens are unhappy!\nWhile unhappy, your civilization will suffer many detrimental effects, increasing in severity as unhappiness gets higher. = lukin la jan ma sina li pilin ike!\npilin ike la kulupu ma sina li kama jo e ike mute; pilin ike li suli la ike li suli.
Unhappiness has two main causes: Population and cities.\n  Each city causes 3 unhappiness, and each population, 1 = pilin ike li kama tan ijo suli tu: mute jan en ma tomo.\n  ma tomo ale li pana e pilin ike 3; jan ale li pana e pilin ike 1
There are 2 main ways to combat unhappiness:\n  by building happiness buildings for your population\n  or by having improved luxury resources within your borders. = nasin suli tu li weka e pilin ike:\n  o pali e tomo pi pilin pona tawa jan ma\n  anu o pona e ijo pona lon ma sina.

You have entered a Golden Age!\nGolden age points are accumulated each turn by the total happiness \n  of your civilization\nWhen in a golden age, culture and production generation increases +20%,\n  and every tile already providing at least one gold will provide an extra gold. = sina kama lon tenpo mani!\nlon tenpo musi ale la pilin pona ale pi kulupu ma sina\n  li kama nanpa pi tenpo mani.\nlon tenpo mani la nasin en pali li kama suli +20%,\n  en ma lili jo mani li pana e mani namako.

Roads and Railroads = nasin en nasin ma kiwen
Roads reduce the Movement Points required to move between two tiles connected by Roads. = nasin li lili e nanpa tawa wile tawa tawa lon insa ma lili tu wan poka nasin.
Railroads improve this reduction even more! = nasin ma kiwen li lili mute e nanpa tawa wile!
This greatly improves the speed you can get Units around the map. = ni li suli e wawa tawa ijo tawa lon lipu ma.
Until you research the technology that removes it, Roads do not cross Rivers = sina kama sona e sona sin weka e ni la nasin li ken ala tawa lon sewi telo tawa.
Connecting your cities to the capital by Roads and/or Railroads will generate Gold via the Trade Route. = nasin anu nasin ma kiwen li wan e ma tomo sina tawa ma tomo lawa la nasin esun li pana e mani.
However, since each Road and Railroad have a Maintenance Cost, it may be more economical to wait until the cities grow and only place where needed. = taso nasin en nasin ma kiwen li wile e mani awen. ken la o awen tawa tenpo ni: ma tomo li kama suli, la o pali taso lon ma wile.

Connecting your cities to the capital by Roads and/or Railroads will generate Gold via the Trade Route. You earn more Gold the more Population the City and your Capital has. = nasin anu nasin ma kiwen li wan e ma tomo sina tawa ma tomo lawa la nasin esun li pana e mani. jan ma mute lon ma tomo en lon ma tomo lawa la mani li mute.
Note that each road costs 1 Gold Maintenance per turn, and each Railroad costs 2 Gold, so it may be more economical to wait until the cities grow! = nasin ale li wile e mani awen 1 lon tenpo musi; nasin ma kiwen ale li wile e mani 2. ni la ken la o awen tawa tenpo ma tomo li kama suli!
Railroads connecting a city to the Capital also provide a 25% Production Boost to the City, but not the Capital. = nasin ma kiwen li wan e ma tomo tawa ma tomo lawa la ona li pana e +25% pali tawa ma tomo; taso ma tomo lawa li kama jo ala e ni.
Trade Routes are also connected over Water via certain buildings like the Harbor. As long as there is a chain that can reach the Capital, there's a Trade Route. Look for this symbol in Yellow below the City Name to mean you have an active Trade Route to your Capital. = nasin esun li ken wan kin lon sewi telo kepeken tomo sama tomo telo. linja li ken tawa ma tomo lawa la nasin esun li lon. sitelen jelo lon anpa nimi ma tomo li toki e ni: nasin esun tawa ma tomo lawa li pali.
Trade Routes can get broken either by Blockades or by Removing/Pillaging the connecting Road/Railroad chain. = nasin esun li ken pakala tan pini telo anu tan weka/lanpan e nasin anu nasin ma kiwen.
City Blockade = pini telo pi ma tomo

Once you’ve settled 3-4 cities and build universities, you’re probably already 100 to 150 turns into the game.\nNow is a good time to start thinking about how, exactly, you want to win – if you haven’t already. = sina awen lon ma tomo 3 anu 4 li pali e tomo sona suli la ken la tenpo musi 100 tawa 150 li pini.\ntenpo ni li pona tawa pilin e nasin kama pona sina.
There are four ways to win in Unciv. They are:\n - Cultural Victory: Complete 5 Social Policy Trees and build the Utopia Project\n - Domination Victory: Conquer the original capital of all other Major civs\n - Science Victory: Be the first to construct a Spaceship\n - Diplomatic Victory: Build the United Nations and win the vote = lon Unciv la nasin kama pona li tu tu:\n - kama pona nasin: o pini e kulupu nasin lawa 5, o pali e pali pi ma pona\n - kama pona lawa: o kama jo e ma tomo lawa open pi kulupu ma suli ante ale\n - kama pona sona: o pali nanpa wan e tomo tawa mun\n - kama pona toki kulupu: o pali e kulupu ma wan, o kama pona lon alasa jan
So to sum it up, these are the basics of Unciv – Found a prosperous first city, expand slowly to manage happiness, and set yourself up for the victory condition you wish to pursue.\nObviously, there is much more to it than that, but it is important not to jump into the deep end before you know how to swim. = sona open pi Unciv li ni: o pali e ma tomo open pona, o suli lili lili tawa awen pilin pona, o alasa e nasin kama pona sina.\nsona mute ante li lon, taso o kama sona lili lon open, la o tawa insa suli.

Enemy City = ma tomo pi jan utala
Cities can be conquered by reducing their health to 1, and entering the city with a melee unit.\nSince cities heal each turn, it is best to attack with ranged units and use your melee units to defend them until the city has been defeated! = sina ken kama jo e ma tomo tan ni: o lili e pona sijelo ona tawa 1, la o pana e ijo tawa pi utala poka lon ma tomo.\nma tomo li kama pona sijelo lon tenpo musi ale; ni la o utala kepeken ijo tawa weka, o awen e ona kepeken ijo tawa poka tawa tenpo ni: ma tomo li anpa.

Luxury Resource = ijo jo pona
Luxury resources within your domain and with their specific improvement are connected to your trade network.\nEach unique Luxury resource you have adds 5 happiness to your civilization, but extra resources of the same type don't add anything, so use them for trading with other civilizations! = ijo jo pona lon ma sina en pali ma ona li wan tawa nasin esun sina.\nijo jo pona ante ale li pana e pilin pona 5 tawa kulupu ma sina; taso ijo jo sama namako li pana ala, ni la o esun e ona tawa kulupu ma ante!

Strategic Resource = ijo jo utala
Strategic resources within your domain and with their specific improvement are connected to your trade network.\nStrategic resources allow you to train units and construct buildings that require those specific resources, for example the Horseman requires Horses. = ijo jo utala lon ma sina en pali ma ona li wan tawa nasin esun sina.\nijo jo utala li ken e pali pi ijo tawa en tomo ni li wile e ijo jo ni; sama la jan tawa soweli li wile e soweli.
Unlike Luxury Resources, each Strategic Resource on the map provides more than one of that resource.\nThe top bar keeps count of how many unused strategic resources you own.\nA full drilldown of resources is available in the Resources tab in the Overview screen. = ante tan ijo jo pona la ijo jo utala wan lon lipu ma li pana e mute pi ijo jo ni.\nlinja sewi li nanpa e ijo jo utala ni sina jo taso kepeken ala.\nsona ale pi ijo jo li lon lipu Ijo Jo lon lukin ale.

The city can no longer put up any resistance!\nHowever, to conquer it, you must enter the city with a melee unit = ma tomo li ken ala awen utala!\ntaso tawa kama jo e ona la o pana e ijo tawa pi utala poka lon ma tomo

After Conquering = lon tenpo kama jo
When conquering a city, you can choose to liberate, annex, puppet, or raze the city. = sina kama jo e ma tomo la sina ken pana sin, kama jo ale, lawa lili, anu pakala e ona.
\nLiberating the city will return it to its original owner, giving you a massive diplomatic boost with them!\n\nAnnexing the city will give you full control over it, but also increase the citizens' unhappiness to 2x!\nThis can be mitigated by building a courthouse in the city, returning the citizen's unhappiness to normal.\n\nPuppeting the city will mean that you have no control on the city's production.\nThe city will not increase your tech or policy cost.\nA puppeted city can be annexed at any time, but annexed cities cannot be returned to a puppeted state!\n\nRazing the city will lower its population by 1 each turn until the city is destroyed!\nYou cannot raze a city that is either the starting capital of a civilization or the holy city of a religion. = \npana sin e ma tomo la ona li tawa jan lawa ona pi tenpo pini; ni li pona mute tawa toki kulupu.\n\nkama jo ale e ma tomo la sina lawa ale e ona, taso pilin ike pi jan ma li kama 2x.\nsina ken lili e pilin ike ni kepeken tomo lawa.\n\nlawa lili e ma tomo la sina lawa ala e pali ona.\nma tomo ni li suli ala e mani wile pi sona sin anu nasin lawa.\nma tomo lawa lili ken kama jo ale lon tenpo ale; taso ma tomo kama jo ale ken ala kama sin tawa lawa lili.\n\npakala e ma tomo la jan ma li lili 1 lon tenpo musi ale tawa tenpo pakala ale.\nsina ken ala pakala e ma tomo lawa open anu ma tomo sewi pi nasin sewi.

You have encountered a barbarian unit!\nBarbarians attack everyone indiscriminately, so don't let your \n  civilian units go near them, and be careful of your scout! = sina kama lukin e ijo tawa pi jan utala ike!\njan utala ike li utala e jan ale; ni la o ken ala e ni:\n  ijo tawa pi utala ala sina li tawa poka ona; o awen e jan alasa sina!

You have encountered another civilization!\nOther civilizations start out peaceful, and you can trade with them,\n  but they may choose to declare war on you later on = sina kama lukin e kulupu ma ante!\nkulupu ma ante li open kepeken utala ala, en sina ken esun poka ona,\n  taso lon tenpo kama la ona ken open e utala tawa sina.

Injured Units = ijo tawa pakala
Injured units deal less damage, but recover after turns that they have been inactive.\nUnits heal 10 health per turn in enemy territory or neutral land,\n  20 inside your territory and 25 in your cities. = ijo tawa pakala li pana e pakala lili, taso ona li pona sijelo lon tenpo musi ni ona li pali ala.\nijo tawa li pona sijelo 10 lon ma jan utala anu ma poka ala,\n  20 lon ma sina, en 25 lon ma tomo sina.

Workers = jan pali
Workers are vital to your cities' growth, since only they can construct improvements on tiles.\nImprovements raise the yield of your tiles, allowing your city to produce more and grow faster while working the same amount of tiles! = jan pali li suli tawa kama suli pi ma tomo sina, tan ni: ona taso li ken pali e pali ma lon ma lili.\npali ma li suli e pana pi ma lili sina, li ken e ma tomo sina tawa pali mute en kama suli wawa.

Embarking = kama lon tomo telo
Once a certain tech is researched, your land units can embark, allowing them to traverse water tiles.\nEntering or leaving water takes the entire turn. = sona sin wile li kama sona la ijo tawa ma sina li ken tawa lon tomo telo, li ken tawa lon ma lili telo.\nkama lon telo anu weka tan telo li kepeken tenpo musi ale.
Units are defenseless while embarked (cannot use modifiers), and have a fixed Defending Strength based on your tech Era, so be careful!\nRanged Units can't attack, Melee Units have a Strength penalty, and all have limited vision. = ijo tawa lon tomo telo li awen ala pona, li ken ala kepeken ante, en wawa awen ona li tan tenpo suli pi sona sin sina. o awen!\nijo tawa weka ken ala utala; ijo tawa poka li wawa lili; lukin pi ona ale li lili.

Idle Units = ijo tawa pi pali ala
Clicking 'Next unit' moves to the next idle unit in the queue (as listed in Overview -> Units). After issuing an order to an unit, if 'Auto Unit Cycle' in Options -> Gameplay is enabled, you will automatically select the next idle unit. = sina pilin e nena 'tawa kama' la sina tawa ijo tawa pi pali ala kama lon linja. sina pana e lawa tawa ijo tawa la, nasin 'tawa sike ilo pi ijo tawa' lon nasin musi li lon la, ilo li alasa e ijo tawa pi pali ala kama.
If you don't want to move a unit this turn, you can skip it by clicking 'Next unit' again, or command the unit to 'Skip turn'. = sina wile ala tawa e ijo tawa lon tenpo musi ni la sina ken pilin sin e 'tawa kama' anu pana e lawa 'weka tenpo musi'.
If you want to disable the 'Next unit' feature entirely, you can toggle it in Options -> Gameplay -> Check for idle units. = sina wile weka e nasin 'ijo tawa kama' ale la o ante e ni lon nasin > nasin musi > o lukin e ijo tawa pi pali ala.
If you'd rather 'Next unit' cycle the units and not mark them as Done, you can change it in the Options -> Gameplay menu. = sina wile e ni: 'tawa kama' li tawa sike lon ijo tawa taso, li pana ala e nimi pini la sina ken ante e ni lon lipu nasin musi.
You can also cycle through the idle units using the left and right triangles on the Unit Table in the lower left of the screen. Or by default using the Cycle button next to the 'Next Unit' button. = sina ken kin tawa sike lon ijo tawa pi pali ala kepeken sike tu lon supa ijo tawa lon anpa poka open. anu la o kepeken nena tawa sike lon poka nena 'tawa kama'.

Contact Me = o toki tawa mi
Hi there! If you've played this far, you've probably seen that the game is currently incomplete.\n Unciv is meant to be open-source and free, forever.\n That means no ads or any other nonsense. = toki! sina musi tawa ni la ken la sina lukin e ni: musi li pini ala.\n Unciv li musi malfermfonta li mani ala lon tenpo ale.\n ni li toki e ni: kulupu esun ala, nasa ante ala.
What motivates me to keep working on it, \n  besides the fact I think it's amazingly cool that I can,\n  is the support from the players - you guys are the best! = seme li awen e pali mi lon ona?\nmi pilin e ni: pali ni li pona mute.\ntaso pona tan jan musi li wawa mute tawa mi. sina mute li pona mute!
 # Requires translation!
Every rating and review that I get puts a smile on my face =)\n  So contact me! Send me an email, review, Github issue\n  or mail pigeon, and let's figure out how to make the game \n  even more awesome!\n(Contact info is in the Play Store) = 

Pillaging = lanpan
Military units can pillage improvements, which heals them 25 health and ruins the improvement.\nThe tile can still be worked, but advantages from the improvement - stat bonuses and resources - will be lost.\nWorkers can repair these improvements, which takes less time than building the improvement from scratch.\nPillaging certain improvements will result in your units looting gold from the improvement. = ijo tawa utala li ken lanpan e pali ma; ni li pona sijelo 25 e ona li pakala e pali ma.\nma lili li ken awen pali, taso pona tan pali ma - pana nanpa en ijo jo - li weka.\njan pali li ken pona e pali ma ni; ni li kepeken tenpo lili tan pali sin.\nlanpan e pali ma ante li pana e mani tawa ijo tawa sina.

Experience = sona pali
Units that enter combat gain experience, which can then be used on promotions for that unit.\nUnits gain more experience when in Melee combat than Ranged, and more when attacking than when defending. = ijo tawa li kama jo e sona pali lon utala; sona pali ni li ken kama wawa e ijo tawa.\nijo tawa li kama jo e sona pali mute lon utala poka, lili lon utala weka; li mute kin lon utala open, lili lon awen.
Units can only gain up to 30 XP from Barbarian units - meaning up to 2 promotions. After that, Barbarian units will provide no experience. = ijo tawa li ken kama jo taso e XP 30 tan ijo tawa pi jan utala ike - ni li kama wawa 2. lon tenpo pini ni, ijo tawa pi jan utala ike li pana ala e sona pali.

Combat = utala
Unit and cities are worn down by combat, which is affected by a number of different values.\nEach unit has a certain 'base' combat value, which can be improved by certain conditions, promotions and locations. = ijo tawa en ma tomo li pakala lili tan utala; pakala ni li tan nanpa mute.\nijo tawa ale li jo e nanpa wawa utala open; ken la ante, kama wawa, en ma li pona e ona.
Units use the 'Strength' value as the base combat value when melee attacking and when defending.\nWhen using a ranged attack, they will the use the 'Ranged Strength' value instead. = ijo tawa li kepeken nanpa 'wawa' sama nanpa utala open lon utala poka en lon awen.\nona li kepeken utala weka la ona li kepeken nanpa 'wawa weka'.
Ranged attacks can be done from a distance, dependent on the 'Range' value of the unit.\nWhile melee attacks allow the defender to damage the attacker in retaliation, ranged attacks do not. = utala weka li ken tan weka, tan nanpa 'weka' pi ijo tawa.\nutala poka la jan awen li ken pakala e jan utala; utala weka la ken ala.

Embassies = tomo toki
Establishing an embassy in other players' Capital city shows the location of their Capital, likewise other players who establish an embassy in your Capital can see location of your Capital. = lipu ni li pana e sona musi. o lukin e nena en lipu lukin, la sina ken sona pona e nasin musi.
Embassies thus allow Spies to be placed in another players' Capital City if Espionage is enabled. = tomo toki li ken e ni: jan lukin len li tawa ma tomo lawa pi jan ante, la lukin len li lon.
Mutual embassies are required to allow trading open borders and to sign Research Agreement and Defensive Pact. = tomo toki pi jan tu li wile tawa esun pi poka ma open, tawa lipu kama sona, en tawa lipu awen.
Declaring war on another player or denouncing them will remove embassies from both players' Capitals. You will have to re-establish them to use their effect. = sina open e utala tawa jan musi ante anu toki ike tawa ona la tomo toki li weka tan ma tomo lawa pi jan tu. sina wile pali sin e ona tawa kepeken pona ona.
Re-establishing an embassy after denunciation from either side becomes available next turn, while re-establishing them when at war requires a peace treaty. = tenpo musi kama la sina ken pali sin e tomo toki tan pini jan pona. lon utala la sina wile lipu pi utala ala tawa pali sin e ona.
Be cautious when accepting embassy from other players because they can spy on your capital, or worse may start planning to attack you. = o lukin pona la sina kama jo e tomo toki tan jan musi ante; ona ken lukin len e ma tomo lawa sina, anu open wile utala e sina.
Note that before you can offer an embassy, you need the required Technology. = o sona: sina wile pana e tomo toki la sina wile sona sin wile.
Embassies are available using the Gods and Kings ruleset. = tomo toki li ken lon nasin lawa sewi en jan lawa.
Defensive Pacts = lipu awen

Open Borders from other player and vice versa allow units to freely pass through their territory. = poka ma open tan jan musi ante li ken e ni: ijo tawa li tawa lon ma ona kepeken mani ala; sama la ijo ona li ken tawa lon ma sina.
They also let Missionaries to enter other players' territory without suffering attrition. = ona li ken e ni: jan pi toki sewi li tawa lon ma pi jan ante kepeken pakala ala.
Open Borders expire depending on game speed and are canceled upon Declaration of War, the closure however takes effect only after war ends and need to be traded again. = poka ma open li pini tan kepeken tenpo pi musi, li weka lon open utala. taso pini poka li kama lon pini utala; sina wile esun sin e ona.
You gain diplomatic boost with other AI player if you both have Open Borders to each other = sina en jan musi ilo sona ante li jo e poka ma open tawa ona ante la pilin toki kulupu li kama pona.
Be cautious when giving Open Borders because other player may settle a City near your lands in an area you are planning to use, they may also use your territory to attack your friends or City State allies. = o lukin pona la sina pana e poka ma open; jan musi ante ken pali e ma tomo lon poka ma sina, anu kepeken ma sina tawa utala e jan pona sina anu ma tomo lili poka sina.
Note that before you can offer or accept open borders, both Nations need the required Technology. = o sona: sina wile pana anu kama jo e poka ma open la kulupu ma tu li wile sona sin wile.
When playing with the Gods and Kings ruleset mutual embassies need to be established before Open Borders can be traded. = lon nasin lawa sewi en jan lawa la tomo toki pi jan tu li wile lon open; ni la poka ma open li ken esun.

In Research Agreements, you and another civilization decide to jointly research technology.\nAt the end of the agreement, you will both receive a 'lump sum' of ⍾Science, which will go towards one of your unresearched technologies. = lon lipu kama sona la sina en kulupu ma ante li toki tawa kama sona e sona sin wan.\nlon pini lipu la sina tu li kama jo e sona mute; sona ni li tawa sona sin sina pi kama sona ala.
The amount of ⍾Science you receive at the end is dependent on the ⍾Science generated by your cities and the other civilization's cities during the agreement - the more, the better! = mute sona sina kama jo lon pini li kama tan sona pi ma tomo sina en ma tomo pi kulupu ma ante lon tenpo lipu. mute li suli la pona li suli!
Note that before you can invest in a research agreement, you must have a Declaraction of Friendship, both Nations need the required Technology, and both Nations need enough Gold on hand for the agreement. = o sona: sina ken pana mani lon lipu kama sona la sina wile toki jan pona; kulupu ma tu li wile sona sin wile, li wile jo e mani mute.
When playing with the Gods and Kings ruleset mutual embassies need to be established before a Research Agreement can be signed. = lon nasin lawa sewi en jan lawa la tomo toki pi jan tu li wile lon open; ni la lipu kama sona li ken sitelen.

Defensive pacts allow you and another civ to protect one another from aggressors.\nOnce the defensive pact is signed, you will be drawn into their future defensive wars, just as they will be drawn into your future defensive wars. Declaring war on any Civ will remove all of your defensive pacts. You will have to re-sign them to use their effect. = lipu awen li ken e ni: sina en kulupu ma ante li awen e ona ante tan jan utala.\nlipu awen li lon la utala awen ona pi tenpo kama li kama utala sina kin; sama la utala awen sina li kama utala ona kin. sina open e utala tawa kulupu ma la lipu awen ale sina li weka.
Be cautious when signing defensive pacts because they can bring you into wars that you might not want to be in. = o lukin pona la sina sitelen e lipu awen; ona ken pana e sina lon utala sina wile ala.
The AI is very careful and will not accept defensive pacts with less than 80 influence. = ilo sona li lukin pona mute, li kama jo ala e lipu awen kepeken wawa pilin lili tan 80.
Note that before you can sign a defensive pact, you must have a Declaraction of Friendship, and both Nations need the required Technology. = o sona: sina ken sitelen e lipu awen la sina wile jo e toki jan pona, en kulupu ma tu li wile sona sin wile.
When playing with the Gods and Kings ruleset mutual embassies need to be established before a Defensive Pact can be signed. = lon nasin lawa sewi en jan lawa la tomo toki pi jan tu li wile lon open; ni la lipu awen li ken sitelen.

Not all nations are contending with you for victory.\nCity-States are nations that can't win, can't be traded with, and instead confer certain bonuses to friendly civilizations. = kulupu ma ale li alasa ala e kama pona sama sina.\nma tomo lili li kulupu ma lili: ona ken ala kama pona, ken ala esun sama kulupu ma suli, taso ona pana e pona tawa kulupu ma jan pona.
Instead, diplomatic relations with City-States are determined by Influence - a meter of 'how much the City-State likes you'.\nInfluence can be increased by attacking their enemies, liberating their city, and giving them sums of gold. = toki kulupu poka ma tomo lili li tan wawa pilin. wawa pilin li sama nanpa pi olin ona tawa sina.\nwawa pilin ken suli tan utala e jan ike ona, tan pana sin e ma tomo ona, tan pana mani tawa ona.
Certain bonuses are given when you are at above 30 influence.\nWhen you have above 60 Influence, and you have the highest influence with them of all civilizations, you are considered their 'Ally', and gain further bonuses and access to the Luxury and Strategic resources in their lands. = sina jo e wawa pilin lon sewi 30 la ona pana e pona.\nsina jo e wawa pilin lon sewi 60 en wawa sina li suli mute tan kulupu ma ante ale la sina jan poka ona; sina kama jo e pona namako en ijo pona en ijo utala lon ma ona.

While working the land is good, eventually your Citizens will want to Specialize. = pali lon ma li pona, taso lon tenpo kama la jan ma sina li wile pali sona.
Certain Buildings will also provide Specialist Slots. These slots will show up in the Citizen Management within the City Screen under Specialists. Each slot can be filled with a Citizen which will then become a Specialist. = tomo mute li pana e ma pali tawa jan sona. ma pali ni li lon lipu lawa jan ma pi sinpin ma tomo. jan ma ken lon ma pali wan li kama jan sona.
Each Specialist will generate a certain amount of yield as indicated to the right of the available slots. = jan sona ale li pana e mute sona/pali sama sitelen lon poka pona pi ma pali ken.
While these are a great way to specialize the yield production of a City outside of the surrounding Tile Yields, Specialists have an additional value. Each one also generates Great Person Points each turn. With enough of them, a new Great Person will join your Nation. = jan sona li ken ante e pana pi ma tomo lon weka tan ma lili. jan sona ale li pana kin e nanpa jan suli lon tenpo musi ale. nanpa ni li mute la jan suli sin li kama lon kulupu ma sina.
Great People = jan suli

Certain buildings, and specialists in cities, generate Great Person points per turn.\nThere are several types of Great People, and their points accumulate separately.\nThe number of points per turn and accumulated points can be viewed in the Overview screen. = tomo en jan sona lon ma tomo li pana e nanpa jan suli lon tenpo musi.\njan suli li jo e kule mute, en nanpa ona li kulupu ala.\nsina ken lukin e nanpa pi tenpo musi en nanpa lon lipu lukin ale.
Alternatively, the Great Person points breakdown per city can be viewed in each City Screen (see UI Tips article). = sina ken lukin kin e kipisi nanpa jan suli pi ma tomo wan wan lon sinpin ma tomo. o lukin kin e lipu sona pi sona lukin.
Once enough points have been accumulated, a Great Person of that type will be created!\nEach Great Person can construct a certain Great Improvement which gives large yields over time, or immediately consumed to provide a certain bonus now. = nanpa li mute pona la jan suli pi kule ni li kama lon!\njan suli ale ken pali e pali ma suli pi pana mute lon tenpo, anu ken kepeken lon tenpo ni tawa pana e pona.
Great Improvements also provide any strategic resources that are under them, so you don't need to worry if resources are revealed underneath your improvements! = pali ma suli li pana kin e ijo utala anpa ona. ni la sina wile monsuta ala la ijo jo li kama lukin anpa pali ma sina.

Removing Terrain Features = weka e ijo ma
Certain tiles have terrain features - like Flood plains or Forests -  on top of them. Some of these layers, like Jungle, Marsh and Forest, can be removed by workers.\nRemoving the terrain feature does not remove any resources in the tile, and is usually required in order to add improvements exploiting those resources. = ma lili ante li jo e ijo ma lon sewi ona, sama ma telo suli anu ma kasi. jan pali li ken weka e ijo ante sama kasi suli, ma telo jaki, en kasi.\nweka e ijo ma li weka ala e ijo jo lon ma lili; taso ni li wile mute tawa pali ma tawa kepeken ijo jo.

Natural Wonders, such as the Mt. Fuji, the Rock of Gibraltar and the Great Barrier Reef, are unique, impassable terrain features, masterpieces of mother Nature, which possess exceptional qualities that make them very different from the average terrain.\nThey benefit by giving you large sums of Culture, ⍾Science, Gold or Production if worked by your Cities, which is why you might need to bring them under your empire as soon as possible. = ma suli pona, sama ma sewi Fuji, kiwen Gibraltar, en selo telo suli, li ijo ma ante mute li ken ala tawa lon ona; ona li pali pona pi mama ma.\nma tomo sina li pali e ona la ona li pana e nasin mute, sona, mani, anu pali; tan ni la ken la sina wile kama jo e ona lon kulupu ma sina lon tenpo lili.

Keyboard = nena sitelen
If you have a keyboard, some shortcut keys become available. Unit command or improvement picker keys, for example, are shown directly in their corresponding buttons. = sina jo e ilo nena sitelen la nena tawa lili li kama ken. nena pali pi ijo tawa anu pali ma li lukin lon nena ona.
On the world screen the hotkeys are as follows: = lon sinpin ma la nena lili li ni:
Space or 'N' - Next unit or turn\n'E' - Empire overview (last viewed page)\n'+', '-' - Zoom in / out\nHome - center on capital or open its City Screen if already centered = Space anu 'N' - ijo tawa kama anu tenpo musi kama\n'E' - lukin ale pi kulupu ma\n'+', '-' - lukin suli/lili\nHome - tawa ma tomo lawa anu open e sinpin ona
F1 - Open Civilopedia\nF2 - Empire overview Trades\nF3 - Empire overview Units\nF4 - Empire overview Diplomacy\nF5 - Social policies\nF6 - Technologies\nF7 - Empire overview Cities\nF8 - Victory Progress\nF9 - Empire overview Stats\nF10 - Empire overview Resources\nF11 - Quicksave\nF12 - Quickload = F1 - open e lipu sona pi musi\nF2 - lukin ale esun\nF3 - lukin ale ijo tawa\nF4 - lukin ale toki kulupu\nF5 - nasin lawa\nF6 - sona sin\nF7 - lukin ale ma tomo\nF8 - nasin kama pona\nF9 - lukin ale sona nanpa\nF10 - lukin ale ijo jo\nF11 - awen lili\nF12 - pana awen lili
Ctrl-R - Toggle tile resource display\nCtrl-Y - Toggle tile yield display\nCtrl-O - Game options\nCtrl-S - Save game\nCtrl-L - Load game\nCtrl-U - Toggle UI (World Screen only) = Ctrl-R - ante lukin ijo jo lon ma lili\nCtrl-Y - ante lukin pana ma lili\nCtrl-O - nasin musi\nCtrl-S - awen e musi\nCtrl-L - pana e musi\nCtrl-U - ante lukin ilo
All of these can be reassigned. = sina ken ante e nena ale ni.

This is where you spend most of your time playing Unciv. See the world, control your units, access other screens from here. = lon ni la sina kepeken tenpo mute pi musi Unciv. sina lukin e ma ale, lawa e ijo tawa sina, li ken tawa lipu lukin ante.
①: The menu button - civilopedia, save, load, options... = ①: nena lipu - lipu sona pi musi, awen e musi, pana e musi, nasin...
②: The player/nation whose turn it is - click for diplomacy overview. = ②: jan musi/kulupu ma pi tenpo musi ni - o pilin tawa lukin toki kulupu.
③: The Technology Button - shows the tech tree which allows viewing or researching technologies. = ③: nena sona sin - li lukin e kasi sona sin; lon ona la sina ken lukin anu kama sona e sona sin.
④: The Social Policies Button - shows enacted and selectable policies, and with enough culture points you can enact new ones. = ④: nena nasin lawa - li lukin e nasin lawa lon en nasin lawa ken. sina jo e nasin mute la sina ken open e nasin sin.
⑤: The Diplomacy Button - shows the diplomacy manager where you can talk to other civilizations. = ⑤: nena toki kulupu - li lukin e ilo toki kulupu; lon ona la sina ken toki tawa kulupu ma ante.
⑥: Unit Action Buttons - while a unit is selected its possible actions appear here. = ⑥: nena pali pi ijo tawa - ijo tawa li alasa la pali ken ona li kama lukin lon ni.
⑦: The unit/city info pane - shows information about a selected unit or city. = ⑦: lipu sona pi ijo tawa/ma tomo - li lukin e sona pi ijo tawa anu ma tomo alasa.
⑧: The name (and unit icon) of the selected unit or city, with current health if wounded. Clicking a unit name or icon will open its civilopedia entry. = ⑧: nimi en sitelen pi ijo tawa anu ma tomo alasa, en pona sijelo ona lon pakala. sina pilin e nimi anu sitelen la lipu sona ona li open.
⑨: The arrow buttons allow jumping to the next/previous idle unit. = ⑨: nena palisa li tawa ijo tawa pali ala kama anu pini.
⑩: For a selected unit, its promotions appear here, and clicking leads to the promotions screen for that unit. = ⑩: lon ijo tawa alasa la kama wawa ona li lukin lon ni. sina pilin la sinpin kama wawa pi ijo tawa ni li open.
⑪: Remaining/per turn movement points, strength and experience / XP needed for promotion. For cities, you get its combat strength. = ⑪: nanpa tawa awen/lon tenpo musi, wawa, en sona pali/XP wile tawa kama wawa. lon ma tomo la ni li wawa utala ona.
⑫: This button closes the selected unit/city info pane. = ⑫: nena ni li pini e lipu sona pi ijo tawa/ma tomo alasa.
⑬: This pane appears when you order a unit to attack an enemy. On top are attacker and defender with their respective base strengths. = ⑬: lipu ni li kama lukin la sina toki e ijo tawa o utala. lon sewi la jan utala en jan awen li lon poka wawa open ona.
⑭: Below that are strength bonuses or penalties and health bars projecting before / after the attack. = ⑭: anpa la pona wawa anu ike wawa en linja pona sijelo li lukin, lon open en pini utala.
⑮: The Attack Button - let blood flow! = ⑮: nena utala - o open e utala!
⑯: The minimap shows an overview over the world, with known cities, terrain and fog of war. Clicking will position the main map. = ⑯: lipu ma lili li lukin e ma ale: ma tomo sona, ma, en len utala. sina pilin e ona la lipu ma suli li tawa ma ni.
⑰: To the side of the minimap are display feature toggling buttons - tile yield, worked indicator, show/hide resources. These mirror setting on the options screen and are hidden if you deactivate the minimap. = poka pi lipu ma lili li jo e nena ante lukin: pana ma lili, sitelen pali, lukin/len ijo jo. nena ni li sama nasin lon lipu nasin, li len la lipu ma lili li ken ala.
⑱: Tile information for the selected hex - current or potential yield, terrain, effects, present units, city located there and such. Where appropriate, clicking a line opens the corresponding civilopedia entry. = ⑱: sona ma lili alasa: pana lon anu pana ken, ma, kama, ijo tawa lon, ma tomo lon ni, en ante. lon ken la sina pilin e linja la lipu sona pi musi li open.
⑲: Notifications - what happened during the last 'next turn' phase. Some are clickable to show a relevant place on the map, some even show several when you click repeatedly. = ⑲: toki kama - ijo li lon tenpo pini pi 'tenpo musi kama'. mute li ken pilin tawa lukin ma lon lipu ma; mute li ken lukin e ma mute la sina pilin sin.
⑳: The Next Turn Button - unless there are things to do, in which case the label changes to 'next unit', 'pick policy' and so on. = ⑳: nena tenpo musi kama - ijo pali li lon la nimi ona li ante tawa 'ijo tawa kama', 'o alasa e nasin lawa', en ante.
㉑: The Multiplayer Button - Here you can easily check your active multiplayer games. = ㉑: nena musi jan mute - lon ni la sina ken lukin pona e musi jan mute sina.
ⓐ: The overview button leads to the empire overview screen with various tabs (the last one viewed is remembered) holding vital information about the state of your civilization in the world. = ⓐ: nena lukin ale li tawa sinpin lukin ale pi kulupu ma, jo e lipu mute en sona suli pi lon kulupu ma sina.
ⓑ: The ♪Culture icon shows accumulated ♪Culture and ♪Culture needed for the next policy - in this case, the exclamation mark tells us a next policy can be enacted. Clicking is another way to the policies manager. = ⓑ: sitelen ♪nasin li lukin e ♪nasin jo en ♪nasin wile tawa nasin lawa kama. sitelen ! li toki e ni: nasin lawa sin li ken open. sina pilin la ilo lawa nasin lawa li open.
ⓒ: Your known strategic resources are displayed here with the available (usage already deducted) number - click to go to the resources overview screen. = ⓒ: ijo utala sona sina li lukin lon ni poka nanpa ken. sina pilin la lipu lukin ale pi ijo jo li open.
ⓓ: Happiness/unhappiness balance and either golden age with turns left or accumulated happiness with amount needed for a golden age is shown next to the smiley. Clicking also leads to the resources overview screen as luxury resources are a way to improve happiness. = ⓓ: pilin pona/pilin ike en tenpo mani anu mute pilin pona tawa tenpo mani li lukin lon poka sitelen sinpin. sina pilin la lipu lukin ale pi ijo jo li open.
ⓔ: The ⍾Science icon shows the number of ⍾Science points produced per turn. Clicking leads to the technology tree. = ⓔ: sitelen ⍾sona li lukin e mute ⍾sona pali lon tenpo musi. sina pilin la kasi sona sin li open.
ⓕ: Number of turns played with translation into calendar years. Click to see the victory overview. = ⓕ: nanpa tenpo musi en ante ona tawa tenpo sike. o pilin tawa lukin ale pi kama pona.
ⓖ: The number of gold coins in your treasury and income. Clicks lead to the Stats overview screen. = ⓖ: nanpa mani lon poki mani sina en mani kama. sina pilin la lipu lukin ale pi sona nanpa li open.
ⓗ: The quantity of ☮Faith your citizens have generated, or 'off' if religion is disabled. Clicking it makes you go to the religion overview screen. = ⓗ: mute ☮pilin sewi tan jan ma sina, anu 'pini' la nasin sewi li ken ala. sina pilin la lipu lukin ale pi nasin sewi li open.
ⓧ: In the center of all this - the world map! Here, the "X" marks a spot outside the map. Yes, unless the wrap option was used, Unciv worlds are flat. Don't worry, your ships won't fall off the edge. = ⓧ: lon insa ale ni li lipu ma! lon ni sitelen X li lon weka pi lipu ma. ma Unciv li supa la tomo telo sina li kama anpa ala.
ⓨ: By the way, here's how an empire border looks like - it's in the national colours of the nation owning the territory. = ⓨ: ni li poka ma pi kulupu ma; ona li kepeken kule pi kulupu ma jo e ma.
ⓩ: And this is the red targeting circle that led to the attack pane back under ⑬. = ⓩ: sike loje ni li alasa utala, li tawa lipu utala lon ⑬.
What you don't see: The phone/tablet's back button will pop the question whether you wish to leave Unciv and go back to Real Life. On desktop versions, you can use the ESC key. = sina lukin ala e ni: nena monsi pi ilo toki/ilo lipu li wile sona e ni: sina wile ala wile weka tan Unciv tawa lon ante. lon ilo supa la sina ken kepeken nena ESC.

When at later stages of the game, you might have a lot of units but only a little to do. To help you we have implemented an AutoPlay feature that lets you use the AI to play part or all of your turn. = lon tenpo kama pi musi la sina ken jo e ijo tawa mute taso pali lili. musi ilo li ken e ni: ilo sona li musi e kipisi anu ale pi tenpo musi sina.
To enable AutoPlay, go to options and open the AutoPlay tab and press "Show AutoPlay button". = tawa ken e musi ilo la o tawa nasin, o open e lipu musi ilo, o pilin e 'o lukin e nena musi ilo'.
Clicking on the AutoPlay button opens a popup menue for choosing to AutoPlay parts or all of your turn. = sina pilin e nena musi ilo la lipu lili li open; ona li ken e ni: ilo sona li pali e kipisi anu ale pi tenpo musi sina.
Clicking Start AutoPlay in the pop-up menue or long pressing the AutoPlay button begins the multi-turn AutoPlay. This will play your next turns as if you were an AI. = sina pilin e 'o open e musi ilo' lon lipu lili anu pilin awen e nena musi ilo la musi ilo pi tenpo musi mute li open. ona li musi e tenpo musi kama sina sama ilo sona.
To cancel multi-turn AutoPlay you can press the AutoPlay button, next turn button or open the options menue. = tawa pini e musi ilo pi tenpo musi mute la sina ken pilin e nena musi ilo, nena tenpo musi kama, anu open e lipu nasin.
Multi-turn AutoPlay is not advised on harder difficulty levels as your AI will not play better against an AI with modifiers. = musi ilo pi tenpo musi mute li pona ala lon suli pi ken ike mute, tan ni: ilo sona sina ken ala musi pona tawa ilo sona pi wawa ante.
Multi-turn AutoPlay for multiplayer is not yet supported. = musi ilo pi tenpo musi mute li ken ala lon musi jan mute lon tenpo ni.

After building a shrine, your civilization will start generating ☮Faith. = sina pali e tomo sewi lili la kulupu ma sina li open pana e ☮pilin sewi.
When enough ☮Faith has been generated, you will be able to found a pantheon. = ☮pilin sewi li mute pona la sina ken open e kulupu sewi.
A pantheon will provide a small bonus for your civilization that will apply to all cities that have it as a majority religion. = kulupu sewi li pana e pona lili tawa kulupu ma sina. pona ni li lon ma tomo ale ni: nasin sewi ni li nasin sewi suli lon ona.
Each civilization can only choose a single pantheon belief, and each pantheon can only be chosen once. = kulupu ma ale ken alasa e pilin sewi pi kulupu sewi wan taso. pilin sewi kulupu sewi ale ken alasa lon tenpo wan taso.
Generating more ☮Faith will allow you to found a religion. = sina pali e ☮pilin sewi mute la sina ken open e nasin sewi.

Keep generating ☮Faith, and eventually a great prophet will be born in one of your cities. = o awen pali e ☮pilin sewi. lon tenpo kama la jan sewi suli li kama lon wan pi ma tomo sina.
This great prophet can be used for multiple things: Constructing a holy site, founding a religion and spreading your religion. = jan sewi suli ni li ken pali e ijo mute: pali e ma sewi, open e nasin sewi, en pana mute e nasin sewi sina.
When founding your religion, you may choose another two beliefs. The founder belief will only apply to you, while the follower belief will apply to all cities following your religion. = lon open nasin sewi sina la sina ken alasa e pilin sewi tu ante. pilin sewi open li tawa sina taso; pilin sewi jan pi nasin sewi li tawa ma tomo ale ni: ona li awen lon nasin sewi sina.
Additionally, the city where you used your great prophet will become the holy city of that religion. = kin la ma tomo ni: sina kepeken jan sewi suli lon ona, li kama ma tomo sewi pi nasin sewi ni.
Once you have founded a religion, great prophets will keep being born every so often, though the amount of Faith☮ you have to save up will be higher. = sina open e nasin sewi la jan sewi suli li kama lon tenpo mute. taso mute ☮pilin sewi wile tawa jan sewi kama li kama suli.
One of these great prophets can then be used to enhance your religion. = jan sewi suli wan pi ni ken pona e nasin sewi sina.
This will allow you to choose another follower belief, as well as an enhancer belief, that only applies to you. = ni li ken e ni: sina alasa e pilin sewi jan pi nasin sewi sin, en pilin sewi pona. pilin sewi pona li tawa sina taso.
Do take care founding a religion soon, only about half the players in the game are able to found a religion! = o open e nasin sewi lon tenpo kama lili: kipisi jan musi taso li ken open e nasin sewi!

Religion inside cities = nasin sewi lon insa ma tomo
When founding a city, it won't follow a religion immediately. = sina open e ma tomo la ona li awen ala lon nasin sewi lon tenpo sama.
The religion a city follows depends on the total pressure each religion has within the city. = nasin sewi pi ma tomo li tan wawa pana ale pi nasin sewi lon insa ma tomo.
Followers are allocated in the same proportions as these pressures, and these followers can be viewed in the City Screen. = jan pi nasin sewi li mute sama wawa pana ni, en sina ken lukin e ona lon sinpin ma tomo.
You are allowed to check religious followers and pressures in cities you do not own by selecting them. = sina ken alasa e ma tomo sina jo ala tawa lukin e jan pi nasin sewi en wawa pana lon ona.
In both places, a tap/click on the icon of a religion will show detailed information with its effects. = lon ma tomo en lipu nasin sewi la sina pilin e sitelen nasin sewi la sona mute en kama ona li lukin.
Based on this, you can get a feel for which religions have a lot of pressure built up in the city, and which have almost none. = tan ni la sina ken sona e nasin sewi seme li jo e wawa pana mute lon ma tomo, en nasin sewi seme li jo ala.
The city follows a religion if a majority of its population follows that religion, and will only then receive the effects of Follower and Pantheon beliefs of that religion. = ma tomo li awen lon nasin sewi la jan mute ona li awen lon nasin sewi ni. tenpo ni taso la ona li kama jo e kama pi pilin sewi jan en kulupu sewi pi nasin sewi ni.

Spreading Religion = pana mute e nasin sewi
Spreading religion happens naturally, but can be sped up using missionaries or great prophets. = nasin sewi li pana mute tan ona taso, taso jan pi toki sewi anu jan sewi suli ken pali e ona wawa.
Missionaries can be bought in cities following a major religion, and will take the religion of that city. = jan pi toki sewi ken esun lon ma tomo pi nasin sewi suli, en ona li jo e nasin sewi pi ma tomo ni.
So do take care where you are buying them! If another civilization has converted one of your cities to their religion, missionaries bought there will follow their religion. = tan ni la o lukin pona e ma tomo sina esun e ona! kulupu ma ante li ante e ma tomo sina tawa nasin sewi ona la jan pi toki sewi sina esun lon ni li awen lon nasin sewi ona.
Great prophets always have your religion when they appear, even if they are bought in cities following other religions, but captured great prophets do retain their original religion. = jan sewi suli li jo lon tenpo ale e nasin sewi sina la ona li kama lukin, taso jan sewi suli sina lanpan li awen jo e nasin sewi open ona.
Both great prophets and missionaries are able to spread religion to cities when they are inside its borders, even cities of other civilizations. = jan sewi suli en jan pi toki sewi li ken pana mute e nasin sewi tawa ma tomo la ona li lon insa poka ma ona, ni li lon ma tomo pi kulupu ma ante kin.
These two units can even enter tiles of civilizations with whom you don't have an open borders agreement! = ijo tawa tu ni li ken tawa ma lili pi kulupu ma ni: sina jo ala e lipu poka ma open poka ona!
But do take care, missionaries will lose 250 religious strength each turn they end while in foreign lands. = taso o lukin pona: jan pi toki sewi li weka e wawa nasin sewi 250 lon tenpo musi ale la ona li awen lon ma ante.
This diminishes their effectiveness when spreading religion, and if their religious strength ever reaches 0, they have lost their faith and disappear. = ni li lili e wawa ona lon pana mute nasin sewi. wawa nasin sewi ona li kama 0 la ona li weka tan pilin sewi li weka tan ma.
When you do spread your religion, the religious strength of the unit is added as pressure for that religion. = sina pana mute e nasin sewi sina la wawa nasin sewi pi ijo tawa li kama wawa pana tawa nasin sewi ni.
Cities also passively add pressure of their majority religion to nearby cities. = ma tomo li pana lili kin e wawa nasin sewi suli ona tawa ma tomo poka.
Each city provides +6 pressure per turn to all cities within 10 tiles, though the exact amount of pressure depends on the game speed. = ma tomo ale li pana e wawa +6 lon tenpo musi tawa ma tomo ale lon poka pi ma lili 10. mute lon li tan kepeken tenpo pi musi.
This pressure can also be seen in the City Screen, and gives you an idea of how religions in your cities will evolve if you don't do anything. = sina ken lukin e wawa ni lon sinpin ma tomo. ni li pana e sona e ni: sina pali ala la nasin sewi lon ma tomo sina li kama seme.
Holy cities also provide +30 pressure of the religion founded there to themselves, making it very difficult to effectively convert a holy city. = ma tomo sewi li pana kin e wawa +30 tawa nasin sewi open lon ona. tan ni la ante e ma tomo sewi li ike mute.
Lastly, before founding a religion, new cities you settle will start with 200 pressure for your pantheon. = lon open nasin sewi ala la ma tomo sin sina pali li open kepeken wawa 200 tawa kulupu sewi sina.
This way, all your cities will starting following your pantheon as long as you haven't founded a religion yet. = tan ni la ma tomo ale sina li open lon kulupu sewi sina, lon tenpo ni: sina open ala e nasin sewi.

Inquisitors = jan weka nasin sewi
Inquisitors are the last religious unit, and their strength is removing other religions. = jan weka nasin sewi li ijo tawa nasin sewi pini; wawa ona li weka e nasin sewi ante.
They can remove all other religions from one of your own cities, removing any pressures built up. = ona ken weka e nasin sewi ante ale tan ma tomo sina wan, li weka e wawa pana ale.
Great prophets also have this ability, and remove all other religions in the city when spreading their religion. = jan sewi suli li jo kin e ken ni, li weka e nasin sewi ante ale lon ma tomo la ona pana mute e nasin sewi ona.
Often this results in the city immediately converting to their religion = mute la ni li ante e ma tomo tawa nasin sewi ona lon tenpo sama.
Additionally, when an inquisitor is stationed in or directly next to a city center, units of other religions cannot spread their faith there, though natural spread is unaffected. = kin la jan weka nasin sewi li lon ma tomo insa anu poka ona la ijo tawa pi nasin sewi ante ken ala pana mute e pilin sewi lon ni. taso pana nasin sewi tan ona taso li awen.

The Mayan unique ability, 'The Long Count', comes with a side effect: = ken ante pi Maya, 'nanpa suli', li jo e kama poka:
Once active, the game's year display will use mayan notation. = ona li open la lukin tenpo sike pi musi li kepeken nasin nanpa Maya.
The Maya measured time in days from what we would call 11th of August, 3114 BCE. A day is called K'in, 20 days are a Winal, 18 Winals are a Tun, 20 Tuns are a K'atun, 20 K'atuns are a B'ak'tun, 20 B'ak'tuns a Piktun, and so on. = jan Maya li nanpa e tenpo kepeken suno tan tenpo suli majuna. suno wan li K'in; suno 20 li Winal; Winal 18 li Tun; Tun 20 li K'atun; K'atun 20 li B'ak'tun; en ante sama.
Unciv only displays ය B'ak'tuns, ඹ K'atuns and ම Tuns (from left to right) since that is enough to approximate gregorian calendar years. The Maya numerals are pretty obvious to understand. Have fun deciphering them! = Unciv li lukin taso e ය B'ak'tun, ඹ K'atun, en ම Tun tan poka open tawa poka pini. ni li mute pona tawa kama sona e tenpo sike Gregorian. nanpa Maya li ken sona pona. o musi e sona ona!

Your cities will periodically demand different luxury goods to satisfy their desire for new things in life. = ma tomo sina li wile e ijo pona ante lon tenpo mute tawa pilin pona tan ijo sin.
If you manage to acquire the demanded luxury by trade, expansion, or conquest, the city will celebrate We Love The King Day for 20 turns. = sina kama jo e ijo pona wile tan esun, tan suli ma, anu tan lanpan la ma tomo li musi lon tenpo pi olin jan lawa tawa tenpo musi 20.
During the We Love The King Day, the city will grow 25% faster. = lon tenpo pi olin jan lawa la ma tomo li kama suli kepeken wawa 25% namako.
This means exploration and trade is important to grow your cities! = ni li toki e ni: alasa ma en esun li suli tawa suli pi ma tomo sina!

Air Combat and Interception = kon utala en utala awen
Air Combat is very similar to normal Combat, with a few wrinkles. Damage is still dealt using the same equations based on the relative Strength of the Attacking and Defending Unit. = utala kon li sama mute utala nasin, taso jo e ante lili. pakala li kama kepeken nanpa sama tan wawa pi ijo utala en ijo awen.
However, before the Attacker and Defender fight, there is an added combat phase called Interception. If there is any unit with Interception Range that covers the target attacked tile, then it will attempt to Intercept the Attacking Air Unit. If multiple units can Intercept, the one with higher Intercept chance does it. = taso lon open utala pi ijo utala en ijo awen la lipu utala namako li lon, nimi ona li awen utala. ijo tawa ken awen utala li kama e ni la ona li alasa awen utala e ijo tawa kon utala. ijo mute li ken la ijo pona mute li alasa.
Generally Land/Naval Units have an Intercept Range of 2 Tiles, and Air Units have an Intercept Range of their Attack Range. = ijo tawa ma en telo li jo e ma awen utala pi ma lili 2; ijo tawa kon li jo e ma awen utala sama ma utala ona.
Ground and Naval Units don't require movement points to Intercept, just Attacks. Air Units cannot have moved nor attacked in the preceding turn. = ijo tawa ma en telo li wile ala e nanpa tawa lon awen utala; ona li wile e ken utala taso. ijo tawa kon li ken awen utala ala la ona li tawa ala li utala ala lon tenpo musi pini.
The Intercepting Unit rolls to see if it hits. Whether it hits or not costs an Attack, and most units (without Promotions) can only Attack Once per Nation's Turn. It does NOT cost Movement Points, but Air Units that have used their Movement cannot Intercept between turns. = ijo awen utala li alasa e ni: ona li pakala ala pakala. lon ken tu la ken utala wan li kepeken. nanpa tawa li kepeken ala. taso ijo tawa kon li tawa lon tenpo musi pini la ken ala awen utala lon insa tenpo musi.
If the Intercepting Unit Hits, it deals damage according to the Combat Strength calculation to the Attacking Air Unit, potentially with any Strength Bonuses that apply to Interception. It does not receive damage from the Attacking Air Unit. = ijo awen utala li pakala e ona la ona li pana pakala tawa ijo tawa kon utala kepeken nanpa wawa utala, poka pona wawa awen utala. ona li kama jo ala e pakala tan ijo tawa kon utala.
After Interception resolves, the Attacking Air Unit and the Defending Unit in the targeted tile do Combat as normal, with damage dealt to both sides. = awen utala li pini la ijo tawa kon utala en ijo awen lon ma lili alasa li utala sama nasin. tu li kama jo e pakala.
To help deal with Interceptions, see Air Sweeps. = tawa sona pi awen utala la o lukin e kon weka.

Air Sweeps = kon weka
Fighter units are able to perform Air Sweeps over a tile helping clear out potential enemy Air, Sea, or Land Interceptions that can reach that tile. = ijo tawa utala kon li ken pali e kon weka lon ma lili. ni li alasa weka e awen utala kon, telo, anu ma pi jan ike ni ken kama tawa ma lili ni.
While this Action will take an Attack, the benefit is drawing out Interceptions to help protect your other Air Units. Especially your Bombers. = pali ni li kepeken e ken utala, taso pona ona li ni: ona li kama e awen utala, li awen e ijo tawa kon ante sina, suli la ijo pana pakala kon sina.
Your unit will always draw an Interception, if one can reach the target tile, even if the Intercepting unit has a chance to miss. = ijo tawa sina li kama e awen utala lon tenpo ale la ijo awen utala ken kama tawa ma lili alasa, lon ken pakala ala kin.
If the Interceptor is not an Air Unit (eg Land or Sea), the Air Sweeping unit and Interceptor take no damage! = ijo awen utala li ijo tawa kon ala (sama ijo ma anu telo) la ijo kon weka en ijo awen utala li kama jo ala e pakala!
If the Interceptor is an Air Unit, the two units will damage each other in a straight fight with no Interception bonuses. And only the Attacking Air Sweep Unit gets any Air Sweep strength bonuses. = ijo awen utala li ijo tawa kon la ijo tawa tu li pana pakala tawa ona ante lon utala pona, kepeken pona awen utala ala. ijo kon weka utala taso li kama jo e pona wawa kon weka.

Fortify, Guard, Withdraw = awen wawa, awen, weka
Most Land units have the ability to Fortify. As they spend time without moving, they will slowly gain a Fortification Bonus to their Combat Strength representing digging in and preparing in case of an attack. = ijo tawa ma mute li ken awen wawa. ona li awen tawa ala lon tenpo la ona li kama jo lili lili e pona awen tawa wawa utala ona.
Some units have the ability to Withdraw before a melee attack is struck. However, perhaps you wish for them to stand their ground to protect a particular tile. If you do, then give them the Guard command and they will stay fixed until they die or you give them fresh orders. = ijo tawa mute li ken weka lon open utala poka. taso ken la sina wile e ona awen lon ma lili tawa awen e ma ni. sina wile ni la o pana e toki awen; ona li awen lon ni tawa moli anu tawa toki sin sina.
This is NOT the same as Fortify but they will still gain the Fortification Bonus. They will simply not utilize their Withdraw ability. Fortified units with the Withdraw ability will try to flee when attacked. = ni li sama ala awen wawa, taso ona li awen kama jo e pona awen. ona li kepeken ala e ken weka. ijo tawa awen wawa pi ken weka li alasa weka la ona li kama utala.

City Tile Blockade = pini ma lili pi ma tomo
One of your tiles is blocked by an enemy: when an enemy unit stands on a tile you own, the tile will not produce yields and cannot be worked by a city this turn. City will reallocate population from a blocked tile automatically. = wan ma lili sina li pini tan jan utala: ijo tawa jan utala li lon ma lili sina la ma lili ni li pana ala, en ma tomo ken ala kepeken ona lon tenpo musi ni. ilo li pana sin e jan ma tan ma lili pini.
Enemy military land units block tiles they are standing on. Enemy military naval units additionally block adjacent water tiles. To protect your tiles from blockade, place a friendly military unit on it or fight off invaders. = ijo tawa utala ma pi jan utala li pini e ma lili ona lon. ijo tawa utala telo pi jan utala li pini kin e ma lili telo poka. tawa awen e ma lili sina la o pana e ijo tawa utala jan pona lon ona anu o utala e jan kama.

One of your cities is under a naval blockade! When all adjacent water tiles of a coastal city are blocked - city loses harbor connection to all other cities, including capital. Make sure to de-blockade cities by deploying friendly military naval units to fight off invaders. = ma tomo wan sina li lon pini telo! ma tomo poka telo la ma lili telo ale poka li pini, la ma tomo li weka tan nasin tomo telo tawa ma tomo ante ale, ma tomo lawa kin. o pana e ijo tawa utala telo jan pona tawa utala e jan kama.

Spies! = jan lukin len!
The first time a civ reaches the Renaissance era each nation gets one spy. Every time a civ reaches an era afterwards they get one more spy. = tenpo wan pi kulupu ma kama tawa tenpo Renaissance la kulupu ma ale li kama jo e jan lukin len wan. tenpo ale pi kulupu ma kama tawa tenpo suli kama la ona li kama jo e jan lukin len wan sin.
Spies can be sent out to foreign cities to steal technology, rigging elections or stage coups. Place them in your own cities to do counter-intelligence work. = jan lukin len ken tawa ma tomo ante tawa lanpan sona sin, ante e ijo alasa, anu open e lawa sin. o pana e ona lon ma tomo sina tawa pali awen sona.
Only one spy per civ is allowed in each city. Spies that are not in any city are on vacation in your spy hideout. = jan lukin len wan taso pi kulupu ma wan li ken lon ma tomo wan. jan lukin len pi ma tomo ala li lon ma len pi jan lukin len sina.
Spies set up in cities of major civilizations will try to steal technology at a rate which is based off of the science production in the city. Succeeding to steal technology will level up your spy. Failing to succeed will level up the defending spy if it is present. = jan lukin len lon ma tomo pi kulupu ma suli li alasa lanpan e sona sin. wawa ona li tan pali sona pi ma tomo. lanpan pona li suli e nanpa jan lukin len sina; lanpan pakala li suli e nanpa jan lukin len awen la ona li lon.
Spies set in city-states will try to rig the elections in order to gain influence and reduce the influence of other civilizations. Only one spy partaking in rigging the election can win. = jan lukin len lon ma tomo lili li alasa ante e ijo alasa tawa kama jo e wawa pilin, li lili e wawa pilin pi kulupu ma ante. jan lukin len wan taso li ken kama pona lon ijo alasa ni.
A spy that is rigging an election in a city-state may also stage a coup. The likelihood of success for the coup depends on your relative influence to the current ally of the city-state, your spy level, and the level of the spy that the current ally has in the city-state if present. Succeeding a coup will make you their new ally and reduce the influence of all other civs. Failing a coup will kill your spy and level up the defending spy if present. = jan lukin len ni li ante e ijo alasa lon ma tomo lili, li ken open e lawa sin. ken pona ona li tan wawa pilin sina tawa jan poka lon, tan nanpa jan lukin len sina, tan nanpa jan lukin len pi jan poka lon la ona li lon ma tomo lili.
Spies that are set up in your own cities will be conducting counter-intelligence. They reduce the success chance of other spies trying to steal your technology. = jan lukin len lon ma tomo sina li pali awen sona. ona li lili e ken pona pi jan lukin len ante tawa lanpan sona sin sina.
Spies at a higher rank have a higher chance of success. The max rank a spy can reach is rank 3. After a spy is killed it will revive after a certain amount of turns back at rank 1. = jan lukin len pi nanpa lawa sewi li jo e ken pona suli. nanpa lawa suli ken pi jan lukin len li 3. jan lukin len li moli la ona li kama sin lon tenpo musi mute kepeken nanpa lawa 1.
Building buildings like the constabulary and police station will reduce the technology steal rate of spies in that city. = tomo sama tomo awen en tomo jan lawa li lili e ken lanpan sona sin pi jan lukin len lon ma tomo ni.
Espionage is available using the Gods and Kings ruleset. To enable it in a new game click advanced settings, then click on the Enable Espionage option. = lukin len li ken lon nasin lawa sewi en jan lawa. tawa ken e ona lon musi sin la o pilin nasin sona mute, la o pilin nasin 'o ken e lukin len'.

Keyboard Bindings = nasin nena sitelen
Limitations = ken lili
This is a work in progress. = ni li pali lon.
For technical reasons, only direct keys or Ctrl-Letter combinations can be used. = tan nasin ilo la nena taso anu kulupu Ctrl+sitelen taso li ken.
Using the Keys page = kepeken lipu nena
Each binding has a button with an image looking like this: = nasin nena ale li jo e nena sitelen sama ni:
While hovering the mouse over the key button, you can press a desired key directly to assign it. = sina awen e ilo luka lon sewi nena la sina ken pilin e nena wile tawa pana ona.
Double-click the image to reset the binding to default. = o pilin tu e sitelen tawa sin e nasin nena tawa nasin open.
Bindings mapped to their default keys are displayed in gray, those reassigned by you in white. = nasin nena open li lukin kule pimeja lili; nasin sina ante li lukin kule walo.
Conflicting assignments are marked red. Conflicts can exist across categories, like World Screen / Unit Actions. Note that at the moment, the game does not prevent saving conflicting assignments, though the result may be unexpected. = pana pali utala li kule loje. utala ken lon kulupu ante sama sinpin ma / pali pi ijo tawa. tenpo ni la musi li ken awen e pana pali utala, taso kama ona ken nasa.
For discussion about missing entries, see the linked github issue. = tawa toki pi ijo weka la o lukin e pakala Github lon nasin linja.

Welcome to the Civilopedia! = kama pona tawa lipu sona pi musi!
Here you can find information - general help, rules, and what makes up the game world. = lon ni la sina ken alasa e sona: pona open, nasin lawa, en ijo pali e ma musi.
How to find information = nasin alasa sona
Select categories with the buttons on top of the screen. Also up there is the button to leave Civilopedia and go back to where you were before. = o alasa e kulupu kepeken nena lon sewi pi sinpin. nena weka tan lipu sona pi musi li lon sewi kin.
Each category has a list of entries on the left of the screen, sorted alphabetically (with few exceptions). Clicking an entry will update the center pane were you are currently reading this. = kulupu ale li jo e lipu ijo lon poka open pi sinpin, li lon nasin sitelen. sina pilin e ijo la lipu insa li kama sin.
Lines can link to other Civilopedia entries, they are marked with a chain link symbol like this one. You can click anywhere on the line to follow the link. = linja ken nasin tawa lipu sona ante. ona li jo e sitelen nasin linja. sina ken pilin lon linja tawa ni.
The current category is special - all articles on general concepts are here. It is called 'Tutorials' because you can revisit these here, too. = kulupu ni li ante: lipu ale pi sona open li lon ni. nimi ona li 'nasin kama sona', tan ni: sina ken lukin sin e ona lon ni.
What information can I find = sona seme li lon?
The data shown is not dependent on your current game's situation, e.g. bonuses for the nation you are playing or difficulty modifiers will not affect the numbers. = sona lukin li kama ala tan lon pi musi sina: pona pi kulupu ma sina anu suli pi ken ike li ante ala e nanpa.
However, it will reflect the mods you are playing! The combination of base ruleset and extension mods you select define the rules of a game, what objects exist and how they interact, and the Civilopedia mirrors these rules. = taso ona li lukin e nasin ante sina kepeken. nasin lawa open en nasin ante namako li lawa e nasin musi, e ijo lon, e nasin ona; lipu sona pi musi li lukin e nasin ni.
If you opened the Civilopedia from the main menu, the "Ruleset" will be that of the last game you started. = sina open e lipu sona pi musi tan lipu lawa la nasin lawa li kama tan musi pini sina open.
Letters can select categories, and when there are multiple categories matching the same letter, you can press that repeatedly to cycle between these. = sitelen ken alasa e kulupu. kulupu mute li open kepeken sitelen sama la pilin sin e sitelen tawa sike insa ona.
The arrow keys allow navigation as well - left/right for categories, up/down for entries. = nena palisa li ken tawa kin: poka open/poka pini tawa kulupu, sewi/anpa tawa ijo.

UI Tips = sona lili pi lukin ilo
World screen = sinpin ma
Skip all units to end a turn quickly = o weka e ijo tawa ale tawa pini wawa e tenpo musi
Right-click or long press the "Next unit" button to open a popup menu which allows to end a turn without having to cycle through all units. If some units are automated, a dedicated button is available to move them before ending the turn. = o pilin poka pona anu pilin awen e nena 'ijo tawa kama' tawa open e lipu lili. lipu ni li ken e pini tenpo musi kepeken tawa sike ala lon ijo tawa ale. ijo tawa ilo li lon la nena ante li ken tawa e ona lon open pini tenpo musi.
Toggle notification list display = ante e lukin pi lipu toki kama
On the World screen, swipe the notification list to the right to temporarily hide it. Click the "Bell" button to display them again. = lon sinpin ma la o luka tawa poka pona lon lipu toki kama tawa len e ona lon tenpo lili. o pilin e nena 'kalama' tawa lukin sin e ona.
The default state for the notification list can be set in Options > Display > UI - Notifications on world screen. = nasin open pi lipu toki kama li ken lon: nasin > lukin > lukin ilo > toki kama lon sinpin ma.
Entering a City Screen quickly = tawa sinpin ma tomo wawa
You can Right-click or long press a city button on the World screen. The result is the same as tapping it twice - once to select and move the button, again to trigger a reaction: show the City Screen (if the city is yours to inspect), or offer the foreign city info popup. = sina ken pilin poka pona anu pilin awen e nena ma tomo lon sinpin ma. ni li sama pilin tu: wan tawa alasa, wan tawa open e kama - lukin e sinpin ma tomo anu lipu sona pi ma tomo ante.
Upgrade multiple units of the same type = kama wawa e ijo tawa mute pi kule sama
On the World screen, select an unit that can be upgraded, then right-click or long press the "Upgrade" button to open a popup menu allowing to upgrade all units of this type at once. = lon sinpin ma la o alasa e ijo tawa ken kama wawa, la o pilin poka pona anu pilin awen e nena 'kama wawa' tawa open e lipu lili. lipu ni li ken kama wawa e ijo tawa ale pi kule ni lon tenpo wan.
In the Units overview, the same upgrade menu is available by clicking the unit icon in the "Upgrade" column. When an unit is upgradeable, the icon is lit if conditions are met (enough gold and/or resources), otherwise it is dimmed. = lon lipu lukin ale pi ijo tawa la lipu kama wawa sama li ken tan pilin sitelen ijo tawa lon linja 'kama wawa'. ijo tawa li ken kama wawa la sitelen li walo la wile li lon; ala la ona li pimeja lili.
Additional controls for the construction queue = lawa namako tawa linja pali
Right-click or long press a construction item to open a popup menu with additional controls, allowing to manage production of the same item in all cities, by issuing the commands from the same City Screen. = o pilin poka pona anu pilin awen e ijo lon linja pali tawa open e lipu lili poka lawa namako. ni li ken lawa e pali pi ijo sama lon ma tomo ale tan sinpin ma tomo sama.
The "Disable" option moves an item to a separated "Disabled" tab, preventing its automatic queueing by the "Auto-assign city production" option. To move a disabled item back to its initial place, enter again the popup menu, and choose "Enable". = nasin 'ken ala' li pana e ijo tawa lipu 'ken ala', li pini e pana ilo ona tan nasin 'ilo li alasa e pali pi ma tomo'. tawa pana sin e ijo la o open sin e lipu lili, o alasa e 'ken e'.
Disabled items are set globally and persistent: they are not reset in a new game, or by restarting Unciv. = ijo ken ala li lon ale en awen: musi sin anu open sin e Unciv li sin ala e ona.
Show Great Person Points breakdown = o lukin e kipisi nanpa jan suli
In the right sidepanel, click a Great People row to display the details of Great Person Points (GPP) accumulated each turn by the current city, for this type of Great People. = lon lipu poka pona la o pilin e linja jan suli tawa lukin e sona pi nanpa jan suli lon tenpo musi pi ma tomo ni, tawa kule jan suli ni.
Click any of the Great People icons to display all GPP accumulated each turn by the current city, for all types of Great People. = o pilin e sitelen jan suli tawa lukin e nanpa jan suli ale lon tenpo musi pi ma tomo ni, tawa kule jan suli ale.
Tech screen = sinpin sona sin
Queue multiple technologies in different branches = o pana e sona sin mute tan nasin ante lon linja
On the Tech screen, right-click or long press a technology to automatically queue it, even if this tech is in another branch than the item currently researched. Prerequisite techs to research will also be automatically queued. = lon sinpin sona sin la o pilin poka pona anu pilin awen e sona sin tawa pana ilo e ona lon linja, lon ona li lon nasin ante tan sona sin sina kama sona lon tenpo ni. sona sin wile li kama lon linja ilo kin.
Right-click or long press multiple techs to append them to the research queue, whatever their branch is. = o pilin poka pona anu pilin awen e sona sin mute tawa pana e ona lon linja kama sona, lon nasin seme la ona li lon.
Overview screens = sinpin lukin ale
Reveal known resources on world screen = o lukin e ijo jo sona lon sinpin ma
In the Resources overview, click on a resource icon to center the world screen on tiles already discovered and providing this resource. = lon lukin ale pi ijo jo la o pilin e sitelen ijo jo, la sinpin ma li tawa insa lon ma lili kama sona ni li pana e ijo jo ni.
Alternatively, click on the "Unimproved" number to center the world screen only on owned (by you or your allied City-states) tiles where the resource is not improved. = anu la o pilin e nanpa 'pona ala', la sinpin ma li tawa insa lon ma lili sina jo anu ma tomo lili poka sina jo, ma ni jo e ijo jo pona ala.
If more than one tile is available, click repeatedly on the notification to cycle through all of them. = ma lili mute li ken la o pilin sin e toki kama tawa sike lon ona ale.
Show diagram line colors = o lukin e kule linja sitelen
In Politics overview > Show diagram, you can click anywhere inside the diagram to display a table listing all relationship line colors and their meaning. = lon lukin ale pi nasin lawa > o lukin e sitelen la sina ken pilin lon insa sitelen tawa lukin e lipu toki kule pi linja pilin en kon ona.
Reading "Toast" popups = lukin e lipu lili 'Toast'
"Toasts" can be clicked to make them stay on the screen for easier reading. = sina ken pilin e 'Toast' tawa awen e ona lon sinpin tawa lukin pona.
Click it again to close (or use the close button). = o pilin ona sin tawa pini; anu o kepeken nena pini.
Miscellaneous = ijo ante
External links = nasin linja tan ma ante
External links support right-click or long press to copy the link to the clipboard instead of launching the browser. = nasin linja tan ma ante li ken e pilin poka pona anu pilin awen tawa sitelen sama e nasin linja tawa lipu sitelen sama, la ilo lukin linja li open ala.
Example: The 'Open Github page' button on the Mod management screen. = sama: nena 'o open e lipu Github' lon sinpin lawa pi nasin ante.
View change log = o lukin e lipu ante
After updating, you might want to see what has changed. The "About" in "Options" has the version number linked to the change log. You can also see that info by clicking the version number on the main menu. = sina sin e musi la ken la sina wile lukin e ante. lon 'sona pi ni' lon 'nasin' la nanpa ante li nasin linja tawa lipu ante. sina ken lukin kin e ni tan pilin nanpa ante lon lipu lawa.

Differences from Civilization V = ante tan kulupu ma V
Production Focus\nIn Civilization V, the Food yield in a city is calculated first, then population grows by consuming stored food (growth), then production is calculated, and so on one by one the other stats are calculated. Thus, citizens can produce yields in the same turn as they are born. The city focus is set to Production to assign the newborn citizen to a hill so they'll contribute Production, and then manually reassigned to a growth tile on the next turn. Alternatively, you can set city focus to Gold (e.g. with Cerro de Potosi), Faith (e.g. with Mount Sinai) or whatever gains the most yields. In Unciv, citizens only start producing yields on the next turn, so you can ignore this whole concept. = pali pi wile suli\nlon kulupu ma V la moku pi ma tomo li nanpa open; jan li kama suli tan moku awen; la pali li nanpa. tan ni la jan ma ken pana lon tenpo musi sama la ona kama suli. lon Unciv la ma tomo li pali open, la moku namako li kama pali lon tenpo ni sama.
Science Queueing\nIn Civilization V, Science yield is calculated after production, so if you finish an item and have Science (or Gold) queued as a perpetual construction, the Production overflow from item will be converted into Science (or Gold), but the Production is not consumed, as this will only happen again on the next turn. By immediately swapping out your perpetual construction for an item on the next turn, you'll get this Science (or Gold) for free. This doesn't apply to Unciv, so don't bother. = linja sona\nlon kulupu ma V la sona li nanpa lon pini pali. sina pini e ijo la pali namako tan ijo li kama sona anu mani, taso pali ni li kepeken ala e moku. lon Unciv la moku namako li kama pali open.
Double Aqueducts\nIn Civilization V, the game sells existing copies of the building for you before providing a free copy of the building. So, if you build an aqueduct in a city, and then in the turn of adopting Tradition Complete you sell a cheap building (e.g a shrine) beforehand, the game is unable to sell more than 1 building per turn, and thus you'll keep your aqueduct, together with the new free aqueduct. Not applicable to Unciv. = tomo telo tu\nlon kulupu ma V la musi li esun e sitelen sama tomo lon open, la pana e sitelen sama mani ala. tan ni la ken la sina esun e tomo ante lon tenpo sama, la tomo telo pi mani ala li kama ante. ni li lon ala Unciv.
Legalism Oxford\nIn Civilization V, national wonders such as Oxford University are considered culture buildings, so you can get them for free with Legalism. Not applicable to Unciv. = nasin lawa Oxford\nlon kulupu ma V la tomo suli nasa pi kulupu ma sama tomo sona Oxford li tomo nasin. tan ni la sina ken kama jo e ona kepeken mani ala tan nasin lawa. ni li lon ala Unciv.
Roads and Forts\nIn Civilization V, you can't use roads and forts in enemy territory. In Unciv, you can use them, so instead of mindlessly constructing them everywhere when at war, you need to decide if and when they'll benefit you more than your opponents. = nasin en tomo awen\nlon kulupu ma V la sina ken ala kepeken nasin en tomo awen lon ma jan utala. lon Unciv la sina ken kepeken ona. tan ni la lon utala o lawa pona e ni: tenpo seme la ona li pona tawa sina mute tan jan utala?
Citizen Conversion\nIn Civilization V, a citizen is born religious if the parent city is already converted. This is not the case in Unciv, which can lead to temporary deconversion of a city when it grows. = ante jan ma\nlon kulupu ma V la jan ma sin li nasin sewi sama ma tomo mama, la ma tomo li ante pini lon nasin sewi. ni li lon ala Unciv; tan ni la ma tomo ken ante weka lili tan nasin sewi lon kama suli.
Unassigned Citizens\nIn Civilization V, unassigned citizens are considered specialists, and subject to the same type of bonuses (e.g. Korea's ability). It can be worthwhile to leave citizens unassigned, instead of being assigned to a tile. Not applicable to Unciv. = jan ma pi pali ala\nlon kulupu ma V la jan ma pi pali ala li sama jan sona, li kama jo e pona sama. ken la ni li pona: o pana ala e jan ma lon ma lili. ni li lon ala Unciv.
Settler Construction\nIn Civilization V, cities can't starve when constructing settlers, so you can assign all citizens to production tiles and none to food tiles. In Unciv, citizens keep consuming two food per turn. = pali jan open ma tomo\nlon kulupu ma V la ma tomo ken ala moli moku lon pali jan open ma tomo. sina ken pana e jan ma ale tawa ma pali, e ala tawa ma moku. lon Unciv la jan ma li awen moku e moku tu lon tenpo musi.
Water Melee Attack\nAs result of a Discord poll, Water Melee units can attack military land units on the shore, unlike in Civilization V. = utala poka telo\ntan ijo alasa Discord la ijo tawa telo pi utala poka li ken utala e ijo tawa utala ma lon poka telo, ante tan kulupu ma V.
Tile improvements\nIn Civilzation V, workers start working on an improvement-under-construction at the beginning of movement. Unciv changes this, to allow players to assign workers to tiles, and then reconsider and change improvement or move them elsewhere. = pali ma lili\nlon kulupu ma V la jan pali li open pali e pali ma lon open tawa. Unciv li ante e ni: jan musi ken pana e jan pali tawa ma lili, la ken ante pilin li ante e pali ma anu tawa e ona ma ante.
Forest and Jungle Visibility\nIn Unciv, forests and jungles are visible 1 tile outside visibility range. In Civilization V, this is the behaviour of hills and mountains, but not of forests and jungles, yet jungle and forest can block hills, and hill + forest can block mountain, indicating they're on the same elevation. This is considered to be a bug in the otherwise well-structured visibility logic in Civilization V. = lukin pi kasi suli en kasi pimeja\nlon Unciv la kasi suli en kasi pimeja li lukin lon ma lili wan lon sewi pi ken lukin. lon kulupu ma V la ni li nasin nena en nena suli, taso ala nasin kasi. taso kasi ken pini e lukin nena, en nena poka kasi ken pini e lukin nena suli. ni li lukin sama pakala lon nasin lukin pi kulupu ma V.
City razing\nIn Civilization V, the player can never raze any of the cities he/she founded. Not applicable to Unciv. = pakala ma tomo\nlon kulupu ma V la jan musi ken ala pakala e ma tomo ona pali open. ni li lon ala Unciv.

Founding Cities\nThe Settler is a unit that can found a new city. You can build a Settler unit in a city with at least 2 population, and then move them to a good location to found a new city. This will usually be your main way of acquiring more cities. = open ma tomo\njan open ma tomo li ijo tawa ken pali e ma tomo sin. sina ken pali e ona lon ma tomo pi jan mute 2 anu mute, la tawa e ona lon ma pona tawa open e ma tomo sin. ni li nasin suli sina tawa kama jo e ma tomo mute.
Food conversion to Production\nDuring the construction of a Settler, the city will not grow. Instead, the 1st, 2nd, 4th, and from there on every 4th, excess Food (Growth) is converted into Production, with the rest of the excess Food being lost. = moku tawa pali\nlon pali jan open ma tomo la ma tomo li kama suli ala. moku namako pi kama suli li kama pali: nanpa 1, nanpa 2, nanpa 4, en tan ni la nanpa 4 ale. moku namako ante li weka.

