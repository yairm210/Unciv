Their citizens generate 2x the unhappiness, unless you build a courthouse. = jan ma ona li pali e pilin ike mute tu, taso tomo lawa li ken weka e ni.
Your civilization may not annex this city. = kulupu ma sina li ken ala kama lawa e ma tomo ni.
Puppet = o lawa lili
Puppeted cities do not increase your tech or policy cost. = ma tomo pi lawa lili li suli ala e mani wile pi sona sin anu nasin lawa.
You have no control over the the production of puppeted cities. = sina ken ala lawa e pali pi ma tomo pi lawa lili.
Puppeted cities also generate 25% less Science and Culture. = ma tomo pi lawa lili li pali e sona en nasin lili tan 25%.
A puppeted city can be annexed at any time. = ma tomo pi lawa lili li ken kama lawa lon tenpo ale.
Liberate (city returns to [originalOwner]) = weka tan lawa ike (ma tomo pana sin tawa [originalOwner])
Liberating a city returns it to its original owner, giving you a massive relationship boost with them! = pana sin e ma tomo li pana e ona tawa jan jo open, en li suli mute e pilin pona ona tawa sina!
Raze = pakala e ma tomo
Razing the city annexes it, and starts burning the city to the ground. = pakala e ma tomo li kama lawa e ona li open e pakala suli ona.
Razing the city puppets it, and starts burning the city to the ground. = pakala e ma tomo li lawa lili e ona li open e pakala suli ona.
The population will gradually dwindle until the city is destroyed. = mute jan li kama lili lili tawa tenpo ni: ma tomo li pakala.
Original capitals and holy cities cannot be razed. = open ma tomo lawa en sewi ma tomo ken ala pakala e ma tomo.
Destroy = pakala
Destroying the city instantly razes the city to the ground. = pakala e ma tomo li weka wawa e ma tomo lon tenpo sama.
Keep it = o awen e ona
Remove your troops in our border immediately! = o weka e kulupu utala sina tan poka ma mi mute lon tenpo ni!
Sorry. = mi pakala.
Never! = lon tenpo ala!
Those lands were not yours to take. This has not gone unnoticed. = ma ni li ala sina. mi mute li lukin e ni.

