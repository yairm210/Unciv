'I once sent a dozen of my friends a telegram saying 'flee at once-all is discovered!' They all left town immediately.' - Mark Twain = „Egyszer egy tucat barátomnak küldtem egy táviratot, amelyben azt írtam: „meneküljetek azonnal - minden kiderült!” Mindannyian azonnal elhagyták a várost.” - Mark Twain
