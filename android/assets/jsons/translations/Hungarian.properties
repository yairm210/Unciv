'Be extremely subtle, even to the point of formlessness, be extremely mysterious, even to the point of soundlessness. Thereby you can be the director of the opponent's fate.' - Sun Tzu = „Légy rendkívül finom, akár a formátlanságig, légy rendkívül titokzatos, akár a hangtalanságig. Így te irányíthatod az ellenfél sorsát.” - Szun-ce
