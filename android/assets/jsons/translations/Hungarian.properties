You won't ever be able to bother me again. Go meet Yama. = Nem fogsz engem háborgatni többé. Találkozol Jamával.
Fool! I will disembowel you all! = Ostobák! Kibelezlek mindannyiótokat!
You have proven to be a cunning and competent adversary. I congratulate you on your victory. = Ravasz és méltó ellenfélnek bizonyultál. Gratulálok a győzedelmedhez.
Greetings, I am Empress Wu Zetian. China desires peace and development. You leave us alone, we'll leave you alone. = Üdvözlet, Wu Zetian császárnő vagyok. Kína békét és fejlődést akar. Ha békén hagysz minket, mi is békén hagyunk téged.
My friend, do you think you can accept this request? = Barátom, elfogadható számodra ez az ajánlat?
How are you today? = Hogy vagy ma?
Oh. It's you? = Ó! Te vagy az?
Art of War = A háború művészete
Heaven itself bends before your beauty, Empress Wu Zetian, ruler of eternal China! You lead one of the oldest and greatest civilization of humanity. In your time, China stood at the forefront of science and technology, bringing the world such contributions as gunpowder, the printing press, and the world of Confucius, and this, long before the rest of the world was mature enough to make the same discoveries! = Maga a mennyország is meghajol a szépséged előtt, Wu Zetian császárnő, az örök Kína uralkodója! Az emberiség egyik legrégebbi és legnagyobb civilizációját vezeted. A te idődben Kína a tudomány és a technológia élvonalában állt, olyan hozzájárulásokkal ajándékozva meg a világot, mint a puskapor, a nyomdagép és Konfuciusz világa, és mindezt jóval azelőtt, hogy a világ többi része elég érett lett volna ugyanezen felfedezések megtételére!
Great Queen, can you make China prevail again, using your divine intelligence and beauty? China stands for greatness, and all its enemies will be dazzled soon enough! Will your new empire shine through the ages of history? = Nagy királynő, képes vagy újra győzelemre vinni Kínát isteni intelligenciádat és szépségedet használva? Kína a nagyságot képviseli, és minden ellensége hamarosan elvakul! Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
