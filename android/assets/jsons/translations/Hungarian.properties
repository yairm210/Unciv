Genghis Khan = Dzsingisz kán
You stand in the way of my armies. Let us solve this like warriors! = A seregeim útjában álltok. Oldjuk meg ezt, mint a harcosok!
No more words. Today, Mongolia charges toward your defeat. = Nincs több szó. Ma Mongólia a vereséged felé tör.
You have hobbled the Mongolian clans. My respect for you nearly matches the loathing. I am waiting for my execution. = Megbénítottátok a mongol klánokat. Az irántad érzett tiszteletem majdnem megegyezik az utálatommal. Várom a kivégzésemet.
Your bravery must be commended. = Dicséretet érdemel a bátorságod.
I am Temuujin, conqueror of cities and countries. Before me lie future Mongolian lands. Behind me is the only cavalry that matters. = Temüdzsin vagyok, városok és országok hódítója. Előttem a jövőbeli mongol földek fekszenek. Mögöttem az egyetlen lovasság áll, amely számít.
I am not always this generous, but we hope you take this rare opportunity we give you. = Nem vagyok mindig ilyen nagylelkű, de reméljük, hogy élsz ezzel a ritka lehetőséggel, amit adunk neked.
So what now? = És most mi lesz?
Mongol Terror = Mongol Terror
O great Temuujin, immortal leader of the mighty Mongol Empire! Your name alone was enough to make cities crumble, and the sound of the mighty Mongol cavalry to make your enemies flee! O Great Khan! Once Northern Asia united into a mighty people, producing one of the greatest armies the world has ever known, your skillful mounted archers conquered in only a few years, most of China, Eastern Asia, and even reached the gates of Europe at the West. With cunning diplomacy and brilliant warfare, you swept your enemies one after another, creating the greatest empire ever seen, reducing Roman or Greek conquests to minor achievements. = Ó, nagy Temüdzsin, a hatalmas Mongol Birodalom halhatatlan vezére! A neved önmagában is elég volt ahhoz, hogy városok omoljanak össze, a hatalmas mongol lovasság hangja pedig menekülésre bírta az ellenségeidet! Ó, Nagy Kán! Miután Észak-Ázsia egyetlen hatalmas néppé egyesült, létrehozva a világ valaha látott egyik legnagyobb hadseregét, képzett lovas íjászaid mindössze néhány év alatt meghódították Kína nagy részét, Kelet-Ázsiát, sőt nyugaton elérték Európa kapuit is. Dörzsölt diplomáciával és briliáns hadviseléssel egymás után söpörted el az ellenségeidet, létrehozva a valaha látott legnagyobb birodalmat, háttérbe szorítva a római vagy görög hódításokat.
Divine Temuujin, battles and conquests run through the veins of the Mongols. Are you ready to shatter the will of your enemies? Will your cavalry ride in the steppes once again and strike as lightning and thunder? Will your new empire shine through the ages of history? = Isteni Temüdzsin, a csaták és a hódítások a mongolok ereiben csörgedeznek. Készen állsz arra, hogy megtörd az ellenségeid akaratát? Vajon a lovasságod újra a sztyeppéken fog lovagolni, és lecsap, mint a villámlás és a mennydörgés? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
