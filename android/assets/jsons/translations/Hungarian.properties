Welcome. I'm Napoleon, of France; the smartest military man in world history. = Üdvözöllek. Napóleon vagyok Franciaországból; a világtörténelem legokosabb katonája.
France offers you this exceptional proposition. = Franciaország ezzel a kivételes ajánlattal fordul hozzád.
Hello. = Üdvözlet.
It's you. = Te vagy az.
Ancien Régime = Régi Rendszer
Vive Napoleon I, First Consul and Emperor of France! After the glorious Revolution which suppressed the centuries-old monarchy, the French nation stood at the heart of Europe as a Republic, and intended to export its ideals to the entire European continent, either by diplomacy or war. The French Capital Paris was more than ever the world center of Culture, Arts, and Letters. With its Great Army, reputed as one of the greatest in the History, France fought gloriously all surrounding enemies, but eventually fell against the coalition of other European powers. = Éljen I. Napóleon, Franciaország első konzulja és császára! A dicsőséges forradalom után, amely felszámolta az évszázados monarchiát, a francia nemzet köztársaságként állt Európa szívében, és szándékában állt eszméit exportálni a teljes európai kontinensre, akár diplomácia, akár háború útján. A francia főváros, Párizs, minden eddiginél inkább a kultúra, a művészetek és az irodalom világközpontja volt. A történelmi hírű Nagy Hadseregével Franciaország dicsőségesen harcolt minden környező ellenségével, de végül elbukott a többi európai hatalom koalíciójával szemben.
Napoleon Bonaparte, ruler of the French people, will you rebuild the Empire to take revenge on your foes, and make again of its Capital the City of Lights? Will your new empire shine through the ages of history? = Bonaparte Napóleon, a francia nép uralkodója, újjáépíted a birodalmat, hogy bosszút állj az ellenségeiden, és fővárosát újra a Fények Városává teszed? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
