Haile Selassie = Hailé Szelasszié
I have tried all other avenues, but yet you persist in this madness. I hope, for your sake, your end is swift. = Minden lehetőséget megpróbáltam már, de te mégis kitartasz e mellett az őrület mellett. Remélem, a magad érdekében, hogy a végzeted gyors lesz.
It is silence that allows evil to triumph. We will not stand mute and allow you to continue on this mad quest unchecked. = A hallgatás az, ami engedi a gonoszt diadalmaskodni. Nem fogunk némán állni, és hagyni, hogy ellenőrizetlenül folytasd ezt az őrült küldetést.
God and history will remember your actions this day. I hope you are ready for your impending judgment. = Isten és a történelem emlékezni fog a mai tetteitekre. Remélem, készen álltok a közelgő ítéletre.
What a waste of time. = Micsoda időpocsékolás.
A thousand welcomes to our fair nation. I am Selassie, the Ras Tafari Makonnen and Emperor of Ethiopia, your humble servant. = Szívből üdvözöllek titeket a mi csodálatos nemzetünkben. Szelasszié vagyok, Ras Tafari Makonnen és Etiópia császára, alázatos szolgátok.
I request that you consider this offer between our two peoples. I believe it will do us both good. = Arra kérlek, fontold meg ezt az ajánlatot két népünk között. Hiszem, hogy mindkettőnknek jót fog tenni.
Spirit of Adwa = Adva szelleme
May God bless you, wise and righteous Emperor of Ethiopia, Haile Selassie. As one of Ethiopia's greatest rulers and a spiritual leader of the Rastafarian movement, your good influence on diplomacy and political cooperation are praised throughout the world. You created Ethiopia's first written constitution, and favorized democracy for years to come, your great wisdom making Ethiopia enter as a charter member in the United Nations. Always aiming to reform and modernize your nation, you changed Ethiopian destiny for the best. = Isten áldjon meg, Etiópia bölcs és igazságos császára, Hailé Szelasszié! Mint Etiópia egyik legnagyobb uralkodóját és a rasztafári mozgalom szellemi vezetőjét, a diplomáciára és a politikai együttműködésre gyakorolt jó hatásodat szerte a világon dicsérik. Te hoztad létre Etiópia első írott alkotmányát, és éveken át támogattad a demokráciát, nagyszerű bölcsességed révén pedig Etiópia az Egyesült Nemzetek Szervezetének alapító tagjává vált. Mindig arra törekedve, hogy megreformáld és modernizáld nemzetedet, a lehető legjobbra változtattad meg az etióp sorsot.
Revered King, your knowledge and intelligence are required once again to protect your people from many threats in the world. Will you secure peace and stability, with benevolence and authority, in the radiance of the Kebra Nagast? Will your new empire shine through the ages of history? = Tisztelt Király, tudásodra és intelligenciádra ismét szükség van, hogy megvédd népedet a világ számos fenyegetésétől. Vajon biztosítod-e a békét és a stabilitást, jóindulattal és tekintéllyel, a Kebra Nagaszt ragyogásában? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
