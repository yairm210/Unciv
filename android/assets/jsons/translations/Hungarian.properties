Catherine = Katalin
You've behaved yourself very badly, you know it. Now it's payback time. = Nagyon csúnyán viselkedtél, tudod jól. Most jött el a megtorlás ideje.
You've mistaken my passion for a weakness, you'll regret about this. = A jóindulatomat gyengeségnek hitted, de megbánod te még ezt.
We were defeated, so this makes me your prisoner. I suppose there are worse fates. = Vesztettünk, tehát a foglyod vagyok. Járhattam volna rosszabbul is.
Fine then. It's your call. = Jól van akkor. A te döntésed.
I greet you, stranger! If you are as intelligent and tactful as you are attractive, we'll get along just fine. = Üdvözöllek, idegen! Ha olyan intelligens és tapintatos vagy, mint amilyen vonzó, nagyszerűen ki fogunk jönni egymással.
How would you like it if I propose this kind of exchange? = Mit szólnál, ha ilyen jellegű cserét javasolnék?
Hello! = Üdvözöllek!
What do you need?! = Mire van szükséged?!
Siberian Riches = Szibériai gazdagság
Hail to Imperial Majesty Catherine, Empress of all Russians. Living in the largest country in the world, from the Pacific Ocean in the east to the Baltic Sea in the west, your people endured wars, droughts, and many disasters, imbuing the Russian society with heroism and tenacity, and producing artists and scientists among the best in the world. Russia is a powerful empire which rightfully claims its place in the world concert of superpowers. = Üdvözlet őcsászári felségének, Katalinnak, minden oroszok császárnőjének. A világ legnagyobb országában élve, a keleti Csendes-óceántól a nyugati Balti-tengerig, néped háborúkat, szárazságokat és számos katasztrófát vészelt át, ami hősiességgel és szívóssággal itatta át az orosz társadalmat, és a világ legjobbjai közé tartozó művészeket és tudósokat nevelt ki. Oroszország egy hatalmas birodalom, amely joggal követeli helyét a nagyhatalmak világrendszerében.
Empress Catherine, your people are eager for Russian glory, to revive the sacred light of the Motherland. Will your new empire shine through the ages of history? = Katalin császárnő, néped vágyik az orosz dicsőségre, hogy felélessze a Haza szent fényét. Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
