Sejong = Nagy Szedzsong
Jip-hyun-jun (Hall of Worthies) will no longer tolerate your irksome behavior. We will liberate the citizens under your oppression even with force, and enlighten them! = A Csiphjondzson (A Kiválóságok Csarnoka) nem tűri tovább a bosszantó viselkedésedet. Akár erőszakkal is felszabadítjuk az elnyomásod alatt sínylődő polgárokat, és megvilágosítjuk őket!
Foolish, miserable wretch! You will be crushed by this country's magnificent scientific power! = Ostoba, szánalmas nyomorult! Összeroppantok országunk tudásának mérhetetlen hatalma alatt!
Now the question is who will protect my people. A dark age has come. = Nem látom, ki kel majd ezután népem védelmére. Sötét kor köszöntött reá.
Your words reveal more of your own prejudice than any fault in my own. = A szavaid többet árulnak el a saját előítéleteidről, mint az én hibáimról.
Welcome to the palace of Choson, stranger. I am the learned King Sejong, who looks after his great people. = Üdvözöllek a Csoszon-palotában, idegen. Én a tudós Szedzsong király vagyok, aki gondoskodik nagyszerű népéről.
We have many things to discuss and have much to benefit from each other. = Sok megbeszélnivalónk van, és sokat profitálhatunk egymásból.
Oh, it's you = Ó, te vagy az
Scholars of the Jade Hall = A Jáde Csarnok tudósai
Greetings to you, King Sejong the Great, heir of the Choson Dynasty! Prosperity and benevolence towards the common man are the principles of your reign, and made of you the most beloved Korean king. You always aimed to provide a fair and equal society for all your people, and also to favor knowledge and technological discoveries. Your wisdom and intelligence imbued all the Korean society, and the scholars of the Jade Hall developed Korea's first written language, Hangul, sharing further literature and science to the people after centuries of darkness. = Üdvözlet neked, Nagy Szedzsong király, a Csoszon-dinasztia örököse! Az átlagemberek iránti jólét és jóindulat uralkodásod alapelvei, és ezek tettek téged a legkedveltebb koreai királlyá. Mindig arra törekedtél, hogy igazságos és egyenlő társadalmat biztosíts minden embered számára, valamint támogasd a tudást és a technológiai felfedezéseket. Bölcsességed és intelligenciád átitatta az egész koreai társadalmat, és a Jáde Csarnok tudósai kifejlesztették Korea első írott nyelvét, a hangult, így a sötétség évszázadai után további irodalmat és tudományt osztottak meg a néppel.
Wise Sejong, will you gift your people with the radiance of harmony and knowledge to dispel the darkness once again? Will your new empire shine through the ages of history? = Bölcs Szedzsong, megajándékozod népedet a harmónia és a tudás ragyogásával, hogy újra elűzd a sötétséget? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
