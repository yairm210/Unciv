Pachacuti = Pacsakutek
Resistance is futile! You cannot hope to stand against the mighty Incan empire. If you will not surrender immediately, then prepare for war! = Az ellenállás hasztalan! Nem remélheted, hogy szembeszállsz a hatalmas Inka Birodalommal. Ha nem adod meg magad azonnal, akkor készülj fel a háborúra!
Declare war on me?!? You can't, because I declare war on you first! = Hadat üzen nekem?!? Nem teheted, mert én üzenek neked először hadat!
How did you darken the sun? I ruled with diligence and mercy—see that you do so as well. = Hogyan sötétítetted el a napot? Én szorgalommal és irgalommal uralkodtam - ügyelj rá, hogy te is így tégy.
How are you? You stand before Pachacuti Inca Yupanqui. = Hogy vagy? Pacsakutek Inka Jupanki előtt állsz.
The Incan people offer this fair trade. = Az inka nép ezt a tisztességes kereskedelmet kínálja.
How are you doing? = Hogy vagy?
What do you want now? = Mit akarsz már megint?
Great Andean Road = Nagy andoki úthálózat
King Pachacuti Sapa Inca, maker of the world and ruler of Tawantinsuyu and the Inca people, your loyal subjects greet you! In the beginning, the small state of Cusco already showed the Incans were promised for greatness. They won many wars against powerful enemies, relentlessly crushing any army that dared oppose them, and forged a mighty empire stretching from Ecuador to Chile, the greatest ever seen in pre-Columbian America. Not just undaunted soldiers, Inca people were accomplished builders and artists, their magnificient and unequalled culture still fascinating the world today. = Pacsakutek Sapa Inka király, a világ teremtője, Tavantinszuju és az inka nép uralkodója, hűséges alattvalóid köszöntenek téged! Kezdetben Cuzco kis állama már megmutatta, hogy az inkák nagyságra hivatottak. Sok háborút nyertek hatalmas ellenségek ellen, könyörtelenül eltiporva minden sereget, amely szembe mert szállni velük, és egy Ecuadortól Chiléig húzódó hatalmas birodalmat kovácsoltak, a legnagyobbat, amit a Kolumbusz előtti Amerika valaha látott. Az inka emberek nemcsak rettenthetetlen katonák, hanem kiváló építők és művészek is voltak, csodálatos és páratlan kultúrájuk ma is lenyűgözi a világot.
O Emperor Pachacuti, honor your name of 'Earth Shaker'! Will you once again summon the power of the earth to unite all Incan people under the protection of Sapa Inca, the Son of the Sun? Will your new empire shine through the ages of history? = Ó, Pacsakutek császár, tiszteld meg a neved, melynek jelentése: „A Föld Megrázója”! Megidézed újra a föld erejét, hogy egyesíts minden inka embert a Sapa Inka, a Nap Fia védelme alatt? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
