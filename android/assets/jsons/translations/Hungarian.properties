Harald Bluetooth = Kékfogú Harald
If I am to be honest, I tire of those pointless charades. Why don't we settle our disputes on the field of battle, like true men? Perhaps the skalds will sing of your valor... or mine! = Ha őszinte akarok lenni, fárasztanak ezek az értelmetlen színjátékok. Miért nem rendezzük a vitáinkat a csatatéren, mint az igazi férfiak? Talán a szkaldok a te bátorságodról fognak énekelni… vagy az enyémről!
Ahahah! You seem to show some skills of a true Viking! Too bad that I'll probably kill you! = Ahahah! Úgy tűnik, hogy egy igazi viking képességeit mutatod! Kár, hogy valószínűleg megöllek!
Loki must have stood by you, for a common man alone could not have defeated me... Oh well! I will join the einherjar in Valhalla and feast, while you toil away here. = Loki biztosan melletted állt, mert egy egyszerű ember egyedül nem tudott volna legyőzni… Na mindegy! Csatlakozom az einherjarokhoz a Valhallában és lakomázom, miközben te itt gürcölsz tovább.
Our future battle will be glorious! = A jövőbeli csatánk dicsőséges lesz!
Harald Bluetooth bids you welcome to his lands, a Viking unlike any the seas and lands have ever known! Hah, are you afraid? = Kékfogú Harald köszönt téged a földjein, egy olyan viking, amilyet még nem ismertek a tengerek és a szárazföldek! Haha, talán félsz?
This is a fine deal! Even a drunk beggar would agree! = Ez egy remek üzlet! Még egy részeg koldus is beleegyezne!
Hail to you. = Üdvözlet neked.
Viking Fury = Viking düh
Skal, Harald Bluetooth Gormsson, son of King Gorm of the Old and Thyra Dannebod! After crushing the armies of Norway, you achieved great construction projects all across the land of mighty Denmark. Numerous Ring Fortresses were built under your reign to protect the people from foreign invasions, but also from local quarrels. In 983 AD, you successfully repelled several waves of German settlers trying to colonize your land, and then always kept your kingdom free from any foreign pressure. = Skal, Kékfogú Harald Gormsson, Öreg Gorm király és Thyra Dannebod fia! Miután szétzúztad Norvégia seregeit, nagyszabású építkezéseket valósítottál meg a hatalmas Dánia egész területén. Uralkodásod alatt számos körerőd épült, hogy megvédje a népet a külső invázióktól, de a helyi viszályoktól is. I. sz. 983-ban sikeresen visszavertél több hullámban érkező német telepest, akik gyarmatosítani akarták a földedet, és ezután királyságodat mindig szabadon tartottad minden külföldi nyomástól.
As a true Viking, who knows not fear, time has come to unleash mighty armies of Northsmen to bring despair upon your enemies! By the will of the Gods, it will be either a glorious triumph or a sumptuous feast in the Valhalla! Will your new empire shine through the ages of history? = Mint egy igazi viking, aki nem ismeri a félelmet, eljött az idő, hogy szabadjára engedd az északi emberek hatalmas seregeit, hogy kétségbeesést hozzanak az ellenségeidre! Az Istenek akaratából ez vagy egy dicsőséges diadal lesz, vagy egy pazar lakoma a Valhallában! Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
