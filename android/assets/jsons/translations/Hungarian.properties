Montezuma I = I. Moctezuma
Xi-miqa-can! Xi-miqa-can! Xi-miqa-can! (Die, die, die!) = Xi-miqa-can! Xi-miqa-can! Xi-miqa-can! (Halj meg, halj meg, halj meg!)
Excellent! Let the blood flow in raging torrents! = Kiváló! Hadd folyjon a vér tomboló áradatként!
Monster! Who are you to destroy my greatness? = Szörnyeteg! Ki vagy te, hogy elpusztítsd a nagyságomat?
What do I see before me? Another beating heart for my sacrificial fire. = Mit látok magam előtt? Egy újabb dobogó szívet az áldozati tüzemhez.
Accept this agreement or suffer the consequences. = Fogadd el ezt a megállapodást, vagy viseld el a következményeket.
Welcome, friend. = Üdvözöllek, barátom.
Sacrificial Captives = Áldozati foglyok
O divine Montezuma, your people welcome you! May your magnificence inspire all living things! The mighty Aztecs were nomads until the 12th century, when they choose to settle in the mesa central, which would later be called Mexico. Wars were frequent with other tribes to control the rich land surrounding the sacred lakes of Texcoco, Xaltocan and Zampango. In some 200 years, double-sided alliances and martial prowess made of the Aztecs the dominant power in the Central American basin, forming a mighty empire stretching from sea to sea. Alas, the empire fell under the assault of foreign devils - the Spaniards and many curses they brought with them! Wars between tribes and weaponry of doom used by the invaders made the great Aztec civilization crumble in only a few decades. = Ó, isteni Moctezuma, a néped köszönt téged! Pompád inspiráljon minden élőlényt! A hatalmas aztékok nomádok voltak a 12. századig, amikor úgy döntöttek, hogy letelepednek a mesa centralon, amelyet később Mexikónak fognak nevezni. Gyakoriak voltak a háborúk más törzsekkel a Texcoco-, Xaltocan- és Zampango-szent tavakat körülvevő gazdag földek ellenőrzéséért. Mintegy 200 év alatt a kétoldalú szövetségek és a harci tudás az aztékokat a közép-amerikai medence domináns hatalmává tették, és egy tengertől tengerig húzódó hatalmas birodalmat hoztak létre. Sajnos a birodalom elesett a külföldi ördögök - a spanyolok és az általuk hozott rengeteg átok - rohama alatt! A törzsek közötti háborúk és a hódítók által használt végzetes fegyverek miatt a nagy azték civilizáció mindössze néhány évtized alatt összeomlott.
O mighty King Montezuma, do you hear the call of your people seeking for revenge? Will you lead them to victory under the light of the Five Suns? Will your new empire shine through the ages of history? = Ó, hatalmas Moctezuma király, hallod a bosszúért kiáltó néped hívását? Győzelemre vezeted őket az Öt Nap fénye alatt? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
