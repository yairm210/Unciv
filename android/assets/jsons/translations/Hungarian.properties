Your wanton aggression leaves us no choice. Prepare for war! = Féktelen agressziód nem hagy más választást számunkra. Készülj fel a háborúra!
You have mistaken our love of peace for weakness. You shall regret this! = Gyengeségnek hitted a békeszeretetünket. Ezt még meg fogod bánni!
The day...is yours. I hope you will be merciful in your triumph. = A mai nap… neked kedvezett. Remélem, irgalmas leszel a diadalodban.
The people of the United States of America welcome you. = Az Amerikai Egyesült Államok lakosai üdvözölnek titeket.
Is the following trade of interest to you? = Felkeltette érdeklődésed az alábbi ajánlat?
Well? = Nos?
Manifest Destiny = Nyilvánvaló végzet
President Washington, we salute you and the proud American civilization! Freed from the British dominion in the 18th century, then cleansed and reborn after a terrible civil war, the United States nation was ready to play its great role in the 20th century. At the height of its power, triumphant after two terrible world wars, United States of America, a land of immigration, opportunities, optimism and determination, has risen above all other weakening nations, unable to equal such power. = Washington elnök, tisztelgünk előtted és a büszke amerikai civilizáció előtt! A 18. században a brit uralom alól felszabadult, majd egy szörnyű polgárháború után megtisztult és újjászületett Egyesült Államok nemzete készen állt arra, hogy betöltse nagyszerű szerepét a 20. században. Hatalma csúcsán, két szörnyű világháború után diadalmaskodva az Amerikai Egyesült Államok - a bevándorlás, a lehetőségek, az optimizmus és az elszántság földje - a többi gyengülő nemzet fölé emelkedett, amelyek képtelenek voltak egyenlővé válni egy ilyen hatalommal.
President Washington, will you show to the world the legitimacy of the American way of life, and spread the flame of liberty to all mankind? Will your new empire shine through the ages of history? = Washington elnök, megmutatod-e a világnak az amerikai életforma létjogosultságát, és elterjeszted-e a szabadság lángját az egész emberiség számára? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
