Otto von Bismarck = Otto von Bismarck
I cannot wait until ye grow even mightier. Therefore, prepare for war! = Nem várhatok, míg még nagyobb hatalomra teszel szert. Készülj tehát a háborúra!
Corrupted villain! We will bring you into the ground! = Mocskos gazember! A földbe foglak döngölni!
Germany has been destroyed. I weep for the future generations. = Németország elpusztult. Sírok a jövő nemzedékeiért.
That wild bravado? It's a ticking time bomb, especially when you're all bark and no bite! = Az a vad kérkedés? Egy ketyegő időzített bomba, különösen, ha csak ugatsz, de nem harapsz!
Guten Tag. In the name of the great German people, I bid you welcome. = Jó napot. A nagy német nép nevében üdvözöllek.
It would be in your best interest, to carefully consider this proposal. = A te érdekedet is az szolgálná a legjobban, ha alaposan megfontolnád ezt az ajánlatot.
What now? = Most mi van?
So, out with it! = Szóval, ki vele!
Furor Teutonicus = Német düh
All hail to Otto von Bismarck, first chancellor of Germany and its empire! During the ancient era, Germany was a land fragmented in several tribes but already showed great promise as the Roman Empire itself struggled to bend the Germans to its will. Germany, as one nation, was slowly built on the ruins of the Holy Roman Empire, and waited 1871 to be finally unified after the glorious victory on France and Napoleon III. The German people are creative, intelligent, industrious and proven to be talented warriors through history. Despite great catastrophes and failures in the first half of the 20th century, Germany can always rely on its people will and strength to be among the greatest and powerful nations in the world. = Üdvözlet Otto von Bismarcknak, Németország és birodalma első kancellárjának! Az ókorban Németország több törzsre tagolt föld volt, de már akkor nagy ígéretet mutatott, amikor maga a Római Birodalom is küzdött, hogy a németeket az akaratára hajlítsa. Németország, mint egy nemzet, lassan épült fel a Német-római Birodalom romjain, és 1871-ig várt, hogy végre egyesüljenek a Franciaország és III. Napóleon feletti dicsőséges győzelem után. A német nép kreatív, intelligens, szorgalmas, és a történelem során tehetséges harcosnak bizonyult. A 20. század első felének hatalmas katasztrófái és kudarcai ellenére Németország mindig bízhat népe akaratában és erejében, hogy a világ legnagyobb és leghatalmasabb nemzetei közé tartozzon.
Great Prince Bismarck, glory and power are at the heart of the German nation. Your people are bright, and lend you their iron will to lead Germany once again. Will your new empire shine through the ages of history? = Nagy Bismarck herceg, a dicsőség és a hatalom a német nemzet szívében rejlik. Néped okos, és vasakaratát kölcsönzi neked, hogy még egyszer Németország élére állj. Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
