I grow tired of this throne. I think I should like to have yours instead. = Kezdem unni ezt a trónt. Azt hiszem, inkább a tiédet szeretném helyette.
Now what is this?! You ask me to add your riches to my great avails. The invitation is accepted. = Hát ez meg mi?! Arra kérsz, hogy a te gazdagságodat is a javaimhoz adjam? Elfogadom a meghívást.
