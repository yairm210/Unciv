Isabella = Izabella
God will probably forgive you... but I shall not. Prepare for war. = Isten valószínűleg megbocsát neked… de én nem. Készüljetek a háborúra.
Repugnant spawn of the devil! You will pay! = Te ördög visszataszító ivadéka! Ezért megfizetsz!
If my defeat is, without any doubt, the will of God, then I will accept it. = Ha a vereségem kétségtelenül Isten akarata, akkor elfogadom azt.
God blesses those who deserve it. I am Isabel of Spain. = Isten azokat áldja meg, akik megérdemlik. Spanyolországi Izabella vagyok.
I hope this deal will receive your blessing. = Remélem, ez az üzlet elnyeri az áldásodat.
Seven Cities of Gold = Az Arany Hét Városa
Holy Isabella, envoy of God, Great Queen of Castille and León, your people celebrate you! Spain is a beautiful and ancient country, a link between Europe and Africa, one shore on the Mediterranean and the other on the mighty Atlantic Ocean. The Spanish culture had taken the best of the Christian and Muslim worlds, and was ready to dominate the world for centuries. Powerful Spanish military fleets and brave explorers found and conquered much of the New World. Exploiting a whole new continent and its riches, Spain reached a state of power few could compete with for hundreds of years. = Szent Izabella, Isten követe, Kasztília és León nagy királynője, a néped ünnepel téged! Spanyolország egy gyönyörű és ősi ország, összekötő kapocs Európa és Afrika között, egyik partja a Földközi-tengeren, a másik a hatalmas Atlanti-óceánon fekszik. A spanyol kultúra a keresztény és a muszlim világ legjavát ötvözte, és készen állt arra, hogy évszázadokon át uralja a világot. A hatalmas spanyol hadiflották és a bátor felfedezők megtalálták és meghódították az Újvilág nagy részét. Egy teljesen új kontinens és annak kincseinek kiaknázásával Spanyolország olyan hatalmi szintre emelkedett, amellyel kevesen tudtak versenyre kelni évszázadokon át.
O splendid and virtuous Isabella! By the will of the heavens, will Spain reborn to achieve its holy destiny and become a new El Dorado? Will your new empire shine through the ages of history? = Ó, pompás és erényes Izabella! Az ég akaratából vajon újjászületik Spanyolország, hogy beteljesítse szent küldetését és új El Doradóvá váljon? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
