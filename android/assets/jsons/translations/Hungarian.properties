In responding to the unstinting malignancy that has heretofore defined your relationship with Canada, we can have no recourse but war! = Válaszul arra a lankadatlan rosszindulatra, amely eddig a Kanadához fűződő kapcsolatodat jellemezte, nincs más választásunk, mint a háború!
