Askia = Aszkia
You are an abomination to heaven and earth, the chief of ignorant savages! You must be destroyed! = Utálatosság vagy az égnek és a földnek, a tudatlan vadak vezére! El kell pusztulnod!
Fool! You have doomed your people to fire and destruction! = Bolond! Tűzre és pusztulásra kárhoztattad a népedet!
We have been consumed by the fires of hatred and rage. Enjoy your victory in this world - you shall pay a heavy price in the next! = Felemésztett minket a gyűlölet és a harag tüze. Élvezd a győzelmedet ebben a világban - a következőben nagy árat fogsz fizetni érte!
This insult shall cost you. = Ez a sértés sokba fog kerülni neked.
I am Askia of the Songhai. We are a fair people - but those who cross us will find only destruction. You would do well to avoid repeating the mistakes others have made in the past. = A szongaj Aszkia vagyok. Igazságos nép vagyunk - de akik keresztbe tesznek nekünk, azok csak pusztulást találnak. Jól tennéd, ha elkerülnéd azoknak a hibáknak a megismétlését, amelyeket mások követtek el a múltban.
Can I interest you in this deal? = Érdekelhet ez az üzlet?
River Warlord = Folyami hadúr
Askia, leader of the Songhai people and greatest of all, may God watch your path towards glory! Songhai was under the rule of the mighty West African state of Mali until the middle of the 14th century. Great King Sunni Ali Ber fought for independance, and showed to all Songhai's power, by conquering territories and repelling many foes who sought to destroy the rising kingdom. Ultimately, conquest of the wealthy cities of Timbuktu and Jenne made Songhai an empire with enough economic power to survive for a century, until the empire bowed down before foes with advanced technology - muskets against spearmen. = Aszkia, a szongaj nép vezetője és mind közül a legnagyobb, Isten vigyázza a dicsőség felé vezető utadat! Szongaj a hatalmas nyugat-afrikai Mali állam uralma alatt állt a 14. század közepéig. A nagy király, Szunni Ali Ber a függetlenségért harcolt, és területek meghódításával, valamint a felemelkedő királyság elpusztítására törekvő számos ellenség visszaverésével megmutatta mindenkinek Szongaj erejét. Végül a gazdag városok, Tombuktu és Dzsenne meghódítása olyan gazdasági erővel rendelkező birodalommá tette Szongajt, amely egy évszázadig fennmaradt, míg a birodalom meg nem hajolt a fejlett technológiával rendelkező ellenségek előtt - muskéták a lándzsások ellen.
King Askia, your people know there's still hope, that the hour of revenge is coming. Give them wealth and power, give them mighty weapons of iron and fire, to destroy any foe, for Songhai to revive! Will your new empire shine through the ages of history? = Aszkia király, a néped tudja, hogy van még remény, és közeleg a bosszú órája. Adj nekik gazdagságot és hatalmat, adj nekik hatalmas vas- és tűzfegyvereket, hogy elpusztítsanak minden ellenséget, hogy Szongaj feltámadjon! Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
