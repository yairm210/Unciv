'As soon as men decide that all means are permitted to fight an evil, then their good becomes indistinguishable from the evil that they set out to destroy.' - Christopher Dawson = „Amint az emberek kijelentik, hogy minden eszköz megengedett a gonosz elpusztításához, a jóságuk megkülönböztethetetlen lesz attól a gonosztól, amelyet el akarnak pusztítani.” - Christopher Dawson
