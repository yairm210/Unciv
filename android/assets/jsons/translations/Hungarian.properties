Gustavus Adolphus = II. Gusztáv Adolf
The Hakkapeliittas will ride again and your men will fall just at the sight of my cavalry! God with us! = A Hakkapeliták újra rohamozni fognak, és az embereid már a lovasságom látványától is elhullanak! Isten velünk van!
Ha ha ha, captain Gars will be very glad to head out to war again. = Hahaha…, Gars kapitány nagyon boldog lesz, hogy újra háborúba indulhat.
I am Sweden's king. You can take my lands, my people, my kingdom, but you will never reach the House of Vasa. = Svédország királya vagyok. Elveheted a földjeimet, a népemet, a királyságomat, de a Vasa-házat sosem éred el.
You actually seem sharper than what I had originally thought. = Valójában élesebb eszűnek tűnsz, mint amit eredetileg gondoltam rólad.
Stranger, welcome to the Snow King's kingdom! I am Gustavus Adolphus, member of the esteemed House of Vasa = Üdvözöllek a Hókirály birodalmában idegen! II. Gusztáv Adolf vagyok, a nagyra becsült Vasa-ház tagja
My friend, it is my belief that this settlement can benefit both our peoples. = Barátom, úgy hiszem, ez az üzlet mindkettőnk népének hasznára fog válni.
Oh, welcome! = Nocsak, üdvözöllek!
Oh, it is you. = Nocsak, te vagy az.
Nobel Prize = Nobel-díj
All hail Great King Gustavus Adolphus, founder of the Swedish Empire, and one of the most famous military tacticians. In the early 17th century, Sweden emerged as a great power in Europe under your reign, thanks to your wisdom, both in diplomacy and warfare. As king, you decided to reform Swedish laws to bring economic stability and prosperity to your people. Your allies, and also your enemies, called you the 'Lion of the North', witnessing your modern vision of warfare, and the prowess of your armies on the battlefield. As you triumphed in the Thirty Years' War, your name will be forever remembered as one of history's greatest generals. = Mindnyájan üdvözöljük a nagy II. Gusztáv Adolf királyt, a Svéd Birodalom alapítóját, a történelem egyik leghíresebb katonai stratégáját. A 17. század elején Svédország nagyhatalommá vált Európában az uralkodásod alatt, köszönhetően a diplomáciában és a hadviselésben tanúsított bölcsességednek. Királyként elhatároztad a svéd törvények megreformálását, hogy gazdasági stabilitást és jólétet hozz a népednek. Szövetségeseid és ellenségeid egyaránt az „Észak Oroszlánjának” neveztek, látva a hadviselésről alkotott modern elképzeléseidet és seregeid vitézségét a harctéren. Mivel diadalmaskodtál a harmincéves háborúban, nevedre örökké a történelem egyik legnagyobb hadvezéreként fognak emlékezni.
O noble King, will you lend your leadership and brilliant ideas to Sweden once again, to conceive strategies never seen before? Will your new empire shine through the ages of history? = Ó, nemes Király, kölcsönzöd-e újra vezetésedet és briliáns ötleteidet Svédországnak, hogy soha nem látott stratégiákat dolgozz ki? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
