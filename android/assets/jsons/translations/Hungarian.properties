By the grace of God, your days are numbered. = Isten kegyelméből, napjaid meg vannak számlálva.
We shall never surrender. = Soha nem adjuk meg magunkat.
You have triumphed over us. The day is yours. = Diadalmaskodtál felettünk. Ma ünnepelhetsz.
Watch yourself, your pride will be your downfall. = Vigyázz magadra, a büszkeséged lesz a veszted.
We are pleased to meet you. = Örvendünk a találkozásnak.
Would you be interested in a trade agreement with England? = Érdekelne egy kereskedelmi megállapodás Angliával?
Hello, again. = Üdv újra.
Oh, it's you! = Á, te vagy az!
Sun Never Sets = A Nap soha nem nyugszik le
Long live to Your Highness, Queen Elizabeth Gloriana, leader and protector of the glorious England! Through history, enduring many invasions, England strengthened its will, playing smartly with diplomacy, cunning, and military power, to eventually rose as one of the most dominant Empires the world has ever known. Their matchless navy, brilliant scientists and artists, and powerful merchants, have shaped the known world for centuries. = Sokáig éljen őfelsége, Gloriana Erzsébet királynő, a dicső Anglia vezére és védelmezője! A történelmen át, számos inváziót elszenvedve, Anglia megerősítette akaratát, okosan játszva a diplomáciával, ravaszsággal és katonai erővel, hogy végül az egyik legalapvetőbb birodalommá emelkedjen, amelyet a világ valaha ismert. Páratlan haditengerészetük, briliáns tudósaik és művészeik, valamint hatalmas kereskedőik évszázadokon át formálták az ismert világot.
Queen Elizabeth, will England cast once more its brightness upon all lands and seas of the world? Will your new empire shine through the ages of history? = Erzsébet királynő, vajon Anglia még egyszer ráveti-e ragyogását a világ minden földjére és tengerére? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
