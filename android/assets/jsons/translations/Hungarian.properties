My God, be merciful to my soul. My God, feel pity for this... my poor people! = Istenem, legyél irgalmas a lelkemhez. Istenem, könyörülj meg ezen a… szegény népemen!
I am William of Orange, stadtholder of The Netherlands. Did you need anything? I still have a lot to do. = Orániai Vilmos vagyok, Hollandia helytartója. Szükséged van valamire? Még rengeteg dolgom van.
I believe I have something that may be of some importance to you. = Azt hiszem, van valamim, ami fontos lehet a számodra.
Once again, greetings. = Üdvözöllek ismét.
Dutch East India Company = Holland Kelet-indiai Társaság
Greetings to the wise and brave Prince William of Orange, who freed the Netherlands and gave strength to the Dutch people. In 1568, you led a rebellion against Spanish dominion, to gain freedom for your people, and therefore starting the Eighty Years' War. Your actions were all aimed to create one of Europe's first modern republics, the Seven United Provinces. The rebellion was the meaning of your very life and death, as it was also the cause of your assassination in 1584. But your death has given even more pride and courage to your people, to fight for liberty against any oppressors. Carved in history as the 'Father of the Fatherland', your name is a symbol of Dutch independence for eternity. = Üdvözlet a bölcs és bátor Orániai Vilmos hercegnek, ki felszabadította Németalföldet és erőt adott a holland népnek. 1568-ban lázadást vezettél a spanyol uralom ellen, hogy kivívd néped szabadságát, ezzel elindítva a nyolcvanéves háborút. Tetteid mind arra irányultak, hogy létrehozd Európa egyik első modern köztársaságát, a Hét Egyesült Tartományt. A lázadás jelentette az életedet és a halálodat is, hiszen ez lett a veszted is az 1584-es meggyilkolásodkor. De halálod még több büszkeséget és bátorságot adott népednek, hogy harcoljanak a szabadságért az elnyomók ellen. A történelembe a „Haza atyja” néven bevonulva neved mindörökre a holland függetlenség szimbóluma marad.
Brave Prince, your people ask for your wisdom to gain its freedom once more, and to illuminate the world with progressive and modern ideas. Will your new empire shine through the ages of history? = Bátor herceg, néped újra a bölcsességedet kéri, hogy elnyerje szabadságát, és progresszív, modern eszmékkel világosítsa meg a világot. Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
