Ramkhamhaeng = Ramkamheng
You lowly, arrogant fool! I will make you regret of your insolence! = Te alantas, arrogáns bolond! Megbánod a szemtelenségedet!
You scoundrel! I shall prepare to fend you off! = Te gazember! Felkészülök, hogy eltüntesselek!
Although I lost, my honor shall endure. I wish you good luck. = Bár veszítettem, a becsületem megmarad. Sok szerencsét kívánok neked.
I, Pho Kun Ramkhamhaeng, King of Siam, consider it a great honor that you have walked to visit my country of Siam. = Én, Pho Kun Ramkhamhaeng, Sziám királya, nagy megtiszteltetésnek tartom, hogy meglátogatod az országomat, Sziámot.
Greetings. I believe this is a fair proposal for both parties. What do you think? = Üdvözletem. Úgy gondolom, hogy ez egy mindkét fél számára méltányos javaslat. Mit gondolsz?
Welcome. = Üdvözöllek.
Father Governs Children = Az atya vezeti gyermekeit
O Great King Ramkhamhaeng, the Siamese people obey you with respect and fear! The beautiful and mysterious land of Siam is an ancient country in the heart of Southeast Asia, which was besieged by many foes, plagued by bloody war and great poverty, but eventually the smart and loyal Siamese people have endured and triumphed. Siam was a part of the Khmer Empire until the 13th century AD, before its brave people took arms and led a revolution to form the small Sukhothai kingdom. After many battles and diplomacy prowess, this tiny kingdom became a mighty empire, which would dominate South East Asia for more than a century. = Ó, Nagy Ramkamheng király, a sziámi nép tisztelettel és félelemmel engedelmeskedik neked! Sziám gyönyörű és titokzatos földje egy ősi ország Délkelet-Ázsia szívében, amelyet számos ellenség ostromolt, véres háború és nagy szegénység sújtott, de végül az okos és hűséges sziámi nép kitartott és győzedelmeskedett. Sziám az i. sz. 13. századig a Khmer Birodalom része volt, mielőtt bátor népe fegyvert fogott és forradalmat vezetett a kis Szukhotaj királyság megalapítására. Sok csata és diplomáciai ügyesség után ez az apró királyság hatalmas birodalommá vált, amely több mint egy évszázadon át uralta Délkelet-Ázsiát.
Wise and powerful King Ramkhamhaeng, your people want to revive these days of glory! Can you make a new dawn break on Siam? Will your new empire shine through the ages of history? = Bölcs és hatalmas Ramkamheng király, a néped fel akarja támasztani a dicsőség ezen napjait! El tudod érni, hogy új hajnal virradjon Sziámra? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
