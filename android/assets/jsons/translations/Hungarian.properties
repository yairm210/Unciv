Hiawatha = Hiawatha
You are a plague upon Mother Earth! Prepare for battle! = Pestis vagy a Földanyán! Készülj a harcra!
You evil creature! My braves will slaughter you! = Te ördög! Bátor harcosaim lemészárolnak téged!
You have defeated us... but our spirits will never be vanquished! We shall return! = Vereséget szenvedtünk tőletek…, de a szellemeinket soha nem igázzátok le! Még visszatérünk!
Words alone cannot shake the roots of peace I have planted among my people. = A szavak önmagukban nem ingathatják meg a béke gyökereit, amelyeket a népem körében elültettem.
Greetings, stranger. I am Hiawatha, speaker for the Iroquois. We seek peace with all, but we do not shrink from war. = Üdvözlet idegen. Hiawatha vagyok, az irokézek szószólója. Mindenkivel a békét keressük, de a háborútól sem riadunk vissza.
Does this trade work for you, my friend? = Megfelel neked ez az üzlet, barátom?
The Great Warpath = A nagy hadiösvény
Greetings, noble Hiawatha, leader of the mighty Iroquois nations! Your people lived near the great and holy lake Ontario since the ancient ages, on a land that will be later known as New York city. Long ago, the five peoples of Seneca, Onondaga, Mohawks, Cayugas and Oneida became one nation, the Haudenosaunee, the Iroquois. Although not having a written language, the wise Iroquois created the Great Law of Peace, which can be considered the first established constitution. For decades, your people fought powerful enemies, such as the Huron, and then the French and English colonists. With less warriors and inferior weaponry, the Iroquois still survived and walk on the path of peace and harmony, until their way of living faded away under the crush of the newborn United States nation. = Üdvözlet nemes Hiawatha, a hatalmas Irokéz nemzet vezetője! Néped az ősidők óta a nagy és szent Ontario-tó közelében élt, egy olyan földön, amelyet később New York városaként ismernek majd. Réges-régen a szeneka, onondaga, mohawk, kajuga és oneida népek egyetlen nemzetté váltak, ők a haudenosaunee-k, az irokézek. Bár írott nyelvük nincs, a bölcs irokézek létrehozták a Béke Nagy Törvényét, amely az első elismert alkotmánynak tekinthető. Néped évtizedeken át harcolt olyan hatalmas ellenségekkel, mint a huronok, majd a francia és angol gyarmatosítók. Kevesebb harcossal és gyengébb fegyverzettel az irokézek mégis túléltek, és a béke és harmónia útját járják, míg végül életmódjuk el nem halványult az újszülött Egyesült Államok nemzetének nyomása alatt.
Great Sachem Hiawatha, do you hear the complaints of your people? Can you light the path leading to the ancient Iroquois union? Will your new empire shine through the ages of history? = Nagy Szatsem Hiawatha, hallod a néped panaszait? Meg tudod világítani az utat, amely az ősi irokéz unióhoz vezet? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
