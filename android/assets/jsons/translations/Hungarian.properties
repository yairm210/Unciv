Maria Theresa = Mária Terézia
Shame that it has come this far. But ye wished it so. Next time, be so good, choose your words more wisely. = Sajnálatos, hogy idáig fajultak a dolgok. De ti akartátok így. Legközelebb légy oly kedves, és válogasd meg jobban a szavaidat.
What a fool ye are! Ye will end swiftly and miserably. = Mekkora bolond vagy! Gyorsan és nyomorúságosan fogod végezni.
The world is pitiful! There's no beauty in it, no wisdom. I am almost glad to go. = Szánalmas ez a világ! Nincs benne se szépség, se bölcsesség. Már-már örömmel távozom.
The archduchess of Austria welcomes your Eminence to... Oh let's get this over with! I have a luncheon at four o'clock. = Ausztria főhercegnője üdvözletét küldi Eminenciádnak, hogy… Jaj, essünk már túl rajta, mert ebédmeghívásom van négy órára.
I see you admire my new damask. Nobody should say that I am an unjust woman. Let's reach an agreement! = Ugye, milyen csodás ez az új damaszt? Ne mondja rám senki, hogy igazságtalan vagyok! Állapodjunk hát meg egymással!
Oh, it's ye! = Ó, te vagy az!
Diplomatic Marriage = Diplomáciai házasság
Noble and pious Queen Maria Theresa, Holy Roman Empress and sovereign of Austria, the people revere your grace. After the death of your father King Charles VI, you inherited the throne of Austria during difficult economic and military times. But you used your wisdom and unflinching determination to fend off your foes and resolve any obstacles to stability and prosperity. With your husband Francis Stephen at your side as co-ruler, you assured your place as Empress of the Holy Roman Empire. During your reign, you reformed Austria in several domains, as you gifted it with a powerful army, a stable economic model, and an improved educational system. = Nemes és dicső Mária Terézia királynő, német-római császárné és Ausztria uralkodója, a nép tiszteli kegyességedet. Édesapád, VI. Károly király halála után nehéz gazdasági és katonai időkben örökölted meg Ausztria trónját. De bölcsességedet és rendíthetetlen elszántságodat használtad, hogy elhárítsd ellenségeidet, és megoldj minden akadályt a stabilitás és a jólét elől. Férjeddel, Lotaringiai Ferenccel az oldaladon társuralkodóként biztosítottad helyedet a Német-római Birodalom császárnéjaként. Uralkodásod alatt számos területen reformáltad meg Ausztriát, erős hadsereget, stabil gazdasági modellt és jobb oktatási rendszert ajándékozva neki.
O Great Queen, proud and dignified, by the will of God and the Divine right, can you reach the height of prosperity and splendor the kingdom of Austria deserves? Will your new empire shine through the ages of history? = Ó, nagy Királynő, büszke és méltóságteljes, Isten akaratából és a kegyelméből el tudod-e érni a jólét és a ragyogás azon magasságát, amelyet Ausztria királysága megérdemel? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
