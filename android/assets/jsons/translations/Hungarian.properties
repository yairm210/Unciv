Boudicca = Boudica
You shall stain this land no longer with your vileness! To arms, my countrymen. We ride to war! = Nem fogod tovább bemocskolni ezt a földet a hitványságoddal! Fegyverbe, honfitársaim. Háborúba indulunk!
Traitorous man! The Celtic peoples will not stand for such wanton abuse and slander - I shall have your balls! = Áruló gazfickó! A kelta népek nem fogják eltűrni az ilyen esztelen gyalázkodást és rágalmazást - el fogom kapni a golyóidat!
Vile ruler, know you have won this war in name alone. Your cities lie buried and your troops defeated. I have my own victory. = Hitvány uralkodó, tudd meg, hogy ezt a háborút csak nevében nyerted meg. Városaid romokban hevernek, csapataidat pedig legyőztük. Megvan a magam győzelme.
Don't forget who you're dealing with. Arrogant moves can get you in danger. = Ne feledd, kivel van dolgod. Az arrogáns lépések veszélybe sodorhatnak.
I am Boudicca, Queen of the Celts. Let no-one underestimate me! = Boudica vagyok, a kelták királynője. Senki ne becsüljön alá engem!
Let us join our forces together and reap the rewards. = Egyesítsük erőinket, és arassuk le a babérokat.
God has given good to you. = Az Isten jót adott neked.
Druidic Lore = Druida hagyományok
May glory and honor always be upon you, Warrior Queen! In a time dominated by men, you successfully claimed the throne and the power, but also valiantly defied the mighty Roman Empire. Punished and humiliated by the hand of the Roman bloody invaders, you united your people and led a terrible revolt, to seek revenge. Many legions fell under your fierce attacks and you burned the city of London with your anger. While the Romans still kept ownership of your land after your final defeat, your actions nonetheless showed Rome that this land could never be fully conquered, making Nero himself consider to withdraw all troops and leaving Britain forever. = Dicsőség és tisztelet övezzen utadon, Harcos Királynő! Egy férfiak által uralt korban sikeresen szerezted meg a trónt és a hatalmat, de hősiesen dacoltál a hatalmas Római Birodalommal is. A véres római hódítók által megbüntetve és megalázva egyesítetted népedet, és szörnyű lázadást vezettél, hogy bosszút állj. Számos légió esett el heves támadásaid alatt, és haragodban felégetted London városát. Bár a rómaiak végső vereséged után is megtartották a földedet, tetteid mindazonáltal megmutatták Rómának, hogy ezt a területet soha nem lehet teljesen leigázni, aminek hatására maga Néró is fontolóra vette minden csapatának kivonását és Britannia elhagyását örökre.
O raging lioness, will you lead the Celts again under the glory of your name, to spread the fires of liberty, and achieve a final victory? Will your new empire shine through the ages of history? = Ó, dühöngő nőstényoroszlán, fogod-e újra vezetni a keltákat neved dicsősége alatt, hogy elterjeszd a szabadság tüzét, és elérd a végső győzelmet? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
