Harun al-Rashid = Hárún ar-Rasíd
The world will be more beautiful without you. Prepare for war. = A világ sokkal szebb hely lenne nélküled. Készülj a háborúra.
Fool! You will soon regret dearly! I swear it! = Ostoba! Ezt hamarosan nagyon meg fogod bánni! Erre megesküszöm!
You have won, congratulations. My palace is now in your possession, and I beg that you care well for the peacock. = Gratulálok, győztél! Palotám mostantól a tiéd, de kérlek viseld jó gondját a pávának.
Our future battle will be glorious. = A jövőbeli csatánk dicsőséges lesz.
Welcome foreigner, I am Harun Al-Rashid, Caliph of the Arabs. Come and tell me about your empire. = Üdvözöllek idegen, Hárún ar-Rasíd vagyok, az arabok kalifája. Jöjj és mesélj nekem a birodalmadról.
Come forth, let's do business. = Gyere közelebb, kössünk üzletet.
Peace be upon you. = A béke legyen veled.
Trade Caravans = Kereskedelmi karavánok
Blessings of the Great God be upon you, O great caliph Harun al-Rashid, leader of the mighty Arabian people! The Muslim Empire, the Caliphate, born from chaos after the death of the prophet Muhammad in 632 AD, intended to apply the rule of God to all Earth. And by the will of God, the caliphate reached its full power, ruling Spain, North Africa, the Middle East, Anatolia, the Balkans and Persia, to even surpass the Great Roman Empire. The arts and sciences were a holy gift of Arabia during the Middle Ages, as the infidel lands of Europe delved deep into ignorance and chaos. Lasting for six hundred years, the Caliphate finally fell before the Mongols, the plague of the civilized world. = A Hatalmas Isten áldása legyen rajtad, ó, nagy Hárún ar-Rasíd kalifa, a hatalmas arab nép vezére! A muzulmán birodalom, a Kalifátus, amely Mohamed próféta i. sz. 632-ben bekövetkezett halála utáni káoszból született, Isten uralmát akarta kiterjeszteni az egész Földre. És Isten akaratából a kalifátus elérte teljes hatalmát, uralva Spanyolországot, Észak-Afrikát, a Közel-Keletet, Anatóliát, a Balkánt és Perzsiát, sőt még a Nagy Római Birodalmat is felülmúlta. A művészetek és a tudományok Arábia szent ajándékai voltak a középkorban, miközben Európa hitetlen földjei mélyen elmerültek a tudatlanságban és a káoszban. A hatszáz évig fennálló Kalifátus végül elbukott a mongolok, a civilizált világ csapása előtt.
Great Caliph Harun al Rashid, all Arabian people long for greatness! Arabia must be once again the land of arts and knowledge, which under the radiant law of God, will fear no enemy! Will your new empire shine through the ages of history? = Nagy Hárún ar-Rasíd kalifa, minden arab nép nagyságra vágyik! Arábia legyen újra a művészetek és a tudás földje, amely Isten ragyogó törvénye alatt semmilyen ellenségtől sem fél! Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
