Augustus Caesar = Augustus Caesar
My treasury contains little and my soldiers are getting impatient... (sigh) ...therefore you must die. = A kincstáram szinte üres, és a katonáim egyre türelmetlenebbek… (sóhaj)… ezért meg kell halnod.
So brave, yet so stupid! If only you had a brain similar to your courage. = Oly bátor, mégis oly ostoba! Bárcsak a bátorságodhoz mérhető eszed is lenne.
The gods have deprived Rome of their favour. We have been defeated. = Az Istenek megvonták Rómától a kegyüket. Legyőztek minket.
I wasn't sure, but it seems you do have some grit. = Nem voltam biztos benne, de úgy tűnik, van benned némi kitartás.
I greet you. I am Augustus, Imperator and Pontifex Maximus of Rome. If you are a friend of Rome, you are welcome. = Üdvözöllek. Augustus vagyok, Róma imperátora és pontifex maximusa. Ha Róma barátja vagy, szívesen látunk.
I offer this, for your consideration. = Vedd fontolóra ezt az ajánlatunkat.
Hail. = Ave.
What do you want? = Mit akarsz?
The Glory of Rome = Róma dicsősége
Ave Caesar Augustus, Emperor of Rome and Dominus of the Roman Empire! Your empire was the most powerful and feared of all in Western civilization. The Roman people crafted so brilliantly its culture, law, art, and warfare, that no one could contest the supremacy of Rome. Force and Honor led to glorious conquests, a domination of all the lands from Spain in the west to Syria in the east, even reaching the remote barbarian lands of England and Germany. Roman art and architecture have been praised for millenia and have been envied by all lesser civilizations who have followed. = Ave Caesar! Augustus! Róma császára és a Római Birodalom dominusa! A te birodalmad volt a leghatalmasabb és legfélelmetesebb a nyugati civilizációk között. A római nép oly briliánsan alkotta meg kultúráját, törvényeit, művészetét és hadviselését, hogy senki sem kérdőjelezhette meg Róma felsőbbrendűségét. Erő és becsület vezetett a dicsőséges hódításokhoz, a nyugati Spanyolországtól a keleti Szíriáig tartó minden föld feletti uralomhoz, elérve még Anglia és Németország távoli barbár földjeit is. A római művészetet és építészetet évezredek óta dicsőítik, és irigyli minden kisebb nemzet, amely követte.
O glorious Imperator, your people celebrate you and ask for the glory of Rome! In these times of darkness, the Pax Romana will be a beacon of light for all! Will your new empire shine through the ages of history? = Ó, dicső imperátor, néped ünnepel téged és Róma dicsőségét kéri! A sötétség ezen időszakában a Pax Romana a fény világítótornya lesz mindenki számára! Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
