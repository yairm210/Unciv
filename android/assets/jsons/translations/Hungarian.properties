Darius I = I. Dareiosz
Your continue existence is an embarrassment to all leaders everywhere! You must be destroyed! = A puszta létezésed is szégyen minden vezetőre nézve, bárhol is legyenek! El kell pusztulnod!
Curse you! You are beneath me, son of a donkey driver! I will crush you! = Legyél átkozott! Alattam állsz, Te szamárhajcsár fia! El foglak tiporni!
You mongrel! Cursed be you! The world will long lament your heinous crime! = Te korcs! Átkozott legyél! A világ még sokáig emlegetni fogja szörnyű bűnödet!
Peace be on you! I am Darius, the great and outstanding king of kings of great Persia... but I suppose you knew that. = Béke veled! Dareiosz vagyok, a hatalmas Perzsia királyainak nagy és kiváló királya… de feltételezem, ezt már tudtad.
In my endless magnanimity, I am making you this offer. You agree, of course? = Végtelen nagylelkűségemben ezt az ajánlatot teszem neked. A mivel Te nagyon is egyetértesz ugye!?
Good day to you! = Szép napot kívánok!
Ahh... you... = Áhh… Te…
Achaemenid Legacy = Óperzsa örökség
Great King Darius of Persia, the heaven casts its light upon you! Persian people are strong and wise, as their leader. In old ages, the great Persian king Cyrus fought back the mighty Median empire and finally destroyed the Medes in 550 BC. Cunning diplomacy and military achievements helped then to conquer the wealthy Lydia and the powerful Babylon, Cyrus' son conquering the eternal Egypt some years later. At the height of its power, the Persian Empire reached the shores of Macedonia, at the very door of the upstart Greek city-states. Persia would have prospered for centuries if Alexander of Macedon hadn't brutally destroyed the great empire in one violent strike. = Perzsia nagy Dareiosz királya, az ég vesse rád fényét! A perzsa nép erős és bölcs, akár a vezetője. A régi időkben a nagy perzsa király, Kürosz visszaverte a hatalmas Média Birodalmat, és végül i. e. 550-ben elpusztította a médeket. A dörzsölt diplomácia és a katonai sikerek segítettek ezután meghódítani a gazdag Lüdiát és a hatalmas Babilon hercegségét, Kürosz fia pedig néhány évvel később meghódította az örök Egyiptomot. Hatalma csúcsán a Perzsa Birodalom elérte Makedónia partjait, a feltörekvő görög városállamok küszöbét. Perzsia évszázadokig virágzott volna, ha a makedón Nagy Sándor egyetlen erőszakos csapással brutálisan el nem pusztítja a nagy birodalmat.
King Darius, the people of Persia await, longing for its past glory and power! Persia of the Immortals must reborn, to punish its foes and rebuild the gleaming Persepolis! Will your new empire shine through the ages of history? = Dareiosz király, Perzsia népe vár, vágyakozva a múlt dicsősége és hatalma után! A Halhatatlanok Perzsiájának újjá kell születnie, hogy megbüntesse ellenségeit és újjáépítse a csillogó Perszepoliszt! Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
