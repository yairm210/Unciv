I have to do this, for the sake of progress if nothing else. You must be opposed! = Meg kell tennem ezt, ha másért nem, a haladás érdekében. Szembe kell szállni veled!
You can see how fruitless this will be for you... right? = Ugye látod, hogy ez mennyire eredménytelen lesz számodra?
May God grant me these last wishes - peace and prosperity for Brazil. = Isten adja meg nekem ezeket az utolsó kívánságaimat - békét és jólétet Brazíliának.
Rio de Janeiro = Rio de Janeiro

Perhaps, in another world, we could have been friends... = Talán, egy másik világban, barátok lehettünk volna…
Singapore = Szingapúr

After thorough deliberation, Australia finds itself at a crossroads. Prepare yourself, for war is upon us. = Alapos mérlegelés után Ausztrália válaszúthoz érkezett. Készüljetek fel, mert a háború közeleg.
We will mobilize every means of resistance to stop this transgression against our nation! = Az ellenállás minden eszközét mozgósítani fogjuk, hogy megállítsuk ezt a nemzetünk elleni vétket!
The principles for which we have fought will survive longer than any nation you could ever build. = Az elvek, amelyekért harcoltunk, tovább fognak élni, mint bármelyik nemzet, amit valaha építhetnél.
Sydney = Sydney

I will enjoy hearing your last breath as you witness the destruction of your realm! = Élvezettel fogom hallgatni az utolsó leheletedet, miközben tanúja leszel a birodalmad pusztulásának!
Why do we fight? Because Inanna demands it. Now, witness the power of the Sumerians! = Miért harcolunk? Mert Inanna ezt követeli. Most pedig legyél a tanúja a sumérok erejének!
What treachery has struck us? No, what evil? = Milyen árulás sújtott minket? Nem, miféle gonoszság?
