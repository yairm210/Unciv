Ramesses II = II. Ramszesz
You are but a pest on this Earth, prepare to be eliminated! = Nem vagy más, csak élősködő ezen a Földön! Készülj rá, hogy kiirtalak!
You are a fool who evokes pity. You have brought my hostility upon yourself and your repulsive civilization! = Egy szánalomra méltó bolond vagy! Magadra vontad a haragomat az egész visszataszító népeddel együtt!
Strike me down and my soul will torment yours forever, you have won nothing. = Sújts le rám, és a lelkem örökre kínozni fogja a tiédet. Semmit sem nyertél.
Greetings, I am Ramesses the god. I am the living embodiment of Egypt, mother and father of all civilizations. = Üdvözöllek, Ramszesz vagyok, az Isten. Én vagyok Egyiptom élő megtestesülése, minden civilizáció anyja és apja.
Generous Egypt makes you this offer. = A nagylelkű Egyiptom ezt az ajánlatot teszi neked.
Good day. = Jó napot.
Oh, it's you. = Á, te vagy az.
Monument Builders = Műemléképítők
O great Ramesses, Pharaoh of Egypt, bright as the Sun and mighty as the Nile! Lord of all living things, you lead the greatest of all civilizations, which has gifted the world with writing, advanced mathematics, sculpture, and architecture. Egyptian monuments and culture will continue to amaze the world for thousands of years. = Ó, nagy Ramszesz, Egyiptom fáraója, fényes, mint a Nap, és hatalmas, mint a Nílus! Minden élőlény ura, te vezeted az minden civilizáció legnagyobbikát, amely írással, speciális matematikával, szobrászattal és építészettel ajándékozta meg a világot. Az egyiptomi műemlékek és kultúra évezredekig ámulatba ejtik majd a világot.
Mighty and eternal Ramesses, Egypt lasted for millenia, whereas other civilisations disappeared into dust after a few centuries. Amun-Ra blesses you again to lead Egypt and its people on the path of light. Will your new empire shine through the ages of history? = Hatalmas és örök Ramszesz, Egyiptom évezredeken át fönnmaradt, miközben más civilizációk néhány évszázad után porrá váltak. Ámon-Ré újra megáld, hogy Egyiptomot és népét a fény útjára vezesd. Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
