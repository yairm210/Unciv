Alexander = Nagy Sándor
You are in my way, you must be destroyed. = Az utamban állsz. El kell, hogy pusztulj.
As a matter of fact I too grow weary of peace. = Ami azt illeti, én is belefáradtam a békébe.
You have somehow become my undoing! What kind of beast are you? = Végül valahogyan mégis tönkretettél engem! Miféle szörnyeteg vagy te?
The Gods frown upon your foolishness. = Az Istenek rossz szemmel nézik a balgaságodat.
Hello stranger! I am Alexandros, son of kings and grandson of the gods! = Üdvözöllek, idegen! Nagy Sándor vagyok, királyok fia és az Istenek unokája!
My friend, does this seem reasonable to you? = Barátom, méltányosnak találod ezt az ajánlatot?
Greetings! = Üdvözöllek!
What? = Nos?
Hellenic League = Hellén szövetség
Great King Alexander, leader of the mighty Greek nation, you are truly blessed by the gods. In 480 BC, quarrelsome city-states such as Athens, Sparta, Thebes, found a way to join their forces, allowing Greece to defeat the mighty Persia in the 5th century BC, both on land and sea. Following their example, you lead a Greek coalition and finally struck down the Persian Empire in 331 BC. You conquered almost all the known world, and from Europe to Africa to India, you built an empire unmatched by any before it. = Nagy Sándor király, a hatalmas görög nemzet vezére, téged valóban megáldottak az Istenek. I. e. 480-ban az olyan viszálykodó városállamok, mint Athén, Spárta, Théba, módot találtak arra, hogy egyesítsék erőiket, lehetővé téve Görögország számára, hogy az i. e. 5. században szárazföldön és tengeren egyaránt legyőzze a hatalmas Perzsiát. Példájukat követve te vezetted a görög koalíciót, és i. e. 331-ben végleg lecsaptál a Perzsa Birodalomra. Meghódítottad szinte az egész ismert világot, és Európától Afrikán át Indiáig olyan birodalmat építettél, amelyhez fogható még nem volt azelőtt.
Megalexandros, son of Zeus, will you ride Bucephalas again, to gift the world with the brightness of the Greek culture? Will your new empire shine through the ages of history? = Nagy Sándor, Zeusz fia, meglovagolod-e újra Bukepfaloszt, hogy megajándékozd a világot a görög kultúra ragyogásával? Új birodalmad fénye vajon áthatol-e a történelem homályán?
