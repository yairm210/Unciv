Theodora = Theodóra
It is always a shame to destroy a thing of beauty. Happily, you are not one. = Mindig szégyen elpusztítani egy szépséget. Szerencsére te nem vagy az.
Now darling, tantrums are most unbecoming. I shall have to teach you a lesson. = Na drágám, a hiszti felettébb illetlen dolog. Meg kell, hogy leckéztesselek.
Like a child playing with toys you are. My people will never love you, nor suffer this indignation gracefully. = Olyan vagy, mint egy játékokkal játszó gyerek. A népem soha nem fog szeretni téged, és nem fogja méltósággal elviselni ezt a felháborító helyzetet.
My, isn't this a pleasant surprise - what may I call you, oh mysterious stranger? I am Theodora, beloved of Byzantium. = Ejha, hát ez nem egy kellemes meglepetés? Hogyan szólíthatlak, ó titokzatos idegen? Theodóra vagyok, Bizánc szerelme.
I have heard that you adept at certain kinds of ... interactions. Show me. = Úgy hallottam, jártas vagy bizonyos fajta… interakciókban. Mutasd hát akkor meg nekem.
Hello again. = Üdvözöllek ismét.
Patriarchate of Constantinople = Konstantinápolyi Patriarchátus
Magnificent Empress Theodora, beloved of Byzantium and of Rome, your people salute you! With your beauty and intelligence, you rose up from actress and courtesan to the rank of the most powerful woman in the Roman Empire, as wife of Justinian I. In the late 520's AD, you helped your husband engage in spiritual and legal reforms, promugalting numerous laws to improve women's status and treatment in the empire. You also made of Constantinople the jewel of the Eastern Roman Empire with the restoration and construction of many aqueducts, bridges, and churches, its beauty culminating with the creation of the Hagia Sophia, one of the most splendid pieces of architecture in the world. = Nagyszerű Theodóra császárné, Bizánc és Róma kedveltje, néped tiszteleg előtted! Szépségeddel és intelligenciáddal színésznőből és kurtizánból küzdötted fel magad a Római Birodalom leghatalmasabb női rangjára, mint I. Iusztinianosz felesége. Az i.sz. 520-as évek végén segítettél férjednek a spirituális és jogi reformok végrehajtásában, számos törvényt hozva a nők státuszának és helyzetének javítására a birodalomban. Konstantinápolyt a Keletrómai Birodalom ékszerévé tetted számos vízvezeték, híd és templom helyreállításával és megépítésével, melynek szépsége a Hagia Sophia megalkotásával teljesedett ki, ami a világ egyik legpompásabb építészeti remekműve.
Beautiful Empress,the Byzantine Empire's magnificence is intact in all memories, and ready to reborn as the new jewel of humankind. Will your new empire shine through the ages of history? = Gyönyörű Császárné, a Bizánci Birodalom nagyszerűsége sértetlenül él minden emlékezetben, és készen áll arra, hogy az emberiség új ékszereként szülessen újjá. Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
