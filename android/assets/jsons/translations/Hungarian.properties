'The release of atomic energy has not created a new problem. It has readily made more urgent the necessity of solving an existing one.' - Albert Einstein = „Az atomenergia felszabadítása nem teremtett új problémát. Csak még sürgetőbbé tette egy már meglévő probléma megoldásának szükségességét.” - Albert Einstein
