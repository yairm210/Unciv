Kamehameha I = I. Kamehameha
The ancient fire flashing across the sky is what proclaimed that this day would come, though I had foolishly hoped for a different outcome. = Az égen felvillanó ősi tűz hirdette, hogy ez a nap el fog jönni, bár én ostoba módon más eredményben reménykedtem.
It is obvious now that I misjudged you and your true intentions. = Most már nyilvánvaló, hogy félreismertelek téged és a valódi szándékaidat.
The hard-shelled crab yields, and the lion lies down to sleep. Kanaloa comes for me now. = A kemény páncélú rák megadja magát, és az oroszlán is nyugovóra tér. Kanaloa eljön most értem.
The ocean's tide may rise and fall, but my resolve stands steady. = Az óceán árapálya emelkedhet és süllyedhet, de az elszántságom szilárdan áll.
Aloha! Greetings and blessings upon you, friend. I am Kamehameha, Great King of this strand of islands. = Aloha! Üdvözlet és áldás rád, barátom. Kamehameha vagyok, e szigetlánc nagy királya.
Come, let our people feast together! = Jöjj, hadd lakomázzon együtt a népünk!
Welcome, friend! = Üdvözöllek, barátom!
Wayfinding = Tájékozódás
Aloha to Kamehameha the Great, who the heavens allowed to unite your people! O great King, under your reign, the Big Island of Hawai'i became one in 1791 AD, and many other islands joined your vision of union in 1810. As the first King of Hawai'i, law and taxation systems were stabilized, and you promoted the Kanawai Mamalahoe, an edict to protect civilian people in times of war. Unification and sovereignty of all the islands continued thanks to your fair laws and deeds, even after you joined your ancestors in paradise in 1819. = Aloha Nagy Kamehamehának, akinek az ég megengedte, hogy egyesítse népét! Ó, nagy király, uralkodásod alatt Hawaii Nagy Szigete i. sz. 1791-ben egységessé vált, és sok más sziget is csatlakozott az unióról alkotott elképzelésedhez 1810-ben. Hawaii első királyaként stabilizáltad a törvényi és adózási rendszereket, és támogattad a Kanawai Mamalahoe-t, egy rendeletet a civil lakosság védelmére háború idején. A szigetek egyesítése és szuverenitása igazságos törvényeidnek és tetteidnek köszönhetően folytatódott azután is, hogy 1819-ben csatlakoztál őseidhez a paradicsomban.
Wise and benevolent King, will you unite your people once again by wearing the bright mantle of the Lion of the Pacific? Will your new empire shine through the ages of history? = Bölcs és jóindulatú király, egyesíted újra népedet a Csendes-óceán Oroszlánjának fényes palástját viselve? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
