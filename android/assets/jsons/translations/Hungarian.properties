'In nothing do men more nearly approach the gods than in giving health to men.' - Cicero = „Hogy egészséget tudunk adni az embernek - közelebb visz minket az Istenekhez, mint bármi más.” - Cicero
Pharmaceuticals = Gyógyszeripar
'Ben, I want to say one word to you, just one word: plastics.' - Buck Henry and Calder Willingham, The Graduate = „Ben, egy szót akarok neked mondani, csak egy szót: műanyagok.” - Buck Henry és Calder Willingham, (Diploma előtt c. film)
