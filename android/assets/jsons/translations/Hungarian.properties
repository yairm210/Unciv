Oh, it's you... = Ó, te vagy az…
Bushido = Busidó
Lord Oda Nobunaga, ruler of Japan, the land of the Rising Sun is at your command! Through history, Japanese people lived and died with honor, proud of their rich culture of arts and letters. Years of bloody civil wars, invasions of foreign powers, wealth but also great poverty, have never altered the strong will of the Rising Sun island, as the Bushido spirit has imbued the fields of battle and the Japanese society for millenia. At the end of the 19th century, under foreign influence, your people took the path of modernity, and in a few decades, made of Japan a land of technological innovation and powerful industry, with which only few nations can compete. = Oda Nobunaga nagyúr, Japán uralkodója, a Felkelő Nap országa a parancsodra vár! A történelem során a japán nép becsülettel élt és halt meg, büszkén a művészetek és az irodalom gazdag kultúrájára. A véres polgárháborúk évei, a külföldi hatalmak inváziói, a gazdagság, de a mély szegénység sem változtatta meg soha a Felkelő Nap szigetének erős akaratát, hiszen a busidó szelleme évezredek óta áthatja a csatatereket és a japán társadalmat. A 19. század végén, külföldi befolyásra, néped a modernizáció útjára lépett, és néhány évtized alatt a technológiai innováció és a nagy teljesítményű ipar földjévé tette Japánt, amellyel csak kevés nemzet tud versenyre kelni.
O great daimyo, will you take on your hands the Japan destiny, for the Rising Sun to light the world? Will your new empire shine through the ages of history? = Ó, nagy daimjó, kezedbe veszed Japán sorsát, hogy a Felkelő Nap megvilágítsa a világot? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
