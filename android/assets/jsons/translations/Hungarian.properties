I have just received a report that large numbers of my troops have crossed your borders. = Épp most kaptam jelentést arról, hogy a csapataim nagy létszámban átlépték a határaidat.
My attempts to avoid violence have failed. An eye for an eye only makes the world blind. = Az erőszak elkerülésére tett kísérleteim kudarcot vallottak. A szemet szemért elv csak megvakítja a világot.
You can chain me, you can torture me, you can even destroy this body, but you will never imprison my mind. = Megláncolhatsz, megkínozhatsz, akár el is pusztíthatod ezt a testet, de az elmémet soha nem fogod bebörtönözni.
Curious. = Különös.
Hello, I am Mohandas Gandhi. My people call me Bapu, but please, call me friend. = Üdvözöllek Mahátma Gandhi vagyok. A népem Bapunak hív, de hívj csak barátomnak.
My friend, are you interested in this arrangement? = Barátom, érdekel ez a megállapodás?
I wish you peace. = Békét kívánok neked.
Population Growth = Lakosságnövekedés
Wise Mahatma Gandhi, great leader of India, we honor you! India is one of the oldest countries in the world with 10,000 years of history, built on spirit and religion, as three of the world's great religions - Hinduism, Buddhism and Jainism - appeared on this sacred land. Every aspect of India society reveres art, music and color, showing great wealth but also grinding poverty. For centuries, India was torn between local kingdoms fighting each other but also repelling invaders. In the 12th century AD, Muslim Turks tried to conquer India, then the Mongols took their place. In the early 17th century, India, still fragmented, was colonized by the English and their diplomacy and technological superiority. After two centuries of British dominion, Indian nationalism woke up, and you, Great Mahatma, have led a peaceful and victorious rebellion never seen anywhere in history! = Bölcs Mahátma Gandhi, India nagy vezére, tisztelünk téged! India a világ egyik legősibb országa 10 000 éves történelemmel, amely a szellemre és a vallásra épült, hiszen a világ három nagy vallása - a hinduizmus, a buddhizmus és a dzsainizmus - ezen a szent földön jelent meg. Az indiai társadalom minden aspektusa tiszteli a művészetet, a zenét és a színeket, hatalmas gazdagságot, de gyötrő szegénységet is mutatva. India évszázadokon át szakadt volt az egymással harcoló, de a hódítókat is visszaverő helyi királyságok között. Az i. sz. 12. században muszlim törökök próbálták meghódítani Indiát, majd a mongolok vették át a helyüket. A 17. század elején a még mindig széttagolt Indiát az angolok gyarmatosították diplomáciájukkal és technológiai fölényükkel. Két évszázados brit uralom után az indiai nacionalizmus felébredt, és te, Nagy Mahátma, olyan békés és győzedelmes lázadást vezettél, amilyet még soha sehol nem látott a történelem!
Gandhi, your people ask again to be led on the path of freedom. Under protection of Ganesha and Surya, can India accomplish its great potential? Will your new empire shine through the ages of history? = Gandhi, a néped újra azt kéri, hogy a szabadság útjára vezesd. Ganésa és Szúrja oltalma alatt képes India kibontakoztatni hatalmas potenciálját? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
