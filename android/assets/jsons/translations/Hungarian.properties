#################### Lines from Global Tutorials ####################

Welcome to Unciv!\nBecause this is a complex game, there are basic tasks to help familiarize you with the game.\nThese are completely optional, and you're welcome to explore the game on your own! = Üdvözlünk az Unciv játékban!\nMivel ez egy összetett játék, alapvető feladatok segítenek megismerkedni vele.\nEzek teljesen kihagyhatók, és nyugodtan felfedezheted a játékot magadtól is!

Welcome to Unciv! = Üdvözlünk az Unciv játékban!
Because this is a complex game, there are some tutorials to help familiarize you with it. These can be disabled in the Options -> Display menu, but please hang on if you're new here! = Mivel ez egy összetett játék, néhány útmutató segít megismerkedni vele. Ezeket ki lehet kapcsolni a Beállítások -> Megjelenítés menüben, de maradj velük, ha új vagy itt!
Your first mission is to found your capital city. This is actually an important task because your capital city will probably be your most prosperous. Many game bonuses apply only to your capital city, and it will be the center of your empire. = Az első küldetésed a fővárosod megalapítása. Ez valójában egy fontos feladat, mert valószínűleg a fővárosod lesz a legvirágzóbb városod. Számos játékbónusz csak a fővárosodra vonatkozik, és ez lesz a birodalmad központja.
How do you know a city location is appropriate? Luckily, the game has already chosen a good location for you. You can settle in this place, or maybe move a turn to found on a Hill (for Production and defence) or next to a Mountain (to gain access to the Observatory building later on). = Honnan tudod, hogy egy város helye megfelelő-e? Szerencsére a játék már kiválasztott egy jó helyszínt neked. Letelepedhetsz ezen a helyen, vagy esetleg léphetsz egy kört, hogy egy dombra alapíts várost (a termelés és a védelem miatt), vagy egy hegy mellé (hogy később hozzáférj a Csillagvizsgáló épülethez).
You'll likely want more cities later on. For these cities, you must go and find a good place. Looking for and founding on or near Luxury resources is a good rule of thumb. = Később valószínűleg több várost is szeretnél majd. Ezeknek a városoknak neked kell jó helyet találnod. Jó hüvelykujjszabály, hogy luxuscikkeken vagy azok közelében keress helyet és alapíts várost.
Luxury resources are tiles that have things like Gems, Cotton, or Silk (indicated by a yellow background of the resource icon). These resources make your civilization happy. You should also keep an eye out for resources needed to build units, such as Iron. Cities cannot be built within 3 tiles of existing cities, which is another thing to keep in mind! = A luxuscikkek olyan mezők, amelyeken például drágakövek, gyapot vagy selyem találhatók (ezt a nyersanyag ikonjának sárga háttere jelzi). Ezek a nyersanyagok boldoggá teszik a civilizációdat. Figyelned kell a katonai egységek építéséhez szükséges nyersanyagokra is, mint például a vasra. Városokat nem lehet a meglévő városoktól számított 3 mezőn belül építeni, ezt is észben kell tartani!
Cities will house Citizens, which can work tiles up to 3 tiles away from the city. This means you don’t have to settle cities right on or next to good tiles. Let’s say, for example, that you want access to some Iron – but the resource is in a desert area. You don’t have to settle your city in the desert. You can settle a few tiles away in more prosperous lands. Your city will grow and eventually gain access to the resource. You only need to settle right on top of resources if you need them immediately. = A városok adnak otthont a polgároknak, akik a várostól legfeljebb 3 mezőnyi távolságra lévő mezőket tudják megművelni. Ez azt jelenti, hogy nem kell a városokat közvetlenül a jó mezőkre vagy azok mellé alapítanod. Tegyük fel például, hogy hozzá szeretnél jutni némi vashoz - de a nyersanyag egy sivatagi területen van. Nem kell a sivatagban megalapítanod a várost. Letelepedhetsz néhány mezővel arrébb, virágzóbb földeken. A városod növekedni fog, és végül elér a nyersanyagig. Csak akkor kell közvetlenül a nyersanyagok tetejére települnöd, ha azonnal szükséged van rájuk.
The first thing coming out of your city depends on the strategy you want to follow, but the 'classic' build order is to build first two Scouts, then a Shrine, and three Settlers, and adopt Tradition, to explore the map quickly (Scouts ignore terrain cost), and to get an early Pantheon (if you're playing with religion enabled). = Az első dolog, ami elkészül a városodban, a követendő stratégiától függ, de a „klasszikus” építési sorrend az, hogy először két felderítőt építesz, majd egy szentélyt és három telepest, valamint elfogadod a hagyományt, hogy gyorsan felfedezd a térképet (a felderítők figyelmen kívül hagyják a terep költségeit), és korai panteont szerezz (ha bekapcsolt vallással játszol).
But feel free to experiment with your own build orders! = De kísérletezz nyugodtan a saját építési sorrendjeiddel!

In your first couple of turns, you will have very little options, but as your civilization grows, so do the number of things requiring your attention. = Az első pár körben nagyon kevés lehetőséged lesz, de ahogy nő a civilizációd, úgy nő a figyelmet igénylő dolgok száma is.

Culture and Policies = Kultúra és politikai berendezkedések
Each turn, the culture you gain from all your cities is added to your Civilization's culture.\nWhen you have enough culture, you may pick a Social Policy, each one giving you a certain bonus. = Minden körben a városaidból szerzett kultúrapontod hozzáadódik a civilizációd kultúrapontjához.\nHa elegendő kultúrapontod gyűlik össze, akkor kiválaszthatsz egy politikai berendezkedést, amelyek mindegyike bizonyos bónuszt biztosít.
The policies are organized into branches, with each branch providing a bonus ability when all policies in the branch have been adopted. = Minden politikai berendezkedés ágakra van bontva, és bónuszképességeket adnak azok az ágak, amelyekben minden politikai berendezkedés törvénybe van iktatva.
With each policy adopted, and with each city built,\n  the cost of adopting another policy rises - so choose wisely! = Minden beiktatott politikai berendezkedéssel és minden város megépítése után\nmegnő a következő politikai berendezkedés beiktatásának költsége. Ezért bölcsen válassz!

City Expansion = Városnövekedés
Once a city has gathered enough Culture, it will expand into a neighboring tile.\nYou have no control over the tile it will expand into, but tiles with resources and higher yields are prioritized. = Amikor egy város elegendő kultúrát termelt, akkor terjeszkedik egy szomszédos mezőre.\nNincs irányításod afölött, hogy melyik mező irányába növekedik a város, de előnyben részesülnek azon mezők, amelyek nyersanyagokat tartalmaznak vagy nagyobb a hozamuk.
Each additional tile will require more culture, but generally your first cities will eventually expand to a wide tile range. = Minden új mező megszerzéséhez egyre több kultúrára van szükség, de a legkorábbi városaid általában sok mezőre kiterjeszkednek majd.
Although your city will keep expanding forever, your citizens can only work 3 tiles away from city center.\nThis should be taken into account when placing new cities. = Bár a városod folyamatosan növekszik, a polgárai mindig csak a várostól számítva 3 mezőn belül tudnak dolgozni.\nEzt figyelembe kell venned egy új város elhelyezésekor.

Food is the resource fundamental to your Cities', and as a result Nation's, population and health. = Az élelem a városaid, és ezáltal a nemzeted lakosságának és egészségének alapvető nyersanyaga.
Every Citizen in each City consumes Food per turn. Any left over is considered Growth and is stored in the City Center. Once enough accumulates, the City Grows and a new Citizen is added. = Minden városban minden polgár fogyaszt élelmet körönként. A megmaradt rész növekedésnek számít, és a városközpontban tárolódik. Amint elég felhalmozódik, a város növekszik, és egy új polgárral bővül.
Initially your main source of Food is the City Center itself and working a surrounding tile with a Citizen. You can increase how much is generated by gaining more Citizens to work more tiles, improving the tiles so that they yield more Food, and eventually Buildings and Policies. = Kezdetben az élelem fő forrása maga a városközpont és a környező mezők megművelése egy polgárral. Növelheted az előállított mennyiséget több polgár megszerzésével a több mező megműveléséhez, a mezők továbbfejlesztésével, hogy több élelmet hozzanak, valamint idővel épületekkel és berendezkedésekkel.
Since a city's number of Citizens, or Population, determines how many tiles a City can work, Food is often the most important Resource. = Mivel egy város lakossága határozza meg, hogy a város hány mezőt tud megművelni, az élelem gyakran a legfontosabb nyersanyag.

Production is the resource that lets a City Center build new things. = A hozam az a nyersanyag, amely lehetővé teszi a városközpont számára, hogy új dolgokat építsen.
This can be new Buildings that are added to the City Center, or new Units that can go out across the World Map to advance your Nation's goals. = Ezek lehetnek új épületek, amelyekkel a városközpont bővül, vagy új egységek, amelyek elindulhatnak a világtérképen, hogy előmozdítsák nemzeted céljait.
Everything you can build has a Production Cost. Every turn each City generates a certain amount of Production and puts it towards whatever is at the top of the Build Queue. Once the total cost is collected, the Building or Unit is built! = Mindennek, amit építhetsz, van egy termelési költsége. Minden körben minden város bizonyos mennyiségű hozamot állít elő, és azt a várólista élén álló dologra fordítja. Amint a teljes költség összegyűlik, az épület vagy az egység megépül!
Any excess Production after something is built is overflowed to the next thing the City builds. Up to it's total Production Cost. = Bármely felesleges hozam, ami valami megépítése után megmarad, átkerül a város által épített következő dologra. Legfeljebb annak teljes termelési költségéig.
Since this determines how quickly you can build more stuff, your Nation's Production Capacity is crucial to it's advancement and survival. = Mivel ez határozza meg, milyen gyorsan tudsz több dolgot építeni, nemzeted termelési kapacitása létfontosságú a fejlődése és túlélése szempontjából.

⍾Science is the resource that unlocks new and exciting Technologies for your Nation. = ⍾A tudomány az a nyersanyag, amely új és izgalmas technológiákat nyit meg a nemzeted számára.
Once you've Founded your Capital, you'll be prompted to Pick a Technology to Research. = Amint megalapítottad a fővárosodat, a játék felkér, hogy válassz egy kutatandó technológiát.
Every Technology costs an amount of ⍾Science. Every turn the ⍾Science your Nation produces is paid towards Researching your chosen Technology. = Minden technológia bizonyos mennyiségű ⍾tudományba kerül. A nemzeted által körönként előállított ⍾tudomány a választott technológia kutatására fordítódik.
Once a Technology has it's cost fully paid, you unlock the benefits for your Nation! This could be new Units, Buildings, or other advantages. Any surplus will overflow into the next Technology you pick to Research. = Amint egy technológia költsége teljesen kifizetésre került, feloldod a nemzetednek nyújtott előnyöket! Ez lehetnek új egységek, épületek vagy egyéb előnyök. Minden felesleg átáramlik a következő kiválasztott technológia kutatásába.
Researching a Technology in the next Era will advance you into that Era and trigger a notification to other Nations about how amazing you are! = Egy következő korszakbeli technológia kikutatásával továbblépsz abba a korszakba, és értesítést küldesz a többi nemzetnek arról, hogy milyen nagyszerű vagy!
Since new Technologies tend to give access to better Units, Buildings, and even unlock powerful new Policies, staying ahead of the competition is one of the best ways to secure your Victory! = Mivel az új technológiák általában jobb egységekhez, épületekhez adnak hozzáférést, sőt erőteljes új berendezkedéseket is feloldanak, a versenyben való élvonal megőrzése az egyik legjobb módja a győzelmed biztosításának!

Ah Gold. The Universal Medium of Exchange. Everyone loves Gold! They say it can't buy Happiness, but nuclear submarines are almost as good. = Ah, arany. Az univerzális csereeszköz. Mindenki szereti az aranyat! Azt mondják, nem lehet rajta boldogságot venni, de a nukleáris tengeralattjárók majdnem olyan jók.
You can earn more Gold from Tiles, Resources, Improvements, and eventually Buildings, Specialists, and Trade Routes. Ancient Ruins, meeting new City-States, and Pillaging are also great sources of Gold. During a Golden Age every Tile that already yields Gold will yield an additional Gold! = Több aranyat szerezhetsz mezőkből, nyersanyagokból, továbbfejlesztésekből, valamint idővel épületekből, szakértőkből és kereskedelmi utakból. Az ősi romok, az új városállamokkal való találkozás és a fosztogatás szintén nagyszerű aranyforrások. Az aranykorban minden olyan mező, amely már eleve hoz aranyat, plusz egy aranyat fog hozni!
Gold is how you pay for Building Maintenance, Transportation Upkeep, and Unit Upkeep. If you run out of Gold, first you'll receive penalties to your ⍾Science production, then eventually your Units will start Disbanding as you can't pay their upkeep. = Arannyal fizetsz az épületek fenntartásáért, a szállítási költségekért és az egységek fenntartásáért. Ha kifogysz az aranyból, először büntetést kapsz a ⍾tudománytermelésedre, majd végül az egységeid kezdenek feloszlani, mivel nem tudod fizetni a fenntartásukat.
Gold can be used to Buy Buildings and Units, helping bring up a new City or quickly build an Army. It can also buy Tiles to add to your City. It's also used to Upgrade your units from their older, obsolete forms to new, stronger versions. And investing it into a Research Agreement is a great way to convert it into ⍾Science. = Az arany felhasználható épületek és egységek vásárlására, segítve egy új város felvirágoztatását vagy egy hadsereg gyors felépítését. Mezőket is vásárolhatsz vele, hogy a városodhoz csatold őket. Arra is használható, hogy az egységeid korszerűsítését elvégezd a régebbi, elavult formájukból új, erősebb verziókra. Egy kutatási megállapodásba való befektetés pedig nagyszerű módja annak, hogy ⍾tudománnyá alakítsd.
Gold is also very valuable in Diplomacy. You can directly Gift Gold to City-States to gain their favor. Use it to balance a Trade Deal with other Nations. Or demand every last drop after a successful war and your enemy sues for peace. = Az arany a diplomáciában is nagyon értékes. Közvetlenül ajándékozhatsz aranyat a városállamoknak, hogy elnyerd a kegyeiket. Használhatod egy más nemzetekkel kötendő kereskedelmi egyezség kiegyensúlyozására. Vagy követelheted az utolsó fillérig egy sikeres háború után, amikor az ellenséged békéért esedezik.
Ironically, some may consider Gold to be one of the less important Resources. But it's flexible nature and importance to keep your Nation running makes it a precious thing to pay attention to. After all, everyone loves Gold. = Ironikus módon egyesek az aranyat az egyik kevésbé fontos nyersanyagnak tarthatják. De rugalmas természete és a nemzet működésének fenntartásában betöltött fontossága miatt nagyon értékes dolog, amire figyelni kell. Végül is mindenki szereti az aranyat.
Not to be confused with the Resource of the same name, Gold Ore = Ne téveszd össze az azonos nevű nyersanyaggal, az aranyérccel
Trade Route = Kereskedelmi út
See also: [param] = Lásd még: [param]
Research Agreements = Kutatási megállapodások

As cities grow in size and influence, you have to deal with a happiness mechanic that is no longer tied to each individual city.\nInstead, your entire empire shares the same level of satisfaction.\nAs your cities grow in population you’ll find that it is more and more difficult to keep your empire happy. = Ahogy a városok területe és befolyása növekszik, egyre több figyelmet kell fordítanod a lakosság boldogságára, mert a városok e tekintetben már nem függetlenek egymástól.\nEz azt jelenti, hogy a boldogság szintje az egész birodalmadban azonos.\nAhogy a városaid lakossága növekszik, észre fogod venni, hogy egyre nehezebb lesz boldogságban tartani a birodalmadat.
In addition, you can’t even build any city improvements that increase happiness until you’ve done the appropriate research.\nIf your empire’s happiness ever goes below zero the growth rate of your cities will be hurt.\nIf your empire becomes severely unhappy (as indicated by the smiley-face icon at the top of the interface)\n  your armies will have a big penalty slapped on to their overall combat effectiveness. = Ráadásul, amíg nem fejleszted ki a megfelelő technológiát, addig nem is építhetsz olyan épületeket, amelyek növelnék a boldogság szintjét.\nHa a birodalmad boldogsága nulla alá csökken, akkor a városaid nem fognak növekedni.\nHa a birodalmad huzamosabb ideig boldogtalan (amit egy emodzsi is jelöl a felső sávban),\nakkor a hadsereged harci ereje is jelentősen le fog csökkenni.
This means that it is very difficult to expand quickly in Unciv.\nIt isn’t impossible, but as a new player you probably shouldn't do it.\nSo what should you do? Chill out, scout, and improve the land that you do have by building Workers.\nOnly build new cities once you have found a spot that you believe is appropriate. = Mindezekből következik, hogy nagyon nehéz gyorsan terjeszkedni az Uncivben.\nNem lehetetlen, de tapasztalatlan játékosként valószínűleg nem kellene erre törekedned.\nHogy mit csinálj akkor inkább? Lazíts, fedezz fel és képezz ki munkásokat, akikkel fejlesztgesd a meglévő területeidet!\nCsak azután építs új várost, ha találtál egy szerinted alkalmas helyet neki.

Unhappiness = Boldogtalanság
It seems that your citizens are unhappy!\nWhile unhappy, your civilization will suffer many detrimental effects, increasing in severity as unhappiness gets higher. = A polgáraid boldogtalannak tűnnek!\nA civilizációd boldogtalanságának több káros hatása van, amelyek egyre súlyosabbá válnak, ahogy nő a boldogtalanság.
Unhappiness has two main causes: Population and cities.\n  Each city causes 3 unhappiness, and each population, 1 = A boldogtalanság két fő oka a lakosság és a városok.\nMinden város 3-mal és minden lakos 1-gyel növeli a boldogtalanságot
There are 2 main ways to combat unhappiness:\n  by building happiness buildings for your population\n  or by having improved luxury resources within your borders. = Általában két módon lehet ellensúlyozni a boldogtalanságot.\nOlyan épületek építésével, amelyek boldogságot okoznak,\nilletve a területeden területfejlesztéssel ellátott, luxuscikkeket tartalmazó mezők által.

You have entered a Golden Age!\nGolden age points are accumulated each turn by the total happiness \n  of your civilization\nWhen in a golden age, culture and production generation increases +20%,\n  and every tile already providing at least one gold will provide an extra gold. = Aranykorba léptél!\nAranykor-pontok minden körben a civilizációd teljes boldogsága alapján gyűlnek.\nAranykorban a kultúra és a termelés +20%-kal nő,\nés minden olyan mező, amely már legalább egy aranyat termel, további egy extra aranyat hoz.

Roads and Railroads = Utak és Vasutak
Roads reduce the Movement Points required to move between two tiles connected by Roads. = Az utak csökkentik az utakkal összekötött két mező közötti mozgáshoz szükséges mozgáspontokat.
Railroads improve this reduction even more! = A vasutak még jobban fokozzák ezt a csökkentést!
This greatly improves the speed you can get Units around the map. = Ez nagyban növeli a sebességet, amellyel az egységeket mozgathatod a térképen.
Until you research the technology that removes it, Roads do not cross Rivers = Amíg ki nem kutatod az ezt megszüntető technológiát, az utak nem keresztezik a folyókat
Connecting your cities to the capital by Roads and/or Railroads will generate Gold via the Trade Route. = A városaid utak és/vagy vasutak révén történő összekötése a fővárossal aranyat állít elő a kereskedelmi úton keresztül.
However, since each Road and Railroad have a Maintenance Cost, it may be more economical to wait until the cities grow and only place where needed. = Mivel azonban minden útnak és vasútnak van fenntartási költsége, gazdaságosabb lehet megvárni, amíg a városok megnőnek, és csak oda helyezni őket, ahol szükség van rájuk.

Connecting your cities to the capital by Roads and/or Railroads will generate Gold via the Trade Route. You earn more Gold the more Population the City and your Capital has. = A városaid utakkal és/vagy vasutakkal történő összekötése a fővárossal aranyat állít elő a kereskedelmi úton keresztül. Minél nagyobb a város és a fővárosod lakossága, annál több aranyat keresel.
Note that each road costs 1 Gold Maintenance per turn, and each Railroad costs 2 Gold, so it may be more economical to wait until the cities grow! = Vedd figyelembe, hogy minden út fenntartása körönkénti 1 aranyba kerül, és minden vasút 2 aranyba, így gazdaságosabb lehet megvárni, amíg a városok megnőnek!
Railroads connecting a city to the Capital also provide a 25% Production Boost to the City, but not the Capital. = A várost a fővárossal összekötő vasutak 25%-os termelési növekedést is biztosítanak a városnak, de a fővárosnak nem.
Trade Routes are also connected over Water via certain buildings like the Harbor. As long as there is a chain that can reach the Capital, there's a Trade Route. Look for this symbol in Yellow below the City Name to mean you have an active Trade Route to your Capital. = A kereskedelmi utak a vízen keresztül is összeköttetésben állnak bizonyos épületek, például a kikötő révén. Mindaddig, amíg van egy láncolat, amely elérheti a fővárost, létezik kereskedelmi út. Keresd ezt a sárga szimbólumot a városnév alatt, ami azt jelenti, hogy aktív kereskedelmi utad van a fővárosodba.
Trade Routes can get broken either by Blockades or by Removing/Pillaging the connecting Road/Railroad chain. = A kereskedelmi utak megszakadhatnak blokádok miatt, vagy az összekötő út-/vasútlánc eltávolításával/lefosztásával.
City Blockade = Városblokád

Once you’ve settled 3-4 cities and build universities, you’re probably already 100 to 150 turns into the game.\nNow is a good time to start thinking about how, exactly, you want to win – if you haven’t already. = Amint létrehoztál 3-4 várost és egyetemeket építettél, valószínűleg már 100-150 körnél jársz a játékban.\nMost jó alkalom elkezdeni azon gondolkodni, hogy pontosan hogyan szeretnél nyerni - ha még nem tetted meg.
There are four ways to win in Unciv. They are:\n - Cultural Victory: Complete 5 Social Policy Trees and build the Utopia Project\n - Domination Victory: Conquer the original capital of all other Major civs\n - Science Victory: Be the first to construct a Spaceship\n - Diplomatic Victory: Build the United Nations and win the vote = Négyféleképpen lehet nyerni az Uncivben. Ezek a következők:\n- Kulturális győzelem: Teljesíts 5 politikai berendezkedési ágat, és építsd meg az utópia projektet\n- Dominancia győzelem: Hódítsd meg minden nagy civilizáció eredeti fővárosát\n- Tudományos győzelem: Legyél Te az első, aki űrhajót épít\n- Diplomáciai győzelem: Építsd meg az Egyesült Nemzeteket, és nyerd meg a szavazást
So to sum it up, these are the basics of Unciv – Found a prosperous first city, expand slowly to manage happiness, and set yourself up for the victory condition you wish to pursue.\nObviously, there is much more to it than that, but it is important not to jump into the deep end before you know how to swim. = Összefoglalva ezek az Unciv alapjai. Először alapíts egy virágzó várost, terjeszkedj lassan, ügyelve a boldogságra, és rendezkedj be a kiválasztott győzelmi célodnak megfelelően.\nNyilván ennél sokkal többre van szükség, de az a fontos, hogy előbb tanulj meg úszni, és csak aztán menj a mély vízbe.

Enemy City = Ellenséges város
Cities can be conquered by reducing their health to 1, and entering the city with a melee unit.\nSince cities heal each turn, it is best to attack with ranged units and use your melee units to defend them until the city has been defeated! = Úgy tudsz elfoglalni egy várost, ha előbb 1-re csökkented az életerejét, majd bevonulsz egy közelharci egységgel.\nMivel a városok minden körben gyógyulnak, a város leigázásáig távolsági egységekkel érdemes támadni, amelyeket a közelharci egységek védenek!

Luxury Resource = Luxuscikk
Luxury resources within your domain and with their specific improvement are connected to your trade network.\nEach unique Luxury resource you have adds 5 happiness to your civilization, but extra resources of the same type don't add anything, so use them for trading with other civilizations! = A területeden lévő mezők, amelyeken luxuscikkek és a megfelelő területfejlesztések találhatók, a kereskedelmi hálózatod részei lesznek.\nMinden különböző fajta luxuscikk, amivel rendelkezel, 5-tel növeli a civilizációd boldogságát, de az nem ér többletpontot, ha ugyanabból a nyersanyagból több példánnyal is rendelkezel. A felesleget használd a többi civilizációval való kereskedelemre!

Strategic Resource = Stratégiai nyersanyag
Strategic resources within your domain and with their specific improvement are connected to your trade network.\nStrategic resources allow you to train units and construct buildings that require those specific resources, for example the Horseman requires Horses. = A területeden lévő mezők, amelyeken stratégiai nyersanyagok és a megfelelő területfejlesztés találhatók, a kereskedelmi hálózatod részei lesznek.\nA stratégiai nyersanyagok lehetővé teszik, hogy olyan egységeket képezz és olyan épületeket építs, amelyeknek arra a meghatározott nyersanyagra van szükségük. A lovasnak például lóra van szüksége.
Unlike Luxury Resources, each Strategic Resource on the map provides more than one of that resource.\nThe top bar keeps count of how many unused strategic resources you own.\nA full drilldown of resources is available in the Resources tab in the Overview screen. = A luxuscikkekkel ellentétben a stratégiai nyersanyagok nem csak egy egységnyi nyersanyagot biztosítanak mezőnként.\nA felső sávon látható, hogy mennyi stratégiai nyersanyagod van.\nAz nyersanyagok részletes kimutatását az Áttekintés képernyő Nyersanyagok fülén tudod megnézni.

The city can no longer put up any resistance!\nHowever, to conquer it, you must enter the city with a melee unit = A város már nem tud ellenállást tanúsítani!\nA meghódításához azonban be kell vonulnod a városba egy közelharci egységgel

After Conquering = Hódítás után
When conquering a city, you can choose to liberate, annex, puppet, or raze the city. = A város elfoglalása után választhatsz, hogy felszabadítod, bekebelezed, bábvárossá teszed vagy elbontod a várost.
\nLiberating the city will return it to its original owner, giving you a massive diplomatic boost with them!\n\nAnnexing the city will give you full control over it, but also increase the citizens' unhappiness to 2x!\nThis can be mitigated by building a courthouse in the city, returning the citizen's unhappiness to normal.\n\nPuppeting the city will mean that you have no control on the city's production.\nThe city will not increase your tech or policy cost.\nA puppeted city can be annexed at any time, but annexed cities cannot be returned to a puppeted state!\n\nRazing the city will lower its population by 1 each turn until the city is destroyed!\nYou cannot raze a city that is either the starting capital of a civilization or the holy city of a religion. = \nA város felszabadítása visszajuttatja azt az eredeti tulajdonosa kezére, ami nagy diplomáciai előrelépést biztosít nemzeteitek között.\n\nA város bekebelezése révén teljesen irányításod alá tudod vonni, de ezzel együtt a polgárok boldogtalansága duplájára emelkedik!\nEz csökkenthető, ha építesz egy bíróságot a városban, ami után a polgárok boldogtalansága visszatér a normális szintre.\n\nHa bábvárost csinálsz a városból, akkor a város termelését nem te fogod irányítani.\nA város nem növeli a technológiai vagy politikai költségedet.\nA bábvárosként működő városokat bármikor bekebelezheted, de egy bekebelezett városból már nem csinálhatsz újra bábvárost!\n\nA város elbontása 1-gyel fogja csökkenteni a lakosságát minden körben, amíg a város el nem pusztul!\nNem bonthatsz le olyan várost, amely egy civilizáció fővárosa vagy egy vallás szent városa volt.

You have encountered a barbarian unit!\nBarbarians attack everyone indiscriminately, so don't let your \n  civilian units go near them, and be careful of your scout! = Találkoztál egy barbár egységgel!\nA barbárok válogatás nélkül megtámadnak mindenkit, szóval ne engedd\na közelükbe a civil egységeidet, és ügyelj a felderítődre is!

You have encountered another civilization!\nOther civilizations start out peaceful, and you can trade with them,\n  but they may choose to declare war on you later on = Találkoztál egy másik civilizációval!\n Más civilizációk kezdetben békések, és kereskedhetsz velük,\nkésőbb azonban úgy is dönthetnek, hogy hadat üzennek neked

Injured Units = Sebesült egységek
Injured units deal less damage, but recover after turns that they have been inactive.\nUnits heal 10 health per turn in enemy territory or neutral land,\n  20 inside your territory and 25 in your cities. = A sebesült egységek kevesebb sérülést okoznak, de minden tétlen körük után gyógyulnak.\nAz egységek 10 életpontot gyógyulnak ellenséges vagy semleges területen,\n20-at a saját területeden és 25-öt a városaid területén.

Workers = Munkások
Workers are vital to your cities' growth, since only they can construct improvements on tiles.\nImprovements raise the yield of your tiles, allowing your city to produce more and grow faster while working the same amount of tiles! = A munkások elengedhetetlenek a városaid növekedéséhez, mivel csak ők képesek területfejlesztéseket építeni a mezőkre.\nA területfejlesztések megnövelik a mezők hozamát, ami lehetővé teszi a városodnak, hogy többet termeljen és gyorsabban növekedjen ugyanannyi mezőn gazdálkodva!

Embarking = Hajóra szállás
Once a certain tech is researched, your land units can embark, allowing them to traverse water tiles.\nEntering or leaving water takes the entire turn. = A megfelelő technológia feltalálása után a földi egységeid képesek lesznek hajóra szállni és utazni rajta.\nA hajóra szállás és a partraszállás egy egész kört vesz igénybe.
Units are defenseless while embarked (cannot use modifiers), and have a fixed Defending Strength based on your tech Era, so be careful!\nRanged Units can't attack, Melee Units have a Strength penalty, and all have limited vision. = Hajóra szállás közben az egységek védtelenek (nem használhatnak módosítókat), csak a technológiai korszakodtól függő fix védelmi erővel rendelkeznek, szóval legyél óvatos!\nA távolsági egységek nem tudnak támadni, a közelharci egységek csökkentett harci erővel rendelkeznek és mindkét egységtípus látótávolsága lecsökken.

Idle Units = Tétlen egységek
Clicking 'Next unit' moves to the next idle unit in the queue (as listed in Overview -> Units). After issuing an order to an unit, if 'Auto Unit Cycle' in Options -> Gameplay is enabled, you will automatically select the next idle unit. = A „Következő egység” gombra kattintva a várólista következő tétlen egységére ugorhatsz (ahogy az az Áttekintés -> Egységek menüpontban szerepel). Miután parancsot adtál egy egységnek, ha a Beállítások -> Játékmenet menüpontban be van kapcsolva az „Automatikus egységváltás”, akkor automatikusan a következő tétlen egység lesz kiválasztva.
If you don't want to move a unit this turn, you can skip it by clicking 'Next unit' again, or command the unit to 'Skip turn'. = Ha ebben a körben nem akarsz mozgatni egy egységet, kihagyhatod, ha újra a „Következő egység” gombra kattintasz, vagy parancsba adhatod az egységnek a „Kör kihagyása” lehetőséget.
If you want to disable the 'Next unit' feature entirely, you can toggle it in Options -> Gameplay -> Check for idle units. = Ha teljesen ki szeretnéd kapcsolni a „Következő egység” funkciót, azt a Beállítások -> Játékmenet -> Tétlen egységek ellenőrzése menüpontban teheted meg.
If you'd rather 'Next unit' cycle the units and not mark them as Done, you can change it in the Options -> Gameplay menu. = Ha inkább azt szeretnéd, hogy a „Következő egység” végigpörgesse az egységeket, és ne jelölje meg őket készként, ezt a Beállítások -> Játékmenet menüben változtathatod meg.
You can also cycle through the idle units using the left and right triangles on the Unit Table in the lower left of the screen. Or by default using the Cycle button next to the 'Next Unit' button. = A tétlen egységek között a képernyő bal alsó sarkában található Egységtáblázat bal és jobb oldali háromszögeivel is válthatsz. Vagy alapértelmezés szerint a „Következő egység” gomb melletti Váltás gombbal.

Contact Me = Kapcsolat
Hi there! If you've played this far, you've probably seen that the game is currently incomplete.\n Unciv is meant to be open-source and free, forever.\n That means no ads or any other nonsense. = Szia! Ha már eddig eljutottál a játékban, biztosan észrevetted, hogy a játék még nincs teljesen készen.\nAzt szerettem volna, hogy az Unciv mindig is nyílt forráskódú és ingyenes maradjon.\nEzért nincsenek benne reklámok és más oda nem illő dolgok.
What motivates me to keep working on it, \n  besides the fact I think it's amazingly cool that I can,\n  is the support from the players - you guys are the best! = Nekem az jelenti a legtöbbet, és azért dolgozok a játékon\n(azon kívül, hogy szerintem állati menő, hogy képes vagyok rá),\nmert sok biztatást kapok a játékosoktól. Ti vagytok a legjobbak!
Every rating and review that I get puts a smile on my face =)\n  So contact me! Send me an email, review, Github issue\n  or mail pigeon, and let's figure out how to make the game \n  even more awesome!\n(Contact info is in the Play Store) = Minden értékelés és vélemény, amit kapok, egy mosolyt csal az arcomra =)\n  Bátran lépjetek velem kapcsolatba! Küldjetek e-mailt, véleményt,\n  hibajelentéseket a GitHubon\n  vagy postagalambot, és találjuk ki, hogyan lehetne\n  még nagyszerűbb a játék!\n(Az elérhetőségeimet megtalálod a Play Store-ban.)

Pillaging = Fosztogatás
Military units can pillage improvements, which heals them 25 health and ruins the improvement.\nThe tile can still be worked, but advantages from the improvement - stat bonuses and resources - will be lost.\nWorkers can repair these improvements, which takes less time than building the improvement from scratch.\nPillaging certain improvements will result in your units looting gold from the improvement. = A katonai egységek kifoszthatják a területfejlesztéseket, ami 25 életponttal gyógyítja őket, ugyanakkor lerombolja a fejlesztést.\nA mező megmunkálható marad, de a területfejlesztésből származó többletek (bónuszok és nyersanyagok) elvesznek.\nMunkásokkal meg lehet javítani ezeket a fejlesztéseket, ami kevesebb ideig tart, mintha teljesen új fejlesztést kellene építeni.\nBizonyos fejlesztések kifosztásakor az egységeid aranyat is zsákmányolnak.

Experience = Tapasztalat
Units that enter combat gain experience, which can then be used on promotions for that unit.\nUnits gain more experience when in Melee combat than Ranged, and more when attacking than when defending. = A harcoló egységek tapasztalatot gyűjtenek, amelyet később fel lehet használni az egység előléptetésére.\nAz egységek közelharcban több tapasztalatot szereznek, mint távolsági harcban, és többet támadáskor, mint védekezéskor.
Units can only gain up to 30 XP from Barbarian units - meaning up to 2 promotions. After that, Barbarian units will provide no experience. = A barbár egységekkel való harc csak legfeljebb 30 TP-ot ad, ami 2 előléptetést jelent. Ennek elérése után a barbár egységek nem adnak több tapasztalatot.

Combat = Harc
Unit and cities are worn down by combat, which is affected by a number of different values.\nEach unit has a certain 'base' combat value, which can be improved by certain conditions, promotions and locations. = A harc megviseli mind az egységeket, mind a városokat, ami több tényezőtől is függ.\nMinden egységnek van természetes harci értéke, amelyet megnövelhetnek bizonyos körülmények, előléptetések és helyszínek.
Units use the 'Strength' value as the base combat value when melee attacking and when defending.\nWhen using a ranged attack, they will the use the 'Ranged Strength' value instead. = Az egységek „Harci erő” értéke szolgál a közelharci és a védekezési erő alapjául.\nTávolsági támadás esetén viszont a „Távolsági támadóerő” értéke számít.
Ranged attacks can be done from a distance, dependent on the 'Range' value of the unit.\nWhile melee attacks allow the defender to damage the attacker in retaliation, ranged attacks do not. = Az, hogy milyen messzire ér a távolsági támadás, az egység hatótávolságának értékétől függ.\nKözelharc esetén a védő is okozhat sebzést a támadónak, de a távolsági támadás esetén nem.

Embassies = Nagykövetségek
Establishing an embassy in other players' Capital city shows the location of their Capital, likewise other players who establish an embassy in your Capital can see location of your Capital. = Nagykövetség alapítása a többi játékos fővárosában megmutatja a fővárosuk helyét, és ugyanígy a többi játékos, aki nagykövetséget alapít a fővárosodban, láthatja a fővárosod helyét.
Embassies thus allow Spies to be placed in another players' Capital City if Espionage is enabled. = A nagykövetségek így lehetővé teszik kémek elhelyezését egy másik játékos fővárosában, ha a kémkedés be van kapcsolva.
Mutual embassies are required to allow trading open borders and to sign Research Agreement and Defensive Pact. = Kölcsönös nagykövetségekre van szükség a nyitott határok kereskedelmének engedélyezéséhez, valamint kutatási megállapodás és védelmi paktum aláírásához.
Declaring war on another player or denouncing them will remove embassies from both players' Capitals. You will have to re-establish them to use their effect. = A háború üzenése egy másik játékosnak vagy az elítélése eltávolítja a nagykövetségeket mindkét játékos fővárosából. Újra meg kell alapítanod őket, hogy használhasd a hatásukat.
Re-establishing an embassy after denunciation from either side becomes available next turn, while re-establishing them when at war requires a peace treaty. = A nagykövetség újbóli megalapítása a bármelyik oldalról történő feljelentés után a következő körben válik elérhetővé, míg a háború alatti újbóli megalapításukhoz békeszerződés szükséges.
Be cautious when accepting embassy from other players because they can spy on your capital, or worse may start planning to attack you. = Legyél óvatos, amikor nagykövetséget fogadsz el más játékosoktól, mert kémkedhetnek a fővárosodban, vagy ami még rosszabb, tervezgetni kezdhetik a megtámadásodat.
Note that before you can offer an embassy, you need the required Technology. = Vedd figyelembe, hogy mielőtt nagykövetséget ajánlhatnál fel, szükséged van a szükséges technológiára.
Embassies are available using the Gods and Kings ruleset. = A nagykövetségek az Istenek és Királyok szabálykészlet használatával érhetők el.
Defensive Pacts = Védelmi paktumok

Open Borders from other player and vice versa allow units to freely pass through their territory. = A nyitott határok a másik játékostól és fordítva lehetővé teszik az egységek számára a szabad áthaladást a területükön.
They also let Missionaries to enter other players' territory without suffering attrition. = Azt is lehetővé teszik a hittérítők számára, hogy lemorzsolódás elszenvedése nélkül lépjenek be a többi játékos területére.
Open Borders expire depending on game speed and are canceled upon Declaration of War, the closure however takes effect only after war ends and need to be traded again. = A nyitott határok a játéksebességtől függően lejárnak, és a háború üzenésekor megszűnnek, a lezárás azonban csak a háború vége után lép életbe, és újra el kell cserélni őket.
You gain diplomatic boost with other AI player if you both have Open Borders to each other = Diplomáciai lendületet kapsz a másik MI-játékossal, ha mindkettőtöknek nyitott határai vannak egymás felé
Be cautious when giving Open Borders because other player may settle a City near your lands in an area you are planning to use, they may also use your territory to attack your friends or City State allies. = Legyél óvatos a nyitott határok megadásakor, mert a másik játékos várost alapíthat a földjeid közelében egy olyan területen, amelyet te tervezel használni, és a területedet is felhasználhatja a barátaid vagy a szövetséges városállamok megtámadására.
Note that before you can offer or accept open borders, both Nations need the required Technology. = Vedd figyelembe, hogy mielőtt nyitott határokat ajánlhatnál fel vagy fogadhatnál el, mindkét nemzetnek szüksége van a szükséges technológiára.
When playing with the Gods and Kings ruleset mutual embassies need to be established before Open Borders can be traded. = Ha az Istenek és Királyok szabálykészlettel játszol, a nyitott határok elcserélése előtt kölcsönös nagykövetségeket kell alapítani.

In Research Agreements, you and another civilization decide to jointly research technology.\nAt the end of the agreement, you will both receive a 'lump sum' of ⍾Science, which will go towards one of your unresearched technologies. = A kutatási megállapodásokban te és egy másik civilizáció úgy döntötök, hogy közösen kutattok egy technológiát.\nA megállapodás végén mindketten egy „egyösszegű” ⍾tudományt kaptok, amely az egyik meg nem kutatott technológiátok felé fordítódik.
The amount of ⍾Science you receive at the end is dependent on the ⍾Science generated by your cities and the other civilization's cities during the agreement - the more, the better! = Az, hogy mennyi ⍾Tudománypontot kapsz a végén, függ a városaidban és a másik civilizáció városaiban a megállapodás alatt keletkező ⍾Tudománypontok mennyiségétől - minél több volt, annál jobb!
Note that before you can invest in a research agreement, you must have a Declaraction of Friendship, both Nations need the required Technology, and both Nations need enough Gold on hand for the agreement. = Vedd figyelembe, hogy mielőtt kutatási megállapodásba fektetnél be, barátsági nyilatkozattal kell rendelkezned, mindkét nemzetnek szüksége van a szükséges technológiára, és mindkét nemzetnek elegendő készpénz arannyal kell rendelkeznie a megállapodáshoz.
When playing with the Gods and Kings ruleset mutual embassies need to be established before a Research Agreement can be signed. = Ha az Istenek és Királyok szabálykészlettel játszol, a kutatási megállapodás aláírása előtt kölcsönös nagykövetségeket kell alapítani.

Defensive pacts allow you and another civ to protect one another from aggressors.\nOnce the defensive pact is signed, you will be drawn into their future defensive wars, just as they will be drawn into your future defensive wars. Declaring war on any Civ will remove all of your defensive pacts. You will have to re-sign them to use their effect. = Védelmi paktumok által a civilizációd egy másikkal összefogva megvédhetik egymást az agresszorok ellen.\nA védelmi paktum megkötése után te is bevonódsz a partnered későbbi védekező háborúiba, akárcsak ő a te jövőbeli védekező háborúidba. Ha bármely civilizációnak hadat üzensz, azzal felbomlik minden védelmi paktumod. Újra kell kötnöd őket, hogy újra érvénybe lépjenek.
Be cautious when signing defensive pacts because they can bring you into wars that you might not want to be in. = Legyél óvatos a védelmi paktumok megkötésekor, mert olyan háborúba sodorhatnak, amilyenben nem biztos, hogy részt akartál venni.
The AI is very careful and will not accept defensive pacts with less than 80 influence. = Az MI nagyon óvatos és nem köt védelmi paktumot 80 befolyás alatt.
Note that before you can sign a defensive pact, you must have a Declaraction of Friendship, and both Nations need the required Technology. = Vedd figyelembe, hogy mielőtt védelmi paktumot írhatnál alá, barátsági nyilatkozattal kell rendelkezned, és mindkét nemzetnek szüksége van a szükséges technológiára.
When playing with the Gods and Kings ruleset mutual embassies need to be established before a Defensive Pact can be signed. = Ha az Istenek és Királyok szabálykészlettel játszol, a védelmi paktum aláírása előtt kölcsönös nagykövetségeket kell alapítani.

Not all nations are contending with you for victory.\nCity-States are nations that can't win, can't be traded with, and instead confer certain bonuses to friendly civilizations. = Vannak nemzetek, amelyek nem versengenek veled a győzelemért.\nA városállamok olyan nemzetek, amelyek nem nyerhetnek, nem lehet velük kereskedni, viszont különféle bónuszokat biztosítanak a barátságos civilizációknak.
Instead, diplomatic relations with City-States are determined by Influence - a meter of 'how much the City-State likes you'.\nInfluence can be increased by attacking their enemies, liberating their city, and giving them sums of gold. = A városállamokkal való diplomáciai kapcsolatokat a befolyás határozza meg, amely annak a mérőszáma, hogy mennyire szeret téged a városállam.\nA befolyás növelhető, ha megtámadod az ellenségeit, felszabadítod a városát vagy bizonyos összegű aranyat adományozol neki.
Certain bonuses are given when you are at above 30 influence.\nWhen you have above 60 Influence, and you have the highest influence with them of all civilizations, you are considered their 'Ally', and gain further bonuses and access to the Luxury and Strategic resources in their lands. = A bónuszok egy részét akkor kapod meg, ha a befolyásod 30 fölött van.\nHa a befolyásod 60 fölötti, és a tiéd a legnagyobb minden civilizáció közül, akkor szövetségesnek számítasz, ezért további bónuszokat kapsz és hozzáférést a területükön lévő luxus- és stratégiai nyersanyagokhoz.

While working the land is good, eventually your Citizens will want to Specialize. = Bár a föld megművelése jó, a polgáraid idővel szakosodni szeretnének majd.
Certain Buildings will also provide Specialist Slots. These slots will show up in the Citizen Management within the City Screen under Specialists. Each slot can be filled with a Citizen which will then become a Specialist. = Bizonyos épületek szakértői helyeket is biztosítanak. Ezek a helyek a Városképernyőn a Polgárok kezelése pontban, a Szakértők alatt jelennek meg. Minden hely megtölthető egy polgárral, aki ezután szakértővé válik.
Each Specialist will generate a certain amount of yield as indicated to the right of the available slots. = Minden szakértő bizonyos mennyiségű hozamot fog előállítani, a rendelkezésre álló helyektől jobbra jelzettek szerint.
While these are a great way to specialize the yield production of a City outside of the surrounding Tile Yields, Specialists have an additional value. Each one also generates Great Person Points each turn. With enough of them, a new Great Person will join your Nation. = Bár ezek nagyszerű lehetőséget nyújtanak egy város hozamtermelésének szakosítására a környező mezőhozamokon kívül, a szakértőknek van egy további értékük is. Mindegyikük híresember-pontokat is termel minden körben. Ha elég van belőlük, egy új híres ember csatlakozik a nemzetedhez.
Great People = Híres emberek

Certain buildings, and specialists in cities, generate Great Person points per turn.\nThere are several types of Great People, and their points accumulate separately.\nThe number of points per turn and accumulated points can be viewed in the Overview screen. = Bizonyos épületek és a városban lévő szakértők minden körben termelnek híresember-pontokat.\nTöbbféle híres ember létezik, és mindegyiknek külön gyűlnek a pontjaik.\nA körönként kapott pontok és az összegyűlt pontok az Áttekintés képernyőn láthatók.
Alternatively, the Great Person points breakdown per city can be viewed in each City Screen (see UI Tips article). = Alternatív megoldásként a híresember-pontok városonkénti bontása az egyes városképernyőkön is megtekinthető (lásd a Kezelőfelületi tippek cikket).
Once enough points have been accumulated, a Great Person of that type will be created!\nEach Great Person can construct a certain Great Improvement which gives large yields over time, or immediately consumed to provide a certain bonus now. = Ha valamelyik típusból összegyűlik elegendő pont, akkor egy olyan fajtájú híres ember fog megjelenni.\nA híres emberek képesek valamilyen nevezetes területfejlesztés megépítésére, amely ezután hosszú ideig nagy hozamot fog biztosítani, vagy azonnal felhasználhatók valamilyen egyszeri előny érdekében.
Great Improvements also provide any strategic resources that are under them, so you don't need to worry if resources are revealed underneath your improvements! = A nevezetes területfejlesztések kitermelik az alattuk lévő mező stratégiai nyersanyagait is, tehát nem kell félni attól, hogy az építmény alatt később feltűnik valamilyen nyersanyag!

Removing Terrain Features = Felszíni képződmények eltávolítása
Certain tiles have terrain features - like Flood plains or Forests -  on top of them. Some of these layers, like Jungle, Marsh and Forest, can be removed by workers.\nRemoving the terrain feature does not remove any resources in the tile, and is usually required in order to add improvements exploiting those resources. = Néhány mezőn találhatók felszíni képződmények, például ártér vagy erdő. Némelyiket, például a dzsungelt, a mocsarat vagy az erdőt, a munkások el is tudnak távolítani.\nA képződmények eltávolításakor a mezőn lévő nyersanyagok nem tűnnek el, sőt általában addig nem is lehet megépíteni a kitermelésüket lehetővé tevő területfejlesztéseket, amíg ez meg nem történik.

Natural Wonders, such as the Mt. Fuji, the Rock of Gibraltar and the Great Barrier Reef, are unique, impassable terrain features, masterpieces of mother Nature, which possess exceptional qualities that make them very different from the average terrain.\nThey benefit by giving you large sums of Culture, ⍾Science, Gold or Production if worked by your Cities, which is why you might need to bring them under your empire as soon as possible. = A természeti csodák, mint például a Fuji-hegy, a Gibraltári-szikla és a Nagy-korallzátony, egyedi, járhatatlan tereptárgyak, anyatermészet remekművei, amelyek olyan kivételes tulajdonságokkal rendelkeznek, amelyek nagymértékben megkülönböztetik őket az átlagos tereptől.\nAzzal az előnnyel járnak, hogy nagy mennyiségű kultúrát, ⍾tudományt, aranyat vagy hozamot adnak, ha a városaid megművelik őket, ezért lehet, hogy a lehető leghamarabb a birodalmad alá kell vonnod őket.

Keyboard = Billentyűzet
If you have a keyboard, some shortcut keys become available. Unit command or improvement picker keys, for example, are shown directly in their corresponding buttons. = Ha van billentyűzeted, használhatsz gyorsgombokat. Az egységparancsok vagy a területfejlesztések billentyűi például közvetlenül a gombjaikon láthatók.
On the world screen the hotkeys are as follows: = Térképképernyő gyorsbillentyűi:
Space or 'N' - Next unit or turn\n'E' - Empire overview (last viewed page)\n'+', '-' - Zoom in / out\nHome - center on capital or open its City Screen if already centered = Szóköz vagy „N” - Következő egység vagy kör\n„E” - Áttekintés (utoljára megtekintett lap)\n„+”, „-” - Nagyítás / kicsinyítés\nHome - főváros megtekintése vagy, ha már látható, akkor megnyitni a városképernyőt
F1 - Open Civilopedia\nF2 - Empire overview Trades\nF3 - Empire overview Units\nF4 - Empire overview Diplomacy\nF5 - Social policies\nF6 - Technologies\nF7 - Empire overview Cities\nF8 - Victory Progress\nF9 - Empire overview Stats\nF10 - Empire overview Resources\nF11 - Quicksave\nF12 - Quickload = F1 - Civilopédia megnyitása\nF2 - Kereskedelem áttekintése\nF3 - Egységek áttekintése\nF4 - Diplomácia áttekintése\nF5 - Politikai berendezkedések\nF6 - Technológiák\nF7 - Városok áttekintése\nF8 - Győzelmi állapot\nF9 - Pontok áttekintése\nF10 - Nyersanyagok áttekintése\nF11 - Gyorsmentés\nF12 - Gyorsbetöltés
Ctrl-R - Toggle tile resource display\nCtrl-Y - Toggle tile yield display\nCtrl-O - Game options\nCtrl-S - Save game\nCtrl-L - Load game\nCtrl-U - Toggle UI (World Screen only) = Ctrl-R - Mezők nyersanyagainak megjelenítése be/ki\nCtrl-Y - Mezők hozamának megjelenítése be/ki\nCtrl-O - Játékbeállítások\nCtrl-S - Játék mentése\nCtrl-L - Játék betöltése\nCtrl-U - Kezelőelemek megjelenítése be/ki (csak a világtérképen)
All of these can be reassigned. = Ezek mindegyike újrakiosztható.

This is where you spend most of your time playing Unciv. See the world, control your units, access other screens from here. = Ezen a képernyőn töltöd a legtöbb időt, amíg az Uncivvel játszol. Tekintsd át a világot, irányítsd az egységeidet, nyiss meg más képernyőket ezen keresztül.
①: The menu button - civilopedia, save, load, options... = ①: A menügomb - civilopédia, mentés, betöltés, beállítások…
②: The player/nation whose turn it is - click for diplomacy overview. = ②: A játékos/nemzet, akinek a köre van - kattints a diplomácia áttekintéséhez.
③: The Technology Button - shows the tech tree which allows viewing or researching technologies. = ③: A technológiagomb - megjeleníti a technológiafát, amely segítségével tájékozódhatsz a technológiákról és feltalálhatod őket.
④: The Social Policies Button - shows enacted and selectable policies, and with enough culture points you can enact new ones. = ④: A politikai eszmék gomb - megjeleníti a törvénybe iktatott és a kiválasztható politikai berendezkedéseket, valamint elegendő kultúrapont esetén újakat iktathatsz törvénybe.
⑤: The Diplomacy Button - shows the diplomacy manager where you can talk to other civilizations. = ⑤: A diplomácia gomb - megjeleníti a diplomáciai kezelőfelületet, amelyen keresztül más civilizációkkal beszélhetsz.
⑥: Unit Action Buttons - while a unit is selected its possible actions appear here. = ⑥: Egységek cselekvésgombjai - a kiválasztott egység cselekvési lehetőségei láthatók itt.
⑦: The unit/city info pane - shows information about a selected unit or city. = ⑦: Az egység vagy város tájékoztatópanelje - a kiválasztott egység vagy város adatait jeleníti meg.
⑧: The name (and unit icon) of the selected unit or city, with current health if wounded. Clicking a unit name or icon will open its civilopedia entry. = ⑧: A kiválasztott egység vagy város neve (és egységikonja) és az aktuális életpontok, ha sérült. Az egység nevére vagy ikonjára nyomva megnyílik a hozzá tartozó civilopédia-bejegyzés.
⑨: The arrow buttons allow jumping to the next/previous idle unit. = ⑨: A nyíl gombok lehetővé teszik a következő/előző tétlen egységre ugrást.
⑩: For a selected unit, its promotions appear here, and clicking leads to the promotions screen for that unit. = ⑩: Egy kiválasztott egységnél az előléptetései itt jelennek meg, és a kattintás az adott egység előléptetési képernyőjére vezet.
⑪: Remaining/per turn movement points, strength and experience / XP needed for promotion. For cities, you get its combat strength. = ⑪: Maradék/körönkénti mozgáspontok, harci erő(k) és aktuális/előléptetéshez szükséges tapasztalat. Városok esetén csak a harci erőt látod itt.
⑫: This button closes the selected unit/city info pane. = ⑫: A kiválasztott egység vagy város tájékoztatópaneljét ezzel a gombbal lehet bezárni.
⑬: This pane appears when you order a unit to attack an enemy. On top are attacker and defender with their respective base strengths. = ⑬: Ez a panel akkor látható, amikor egy ellenség megtámadására utasítasz egy egységet. Felül látható a támadó és a védekező, illetve az eredeti harci erejük.
⑭: Below that are strength bonuses or penalties and health bars projecting before / after the attack. = ⑭: Ezalatt találhatók a harci erőt növelő vagy csökkentő hatások, valamint az életsávok a támadás előtti és a támadás után várható állapotot jelenítve meg.
⑮: The Attack Button - let blood flow! = ⑮: A támadásgomb - induljon a vérontás!
⑯: The minimap shows an overview over the world, with known cities, terrain and fog of war. Clicking will position the main map. = ⑯: A kistérképen áttekinthető a világ, az ismert városok, területek és a háborús köd. Rányomva a térkép kiválasztott része lesz látható a főképernyőn.
⑰: To the side of the minimap are display feature toggling buttons - tile yield, worked indicator, show/hide resources. These mirror setting on the options screen and are hidden if you deactivate the minimap. = ⑰: A minitérkép mellett találhatók a megjelenítési beállításgombok - mezőhozamok, megmunkálásjelölők, nyersanyagok megjelenítése be/ki. A beállítás-képernyőn is elérhető beállítások megismétlései ezek a gombok, és a minitérkép kikapcsolása esetén eltűnnek vele együtt.
⑱: Tile information for the selected hex - current or potential yield, terrain, effects, present units, city located there and such. Where appropriate, clicking a line opens the corresponding civilopedia entry. = ⑱: Mezőinformáció a kiválasztott hatszög alakú területre vonatkozóan - jelenlegi vagy potenciális hozam, terep, hatások, jelenlévő egységek, ott található város és hasonlók. Ahol releváns, egy sorra kattintva megnyílik a megfelelő civilopédia bejegyzés.
⑲: Notifications - what happened during the last 'next turn' phase. Some are clickable to show a relevant place on the map, some even show several when you click repeatedly. = ⑲: Értesítések - mi történt a legutóbbi „következő kör” fázisban. Némelyikre rá lehet kattintani, hogy megmutassa a releváns helyet a térképen, sőt, némelyik többet is mutat, ha többször rákattintasz.
⑳: The Next Turn Button - unless there are things to do, in which case the label changes to 'next unit', 'pick policy' and so on. = ⑳: A Következő kör gomb - hacsak nincs tennivaló, amely esetben a felirat „következő egység”, „berendezkedés választása” és így tovább formára változik.
㉑: The Multiplayer Button - Here you can easily check your active multiplayer games. = ㉑: A többjátékos gomb - Itt könnyedén áttekintheted a folyamatban lévő többjátékos játékaidat.
ⓐ: The overview button leads to the empire overview screen with various tabs (the last one viewed is remembered) holding vital information about the state of your civilization in the world. = ⓐ: Az áttekintés gomb a birodalmad áttekintő képernyőjére visz, amelynek különböző fülei vannak (az utoljára megtekintett fülre emlékezni fog a játék). E fülek nélkülözhetetlen információkat tartalmaznak a civilizációd helyzetéről a világban.
ⓑ: The ♪Culture icon shows accumulated ♪Culture and ♪Culture needed for the next policy - in this case, the exclamation mark tells us a next policy can be enacted. Clicking is another way to the policies manager. = ⓑ: A ♪Kultúra ikon a felhalmozódott ♪Kultúrát és a következő politikai berendezkedéshez szükséges ♪Kultúrát jeleníti meg - ebben az esetben a felkiáltójel arra figyelmeztet, hogy törvénybe lehet iktatni a következő politikai berendezkedést. Nyomógombként is használható a politikai berendezkedési kezelőképernyő eléréséhez.
ⓒ: Your known strategic resources are displayed here with the available (usage already deducted) number - click to go to the resources overview screen. = ⓒ: Az ismert stratégiai nyersanyagaid itt jelennek meg a rendelkezésre álló (a felhasználás már levonva) számmal - kattints a nyersanyag-áttekintő képernyőre való lépéshez.
ⓓ: Happiness/unhappiness balance and either golden age with turns left or accumulated happiness with amount needed for a golden age is shown next to the smiley. Clicking also leads to the resources overview screen as luxury resources are a way to improve happiness. = ⓓ: Az emodzsi mellett látható a boldogság vagy boldogtalanság mérlege, illetve vagy az aranykor a hátralévő körök számával, vagy a felhalmozódott boldogság az aranykorig hátralévő körök számával. Nyomógombként is használható a nyersanyag-áttekintő képernyőhöz, hiszen a luxuscikkek jelentik a boldogság növelésének egyik eszközét.
ⓔ: The ⍾Science icon shows the number of ⍾Science points produced per turn. Clicking leads to the technology tree. = ⓔ: A ⍾Tudomány ikon megjeleníti a körönként előállított ⍾Tudományos pontokat. Nyomógombként is használható a technológiafa megjelenítéséhez.
ⓕ: Number of turns played with translation into calendar years. Click to see the victory overview. = ⓕ: A lejátszott körök száma és az ennek megfelelő évszám. Rányomva áttekinthetők a győzelmi feltételek.
ⓖ: The number of gold coins in your treasury and income. Clicks lead to the Stats overview screen. = ⓖ: A kincstáradban lévő aranyérmék száma és a jövedelmed. Rányomva a pontok áttekintő képernyője nyílik meg.
ⓗ: The quantity of ☮Faith your citizens have generated, or 'off' if religion is disabled. Clicking it makes you go to the religion overview screen. = ⓗ: A polgáraid által előállított ☮hit mennyisége, vagy „ki”, ha a vallás ki van kapcsolva. Rákattintva a vallás-áttekintő képernyőre jutsz.
ⓧ: In the center of all this - the world map! Here, the "X" marks a spot outside the map. Yes, unless the wrap option was used, Unciv worlds are flat. Don't worry, your ships won't fall off the edge. = ⓧ: És mindezek középpontjában a térkép: a világtérkép! Az „X” itt egy térképen kívüli pontot jelöl. Igen, az Unciv-világok laposak - hacsak nem engedélyezed a körbejárható térkép beállítását. Azért ne félj, a hajóid nem fognak leesni a térkép széléről.
ⓨ: By the way, here's how an empire border looks like - it's in the national colours of the nation owning the territory. = ⓨ: Egyébként pedig így néz ki egy birodalom határa, melynek színe a területet birtokló nemzet nemzeti színével egyezik meg.
ⓩ: And this is the red targeting circle that led to the attack pane back under ⑬. = ⓩ: Ez pedig a vörös célkereszt, amely megnyitja a ⑬-as pontban bemutatott támadási panelt.
What you don't see: The phone/tablet's back button will pop the question whether you wish to leave Unciv and go back to Real Life. On desktop versions, you can use the ESC key. = Ami nem látható itt az az, hogy a telefon vagy tablet vissza gombjával előhívható a kérdés, hogy abba akarod-e hagyni a játékot és visszatérsz a való világba. Az asztali verzióban az ESC gombot tudod erre használni.

When at later stages of the game, you might have a lot of units but only a little to do. To help you we have implemented an AutoPlay feature that lets you use the AI to play part or all of your turn. = A játék előrehaladtával előfordulhat, hogy sok egységed van, ugyanakkor kevés a tennivalód. Azért készítettük a robotvezérlés funkciót, hogy ilyen helyzetben segítségedre legyen azzal, hogy a köröd lejátszását részben vagy teljesen az MI-re bízza.
To enable AutoPlay, go to options and open the AutoPlay tab and press "Show AutoPlay button". = A robotvezérlés engedélyezéséhez lépj be a beállításokba és az „Robotvezérlés” fülön jelöld be az „Robotvezérlés gombjának megjelenítése” elemet.
Clicking on the AutoPlay button opens a popup menue for choosing to AutoPlay parts or all of your turn. = A robotvezérlés-gombra kattintva megjelenik a menü, amelyből kiválaszthatod, hogy a teljes köröd vagy csak egy része történjen robotvezérelten.
Clicking Start AutoPlay in the pop-up menue or long pressing the AutoPlay button begins the multi-turn AutoPlay. This will play your next turns as if you were an AI. = Az „Robotvezérlés indítása” menüelemre kattintva vagy a „Robotvezérlés-gomb” hosszan nyomva tartásakor elindul a többkörös robotvezérlés. Ilyenkor a következő néhány körödet úgy játssza le az MI, mint a gépi játékosok körét szokta.
To cancel multi-turn AutoPlay you can press the AutoPlay button, next turn button or open the options menue. = A többkörös robotvezérlés megállításához megnyomhatod a „Robotvezérlés” gombot, a „Következő kör” gombot, vagy leállíthatod a „Beállítások” menüben.
Multi-turn AutoPlay is not advised on harder difficulty levels as your AI will not play better against an AI with modifiers. = A magasabb nehézségi fokozatok esetén nem javasoljuk a robotvezérlés használatát, mivel a te MI-d hátrányban lesz a kedvezményekkel játszó MI-khez képest.
Multi-turn AutoPlay for multiplayer is not yet supported. = A többkörös robotvezérlés még nem támogatja a többjátékos módot.

After building a shrine, your civilization will start generating ☮Faith. = A kegyhely megépítése után a civilizációd ☮Hitet fog gyűjteni.
When enough ☮Faith has been generated, you will be able to found a pantheon. = Miután elegendő ☮Hit összegyűlt, alapíthatsz egy panteont.
A pantheon will provide a small bonus for your civilization that will apply to all cities that have it as a majority religion. = A panteon kis bónuszt biztosít a civilizációdnak, amely minden városban érvényesül, amelyben az a fő vallás.
Each civilization can only choose a single pantheon belief, and each pantheon can only be chosen once. = Minden civilizáció csak egy panteoni tant választhat, és minden panteoni tan csak egyszer választható.
Generating more ☮Faith will allow you to found a religion. = További ☮Hit összegyűjtése után alapíthatsz egy vallást.

Keep generating ☮Faith, and eventually a great prophet will be born in one of your cities. = Ha elegendő ☮Hit gyűlik össze, születni fog egy híres próféta az egyik városodban.
This great prophet can be used for multiple things: Constructing a holy site, founding a religion and spreading your religion. = Ez a híres próféta több dologra képes: Építhet szentélyt, alapíthat vallást, illetve terjesztheti a vallásodat.
When founding your religion, you may choose another two beliefs. The founder belief will only apply to you, while the follower belief will apply to all cities following your religion. = Vallásalapításkor még két tant választhatsz. Az alapító tana csak rád lesz érvényes, míg a követő tana minden városra, amely követi a vallásodat.
Additionally, the city where you used your great prophet will become the holy city of that religion. = Ráadásul az a város, amelyikben felhasználod a híres prófétát, szent hely lesz az adott vallás számára.
Once you have founded a religion, great prophets will keep being born every so often, though the amount of Faith☮ you have to save up will be higher. = A vallásalapítás után is születni fognak híres próféták, de a szükséges Hit☮ mennyisége egyre nagyobb lesz majd.
One of these great prophets can then be used to enhance your religion. = E híres próféták egyike által kibővítheted a vallásodat.
This will allow you to choose another follower belief, as well as an enhancer belief, that only applies to you. = Ekkor választhatsz még egy követői tant és egy bővítői tant, amely csak rád lesz hatással.
Do take care founding a religion soon, only about half the players in the game are able to found a religion! = Igyekezz minél előbb vallást alapítani, mert csak a játékosok felének lesz erre lehetősége!

Religion inside cities = Vallás a városokban
When founding a city, it won't follow a religion immediately. = Az újonnan alapított városok nem követik maguktól egyik vallást sem.
The religion a city follows depends on the total pressure each religion has within the city. = Minden vallás városon belüli vonzerejének kölcsönhatása határozza meg a város vallását.
Followers are allocated in the same proportions as these pressures, and these followers can be viewed in the City Screen. = A követők arányát e vonzerők aránya határozza meg, és a város képernyőjén látható a követők száma.
You are allowed to check religious followers and pressures in cities you do not own by selecting them. = Megnézheted mások városainak híveit és a vallások vonzerőit, ha kiválasztod a várost.
In both places, a tap/click on the icon of a religion will show detailed information with its effects. = Mind a két helyen látható a vallás ikonja, amelyre rányomva részletes információk láthatók annak hatásairól.
Based on this, you can get a feel for which religions have a lot of pressure built up in the city, and which have almost none. = Ennek segítségével képet alkothatsz arról, hogy melyik vallásnak van óriási vonzereje a városban és melyiknek van szinte semekkora.
The city follows a religion if a majority of its population follows that religion, and will only then receive the effects of Follower and Pantheon beliefs of that religion. = A város akkor követ egy vallást, ha a lakosság többsége azt a vallást követi, és csak ezután fog érvényesülni az adott vallás követői tana és panteon tana.

Spreading Religion = Hittérítés
Spreading religion happens naturally, but can be sped up using missionaries or great prophets. = A vallás magától is terjed, de ez misszionáriusok vagy híres próféták segítségével felgyorsítható.
Missionaries can be bought in cities following a major religion, and will take the religion of that city. = A misszionáriusokat valamely fő vallást követő városban lehet kiképezni és annak a városnak a vallását fogják átvenni.
So do take care where you are buying them! If another civilization has converted one of your cities to their religion, missionaries bought there will follow their religion. = Jól gondold hát meg, hogy hol képzed ki őket! Lehet, hogy egy másik civilizáció áttérítette az egyik városodat a saját hitére, ilyenkor az ott kiképzett misszionárius az idegen vallást fogja követni.
Great prophets always have your religion when they appear, even if they are bought in cities following other religions, but captured great prophets do retain their original religion. = A híres próféták minden esetben a saját vallásodat követik, amikor megjelennek, még akkor is, ha más hitre tért városokban képzed ki őket. Azok a híres próféták azonban, amelyeket úgy zsákmányol valaki, megőrzik az eredeti vallásukat.
Both great prophets and missionaries are able to spread religion to cities when they are inside its borders, even cities of other civilizations. = A híres próféták és a misszionáriusok is képesek hittérítésre saját és más civilizációk városaiban is, ha azok határán belül tartózkodnak.
These two units can even enter tiles of civilizations with whom you don't have an open borders agreement! = Ez a két egység még olyan civilizációk földjére is beléphet, amellyel nincs határátlépési egyezményed!
But do take care, missionaries will lose 250 religious strength each turn they end while in foreign lands. = Arra azonban ügyelj, hogy a misszionáriusok hittérítési ereje minden idegen földön befejezett körben 250 egységgel csökken.
This diminishes their effectiveness when spreading religion, and if their religious strength ever reaches 0, they have lost their faith and disappear. = Ez csökkenti az egység hittérítési hatékonyságát, és ha a hittérítési erejük 0-ra csökken, elvesztik hitüket és eltűnnek.
When you do spread your religion, the religious strength of the unit is added as pressure for that religion. = Amikor terjeszted a vallásodat, az egység hittérítési ereje hozzáadódik annak a vallásnak a vonzerejéhez.
Cities also passively add pressure of their majority religion to nearby cities. = A városok passzív módon is növelik többségi vallásuk vonzerejét a környező városokban.
Each city provides +6 pressure per turn to all cities within 10 tiles, though the exact amount of pressure depends on the game speed. = Minden város +6-tal növeli a vonzerőt a 10 mezőnél nem távolabbi városokban, de a vonzerő pontos értéke a játék sebességétől függ.
This pressure can also be seen in the City Screen, and gives you an idea of how religions in your cities will evolve if you don't do anything. = Ez a vonzerő a város képernyőjében is látható, és innen tudhatod, hogyan alakulna a város vallási élete, ha nem avatkoznál közbe.
Holy cities also provide +30 pressure of the religion founded there to themselves, making it very difficult to effectively convert a holy city. = A szent városok ezen felül +30 vonzerőt biztosítanak az ott alapított vallás számára a saját területükön, így nagyon nehéz a szent városokat másik hitre téríteni.
Lastly, before founding a religion, new cities you settle will start with 200 pressure for your pantheon. = Végül, a vallásod megalapítása előtt az újalapítású városok panteonja 200 vonzerővel fog rendelkezni.
This way, all your cities will starting following your pantheon as long as you haven't founded a religion yet. = Ez biztosítja, hogy minden városod a panteonodat követi, ha még nem alapítottál vallást.

Inquisitors = Inkvizítorok
Inquisitors are the last religious unit, and their strength is removing other religions. = Az utolsó vallási egység az inkvizítor, amely hittérítő erejével képes eltávolítani más vallásokat.
They can remove all other religions from one of your own cities, removing any pressures built up. = El tud távolítani minden más vallást az egyik saját városodból és eltünteti azok vonzerejét.
Great prophets also have this ability, and remove all other religions in the city when spreading their religion. = A híres próféták is képesek erre, hiszen eltávolítanak minden vallást a városból, amikor a sajátjukat terjesztik.
Often this results in the city immediately converting to their religion = Ez általában ahhoz vezet, hogy a város azonnal áttér az ő vallásukra
Additionally, when an inquisitor is stationed in or directly next to a city center, units of other religions cannot spread their faith there, though natural spread is unaffected. = Ezen kívül, ha egy inkvizítor állomásozik közvetlenül valamely városközpont mellett, akkor meg tudja akadályozni, hogy más vallások egységei hittérítést végezzenek ott, noha a vallások természetes terjedésére nincs hatásuk.

The Mayan unique ability, 'The Long Count', comes with a side effect: = A maják különleges képességének, a hosszú számításnak, van egy mellékhatása:
Once active, the game's year display will use mayan notation. = Amint elkezdődik a használata, a játékbeli évszám a maja naptár szerint fog megjelenni.
The Maya measured time in days from what we would call 11th of August, 3114 BCE. A day is called K'in, 20 days are a Winal, 18 Winals are a Tun, 20 Tuns are a K'atun, 20 K'atuns are a B'ak'tun, 20 B'ak'tuns a Piktun, and so on. = A maja időszámítás kezdete a mi időszámításunk előtti 3114. augusztus 11-i napra esik. A nap megnevezésére a Kin szót használják, 20 nap egy Vinál, 18 Vinál egy Tun, 20 Tun egy Katun, 20 Katun egy Baktun, 20 Baktun egy Piktun és így tovább.
Unciv only displays ය B'ak'tuns, ඹ K'atuns and ම Tuns (from left to right) since that is enough to approximate gregorian calendar years. The Maya numerals are pretty obvious to understand. Have fun deciphering them! = Az Uncivben csak a ය Baktunok, ඹ Katunok és ම Tunok (balról jobbra) láthatók, mivel a Gergely-naptár évszámainak átírásához ennyi elegendő. Elég egyszerű kitalálni a maja számjegyek jelentését is. Jó szórakozást a megfejtésükhöz!

Your cities will periodically demand different luxury goods to satisfy their desire for new things in life. = Városaid polgárainak időnként különböző luxuscikkekre lesz szüksége, hogy az újdonságok iránti vágyaikat kielégítsék.
If you manage to acquire the demanded luxury by trade, expansion, or conquest, the city will celebrate We Love The King Day for 20 turns. = Ha a szükséges luxuscikkeket kereskedelem, terjeszkedés vagy hódítás útján elő tudod teremteni, a város 20 körön keresztül meg fogja tartani az Uralkodóünnepet.
During the We Love The King Day, the city will grow 25% faster. = Az Uralkodóünnep alatt a város 25%-kal gyorsabban növekszik.
This means exploration and trade is important to grow your cities! = A felfedezés és a kereskedelem tehát fontosak a városaid növekedése szempontjából!

Air Combat and Interception = Légi támadás és légelhárítás
Air Combat is very similar to normal Combat, with a few wrinkles. Damage is still dealt using the same equations based on the relative Strength of the Attacking and Defending Unit. = A légi harc nagyon hasonlít a normál harchoz, néhány apró eltéréssel. A sebzés kiszámítása továbbra is ugyanazon egyenletek alapján történik, a támadó és a védő egység relatív ereje alapján.
However, before the Attacker and Defender fight, there is an added combat phase called Interception. If there is any unit with Interception Range that covers the target attacked tile, then it will attempt to Intercept the Attacking Air Unit. If multiple units can Intercept, the one with higher Intercept chance does it. = Azonban a támadó és a védő küzdelme előtt van egy plusz harci fázis, amelyet légelhárításnak neveznek. Ha van olyan egység, amelynek a légelhárítási hatótávolsága lefedi a megtámadott célmezőt, akkor az megkísérli a támadó légi egység elhárítását. Ha több egység is képes a légelhárításra, akkor a magasabb légelhárítási eséllyel rendelkező hárítja el.
Generally Land/Naval Units have an Intercept Range of 2 Tiles, and Air Units have an Intercept Range of their Attack Range. = Általában a szárazföldi/vízi egységek légelhárítási hatótávolsága 2 mező, a légi egységek légelhárítási hatótávolsága pedig megegyezik a támadási hatótávolságukkal.
Ground and Naval Units don't require movement points to Intercept, just Attacks. Air Units cannot have moved nor attacked in the preceding turn. = A szárazföldi és vízi egységeknek nincs szükségük mozgáspontra a légelhárításhoz, csak támadási lehetőségre. A légi egységek nem mozoghattak és nem támadhattak az előző körben.
The Intercepting Unit rolls to see if it hits. Whether it hits or not costs an Attack, and most units (without Promotions) can only Attack Once per Nation's Turn. It does NOT cost Movement Points, but Air Units that have used their Movement cannot Intercept between turns. = A légelhárítást végző egység dobást végez, hogy eltalálja-e a célt. Akár talál, akár nem, ez egy támadásba kerül, és a legtöbb egység (előléptetések nélkül) nemzetenként csak egyszer támadhat körönként. Ez nem kerül mozgáspontba, de a mozgásukat már elhasznált légi egységek a körök között nem képesek a légelhárításra.
If the Intercepting Unit Hits, it deals damage according to the Combat Strength calculation to the Attacking Air Unit, potentially with any Strength Bonuses that apply to Interception. It does not receive damage from the Attacking Air Unit. = Ha a légelhárítást végző egység talál, a harci erő számítása alapján sebzést okoz a támadó légi egységnek, esetlegesen a légelhárításra érvényes erőbónuszokkal együtt. A támadó légi egységtől nem kap sebzést.
After Interception resolves, the Attacking Air Unit and the Defending Unit in the targeted tile do Combat as normal, with damage dealt to both sides. = A légelhárítás lezajlása után a támadó légi egység és a célba vett mezőn lévő védő egység a megszokott módon harcol, mindkét fél sebzést szenved el.
To help deal with Interceptions, see Air Sweeps. = A légi elfogások kezelésében segítséget nyújt a légtértisztítás.

Air Sweeps = Légtértisztítás
Fighter units are able to perform Air Sweeps over a tile helping clear out potential enemy Air, Sea, or Land Interceptions that can reach that tile. = A vadászrepülő egységekkel légtértisztítást lehet végrehajtani egy mező fölött, ami segít elvonni az adott mezőn esetlegesen bevethető ellenséges légi, vízi vagy földi légelhárítók tüzét.
While this Action will take an Attack, the benefit is drawing out Interceptions to help protect your other Air Units. Especially your Bombers. = Ez a művelet egy támadási lehetőségbe kerül ugyan, de az előnye az, hogy segít a többi légi egységed megvédeni a légelhárítástól. Főleg a bombázókat.
Your unit will always draw an Interception, if one can reach the target tile, even if the Intercepting unit has a chance to miss. = Ilyenkor az egységed mindig támadásra kényszeríti a légelhárítót, ha annak hatótávjában benne van a célmező, még akkor is, ha a légelhárító egységnek esélye van arra, hogy elvétse.
If the Interceptor is not an Air Unit (eg Land or Sea), the Air Sweeping unit and Interceptor take no damage! = Ha a légelhárító nem légi egység (pl. földi vagy vízi), akkor sem a légtértisztító egység, sem az elhárító nem szenved károkat!
If the Interceptor is an Air Unit, the two units will damage each other in a straight fight with no Interception bonuses. And only the Attacking Air Sweep Unit gets any Air Sweep strength bonuses. = Ha a légelhárító légi egység, akkor a két egység egyenlő küzdelemben légelhárítási bónusz nélküli sérülést fog okozni egymásnak. Csak a légtértisztítást végző támadó egység harci ereje lesz nagyobb a légtértisztítási bónusszal.

Fortify, Guard, Withdraw = Erődítés, Védekezőállás, Visszavonulás
Most Land units have the ability to Fortify. As they spend time without moving, they will slowly gain a Fortification Bonus to their Combat Strength representing digging in and preparing in case of an attack. = A legtöbb szárazföldi egység képes az erődítésre. Ahogy mozgás nélkül töltik az időt, lassan erődítési bónuszt kapnak a harci erejükhöz, ami a beásást és a felkészülést jelképezi egy esetleges támadásra.
Some units have the ability to Withdraw before a melee attack is struck. However, perhaps you wish for them to stand their ground to protect a particular tile. If you do, then give them the Guard command and they will stay fixed until they die or you give them fresh orders. = Némelyik egység képes a visszavonulásra, mielőtt egy közelharci támadás érné. Azonban meglehet, hogy azt szeretnéd, ha állnák a sarat egy adott mező védelmében. Ha így van, add ki nekik az Őrség parancsot, és egy helyben maradnak, amíg meg nem halnak, vagy új parancsot nem adsz nekik.
This is NOT the same as Fortify but they will still gain the Fortification Bonus. They will simply not utilize their Withdraw ability. Fortified units with the Withdraw ability will try to flee when attacked. = Ez nem ugyanaz, mint az erődítés, de az erődítési bónuszt így is megkapják. Egyszerűen csak nem fogják használni a visszavonulási képességüket. A visszavonulási képességgel rendelkező erődített egységek megpróbálnak elmenekülni, ha megtámadják őket.

City Tile Blockade = Városi mezőblokád
One of your tiles is blocked by an enemy: when an enemy unit stands on a tile you own, the tile will not produce yields and cannot be worked by a city this turn. City will reallocate population from a blocked tile automatically. = Egy meződet elzárja az ellenség: ha az ellenség egy általad birtokolt mezőn áll, nem férsz hozzá a mező hozamához és a város sem tudja megmunkálni azt az adott körben. A város automatikusan átcsoportosítja a lakosságot egy másik mezőre.
Enemy military land units block tiles they are standing on. Enemy military naval units additionally block adjacent water tiles. To protect your tiles from blockade, place a friendly military unit on it or fight off invaders. = Az ellenség katonai földi egységei elzárják a mezőket, amelyeken állnak. Az ellenség katonai vízi egységei elzárják a szomszédos vízi mezőket is. Megóvhatod a mezőket a blokádtól, ha barátságos katonai egységet állítasz rájuk vagy visszavered a betolakodókat.

One of your cities is under a naval blockade! When all adjacent water tiles of a coastal city are blocked - city loses harbor connection to all other cities, including capital. Make sure to de-blockade cities by deploying friendly military naval units to fight off invaders. = Az egyik városod kikötői blokád alatt áll! Ha egy tengerparti város körüli vízi mezőket elzárja az ellenség, a város elveszíti tengeri összeköttetését a többi várossal, így a fővárossal is. Megtörheted a város blokádját, ha barátságos katonai egységekkel visszavered a behatolókat.

Spies! = Kémek!
The first time a civ reaches the Renaissance era each nation gets one spy. Every time a civ reaches an era afterwards they get one more spy. = Az első alkalommal, amikor egy civilizáció elsőnek éri el mind közül a reneszánsz kort, minden nemzet kap egy kémet. Ezután valahányszor egy civilizáció újabb korba lép, kap egy további kémet.
Spies can be sent out to foreign cities to steal technology, rigging elections or stage coups. Place them in your own cities to do counter-intelligence work. = A kémeket idegen városokba lehet küldeni, hogy technológiát lopjanak, választásokat manipuláljanak vagy puccsot szervezzenek. A saját városodba is küldheted őket, hogy kémelhárítást végezzenek.
Only one spy per civ is allowed in each city. Spies that are not in any city are on vacation in your spy hideout. = Minden városban egy civilizációnak csak egy kéme lehet. Azok a kémek, amelyek egyik városban sem teljesítenek küldetést, a rejtekhelyükön pihennek.
Spies set up in cities of major civilizations will try to steal technology at a rate which is based off of the science production in the city. Succeeding to steal technology will level up your spy. Failing to succeed will level up the defending spy if it is present. = A nagy civilizációk városaiba küldött kémek az adott város tudományos kutatási teljesítményétől függő ütemben próbálnak technológiát lopni. Ha sikerül ellopni a technológiát, akkor szintet fog lépni a kémed. Ha nem sikerül a lopás, akkor a kémelhárítást végző kém fog szintet lépni, ha volt ilyen.
Spies set in city-states will try to rig the elections in order to gain influence and reduce the influence of other civilizations. Only one spy partaking in rigging the election can win. = A városállamokba küldött kémek megpróbálják manipulálni a választásokat, hogy növeljék a befolyásodat és a többi civilizációét pedig csökkentsék. A választási manipulációban részt vevő kémek közül csak egy nyerhet.
A spy that is rigging an election in a city-state may also stage a coup. The likelihood of success for the coup depends on your relative influence to the current ally of the city-state, your spy level, and the level of the spy that the current ally has in the city-state if present. Succeeding a coup will make you their new ally and reduce the influence of all other civs. Failing a coup will kill your spy and level up the defending spy if present. = A választást manipuláló kém puccsot is szervezhet a városállamban. A puccs sikerének esélye függ a városállam jelenlegi szövetségesének a tiédhez viszonyított befolyásától, a kémed szintjétől, illetve a jelenlegi szövetséges által a városba küldött kém szintjétől, ha van ilyen. Sikeres puccs esetén te leszel az új szövetséges és a többi civilizáció befolyása csökkenni fog a városállamban. Sikertelen puccs esetén a kémedet megölik és a kémelhárítást végző kém szintet lép, ha volt ilyen.
Spies that are set up in your own cities will be conducting counter-intelligence. They reduce the success chance of other spies trying to steal your technology. = A saját városaidba küldött kémek kémelhárítást végeznek. Csökkentik annak esélyét, hogy más kémek sikeresen technológiát lopjanak tőled.
Spies at a higher rank have a higher chance of success. The max rank a spy can reach is rank 3. After a spy is killed it will revive after a certain amount of turns back at rank 1. = A magasabb rangú kémek sikeresebbek. A kémek által elérhető legmagasabb rang a 3. A meggyilkolt kémek egy bizonyos számú kör múlva feltámadnak 1-es ranggal.
Building buildings like the constabulary and police station will reduce the technology steal rate of spies in that city. = Rendőrőrs és rendőrkapitányság építésével csökkenteni lehet a kémek által elkövetett lopások gyakoriságát az adott városban.
Espionage is available using the Gods and Kings ruleset. To enable it in a new game click advanced settings, then click on the Enable Espionage option. = A kémkedés az Istenek és Királyok szabálykészlet használatával érhető el. Egy új játékban való engedélyezéséhez kattints a speciális beállításokra, majd kattints a Kémkedés engedélyezése lehetőségre.

Keyboard Bindings = Billentyűkötések
Limitations = Korlátozások
This is a work in progress. = Ez a funkció jelenleg fejlesztés alatt áll.
For technical reasons, only direct keys or Ctrl-Letter combinations can be used. = Technikai okokból csak a billentyűk önmagukban és a Ctrl+betű kombinációk használhatók.
Using the Keys page = A Billentyűk fül használata
Each binding has a button with an image looking like this: = Minden kötésnek van egy gombja, amelyhez egy ilyen kép tartozik:
While hovering the mouse over the key button, you can press a desired key directly to assign it. = Vidd az egeret e billentyűgomb fölé, majd nyomd meg egyből a hozzárendelendő billentyűt.
Double-click the image to reset the binding to default. = Kattintson duplán a képre a kötés alapértelmezettre való visszaállításához.
Bindings mapped to their default keys are displayed in gray, those reassigned by you in white. = Az alapértelmezett billentyűkhöz rendelt parancsok szürkén, az általad átállítottak fehéren jelennek meg.
Conflicting assignments are marked red. Conflicts can exist across categories, like World Screen / Unit Actions. Note that at the moment, the game does not prevent saving conflicting assignments, though the result may be unexpected. = Az ellentmondó hozzárendeléseket piros színnel jelöljük. Ellentmondások több kategória között is fennállhatnak, mint például a térképképernyő és az egységműveletek között. Ne feledd, hogy jelenleg a játék nem akadályozza meg az ütköző billentyűkötések mentését, bár így lehet, hogy nem a várt eredményre fognak vezetni.
For discussion about missing entries, see the linked github issue. = A hiányzó bejegyzésekről szóló megbeszélést lásd a linkelt GitHub-hibajegynél.

Welcome to the Civilopedia! = Üdvözlünk a Civilopédiában!
Here you can find information - general help, rules, and what makes up the game world. = Itt találsz információkat - általános segítséget, szabályokat és azt, hogy hogyan épül fel a játék világa.
How to find information = Hogyan találhatsz információt
Select categories with the buttons on top of the screen. Also up there is the button to leave Civilopedia and go back to where you were before. = Válaszd ki a kategóriákat a képernyő tetején lévő gombokkal. Szintén ott fent van a gomb, amellyel elhagyhatod a Civilopédiát, és visszatérhetsz oda, ahol korábban voltál.
Each category has a list of entries on the left of the screen, sorted alphabetically (with few exceptions). Clicking an entry will update the center pane were you are currently reading this. = Minden kategóriában a képernyő bal oldalán található a bejegyzések listája, ábécé sorrendben (néhány kivételtől eltekintve). Egy bejegyzésre kattintva frissül a középső ablaktábla, ahol jelenleg ezt olvasod.
Lines can link to other Civilopedia entries, they are marked with a chain link symbol like this one. You can click anywhere on the line to follow the link. = A sorok hivatkozhatnak más Civilopédia-bejegyzésekre is, ezeket egy láncszem-szimbólum jelöli, mint ez is. A hivatkozás követéséhez a sorban bárhová kattinthatsz.
The current category is special - all articles on general concepts are here. It is called 'Tutorials' because you can revisit these here, too. = A jelenlegi kategória speciális - az általános fogalmakról szóló cikkek itt találhatók. Azért hívják „Oktatóanyagnak”, mert ezeket is itt tekintheted meg újra.
What information can I find = Milyen információkat találhatok
The data shown is not dependent on your current game's situation, e.g. bonuses for the nation you are playing or difficulty modifiers will not affect the numbers. = A feltüntetett adatok nem függnek az aktuális játékhelyzettől, például az Ön által játszott nemzet bónuszai vagy nehézségi módosítók nem befolyásolják a számokat.
However, it will reflect the mods you are playing! The combination of base ruleset and extension mods you select define the rules of a game, what objects exist and how they interact, and the Civilopedia mirrors these rules. = Azonban tükrözi a modokat, amikkel játszol! Az alap szabálykészlet és a választott bővítőmodok kombinációja határozza meg a játék szabályait, azt, hogy milyen tárgyak léteznek és hogyan hatnak egymásra, és a Civilopédia ezeket a szabályokat tükrözi.
If you opened the Civilopedia from the main menu, the "Ruleset" will be that of the last game you started. = Ha a főmenüből nyitottad meg a Civilopédiát, a „Szabálykészlet” a legutóbb elindított játékodé lesz.
Letters can select categories, and when there are multiple categories matching the same letter, you can press that repeatedly to cycle between these. = A betűkkel kategóriákat lehet kiválasztani, és ha egy betűhöz több kategória is tartozik, akkor többször is megnyomhatja azt, hogy váltogasson ezek között.
The arrow keys allow navigation as well - left/right for categories, up/down for entries. = A nyílbillentyűkkel is lehet navigálni - balra/jobbra a kategóriákhoz, fel/le a bejegyzésekhez.

UI Tips = Kezelőfelületi tippek
World screen = Világképernyő
Skip all units to end a turn quickly = Minden egység kihagyása a kör gyors befejezéséhez
Right-click or long press the "Next unit" button to open a popup menu which allows to end a turn without having to cycle through all units. If some units are automated, a dedicated button is available to move them before ending the turn. = Kattints jobb gombbal vagy nyomd hosszan a „Következő egység” gombot egy felugró menü megnyitásához, amely lehetővé teszi a kör befejezését anélkül, hogy végig kellene lépkedned az mindegyik egységen. Ha néhány egység önállósítva van, egy külön gomb áll rendelkezésre a mozgatásukra a kör befejezése előtt.
Toggle notification list display = Értesítési lista megjelenítése be/ki
On the World screen, swipe the notification list to the right to temporarily hide it. Click the "Bell" button to display them again. = A világképernyőn húzd el az értesítési listát jobbra az ideiglenes elrejtéséhez. Kattints a „Harang” gombra az újbóli megjelenítésükhöz.
The default state for the notification list can be set in Options > Display > UI - Notifications on world screen. = Az értesítési lista alapértelmezett állapota a Beállítások > Kijelző > Felület - Értesítések a világképernyőn menüpontban adható meg.
Entering a City Screen quickly = Belépés egy városképernyőre gyorsan
You can Right-click or long press a city button on the World screen. The result is the same as tapping it twice - once to select and move the button, again to trigger a reaction: show the City Screen (if the city is yours to inspect), or offer the foreign city info popup. = Kattinthatsz a jobb gombbal vagy hosszan nyomhatsz egy városgombot a Világképernyőn. Az eredmény ugyanaz, mintha kétszer koppintanál rá – egyszer a gomb kijelöléséhez és mozgatásához, másodszor pedig a reakció kiváltásához: megjelenik a Városképernyő (ha a város a tied akkor, a megtekintéshez) vagy felajánlja az idegen város információs felugró ablakát.
Upgrade multiple units of the same type = Azonos típusú egységek tömeges korszerűsítése
On the World screen, select an unit that can be upgraded, then right-click or long press the "Upgrade" button to open a popup menu allowing to upgrade all units of this type at once. = A világképernyőn jelölj ki egy fejleszthető egységet, majd kattints jobb gombbal vagy nyomd hosszan a „Korszerűsítés” gombot egy felugró menü megnyitásához, amely lehetővé teszi az ilyen típusú egységek egyszerre történő korszerűsítését.
In the Units overview, the same upgrade menu is available by clicking the unit icon in the "Upgrade" column. When an unit is upgradeable, the icon is lit if conditions are met (enough gold and/or resources), otherwise it is dimmed. = Az egységek áttekintésében ugyanez a korszerűsítési menü érhető el a „Korszerűsítés” oszlopban található egységikonra kattintva. Ha egy egység fejleszthető, az ikon világít, ha a feltételek teljesülnek (elég arany és/vagy nyersanyag), egyébként elhomályosul.
Additional controls for the construction queue = További vezérlők az építési várólistához
Right-click or long press a construction item to open a popup menu with additional controls, allowing to manage production of the same item in all cities, by issuing the commands from the same City Screen. = Kattints jobb gombbal vagy nyomd hosszan az egyik építési tételt egy további vezérlőket tartalmazó felugró menü megnyitásához, amellyel ugyanannak a tételnek a termelését kezelheted egyszerre mindegyik városban, de a parancsokat ugyanarról a városképernyőről kiadva.
The "Disable" option moves an item to a separated "Disabled" tab, preventing its automatic queueing by the "Auto-assign city production" option. To move a disabled item back to its initial place, enter again the popup menu, and choose "Enable". = A „Letiltással” áthelyezi a tételt egy különálló „Letiltott” lapra, megakadályozva annak automatikus várólistára helyezését a „Városi termelés automatikus kiosztása” beállítással. Egy letiltott tétel eredeti helyére való visszahelyezéséhez lépj be újra a felugró menübe, és válaszd az „Engedélyezés” lehetőséget.
Disabled items are set globally and persistent: they are not reset in a new game, or by restarting Unciv. = A letiltott tételek globálisan vannak beállítva és tartósak: nem törlődnek új játékban vagy az Unciv újraindításával sem.
Show Great Person Points breakdown = Híresember-pontok áttekintésének megjelenítése
In the right sidepanel, click a Great People row to display the details of Great Person Points (GPP) accumulated each turn by the current city, for this type of Great People. = A jobb oldali oldalsávban kattints egy Híres emberek gombra az jelenlegi város által körönként felhalmozott Híresember-pontok (HEP) részleteinek megjelenítéséhez az adott típusú Híres emberekre vonatkozóan.
Click any of the Great People icons to display all GPP accumulated each turn by the current city, for all types of Great People. = Kattints a Híres Emberek bármelyik ikonjára a jelenlegi város által körönként felhalmozott HEP megjelenítéséhez, minden Híres Ember-típusra vonatkozóan.
Tech screen = Technológia-képernyő
Queue multiple technologies in different branches = Több technológia várólistára helyezése különböző ágakon
On the Tech screen, right-click or long press a technology to automatically queue it, even if this tech is in another branch than the item currently researched. Prerequisite techs to research will also be automatically queued. = A technológia-képernyőn kattints jobb gombbal vagy nyomd hosszan az egyik technológiát annak automatikus várólistára helyezéséhez, még akkor is, ha ez a technológia egy másik ágban van, mint a jelenleg kutatott tétel. A kutatáshoz szükséges előfeltétel-technológiák szintén automatikusan várólistára kerülnek.
Right-click or long press multiple techs to append them to the research queue, whatever their branch is. = Kattints jobb gombbal vagy nyomj hosszan több technológiát, hogy hozzáadd őket a kutatási várólistához, függetlenül attól, hogy melyik ágban vannak.
Overview screens = Áttekintő-képernyők
Reveal known resources on world screen = Ismert nyersanyagok felfedése a világképernyőn
In the Resources overview, click on a resource icon to center the world screen on tiles already discovered and providing this resource. = A nyersanyagok áttekintésében kattints egy nyersanyag ikonra, hogy a világképernyőt a már felfedezett és ezt a nyersanyagot biztosító mezőkre központosítsd.
Alternatively, click on the "Unimproved" number to center the world screen only on owned (by you or your allied City-states) tiles where the resource is not improved. = Alternatív megoldásként kattints a „Területfejlesztés nélküli” számra, hogy a világképernyőt csak azokra a tulajdonodban lévő (általad vagy a szövetséges városállamaid által birtokolt) mezőkre központosítsd, ahol nincs nyersanyag-területfejlesztés.
If more than one tile is available, click repeatedly on the notification to cycle through all of them. = Ha egynél több mező áll rendelkezésre, kattints ismételten az értesítésre minden mező végiglapozásához.
Show diagram line colors = Diagramvonalak színeinek megjelenítése
In Politics overview > Show diagram, you can click anywhere inside the diagram to display a table listing all relationship line colors and their meaning. = A Politika áttekintése > Diagram megjelenítése menüpontban a diagramon belül bárhová kattinthatsz egy olyan táblázat megjelenítéséhez, amely felsorolja a kapcsolatvonalak minden színét és azok jelentését.
Reading "Toast" popups = Felugró üzenetek olvasása
"Toasts" can be clicked to make them stay on the screen for easier reading. = A felugró üzenetekre rá lehet kattintani, hogy a képernyőn maradjanak a könnyebb olvashatóság érdekében.
Click it again to close (or use the close button). = Kattints rá újra a bezárásához (vagy használd a bezárás gombot).
Miscellaneous = Egyebek
External links = Külső hivatkozások
External links support right-click or long press to copy the link to the clipboard instead of launching the browser. = A külső hivatkozások támogatják a jobb gombbal történő kattintást vagy a hosszú megnyomást, hogy a böngésző elindítása helyett a hivatkozást a vágólapra másold.
Example: The 'Open Github page' button on the Mod management screen. = Például: A „GitHub-oldal megnyitása” gomb a Modkezelési képernyőn.
View change log = Változáslista megtekintése
After updating, you might want to see what has changed. The "About" in "Options" has the version number linked to the change log. You can also see that info by clicking the version number on the main menu. = Frissítés után érdemes lehet megnézni, mi változott. A „Beállítások” „Névjegy” részében a verziószám a változásnaplóhoz van linkelve. Ezt az információt a főmenüben a verziószámra kattintva is megtekintheted.

Differences from Civilization V = Különbségek a Civilization V-höz képest
Production Focus\nIn Civilization V, the Food yield in a city is calculated first, then population grows by consuming stored food (growth), then production is calculated, and so on one by one the other stats are calculated. Thus, citizens can produce yields in the same turn as they are born. The city focus is set to Production to assign the newborn citizen to a hill so they'll contribute Production, and then manually reassigned to a growth tile on the next turn. Alternatively, you can set city focus to Gold (e.g. with Cerro de Potosi), Faith (e.g. with Mount Sinai) or whatever gains the most yields. In Unciv, citizens only start producing yields on the next turn, so you can ignore this whole concept. = Termelési fókusz\nA Civilization V-ben először a város élelemhozamát számítja ki a játék, majd a lakosság növekszik a tárolt élelem elfogyasztásával (növekedés), ezután a termelést számítja ki, és így tovább, egymás után a többi statisztikát. Így a polgárok már a születésük körében is képesek hozamot termelni. A város fókuszát Termelésre állítják, hogy az újszülött polgárt egy dombra rendeljék, így hozzájárulva a termeléshez, majd a következő körben kézzel átcsoportosíthatók egy növekedési mezőre. Alternatív megoldásként beállíthatod a város fókuszát Aranyra (pl. a Cerro de Potosival), Hitre (pl. a Sínai-heggyel) vagy bármire, ami a legtöbb hozamot hozza. Az Uncivben a lakosok csak a következő körben kezdenek el hozamot termelni, így ezt az egész koncepciót figyelmen kívül hagyhatod.
Science Queueing\nIn Civilization V, Science yield is calculated after production, so if you finish an item and have Science (or Gold) queued as a perpetual construction, the Production overflow from item will be converted into Science (or Gold), but the Production is not consumed, as this will only happen again on the next turn. By immediately swapping out your perpetual construction for an item on the next turn, you'll get this Science (or Gold) for free. This doesn't apply to Unciv, so don't bother. = Tudomány várólistára helyezése\nA Civilization V-ben a tudományhozam kiszámítása a termelés után történik, így ha befejezel egy tételt, és a Tudomány (vagy Arany) örökös építésként van várólistára helyezve, a tételből származó termelési többlet Tudománnyá (vagy Arannyá) alakul át, de a termelés nem használódik fel, mivel ez csak a következő körben fog újra megtörténni. Ha a következő körben azonnal lecseréled az örökös építésedet egy tételre, ezt a Tudományt (vagy Aranyat) ajándék kapsz meg. Ez nem vonatkozik az Uncivre, úgyhogy ne törődj vele.
Double Aqueducts\nIn Civilization V, the game sells existing copies of the building for you before providing a free copy of the building. So, if you build an aqueduct in a city, and then in the turn of adopting Tradition Complete you sell a cheap building (e.g a shrine) beforehand, the game is unable to sell more than 1 building per turn, and thus you'll keep your aqueduct, together with the new free aqueduct. Not applicable to Unciv. = Dupla vízvezetékek\nA Civilization V-ben a játék eladja neked az épület meglévő példányait, mielőtt biztosítaná az épület egy ajándék példányát. Tehát, ha építesz egy vízvezetéket egy városban, majd a teljes tradíció elfogadásának körében előtte eladsz egy olcsó épületet (pl. egy szentélyt), a játék körönként legfeljebb 1 épületet tud eladni, és így megtartod a vízvezetékedet az új ajándék vízvezetékkel együtt. Az Uncivre ez nem vonatkozik.
Legalism Oxford\nIn Civilization V, national wonders such as Oxford University are considered culture buildings, so you can get them for free with Legalism. Not applicable to Unciv. = Legalizmus Oxford\nA Civilization V-ben a nemzeti csodák, mint például az Oxfordi Egyetem, kulturális épületnek számítanak, így a Legalizmussal megszerezheted őket ajándékba. Az Uncivre ez nem vonatkozik.
Roads and Forts\nIn Civilization V, you can't use roads and forts in enemy territory. In Unciv, you can use them, so instead of mindlessly constructing them everywhere when at war, you need to decide if and when they'll benefit you more than your opponents. = Utak és erődök\nA Civilization V-ben nem használhatod az utakat és erődöket az ellenséges területen. Az Uncivben használhatod őket, így ahelyett, hogy háború esetén ész nélkül építenéd őket mindenhol, el kell döntened, hogy mikor és mikor válnak inkább a te hasznodra, mint az ellenfeleidére.
Citizen Conversion\nIn Civilization V, a citizen is born religious if the parent city is already converted. This is not the case in Unciv, which can lead to temporary deconversion of a city when it grows. = Polgárok áttérése\nA Civilization V-ben a polgár már vallásosnak születik, ha a szülőváros már át van térítve. Az Uncivben ez nincs így, ami a város növekedésekor annak ideiglenes vallásvesztéséhez vezethet.
Unassigned Citizens\nIn Civilization V, unassigned citizens are considered specialists, and subject to the same type of bonuses (e.g. Korea's ability). It can be worthwhile to leave citizens unassigned, instead of being assigned to a tile. Not applicable to Unciv. = Tétlen polgárok\nA Civilization V-ben a tétlen polgárok szakértőnek számítanak, és ugyanolyan típusú bónuszok vonatkoznak rájuk (pl. Korea képessége). Érdemes lehet a polgárokat tétlenül hagyni ahelyett, hogy egy mezőhöz rendelnéd őket. Az Uncivre nem vonatkozik.
Settler Construction\nIn Civilization V, cities can't starve when constructing settlers, so you can assign all citizens to production tiles and none to food tiles. In Unciv, citizens keep consuming two food per turn. = Telepes kiképzése\nA Civilization V-ben a városok nem éhezhetnek telepesek építése közben, így mindegyik polgárt beoszthatod termelési mezőkre, és egyet sem élelmezési mezőkre. Az Uncivben a polgárok továbbra is kötelezően két élelmet fogyasztanak körönként.
Water Melee Attack\nAs result of a Discord poll, Water Melee units can attack military land units on the shore, unlike in Civilization V. = Vízi közelharci támadás\nEgy Discord-szavazás eredményeként a vízi közelharci egységek megtámadhatják a parton lévő katonai szárazföldi egységeket, ellentétben a Civilization V-tel.
Tile improvements\nIn Civilzation V, workers start working on an improvement-under-construction at the beginning of movement. Unciv changes this, to allow players to assign workers to tiles, and then reconsider and change improvement or move them elsewhere. = Mező-továbbfejlesztések\nA Civilization V-ben a munkások a mozgás elején kezdenek el dolgozni egy építés alatt álló továbbfejlesztésen. Az Unciv ezen változtat, hogy a játékosok munkásokat rendelhessenek a mezőkhöz, majd újragondolhassák és megváltoztathassák a továbbfejlesztést, vagy máshová mozgathassák őket.
Forest and Jungle Visibility\nIn Unciv, forests and jungles are visible 1 tile outside visibility range. In Civilization V, this is the behaviour of hills and mountains, but not of forests and jungles, yet jungle and forest can block hills, and hill + forest can block mountain, indicating they're on the same elevation. This is considered to be a bug in the otherwise well-structured visibility logic in Civilization V. = Erdők és dzsungelek láthatósága\nAz Uncivben az erdők és dzsungelek 1 mezővel a látótávolságon kívül is láthatóak. A Civilization V-ben ez a dombokra és hegyekre jellemző, de az erdőkre és dzsungelekre nem, mégis a dzsungel és az erdő blokkolhatja a dombokat, a domb + erdő pedig a hegyeket, ami azt jelzi, hogy azonos magasságban vannak. Ez hibának számít a Civilization V egyébként jól felépített láthatósági logikájában.
City razing\nIn Civilization V, the player can never raze any of the cities he/she founded. Not applicable to Unciv. = Városok lerombolása\nA Civilization V-ben a játékos soha nem rombolhatja le az általa alapított városokat. Az Uncivre ez nem vonatkozik.

Founding Cities\nThe Settler is a unit that can found a new city. You can build a Settler unit in a city with at least 2 population, and then move them to a good location to found a new city. This will usually be your main way of acquiring more cities. = Városok alapítása\nA telepes egy olyan egység, amellyel új várost lehet alapítani. Telepes egységet olyan városban építhetsz, amelynek lakossága legalább 2, majd elmozgathatod őket egy jó helyre egy új város alapításához. Általában ez lesz a fő módja a további városok megszerzésének.
Food conversion to Production\nDuring the construction of a Settler, the city will not grow. Instead, the 1st, 2nd, 4th, and from there on every 4th, excess Food (Growth) is converted into Production, with the rest of the excess Food being lost. = Élelem átalakítása termeléssé\nA telepes kiképzésekor a város nem fog növekedni. Ehelyett az 1., 2., 4., és onnantól kezdve minden 4. többlet élelem (növekedés) termeléssé alakul át, míg a többi többlet élelem elvész.

