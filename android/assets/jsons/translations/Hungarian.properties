Pacal = Pakal
A sacrifice unlike all others must be made! = Minden eddiginél nagyobb áldozatot kell hozni!
Muahahahahahaha! = Muahahahahahaha!
Today comes a great searing pain. With you comes the path to the black storm. = Ma egy hatalmas, égető fájdalom érkezik. Veled jön el a fekete viharhoz vezető út.
Greetings, wayward one. I am known as Pacal. = Üdvözöllek, tévelygő lélek. Engem Pakal néven ismernek.
Friend, I believe I may have found a way to save us all! Look, look and accept my offering! = Barátom, azt hiszem, megtaláltam a módját, hogy mindannyiunkat megmentselek! Nézd, nézd meg és fogadd el az ajánlatomat!
A fine day, it helps you. = Ez egy szép nap, a segítségedre van.
The Long Count = A hosszú számítás
Kneel before King Pacal the Great, son of the gods and protector of the Palenque domain! After your kingdom has been harassed for years by neighboring rivals, you struck back at the enemies of your people, defeating each of them and sacrificing their leaders as a retribution to the insults made to your ancestors. Your wisdom and hard will not only restored the glory of Palenque, but turned it into a magnificient city, as your people built the greatest monuments and architecture the world has ever known. = Térdelj le a nagy Pakal király, az Istenek fia és a Palenque domínium védelmezője előtt! Miután királyságodat éveken át zaklatták a szomszédos riválisok, visszacsaptál néped ellenségeire, legyőzve mindegyiküket, és feláldozva vezetőiket az őseidnek okozott sérelmek megtorlásaként. Bölcsességed és kemény akaratod nemcsak visszaállította Palenque dicsőségét, hanem pompás várossá is tette azt, miközben néped felépítette a világ valaha ismert legnagyobb műemlékeit és építészeti csodáit.
Absolute King, your people need you to save the great Mayan culture and knowledge. Will you be able to read the movement of the stars, and find in the heavens the power to repel any foes? Will your new empire shine through the ages of history? = Abszolút Király, népednek szüksége van rád, hogy megmentsd a nagyszerű maja kultúrát és tudást. Képes leszel-e olvasni a csillagok mozgásából, és megtalálni az égboltban az erőt, hogy visszaverj minden ellenséget? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
