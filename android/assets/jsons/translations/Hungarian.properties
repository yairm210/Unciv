Perhaps now we will find peace in death... = Talán most megleljük a békét a halálban…
Lhasa = Lhásza

You fiend! History shall remember this! = Te ördög! A történelem emlékezni fog erre!
Milan = Milánó

Monaco = Monaco

I have failed. May you, at least, know compassion towards our people. = Elbuktam. Legalább a népünk iránti együttérzés legyen meg benned.
Cape Town = Fokváros

How barbaric. Those who live by the sword shall perish by the sword. = Milyen barbár. Kard által vész el, ki kardot fog.
Genoa = Genova

The day of judgement has come to us. But rest assured, the same will go for you! = Eljött számunkra az ítélet napja. De megnyugodhatsz, rád is ez vár majd!
Helsinki = Helsinki

Ah, Gods! Why have you forsaken us? = Ó, Istenek! Miért hagytatok el minket?
