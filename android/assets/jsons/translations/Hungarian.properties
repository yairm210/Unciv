Dido = Dido
Tell me, do you all know how numerous my armies, elephants and the gdadons are? No? Today, you shall find out! = Mondd csak, tudod egyáltalán, hogy mekkora seregeim vannak, hány elefántom és a gdadonom? Nem? Ma majd megtudod!
Fate is against you. You earned the animosity of Carthage in your exploration. Your days are numbered. = A sors ellened van. Felfedezéseiddel kivívtad Karthágó ellenszenvét. A napjaid meg vannak számlálva.
The fates became to hate me. This is it? You wouldn't destroy us so without their help. = A sors meggyűlölt engem. Ennyi lenne? Az ő segítségük nélkül nem tudtatok volna így elpusztítani minket.
You aren't meeting my expectations. You can do so much better. = Nem felelsz meg az elvárásaimnak. Sokkal jobban is teljesíthetnél.
The Phoenicians welcome you to this most pleasant kingdom. I am Dido, the queen of Carthage and all that belongs to it. = A föníciaiak üdvözölnek ebben a felettébb kellemes királyságban. Dídó vagyok, Karthágó királynője és mindene, ami hozzá tartozik.
I just had the marvelous idea, and I think you'll appreciate it too. = Épp most támadt egy csodás ötletem, és szerintem te is értékelni fogod.
What is it now? = Mi az már megint?
Phoenician Heritage = Föníciai örökség
Greetings to you, revered Queen Dido, ruler of the legendary kingdom of Carthage. The great poet Virgil related your great history, how your husband Acerbas was murdered by your own brother, King Pygmalion of Tyre, to steal the treasures of your family that were rightfully yours. But you endured his pressure until you and your compatriots decided to flee and sail for new lands. The gods led you to the shores of North Africa, and with cunning diplomacy, you expanded the territory of your new home, and laid the basis for the future kingdom of Carthage. = Üdvözlet neked, tisztelt Dídó királynő, a legendás Karthágó uralkodója. A nagy költő, Vergilius mesélte el nagyszerű történetedet, hogy miként gyilkolta meg férjedet, Acerbast a saját fivéred, Pügmalión, Türosz királya, hogy ellopja a családod kincseit, amelyek jogosan téged illettek. De te elviselted a nyomását, míg végül honfitársaidat magad mellé állítva úgy döntöttél, hogy elmenekülsz és új földek felé hajózol. Az Istenek Észak-Afrika partjaira vezéreltek, és dörzsölt diplomáciával kiterjesztetted új otthonod területét, lefektetve a későbbi Karthágói Királyság alapjait.
Clever and proud Dido, the storm is coming and your people look for a shelter under your wise and powerful protection. Can you create a new and radiant Carthage able to cleave the darkness? Will your new empire shine through the ages of history? = Okos és büszke Dídó, közeleg a vihar, és néped menedéket keres bölcs és hatalmas védelmed alatt. Képes vagy-e egy új és sugárzó Karthágót teremteni, amely képes áthasítani a sötétséget? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
