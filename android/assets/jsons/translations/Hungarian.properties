You are in the presence of Attila, scourge of Rome. Do not let hubris be your downfall as well. = Attila, Isten ostorának színe előtt állsz. Ne hagyd, hogy a gőg okozza a te vesztedet is.
This is better than you deserve, but let it not be said that I am an unfair man. = Ez jobb, mint amit megérdemelsz, de senki sem mondhatja, hogy igazságtalan ember lennék.
Good day to you. = Szép napot neked.
Scourge of God = Isten ostora
Great Attila, mighty warrior and leader of the Hunnic empire, your men bow down before you. During the 5th century, you and your brother Bleda have conquered many lands, forged a mighty empire and commanded the most powerful and frightening force of antiquity. You inspired fear to the Roman Emperors themselves, who called you 'Flagellum Dei', the 'Scourge of God', as you took kingdom after kingdom in the Balkans, invaded Eastern Roman Empire, into Gaul and Northern Italy, and planned to conquer Rome itself. Your empire didn't survive long after your death, but your name and your legend have, for millenia to come. = Attila, Hun Birodalom hatalmas harcosa és vezére, embereid meghajolnak előtted. Az 5. században fivéreddel, Budával sok földet hódítottatok meg, hatalmas birodalmat kovácsoltatok, és az ókor leghatalmasabb és legfélelmetesebb haderejének parancsoltatok. Rettegésben tartottátok magukat a római császárokat is, akik „Flagellum Dei”-nek, azaz „Isten ostorának” neveztek, miközben királyságot királyság után vettél be a Balkánon, bejártad a Keletrómai Birodalmat, benyomultál Galliába és Észak-Itáliába, és magának Rómának a meghódítását tervezted. Birodalmad nem élt sokáig a halálod után, de neved és legendád évezredeken át fennmarad.
Fearsome General, your mighty hordes are at your command, waiting to crush your foes once again and to conquer all the riches the world has to offer! Will your new empire shine through the ages of history? = Félelmetes hadvezér, hatalmas hordáid csak a parancsodra várnak, készen állva arra, hogy újra eltiporják ellenségeidet, és meghódítsák a világ minden gazdagságát! Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
