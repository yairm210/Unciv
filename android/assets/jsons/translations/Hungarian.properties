Suleiman I = I. Szulejmán
Your continued insolence and failure to recognize our preeminence leads us to war. = A folyamatos pimaszságod és az, hogy nem ismered el az elsőbbségünket, háborúhoz vezet.
Good. The world shall witness the incontestable might of my armies and the glory of the Empire. = Helyes. A világ tanúja lesz a seregeim vitathatatlan erejének és a birodalom dicsőségének.
Ruin! Ruin! Istanbul becomes Iram of the Pillars, remembered only by the melancholy poets. = Pusztulás! Pusztulás! Isztambul az oszlopos Irammá válik, amire már csak a melankolikus költők emlékeznek.
From the magnificence of Topkapi, the Ottoman nation greets you, stranger! I'm Suleiman, Kayser-I Rum, and I bestow upon you my welcome! = A Topkapi pompájából köszönt téged az oszmán nemzet, idegen! Szulejmán vagyok, Kayser-i Rum, és üdvözöllek téged!
Let us do business! Would you be interested? = Üzleteljünk! Érdekelne, amit kínálok?
Barbary Corsairs = Berber kalózok
O Great Sultan Suleiman, may the God bless you! You are revered for your power, wealth and generosity, and you truly deserves to be called the 'Magnificent'! The Ottoman Empire was born in Bithynia, starting as a small country in Eastern Anatolia in 12th century, then expanded to west into Anatolia. Over the next century, your people vanquished the empire of Byzantium, annexing Turkey and the Balkans, and smartly assimilating all wonders and knowledge of the Byzantine civilization. In the mid 15th century, the Ottomans added Constantinople to their empire, establishing a strategic link between Europe and the Middle East. The Empire would continue to expand for centuries reaching North Africa, Middle East and Eastern Europe at its height, but brutally disappeared in the chaos of the first world war, in early 20th century. = Ó, Nagy Szulejmán szultán, Isten áldjon téged! Tisztelnek az erődért, gazdagságodért és nagylelkűségedért, és valóban megérdemled, hogy „Nagynak” nevezzenek! Az Oszmán Birodalom Bitíniában született, a 12. században egy kis kelet-anatóliai országként indult, majd nyugat felé, Anatóliába terjeszkedett. A következő évszázadban néped legyőzte a Bizánci Birodalmat, annektálta Törökországot és a Balkánt, és okosan magába olvasztotta a bizánci civilizáció minden csodáját és tudását. A 15. század közepén az oszmánok Konstantinápolyt is a birodalmukhoz csatolták, stratégiai kapcsolatot teremtve Európa és a Közel-Kelet között. A Birodalom évszázadokon át terjeszkedett tovább, fénykorában elérte Észak-Afrikát, a Közel-Keletet és Kelet-Európát, de az első világháború káoszában, a 20. század elején brutálisan összeomlott.
Mighty Caliph, your people ask you to build again the Empire, to the level of power and glory it once achieved, and beyond! Will you revive the Ottoman golden age? Will your new empire shine through the ages of history? = Hatalmas kalifa, a néped arra kér, hogy építsd fel újra a Birodalmat arra a hatalmas és dicsőséges szintre, amelyet egykor elért, sőt még azon is túl! Feltámasztod az oszmán aranykort? Új birodalmad csillaga vajon mindörökké ragyogni fog a történelem egén?
