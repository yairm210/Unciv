'Any man who can drive safely while kissing a pretty girl is simply not giving the kiss the attention it deserves.' - Albert Einstein = „Bármelyik férfi, aki biztonságosan tud vezetni, miközben csókolózik egy csinos lánnyal, egyszerűen nem adja meg a csóknak a kellő figyelmet.” - Albert Einstein
