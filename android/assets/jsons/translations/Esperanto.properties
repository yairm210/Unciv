Darius I = Dario la 1-a
Your continue existence is an embarrassment to all leaders everywhere! You must be destroyed! = Via daŭra ekzisto estas hontindaĵo por ĉiuj regantoj ĉie! Vi devas esti detruita!
Curse you! You are beneath me, son of a donkey driver! I will crush you! = Malbenon al vi! Vi estas sub mi, filo de azenpelisto! Mi dispremos vin!
You mongrel! Cursed be you! The world will long lament your heinous crime! = Vi bastardo! Estu malbenita! La mondo longe priploros vian abomenan krimon!
Peace be on you! I am Darius, the great and outstanding king of kings of great Persia... but I suppose you knew that. = Paco estu sur vi! Mi estas Dario, la granda kaj elstara reĝo de reĝoj de granda Persujo... sed mi supozas, ke vi jam sciis tion.
In my endless magnanimity, I am making you this offer. You agree, of course? = En mia senfina grandanimeco, mi faras al vi ĉi tiun proponon. Vi konsentas, kompreneble?
Good day to you! = Bonan tagon al vi!
Ahh... you... = Aĥ... vi...
Achaemenid Legacy = Aĥemenida Heredaĵo
Great King Darius of Persia, the heaven casts its light upon you! Persian people are strong and wise, as their leader. In old ages, the great Persian king Cyrus fought back the mighty Median empire and finally destroyed the Medes in 550 BC. Cunning diplomacy and military achievements helped then to conquer the wealthy Lydia and the powerful Babylon, Cyrus' son conquering the eternal Egypt some years later. At the height of its power, the Persian Empire reached the shores of Macedonia, at the very door of the upstart Greek city-states. Persia would have prospered for centuries if Alexander of Macedon hadn't brutally destroyed the great empire in one violent strike. = Granda Reĝo Dario de Persujo, la ĉielo ĵetas sian lumon sur vin! La persa popolo estas forta kaj saĝa, kiel ĝia gvidanto. En malnovaj epokoj, la granda persa reĝo Ciro repuŝis la potencan Median imperion kaj fine detruis la Medojn en 550 a.K. Ruza diplomatio kaj militaj atingoj poste helpis konkeri la riĉan Lidion kaj la potencan Babilonon, dum la filo de Ciro konkeris eternan Egiption kelkajn jarojn poste. Ĉe la pinto de sia potenco, la Persa Imperio atingis la bordojn de Makedonio, ĉe la sojlo mem de la leviĝantaj grekaj urboŝtatoj. Persujo prosperus dum jarcentoj, se Aleksandro de Makedonio ne brutale detruus la grandan imperion per unu perforta frapo.
King Darius, the people of Persia await, longing for its past glory and power! Persia of the Immortals must reborn, to punish its foes and rebuild the gleaming Persepolis! Will your new empire shine through the ages of history? = Reĝo Dario, la popolo de Persujo atendas, sopirante al sia pasinta gloro kaj potenco! Persujo de la Senmortuloj devas renaskiĝi, por puni siajn malamikojn kaj rekonstrui la brilantan Persepolon! Ĉu via nova imperio brilos tra la epokoj de historio?
Persepolis = Persepolo
