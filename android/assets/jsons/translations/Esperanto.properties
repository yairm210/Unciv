#################### Lines from Events from Civ V - Gods & Kings ####################

Tutorial Task: [Move unit] = Lernila tasko: [Move unit]
Move a unit! = Movu unuon!
Click on a unit → Click on a destination → Click the arrow popup. = Alklaku unuon → Alklaku celon → Alklaku la sagan ŝprucfenestron.

Found a city! = Fondu urbon!
Select the Settler → Click on 'Found city'. = Elektu la Setlanton → Alklaku 'Fondi urbon'.

Enter the city screen! = Eniru la urban ekranon!
Click the city button twice. = Alklaku la urbobutonon dufoje.

Pick a technology to research! = Elektu teknologion por esplori!
Click on the tech button → Select technology → Click 'Research' (bottom right). = Alklaku la teknologibutonon → Elektu teknologion → Alklaku 'Esplori' (malsupre dekstre).

Pick a construction! = Elektu konstruotaĵon!
Enter city screen → Click on a unit or building → Click 'add to queue'. = Eniru la urban ekranon → Alklaku unuon aŭ konstruaĵon → Alklaku 'Aldoni al la vico'.

Pass a turn! = Pasigu vicon!
Cycle through units with 'Next unit' → Click 'Next turn'. = Ciklu tra unuoj per 'Sekva unuo' → Alklaku 'Sekva vico'.

Reassign worked tiles! = Reasignu laboratajn kahelojn!
Enter city screen → Click the assigned tile to unassign → Click an unassigned tile to assign population. = Eniru la urban ekranon → Alklaku la asignitan kahelon por malasigni → Alklaku neasignitan kahelon por asigni loĝantaron.

Got it = Komprenite
Meet another civilization! = Renkontu alian civilizacion!
Explore the map until you encounter another civilization! = Esploru la mapon ĝis vi renkontos alian civilizacion!

Open the options dialog! = Malfermu la agordodialogon!
Click the menu button (top left) → Click 'Options'. = Alklaku la menubutonon (supre maldekstre) → Alklaku 'Agordoj'.

Construct an improvement! = Konstruu plibonigon!
Construct a Worker unit → Move it to a Plains or Grassland tile → Click 'Construct improvement' → Choose the farm → Leave the worker there until it's finished. = Konstruu Laboristan unuon → Movu ĝin al Ebenaĵa aŭ Herbeja kahelo → Alklaku 'Konstrui plibonigon' → Elektu la bienon → Lasu la laboriston tie ĝis ĝi finiĝos.

Create a trade route! = Kreu komercan vojon!
Construct roads between your capital and another city. Or, automate your worker and let him get to that eventually. = Konstruu vojojn inter via ĉefurbo kaj alia urbo. Aŭ aŭtomatigu vian laboriston kaj lasu lin fine fari tion.

Conquer a city! = Konkeru urbon!
Bring an enemy city down to low health → Enter the city with a melee unit. = Malaltigu malamikan urbon ĝis malalta sano → Eniru la urbon per proksimbatala unuo.

Move an air unit! = Movu aeran unuon!
Select an air unit → Select another city within range → Move the unit to the other city. = Elektu aeran unuon → Elektu alian urbon ene de atingo → Movu la unuon al la alia urbo.

See your stats breakdown! = Vidu detaligon de viaj statistikoj!
Enter the Overview screen (top right corner) → Click on 'Stats'. = Eniru la Superrigardan ekranon (supra dekstra angulo) → Alklaku 'Statistikoj'.


