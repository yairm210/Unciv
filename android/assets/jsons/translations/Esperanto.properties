Kamehameha I = Kamehameha la 1-a
The ancient fire flashing across the sky is what proclaimed that this day would come, though I had foolishly hoped for a different outcome. = La antikva fajro fulmanta trans la ĉielo proklamis, ke ĉi tiu tago venos, kvankam mi malsaĝe esperis alian rezulton.
It is obvious now that I misjudged you and your true intentions. = Nun estas evidente, ke mi mise juĝis vin kaj viajn verajn intencojn.
The hard-shelled crab yields, and the lion lies down to sleep. Kanaloa comes for me now. = La durŝela krabo cedas, kaj la leono kuŝiĝas por dormi. Kanaloa venas por mi nun.
The ocean's tide may rise and fall, but my resolve stands steady. = La tajdo de la oceano povas leviĝi kaj fali, sed mia decidemo restas firma.
Aloha! Greetings and blessings upon you, friend. I am Kamehameha, Great King of this strand of islands. = Aloha! Salutojn kaj benojn al vi, amiko. Mi estas Kamehameha, Granda Reĝo de ĉi tiu insularo.
Come, let our people feast together! = Venu, ni lasu niajn popolojn festeni kune!
Welcome, friend! = Bonvenon, amiko!
Wayfinding = Vojtrovado
Aloha to Kamehameha the Great, who the heavens allowed to unite your people! O great King, under your reign, the Big Island of Hawai'i became one in 1791 AD, and many other islands joined your vision of union in 1810. As the first King of Hawai'i, law and taxation systems were stabilized, and you promoted the Kanawai Mamalahoe, an edict to protect civilian people in times of war. Unification and sovereignty of all the islands continued thanks to your fair laws and deeds, even after you joined your ancestors in paradise in 1819. = Aloha al Kamehameha la Granda, al kiu la ĉieloj permesis unuigi vian popolon! Ho granda Reĝo, sub via regado la Granda Insulo de Havajo unuiĝis en 1791 p.K., kaj multaj aliaj insuloj aliĝis al via vizio de unuiĝo en 1810. Kiel la unua Reĝo de Havajo, leĝaj kaj impostaj sistemoj estis stabiligitaj, kaj vi antaŭenigis la Kanawai Mamalahoe, edikton por protekti civilulojn dum milito. La unuiĝo kaj suvereneco de ĉiuj insuloj daŭris danke al viaj justaj leĝoj kaj agoj, eĉ post kiam vi aliĝis al viaj prapatroj en paradizo en 1819.
Wise and benevolent King, will you unite your people once again by wearing the bright mantle of the Lion of the Pacific? Will your new empire shine through the ages of history? = Saĝa kaj bonvolema Reĝo, ĉu vi denove unuigos vian popolon portante la brilan mantelon de la Leono de Pacifiko? Ĉu via nova imperio brilos tra la epokoj de historio?
