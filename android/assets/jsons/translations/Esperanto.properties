The day of judgement has come to us. But rest assured, the same will go for you! = La tago de juĝo venis al ni. Sed estu certa, la sama okazos al vi!
Helsinki = Helsinko

Ah, Gods! Why have you forsaken us? = Ho, Dioj! Kial vi forlasis nin?
