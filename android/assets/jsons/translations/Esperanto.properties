Hiawatha = Hiawatha
You are a plague upon Mother Earth! Prepare for battle! = Vi estas plago sur Patrino Tero! Preparu vin por batalo!
You evil creature! My braves will slaughter you! = Vi malbona estaĵo! Miaj bravuloj buĉos vin!
You have defeated us... but our spirits will never be vanquished! We shall return! = Vi venkis nin... sed niaj spiritoj neniam estos venkitaj! Ni revenos!
Words alone cannot shake the roots of peace I have planted among my people. = Nur vortoj ne povas skui la radikojn de paco, kiujn mi plantis inter mia popolo.
Greetings, stranger. I am Hiawatha, speaker for the Iroquois. We seek peace with all, but we do not shrink from war. = Saluton, fremdulo. Mi estas Hiawatha, parolanto por la Irokezoj. Ni serĉas pacon kun ĉiuj, sed ni ne retiriĝas antaŭ milito.
Does this trade work for you, my friend? = Ĉu ĉi tiu komerco taŭgas por vi, mia amiko?
The Great Warpath = La Granda Militvojo
Greetings, noble Hiawatha, leader of the mighty Iroquois nations! Your people lived near the great and holy lake Ontario since the ancient ages, on a land that will be later known as New York city. Long ago, the five peoples of Seneca, Onondaga, Mohawks, Cayugas and Oneida became one nation, the Haudenosaunee, the Iroquois. Although not having a written language, the wise Iroquois created the Great Law of Peace, which can be considered the first established constitution. For decades, your people fought powerful enemies, such as the Huron, and then the French and English colonists. With less warriors and inferior weaponry, the Iroquois still survived and walk on the path of peace and harmony, until their way of living faded away under the crush of the newborn United States nation. = Saluton, nobla Hiawatha, gvidanto de la potencaj irokezaj nacioj! Via popolo loĝis apud la granda kaj sankta lago Ontario ekde antikvaj epokoj, sur tero, kiu poste estos konata kiel la urbo Novjorko. Antaŭ longe, la kvin popoloj de Seneko, Onondaga, Mohokoj, Kajugoj kaj Oneida fariĝis unu nacio, la Haudenosaunee, la Irokezoj. Kvankam ili ne havis skriban lingvon, la saĝaj Irokezoj kreis la Grandan Leĝon de Paco, kiu povas esti konsiderata la unua establita konstitucio. Dum jardekoj via popolo batalis kontraŭ potencaj malamikoj, kiel la Huronoj, kaj poste kontraŭ francaj kaj anglaj kolonianoj. Kun malpli da militistoj kaj malsuperaj armiloj, la Irokezoj tamen pluvivis kaj marŝis sur la vojo de paco kaj harmonio, ĝis ilia vivmaniero forvelkis sub la premo de la ĵusnaskita usona nacio.
Great Sachem Hiawatha, do you hear the complaints of your people? Can you light the path leading to the ancient Iroquois union? Will your new empire shine through the ages of history? = Granda Saĥemo Hiawatha, ĉu vi aŭdas la plendojn de via popolo? Ĉu vi povas lumigi la vojon kondukantan al la antikva irokeza unuiĝo? Ĉu via nova imperio brilos tra la epokoj de historio?
