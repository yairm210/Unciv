Pacal = Pacal
A sacrifice unlike all others must be made! = Ofero malsimila al ĉiuj aliaj devas esti farita!
Muahahahahahaha! = Muahahahahahaha!
Today comes a great searing pain. With you comes the path to the black storm. = Hodiaŭ venas granda bruliga doloro. Kun vi venas la vojo al la nigra ŝtormo.
Greetings, wayward one. I am known as Pacal. = Salutojn, devojiĝinto. Mi estas konata kiel Pacal.
Friend, I believe I may have found a way to save us all! Look, look and accept my offering! = Amiko, mi kredas, ke mi eble trovis manieron savi nin ĉiujn! Rigardu, rigardu kaj akceptu mian oferon!
A fine day, it helps you. = Bona tago, ĝi helpas vin.
The Long Count = La Longa Kalkulo
Kneel before King Pacal the Great, son of the gods and protector of the Palenque domain! After your kingdom has been harassed for years by neighboring rivals, you struck back at the enemies of your people, defeating each of them and sacrificing their leaders as a retribution to the insults made to your ancestors. Your wisdom and hard will not only restored the glory of Palenque, but turned it into a magnificient city, as your people built the greatest monuments and architecture the world has ever known. = Genuiĝu antaŭ Reĝo Pacal la Granda, filo de la dioj kaj protektanto de la regno Palenque! Post kiam via regno estis ĉikanata dum jaroj de najbaraj rivaloj, vi rebatis kontraŭ la malamikoj de via popolo, venkante ĉiun el ili kaj oferante iliajn gvidantojn kiel repagon por la insultoj faritaj al viaj prapatroj. Via saĝo kaj fera volo ne nur restarigis la gloron de Palenque, sed transformis ĝin en grandiozan urbon, dum via popolo konstruis la plej grandajn monumentojn kaj arkitekturaĵojn, kiujn la mondo iam konis.
Absolute King, your people need you to save the great Mayan culture and knowledge. Will you be able to read the movement of the stars, and find in the heavens the power to repel any foes? Will your new empire shine through the ages of history? = Absoluta Reĝo, via popolo bezonas vin por savi la grandan majaan kulturon kaj scion. Ĉu vi povos legi la movadon de la steloj kaj trovi en la ĉieloj la potencon repeli ĉiajn malamikojn? Ĉu via nova imperio brilos tra la epokoj de historio?
