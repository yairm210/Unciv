Gustavus Adolphus = Gustavo Adolfo
The Hakkapeliittas will ride again and your men will fall just at the sight of my cavalry! God with us! = La Hakkapeliitoj denove rajdos, kaj viaj viroj falos jam ĉe la vido de mia kavalerio! Dio kun ni!
Ha ha ha, captain Gars will be very glad to head out to war again. = Ha ha ha, kapitano Gars tre ĝojos denove eliri al milito.
I am Sweden's king. You can take my lands, my people, my kingdom, but you will never reach the House of Vasa. = Mi estas la reĝo de Svedio. Vi povas preni miajn landojn, mian popolon, mian regnon, sed vi neniam atingos la Domon de Vasa.
You actually seem sharper than what I had originally thought. = Vi efektive ŝajnas pli akra ol mi origine pensis.
Stranger, welcome to the Snow King's kingdom! I am Gustavus Adolphus, member of the esteemed House of Vasa = Fremdulo, bonvenon al la regno de la Neĝa Reĝo! Mi estas Gustavo Adolfo, membro de la estimata Domo de Vasa
My friend, it is my belief that this settlement can benefit both our peoples. = Mia amiko, mi kredas, ke ĉi tiu aranĝo povas utili al ambaŭ niaj popoloj.
Oh, welcome! = Ho, bonvenon!
Oh, it is you. = Ho, estas vi.
Nobel Prize = Nobel-premio
All hail Great King Gustavus Adolphus, founder of the Swedish Empire, and one of the most famous military tacticians. In the early 17th century, Sweden emerged as a great power in Europe under your reign, thanks to your wisdom, both in diplomacy and warfare. As king, you decided to reform Swedish laws to bring economic stability and prosperity to your people. Your allies, and also your enemies, called you the 'Lion of the North', witnessing your modern vision of warfare, and the prowess of your armies on the battlefield. As you triumphed in the Thirty Years' War, your name will be forever remembered as one of history's greatest generals. = Ĉian honoron al Granda Reĝo Gustavo Adolfo, fondinto de la Sveda Imperio kaj unu el la plej famaj militaj taktikistoj. Komence de la 17-a jarcento, Svedio aperis kiel granda potenco en Eŭropo sub via regado, danke al via saĝo kaj en diplomatio kaj en militado. Kiel reĝo, vi decidis reformi svedajn leĝojn por alporti ekonomian stabilecon kaj prosperon al via popolo. Viaj aliancanoj, kaj ankaŭ viaj malamikoj, nomis vin la 'Leono de la Nordo', atestante vian modernan vizion pri militado kaj la lertecon de viaj armeoj sur la batalkampo. Ĉar vi triumfis en la Tridekjara Milito, via nomo estos por ĉiam memorata kiel unu el la plej grandaj generaloj de la historio.
O noble King, will you lend your leadership and brilliant ideas to Sweden once again, to conceive strategies never seen before? Will your new empire shine through the ages of history? = Ho nobla Reĝo, ĉu vi denove pruntedonos vian gvidadon kaj brilajn ideojn al Svedio por koncepti strategiojn neniam antaŭe viditajn? Ĉu via nova imperio brilos tra la epokoj de historio?
