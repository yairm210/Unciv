You've fallen into my trap. I'll bury you. = Vi falis en mian kaptilon. Mi enterigos vin.
I congratulate you for your victory. = Mi gratulas vin pro via venko.
Welcome. I'm Napoleon, of France; the smartest military man in world history. = Bonvenon. Mi estas Napoleono de Francio; la plej lerta militisto en la monda historio.
France offers you this exceptional proposition. = Francio proponas al vi ĉi tiun esceptan proponon.
Hello. = Saluton.
It's you. = Estas vi.
Ancien Régime = Malnova Reĝimo
Vive Napoleon I, First Consul and Emperor of France! After the glorious Revolution which suppressed the centuries-old monarchy, the French nation stood at the heart of Europe as a Republic, and intended to export its ideals to the entire European continent, either by diplomacy or war. The French Capital Paris was more than ever the world center of Culture, Arts, and Letters. With its Great Army, reputed as one of the greatest in the History, France fought gloriously all surrounding enemies, but eventually fell against the coalition of other European powers. = Vivu Napoleono la 1-a, Unua Konsulo kaj Imperiestro de Francio! Post la glora Revolucio, kiu subpremis la jarcentaĝan monarkion, la franca nacio staris en la koro de Eŭropo kiel Respubliko kaj intencis eksporti siajn idealojn al la tuta eŭropa kontinento, ĉu per diplomatio, ĉu per milito. La franca ĉefurbo Parizo estis pli ol iam ajn la monda centro de Kulturo, Artoj kaj Literaturo. Per sia Granda Armeo, famkonata kiel unu el la plej grandaj en la Historio, Francio glore batalis kontraŭ ĉiuj ĉirkaŭaj malamikoj, sed fine falis kontraŭ la koalicio de aliaj eŭropaj potencoj.
Napoleon Bonaparte, ruler of the French people, will you rebuild the Empire to take revenge on your foes, and make again of its Capital the City of Lights? Will your new empire shine through the ages of history? = Napoleono Bonaparte, reganto de la franca popolo, ĉu vi rekonstruos la Imperion por venĝi vin kontraŭ viaj malamikoj kaj denove fari el ĝia Ĉefurbo la Urbon de Lumoj? Ĉu via nova imperio brilos tra la epokoj de historio?
