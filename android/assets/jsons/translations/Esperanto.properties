Montezuma I = Montezuma la 1-a
Xi-miqa-can! Xi-miqa-can! Xi-miqa-can! (Die, die, die!) = Xi-miqa-can! Xi-miqa-can! Xi-miqa-can! (Mortu, mortu, mortu!)
Excellent! Let the blood flow in raging torrents! = Bonege! Lasu la sangon flui en furiozaj torentoj!
Monster! Who are you to destroy my greatness? = Monstro! Kiu vi estas por detrui mian grandecon?
What do I see before me? Another beating heart for my sacrificial fire. = Kion mi vidas antaŭ mi? Alia batanta koro por mia oferfajro.
Accept this agreement or suffer the consequences. = Akceptu ĉi tiun interkonsenton aŭ suferu la sekvojn.
Welcome, friend. = Bonvenon, amiko.
Sacrificial Captives = Oferaj Kaptitoj
O divine Montezuma, your people welcome you! May your magnificence inspire all living things! The mighty Aztecs were nomads until the 12th century, when they choose to settle in the mesa central, which would later be called Mexico. Wars were frequent with other tribes to control the rich land surrounding the sacred lakes of Texcoco, Xaltocan and Zampango. In some 200 years, double-sided alliances and martial prowess made of the Aztecs the dominant power in the Central American basin, forming a mighty empire stretching from sea to sea. Alas, the empire fell under the assault of foreign devils - the Spaniards and many curses they brought with them! Wars between tribes and weaponry of doom used by the invaders made the great Aztec civilization crumble in only a few decades. = Ho dia Montezuma, via popolo bonvenigas vin! Via grandiozeco inspiru ĉiujn vivantajn estaĵojn! La potencaj Aztekoj estis nomadoj ĝis la 12-a jarcento, kiam ili elektis ekloĝi en la centra altebenaĵo, kiu poste nomiĝus Meksiko. Militoj estis oftaj kontraŭ aliaj triboj por regi la riĉajn terojn ĉirkaŭ la sanktaj lagoj Texcoco, Xaltocan kaj Zampango. Dum ĉirkaŭ 200 jaroj, duflankaj aliancoj kaj milita lerteco igis la Aztekojn la domina potenco en la mezamerika baseno, formante potencan imperion etendiĝantan de maro al maro. Ve, la imperio falis sub la atako de fremdaj diabloj — la Hispanoj kaj la multaj malbenoj, kiujn ili kunportis! Militoj inter triboj kaj pereigaj armiloj uzataj de la invadantoj igis la grandan aztekan civilizacion disfali en nur kelkaj jardekoj.
O mighty King Montezuma, do you hear the call of your people seeking for revenge? Will you lead them to victory under the light of the Five Suns? Will your new empire shine through the ages of history? = Ho potenca Reĝo Montezuma, ĉu vi aŭdas la vokon de via popolo serĉanta venĝon? Ĉu vi gvidos ilin al venko sub la lumo de la Kvin Sunoj? Ĉu via nova imperio brilos tra la epokoj de historio?
