Oh, it's you! = Ho, estas vi!
Sun Never Sets = La Suno Neniam Subiras
Long live to Your Highness, Queen Elizabeth Gloriana, leader and protector of the glorious England! Through history, enduring many invasions, England strengthened its will, playing smartly with diplomacy, cunning, and military power, to eventually rose as one of the most dominant Empires the world has ever known. Their matchless navy, brilliant scientists and artists, and powerful merchants, have shaped the known world for centuries. = Longan vivon al Via Moŝto, Reĝino Elizabeto Gloriana, gvidantino kaj protektantino de glora Anglio! Tra la historio, eltenante multajn invadojn, Anglio fortigis sian volon, lerte uzante diplomation, ruzon kaj militan potencon, por fine leviĝi kiel unu el la plej dominaj Imperioj, kiujn la mondo iam konis. Ĝia senkompara mararmeo, brilaj sciencistoj kaj artistoj, kaj potencaj komercistoj formis la konatan mondon dum jarcentoj.
Queen Elizabeth, will England cast once more its brightness upon all lands and seas of the world? Will your new empire shine through the ages of history? = Reĝino Elizabeto, ĉu Anglio denove ĵetos sian brilon sur ĉiujn landojn kaj marojn de la mondo? Ĉu via nova imperio brilos tra la epokoj de historio?
