William of Orange = Vilhelmo de Oranĝo
As much as I despise war, I consider it a, hahaha, contribution to the common cause to erase your existence. = Kiom ajn mi malestimas militon, mi konsideras ĝin, hahaha, kontribuo al la komuna afero forviŝi vian ekziston.
You call yourself an exalted ruler, but I see nothing more than a smartly dressed barbarian! = Vi nomas vin altega reganto, sed mi vidas nenion pli ol elegante vestitan barbaron!
My God, be merciful to my soul. My God, feel pity for this... my poor people! = Mia Dio, estu kompatema al mia animo. Mia Dio, kompatu ĉi tion... mian kompatindan popolon!
I am William of Orange, stadtholder of The Netherlands. Did you need anything? I still have a lot to do. = Mi estas Vilhelmo de Oranĝo, stadestro de Nederlando. Ĉu vi bezonis ion? Mi ankoraŭ havas multon por fari.
I believe I have something that may be of some importance to you. = Mi kredas, ke mi havas ion, kio eble iom gravas por vi.
Once again, greetings. = Denove, salutojn.
Dutch East India Company = Nederlanda Orienthinda Kompanio
Greetings to the wise and brave Prince William of Orange, who freed the Netherlands and gave strength to the Dutch people. In 1568, you led a rebellion against Spanish dominion, to gain freedom for your people, and therefore starting the Eighty Years' War. Your actions were all aimed to create one of Europe's first modern republics, the Seven United Provinces. The rebellion was the meaning of your very life and death, as it was also the cause of your assassination in 1584. But your death has given even more pride and courage to your people, to fight for liberty against any oppressors. Carved in history as the 'Father of the Fatherland', your name is a symbol of Dutch independence for eternity. = Salutojn al la saĝa kaj brava Princo Vilhelmo de Oranĝo, kiu liberigis Nederlandon kaj donis forton al la nederlanda popolo. En 1568 vi gvidis ribelon kontraŭ hispana regado por akiri liberecon por via popolo, tiel komencante la Okdekjaran Militon. Ĉiuj viaj agoj celis krei unu el la unuaj modernaj respublikoj de Eŭropo, la Sep Unuiĝintajn Provincojn. La ribelo estis la senco de via vivo kaj morto, ĉar ĝi ankaŭ estis la kaŭzo de via murdo en 1584. Sed via morto donis eĉ pli da fiereco kaj kuraĝo al via popolo por batali por libereco kontraŭ ĉiaj subpremantoj. Gravurita en la historio kiel la 'Patro de la Patrujo', via nomo estas simbolo de nederlanda sendependeco por eterneco.
Brave Prince, your people ask for your wisdom to gain its freedom once more, and to illuminate the world with progressive and modern ideas. Will your new empire shine through the ages of history? = Brava Princo, via popolo petas vian saĝon por refoje akiri sian liberecon kaj prilumi la mondon per progresemaj kaj modernaj ideoj. Ĉu via nova imperio brilos tra la epokoj de historio?
