Dido = Didono
Tell me, do you all know how numerous my armies, elephants and the gdadons are? No? Today, you shall find out! = Diru al mi, ĉu vi ĉiuj scias, kiom nombraj estas miaj armeoj, elefantoj kaj gdadonoj? Ne? Hodiaŭ vi ekscios!
Fate is against you. You earned the animosity of Carthage in your exploration. Your days are numbered. = La sorto estas kontraŭ vi. Per via esplorado vi gajnis la malamikecon de Kartago. Viaj tagoj estas kalkulitaj.
The fates became to hate me. This is it? You wouldn't destroy us so without their help. = La sortoj ekmalamis min. Ĉu jen ĉio? Vi ne detruus nin tiel sen ilia helpo.
You aren't meeting my expectations. You can do so much better. = Vi ne plenumas miajn atendojn. Vi povas fari multe pli bone.
The Phoenicians welcome you to this most pleasant kingdom. I am Dido, the queen of Carthage and all that belongs to it. = La Fenicoj bonvenigas vin al ĉi tiu plej agrabla regno. Mi estas Didono, reĝino de Kartago kaj de ĉio, kio apartenas al ĝi.
I just had the marvelous idea, and I think you'll appreciate it too. = Mi ĵus havis mirindan ideon, kaj mi pensas, ke ankaŭ vi aprezos ĝin.
What is it now? = Kio estas nun?
Phoenician Heritage = Fenica Heredaĵo
Greetings to you, revered Queen Dido, ruler of the legendary kingdom of Carthage. The great poet Virgil related your great history, how your husband Acerbas was murdered by your own brother, King Pygmalion of Tyre, to steal the treasures of your family that were rightfully yours. But you endured his pressure until you and your compatriots decided to flee and sail for new lands. The gods led you to the shores of North Africa, and with cunning diplomacy, you expanded the territory of your new home, and laid the basis for the future kingdom of Carthage. = Salutojn al vi, respektata Reĝino Didono, regantino de la legenda regno Kartago. La granda poeto Vergilio rakontis vian grandan historion: kiel via edzo Acerbas estis murdita de via propra frato, Reĝo Pigmaliono de Tiro, por ŝteli la trezorojn de via familio, kiuj laŭrajte apartenis al vi. Sed vi eltenis lian premon ĝis vi kaj viaj samlandanoj decidis fuĝi kaj veli al novaj landoj. La dioj kondukis vin al la bordoj de Norda Afriko, kaj per ruza diplomatio vi vastigis la teritorion de via nova hejmo kaj metis la fundamenton por la estonta regno de Kartago.
Clever and proud Dido, the storm is coming and your people look for a shelter under your wise and powerful protection. Can you create a new and radiant Carthage able to cleave the darkness? Will your new empire shine through the ages of history? = Lerta kaj fiera Didono, la ŝtormo venas kaj via popolo serĉas rifuĝon sub via saĝa kaj potenca protekto. Ĉu vi povas krei novan kaj radiantan Kartagon kapablan fendeti la mallumon? Ĉu via nova imperio brilos tra la epokoj de historio?
