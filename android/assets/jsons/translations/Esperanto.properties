Oda Nobunaga = Oda Nobunaga
I hereby inform you of our intention to wipe out your civilization from this world. = Per ĉi tio mi informas vin pri nia intenco forviŝi vian civilizacion el ĉi tiu mondo.
Pitiful fool! Now we shall destroy you! = Kompatinda malsaĝulo! Nun ni detruos vin!
You were much wiser than I thought. = Vi estis multe pli saĝa ol mi pensis.
I expected more for you from. = Mi atendis pli de vi.
We hope for a fair and just relationship with you, who are renowned for military bravery. = Ni esperas justan kaj honestan rilaton kun vi, kiu estas fama pro milita braveco.
I would be grateful if you agreed on the following proposal. = Mi estus dankema, se vi konsentus pri la jena propono.
Oh, it's you... = Ho, estas vi...
Bushido = Buŝido
Lord Oda Nobunaga, ruler of Japan, the land of the Rising Sun is at your command! Through history, Japanese people lived and died with honor, proud of their rich culture of arts and letters. Years of bloody civil wars, invasions of foreign powers, wealth but also great poverty, have never altered the strong will of the Rising Sun island, as the Bushido spirit has imbued the fields of battle and the Japanese society for millenia. At the end of the 19th century, under foreign influence, your people took the path of modernity, and in a few decades, made of Japan a land of technological innovation and powerful industry, with which only few nations can compete. = Sinjoro Oda Nobunaga, reganto de Japanio, la lando de la Leviĝanta Suno estas sub via komando! Tra la historio, japanaj homoj vivis kaj mortis kun honoro, fieraj pri sia riĉa kulturo de artoj kaj literaturo. Jaroj de sangaj enlandaj militoj, invadoj de fremdaj potencoj, riĉeco sed ankaŭ granda malriĉeco, neniam ŝanĝis la fortan volon de la insulo de la Leviĝanta Suno, ĉar la spirito de Buŝido trapenetris la batalkampojn kaj japanan socion dum jarmiloj. Je la fino de la 19-a jarcento, sub fremda influo, via popolo prenis la vojon de moderneco kaj, post kelkaj jardekoj, faris el Japanio landon de teknologia novigado kaj potenca industrio, kun kiu nur malmultaj nacioj povas konkuri.
O great daimyo, will you take on your hands the Japan destiny, for the Rising Sun to light the world? Will your new empire shine through the ages of history? = Ho granda daimio, ĉu vi prenos en viajn manojn la destinon de Japanio, por ke la Leviĝanta Suno lumigu la mondon? Ĉu via nova imperio brilos tra la epokoj de historio?
