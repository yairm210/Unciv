#################### Lines from Quests from Civ V - Vanilla ####################

Route = Itinero
Build a road to connect your capital to our city. = Konstruu vojon por konekti vian ĉefurbon al nia urbo.

Clear Barbarian Camp = Forigi Barbaran Tendaron
We feel threatened by a Barbarian Camp near our city. Please take care of it. = Ni sentas nin minacataj de Barbara Tendaro proksime de nia urbo. Bonvolu prizorgi ĝin.

Connect Resource = Konekti Rimedon
In order to make our civilizations stronger, connect [tileResource] to your trade network. = Por fortigi niajn civilizaciojn, konektu [tileResource] al via komerca reto.

Construct Wonder = Konstrui Mirindaĵon
We recommend you to start building [wonder] to show the whole world your civilization strength. = Ni rekomendas, ke vi komencu konstrui [wonder] por montri al la tuta mondo la forton de via civilizacio.

Acquire Great Person = Akiri Grandan Personon
Great People can change the course of a Civilization! You will be rewarded for acquiring a new [greatPerson]. = Grandaj Personoj povas ŝanĝi la direkton de Civilizacio! Vi estos rekompencita pro akiro de nova [greatPerson].

Conquer City State = Konkeri Urboŝtaton
It's time to erase the City-State of [cityState] from the map. You will be greatly rewarded for conquering them! = Venis la tempo forviŝi la Urboŝtaton [cityState] de la mapo. Vi estos grande rekompencita pro ĝia konkero!

Find Player = Trovi Ludanton
You have yet to discover where [civName] set up their cities. You will be rewarded for finding their territories. = Vi ankoraŭ devas malkovri, kie [civName] starigis siajn urbojn. Vi estos rekompencita pro trovo de iliaj teritorioj.

Find Natural Wonder = Trovi Naturan Mirindaĵon
Send your best explorers on a quest to discover Natural Wonders. Nobody knows the location of [naturalWonder] yet. = Sendu viajn plej bonajn esploristojn al tasko por malkovri Naturajn Mirindaĵojn. Neniu ankoraŭ konas la lokon de [naturalWonder].

Give Gold = Doni Oron
We are suffering great poverty after being robbed by [civName], and unless we receive a sum of Gold, it's only a matter of time before we collapse. = Ni suferas grandan malriĉecon post prirabo fare de [civName], kaj se ni ne ricevos sumon da Oro, estos nur demando de tempo antaŭ ol ni kolapsos.

Pledge to Protect = Promesi Protekti
We need your protection to stop the aggressions of [civName]. By signing a Pledge of Protection, you'll confirm the bond that ties us. = Ni bezonas vian protekton por haltigi la agresojn de [civName]. Subskribante Promeson de Protekto, vi konfirmos la ligon, kiu kunigas nin.

Contest Culture = Konkurso pri Kulturo
The civilization with the largest Culture growth will gain a reward. = La civilizacio kun la plej granda kresko de Kulturo ricevos rekompencon.

Contest Faith = Konkurso pri Kredo
The civilization with the largest Faith growth will gain a reward. = La civilizacio kun la plej granda kresko de Kredo ricevos rekompencon.

Contest Technologies = Konkurso pri Teknologioj
The civilization with the largest number of new Technologies researched will gain a reward. = La civilizacio kun la plej granda nombro da novaj esploritaj Teknologioj ricevos rekompencon.

Invest = Investi
Our people are rejoicing thanks to a tourism boom. For a certain amount of time, any Gold donation will yield [50]% extra Influence. = Nia popolo ĝojas danke al turisma ekprospero. Dum certa tempo, ĉiu donaco de Oro donos [50]% kroman Influon.

Bully City State = Ĉikani Urboŝtaton
We are tired of the pretensions of [cityState]. If someone were to put them in their place by Demanding Tribute from them, they would be rewarded. = Ni laciĝis de la pretendoj de [cityState]. Se iu metus ilin en ilian lokon postulante Tributadon de ili, tiu estus rekompencita.

Denounce Civilization = Denunci Civilizacion
We have been forced to pay tribute to [civName]! We need you to tell the world of their ill deeds. = Oni devigis nin pagi tributon al [civName]! Ni bezonas, ke vi diru al la mondo pri iliaj malbonfaroj.

We have heard the tenets of [religionName] and are most curious. Will you send missionaries to teach us about your religion? = Ni aŭdis la dogmojn de [religionName] kaj estas tre scivolemaj. Ĉu vi sendos misiistojn por instrui nin pri via religio?


