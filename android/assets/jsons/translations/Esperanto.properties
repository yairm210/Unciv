Harald Bluetooth = Harald Bludento
If I am to be honest, I tire of those pointless charades. Why don't we settle our disputes on the field of battle, like true men? Perhaps the skalds will sing of your valor... or mine! = Se mi devas esti honesta, mi laciĝas de tiuj sencelaj ŝajnigoj. Kial ni ne solvu niajn disputojn sur la batalkampo, kiel veraj viroj? Eble la skaldoj kantos pri via braveco... aŭ pri la mia!
Ahahah! You seem to show some skills of a true Viking! Too bad that I'll probably kill you! = Ha ha ha! Vi ŝajnas montri kelkajn kapablojn de vera Vikingo! Domaĝe, ke mi probable mortigos vin!
Loki must have stood by you, for a common man alone could not have defeated me... Oh well! I will join the einherjar in Valhalla and feast, while you toil away here. = Lokio certe staris apud vi, ĉar ordinara homo sola ne povus venki min... Nu bone! Mi aliĝos al la einherjar en Valhalo kaj festenos, dum vi pene laboros ĉi tie.
Our future battle will be glorious! = Nia estonta batalo estos glora!
Harald Bluetooth bids you welcome to his lands, a Viking unlike any the seas and lands have ever known! Hah, are you afraid? = Harald Bludento bonvenigas vin al siaj landoj, Vikingo sen egalo sur maroj aŭ teroj! Ha, ĉu vi timas?
This is a fine deal! Even a drunk beggar would agree! = Jen bona interkonsento! Eĉ ebria almozulo konsentus!
Hail to you. = Saluton al vi.
Viking Fury = Vikinga Furiozo
Skal, Harald Bluetooth Gormsson, son of King Gorm of the Old and Thyra Dannebod! After crushing the armies of Norway, you achieved great construction projects all across the land of mighty Denmark. Numerous Ring Fortresses were built under your reign to protect the people from foreign invasions, but also from local quarrels. In 983 AD, you successfully repelled several waves of German settlers trying to colonize your land, and then always kept your kingdom free from any foreign pressure. = Skal, Harald Bludento Gormsson, filo de Reĝo Gorm la Maljuna kaj Thyra Dannebod! Post dispremado de la armeoj de Norvegio, vi atingis grandajn konstruprojektojn tra la tuta lando de potenca Danio. Multnombraj Ringfortikaĵoj estis konstruitaj sub via regado por protekti la popolon kontraŭ fremdaj invadoj, sed ankaŭ kontraŭ lokaj kvereloj. En 983 p.K., vi sukcese repelis plurajn ondojn de germanaj setlantoj provantaj koloniigi vian landon, kaj poste ĉiam tenis vian regnon libera de ĉia fremda premo.
As a true Viking, who knows not fear, time has come to unleash mighty armies of Northsmen to bring despair upon your enemies! By the will of the Gods, it will be either a glorious triumph or a sumptuous feast in the Valhalla! Will your new empire shine through the ages of history? = Kiel vera Vikingo, kiu ne konas timon, venis la tempo liberigi potencajn armeojn de Norduloj por alporti malesperon al viaj malamikoj! Laŭ la volo de la Dioj, tio estos aŭ glora triumfo aŭ luksa festeno en Valhalo! Ĉu via nova imperio brilos tra la epokoj de historio?
