May the gods bless you, great Nebuchadnezzar, ruler of ancient Babylon! Built 5000 years ago, Babylon emerged as an empire in 1800 BC, thanks to godlike Hammurabi, The Giver of Law. Falling under the Kassites assaults then the Assyrian domination, Babylon was reborn from its ashes, gaining back its independance, and became the beacon for Arts and Learning in the ancient world. O Nebuchadnezzar, after your death, Babylon quickly fell, conquered by the mighty Persians, and then by the Greeks, until the great city disappeared forever in 141 BC. = La dioj benu vin, granda Nebukadnecar, reganto de antikva Babilono! Konstruita antaŭ 5000 jaroj, Babilono aperis kiel imperio en 1800 a.K., danke al la dieca Hamurabi, la Donanto de Leĝo. Falinte sub la atakoj de la Kasitoj kaj poste sub asiria regado, Babilono renaskiĝis el siaj cindroj, reakiris sian sendependecon kaj fariĝis lumturo de Artoj kaj Lernado en la antikva mondo. Ho Nebukadnecar, post via morto, Babilono rapide falis, konkerita de la potencaj Persoj kaj poste de la Grekoj, ĝis la granda urbo malaperis por ĉiam en 141 a.K.
