Genghis Khan = Ĝingis-Ĥano
You stand in the way of my armies. Let us solve this like warriors! = Vi staras sur la vojo de miaj armeoj. Ni solvu ĉi tion kiel militistoj!
No more words. Today, Mongolia charges toward your defeat. = Ne plu vortoj. Hodiaŭ Mongolio atakas por via malvenko.
You have hobbled the Mongolian clans. My respect for you nearly matches the loathing. I am waiting for my execution. = Vi kripligis la mongolajn klanojn. Mia respekto al vi preskaŭ egalas mian abomenon. Mi atendas mian ekzekuton.
Your bravery must be commended. = Via braveco devas esti laŭdata.
I am Temuujin, conqueror of cities and countries. Before me lie future Mongolian lands. Behind me is the only cavalry that matters. = Mi estas Temuĝin, konkeranto de urboj kaj landoj. Antaŭ mi kuŝas estontaj mongolaj landoj. Malantaŭ mi estas la sola kavalerio, kiu gravas.
I am not always this generous, but we hope you take this rare opportunity we give you. = Mi ne ĉiam estas tiel malavara, sed ni esperas, ke vi kaptos ĉi tiun raran okazon, kiun ni donas al vi.
So what now? = Do kio nun?
Mongol Terror = Mongola Teruro
O great Temuujin, immortal leader of the mighty Mongol Empire! Your name alone was enough to make cities crumble, and the sound of the mighty Mongol cavalry to make your enemies flee! O Great Khan! Once Northern Asia united into a mighty people, producing one of the greatest armies the world has ever known, your skillful mounted archers conquered in only a few years, most of China, Eastern Asia, and even reached the gates of Europe at the West. With cunning diplomacy and brilliant warfare, you swept your enemies one after another, creating the greatest empire ever seen, reducing Roman or Greek conquests to minor achievements. = Ho granda Temuĝin, senmorta gvidanto de la potenca Mongola Imperio! Via nomo sola sufiĉis por igi urbojn disfali, kaj la sono de la potenca mongola kavalerio por igi viajn malamikojn fuĝi! Ho Granda Ĥano! Kiam Norda Azio unuiĝis en potencan popolon, produktante unu el la plej grandaj armeoj, kiujn la mondo iam konis, viaj lertaj rajdantaj arkpafistoj konkeris en nur kelkaj jaroj plejparton de Ĉinio, Orienta Azio, kaj eĉ atingis la pordegojn de Eŭropo okcidente. Per ruza diplomatio kaj brila militado, vi forbalais viajn malamikojn unu post alia, kreante la plej grandan imperion iam viditan, reduktante romiajn aŭ grekajn konkerojn al malgrandaj atingoj.
Divine Temuujin, battles and conquests run through the veins of the Mongols. Are you ready to shatter the will of your enemies? Will your cavalry ride in the steppes once again and strike as lightning and thunder? Will your new empire shine through the ages of history? = Dia Temuĝin, bataloj kaj konkeroj fluas tra la vejnoj de la Mongoloj. Ĉu vi pretas frakasi la volon de viaj malamikoj? Ĉu via kavalerio denove rajdos sur la stepoj kaj frapos kiel fulmo kaj tondro? Ĉu via nova imperio brilos tra la epokoj de historio?
