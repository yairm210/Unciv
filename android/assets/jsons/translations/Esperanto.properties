Fastlane_short_description = Malfermfonta 4X-strategia civilizaciokonstrua ludo

# Documentation: https://f-droid.org/en/docs/Build_Metadata_Reference/#Description
# English to translate: https://github.com/yairm210/Unciv/blob/master/fastlane/metadata/android/en-US/full_description.txt
Fastlane_full_description = Malfermfonta reimplementado de la plej fama civilizaciokonstrua ludo de ĉiuj tempoj — rapida, malpeza, sen reklamoj, por ĉiam senpaga!\n\nKonstruu vian civilizacion, esploru teknologiojn, vastigu viajn urbojn kaj venku viajn malamikojn!\n\nPetoj? Cimoj? Ĉu vi volas helpi la disvolvon? Taskolisto de la aplikaĵo <a href="https://github.com/yairm210/Unciv/issues">Unciv-problemoj - GitHub</a>\n\nĈu demandoj? Ĉu komentoj? Aliĝu al ni ĉe Discord ĉe <a href="https://discord.gg/bjrB4Xw">Unciv Discord</a> ;)\n\nĈu vi volas helpi traduki la ludon al via lingvo? Vidu <a href="https://yairm210.github.io/Unciv/Translating/Translating/">Vikio por traduki</a>\n\nLa mondo atendas! Ĉu vi konstruos vian civilizacion en imperion, kiu eltenos la provon de la tempo?\n\nLa permeso “plena reta aliro” estas bezonata por uzant-iniciataj elŝutoj kaj por la plurludanta reĝimo. Ĉiuj aliaj listigitaj permesoj estas inkluzivitaj aŭtomate de la API uzata por realigi plurludantajn turnosciigojn. Retaj permesoj estas uzataj por listigi modifojn, elŝuti modifojn, elŝuti muzikon kaj alŝuti/elŝuti plurludantajn ludojn. Neniu alia interreta komunikado estas iniciata de Unciv.


