You leave us no choice. War it must be. = Vi lasas al ni neniun elekton. Milito ĝi devas esti.
Very well, this shall not be forgotten. = Tre bone, ĉi tio ne estos forgesita.
I guess you weren't here for the sprouts after all... = Mi supozas, ke vi ja ne venis ĉi tien pro la ĝermoj...
