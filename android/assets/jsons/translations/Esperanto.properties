Ramkhamhaeng = Ramkhamhaeng
You lowly, arrogant fool! I will make you regret of your insolence! = Vi malnobla, aroganta malsaĝulo! Mi igos vin bedaŭri vian impertinentecon!
You scoundrel! I shall prepare to fend you off! = Vi kanajlo! Mi preparos min por forpuŝi vin!
Although I lost, my honor shall endure. I wish you good luck. = Kvankam mi perdis, mia honoro daŭros. Mi deziras al vi bonŝancon.
I, Pho Kun Ramkhamhaeng, King of Siam, consider it a great honor that you have walked to visit my country of Siam. = Mi, Pho Kun Ramkhamhaeng, Reĝo de Siamo, konsideras granda honoro, ke vi venis viziti mian landon Siamo.
Greetings. I believe this is a fair proposal for both parties. What do you think? = Saluton. Mi kredas, ke ĉi tio estas justa propono por ambaŭ flankoj. Kion vi pensas?
Welcome. = Bonvenon.
Father Governs Children = Patro Regas Infanojn
O Great King Ramkhamhaeng, the Siamese people obey you with respect and fear! The beautiful and mysterious land of Siam is an ancient country in the heart of Southeast Asia, which was besieged by many foes, plagued by bloody war and great poverty, but eventually the smart and loyal Siamese people have endured and triumphed. Siam was a part of the Khmer Empire until the 13th century AD, before its brave people took arms and led a revolution to form the small Sukhothai kingdom. After many battles and diplomacy prowess, this tiny kingdom became a mighty empire, which would dominate South East Asia for more than a century. = Ho Granda Reĝo Ramkhamhaeng, la siama popolo obeas vin kun respekto kaj timo! La bela kaj mistera lando Siamo estas antikva lando en la koro de Sudorienta Azio, sieĝita de multaj malamikoj, plagita de sangaj militoj kaj granda malriĉeco, sed fine la inteligenta kaj lojala siama popolo eltenis kaj triumfis. Siamo estis parto de la Ĥmera Imperio ĝis la 13-a jarcento p.K., antaŭ ol ĝia kuraĝa popolo prenis armilojn kaj gvidis revolucion por formi la malgrandan regnon Sukhothai. Post multaj bataloj kaj diplomatia lerteco, ĉi tiu eta regno fariĝis potenca imperio, kiu regus Sudorientan Azion dum pli ol jarcento.
Wise and powerful King Ramkhamhaeng, your people want to revive these days of glory! Can you make a new dawn break on Siam? Will your new empire shine through the ages of history? = Saĝa kaj potenca Reĝo Ramkhamhaeng, via popolo volas revivigi tiujn tagojn de gloro! Ĉu vi povas aperigi novan tagiĝon super Siamo? Ĉu via nova imperio brilos tra la epokoj de historio?
