Haile Selassie = Haile Selassie
I have tried all other avenues, but yet you persist in this madness. I hope, for your sake, your end is swift. = Mi provis ĉiujn aliajn vojojn, sed vi tamen persistas en ĉi tiu frenezo. Mi esperas, pro via propra bono, ke via fino estos rapida.
It is silence that allows evil to triumph. We will not stand mute and allow you to continue on this mad quest unchecked. = Silento estas tio, kio permesas al malbono triumfi. Ni ne staros mute kaj permesos al vi daŭrigi ĉi tiun frenezan serĉadon senbride.
God and history will remember your actions this day. I hope you are ready for your impending judgment. = Dio kaj historio memoros viajn agojn ĉi tiun tagon. Mi esperas, ke vi pretas por via baldaŭa juĝo.
What a waste of time. = Kia tempoperdo.
A thousand welcomes to our fair nation. I am Selassie, the Ras Tafari Makonnen and Emperor of Ethiopia, your humble servant. = Mil bonvenojn al nia bela nacio. Mi estas Selassie, Ras Tafari Makonnen kaj Imperiestro de Etiopio, via humila servanto.
I request that you consider this offer between our two peoples. I believe it will do us both good. = Mi petas, ke vi konsideru ĉi tiun proponon inter niaj du popoloj. Mi kredas, ke ĝi utilos al ni ambaŭ.
Spirit of Adwa = Spirito de Adwa
May God bless you, wise and righteous Emperor of Ethiopia, Haile Selassie. As one of Ethiopia's greatest rulers and a spiritual leader of the Rastafarian movement, your good influence on diplomacy and political cooperation are praised throughout the world. You created Ethiopia's first written constitution, and favorized democracy for years to come, your great wisdom making Ethiopia enter as a charter member in the United Nations. Always aiming to reform and modernize your nation, you changed Ethiopian destiny for the best. = Dio benu vin, saĝa kaj justa Imperiestro de Etiopio, Haile Selassie. Kiel unu el la plej grandaj regantoj de Etiopio kaj spirita gvidanto de la rastafaria movado, via bona influo al diplomatio kaj politika kunlaboro estas laŭdata tra la mondo. Vi kreis la unuan skriban konstitucion de Etiopio kaj favorigis demokration por venontaj jaroj, dum via granda saĝo igis Etiopion eniri kiel fonda membro en la Unuiĝintajn Naciojn. Ĉiam celante reformi kaj modernigi vian nacion, vi ŝanĝis la destinon de Etiopio por la bono.
Revered King, your knowledge and intelligence are required once again to protect your people from many threats in the world. Will you secure peace and stability, with benevolence and authority, in the radiance of the Kebra Nagast? Will your new empire shine through the ages of history? = Respektata Reĝo, via scio kaj inteligento denove estas bezonataj por protekti vian popolon kontraŭ multaj minacoj en la mondo. Ĉu vi certigos pacon kaj stabilecon, kun bonvolemo kaj aŭtoritato, en la brilo de la Kebra Nagast? Ĉu via nova imperio brilos tra la epokoj de historio?
