Isabella = Izabela
God will probably forgive you... but I shall not. Prepare for war. = Dio probable pardonos vin... sed mi ne. Preparu vin por milito.
Repugnant spawn of the devil! You will pay! = Abomena ido de la diablo! Vi pagos!
If my defeat is, without any doubt, the will of God, then I will accept it. = Se mia malvenko estas, sendube, la volo de Dio, tiam mi akceptos ĝin.
God blesses those who deserve it. I am Isabel of Spain. = Dio benas tiujn, kiuj meritas tion. Mi estas Izabela de Hispanio.
I hope this deal will receive your blessing. = Mi esperas, ke ĉi tiu interkonsento ricevos vian benon.
Seven Cities of Gold = Sep Urboj de Oro
Holy Isabella, envoy of God, Great Queen of Castille and León, your people celebrate you! Spain is a beautiful and ancient country, a link between Europe and Africa, one shore on the Mediterranean and the other on the mighty Atlantic Ocean. The Spanish culture had taken the best of the Christian and Muslim worlds, and was ready to dominate the world for centuries. Powerful Spanish military fleets and brave explorers found and conquered much of the New World. Exploiting a whole new continent and its riches, Spain reached a state of power few could compete with for hundreds of years. = Sankta Izabela, senditino de Dio, Granda Reĝino de Kastilio kaj Leono, via popolo festas vin! Hispanio estas bela kaj antikva lando, ligo inter Eŭropo kaj Afriko, kun unu bordo ĉe Mediteraneo kaj la alia ĉe la potenca Atlantika Oceano. La hispana kulturo prenis la plej bonon de la kristana kaj islama mondoj, kaj estis preta regi la mondon dum jarcentoj. Potencaj hispanaj militŝiparoj kaj kuraĝaj esploristoj trovis kaj konkeris grandan parton de la Nova Mondo. Ekspluatante tutan novan kontinenton kaj ĝiajn riĉaĵojn, Hispanio atingis staton de potenco, kun kiu malmultaj povis konkuri dum centoj da jaroj.
O splendid and virtuous Isabella! By the will of the heavens, will Spain reborn to achieve its holy destiny and become a new El Dorado? Will your new empire shine through the ages of history? = Ho brila kaj virta Izabela! Laŭ la volo de la ĉieloj, ĉu Hispanio renaskiĝos por atingi sian sanktan destinon kaj fariĝi nova Eldorado? Ĉu via nova imperio brilos tra la epokoj de historio?
