Gandhi = Gandhi
I have just received a report that large numbers of my troops have crossed your borders. = Mi ĵus ricevis raporton, ke grandaj nombroj de miaj trupoj transiris viajn limojn.
My attempts to avoid violence have failed. An eye for an eye only makes the world blind. = Miaj provoj eviti perforton malsukcesis. Okulo kontraŭ okulo nur blindigas la mondon.
You can chain me, you can torture me, you can even destroy this body, but you will never imprison my mind. = Vi povas ĉeni min, vi povas torturi min, vi eĉ povas detrui ĉi tiun korpon, sed vi neniam malliberigos mian menson.
Curious. = Kurioze.
Hello, I am Mohandas Gandhi. My people call me Bapu, but please, call me friend. = Saluton, mi estas Mohandas Gandhi. Mia popolo nomas min Bapu, sed bonvolu nomi min amiko.
My friend, are you interested in this arrangement? = Mia amiko, ĉu vi interesiĝas pri ĉi tiu aranĝo?
I wish you peace. = Mi deziras al vi pacon.
Population Growth = Loĝantara Kresko
Wise Mahatma Gandhi, great leader of India, we honor you! India is one of the oldest countries in the world with 10,000 years of history, built on spirit and religion, as three of the world's great religions - Hinduism, Buddhism and Jainism - appeared on this sacred land. Every aspect of India society reveres art, music and color, showing great wealth but also grinding poverty. For centuries, India was torn between local kingdoms fighting each other but also repelling invaders. In the 12th century AD, Muslim Turks tried to conquer India, then the Mongols took their place. In the early 17th century, India, still fragmented, was colonized by the English and their diplomacy and technological superiority. After two centuries of British dominion, Indian nationalism woke up, and you, Great Mahatma, have led a peaceful and victorious rebellion never seen anywhere in history! = Saĝa Mahatmo Gandhi, granda gvidanto de Barato, ni honoras vin! Barato estas unu el la plej malnovaj landoj en la mondo, kun 10 000 jaroj da historio, konstruita sur spirito kaj religio, ĉar tri el la grandaj religioj de la mondo — hinduismo, budhismo kaj ĝajnismo — aperis sur ĉi tiu sankta tero. Ĉiu aspekto de barata socio respektas arton, muzikon kaj koloron, montrante grandan riĉecon sed ankaŭ premantan malriĉecon. Dum jarcentoj, Barato estis ŝirata inter lokaj regnoj batalantaj unu kontraŭ la alia kaj samtempe repelantaj invadantojn. En la 12-a jarcento p.K., islamaj Turkoj provis konkeri Baraton, poste la Mongoloj prenis ilian lokon. Komence de la 17-a jarcento, Barato, ankoraŭ fragmentita, estis koloniigita de la Angloj per ilia diplomatio kaj teknologia supereco. Post du jarcentoj da brita regado, barata naciismo vekiĝis, kaj vi, Granda Mahatmo, gvidis pacan kaj venkan ribelon neniam antaŭe viditan ie ajn en la historio!
Gandhi, your people ask again to be led on the path of freedom. Under protection of Ganesha and Surya, can India accomplish its great potential? Will your new empire shine through the ages of history? = Gandhi, via popolo denove petas esti gvidata sur la vojo de libereco. Sub la protekto de Ganeŝo kaj Surjo, ĉu Barato povas plenumi sian grandan potencialon? Ĉu via nova imperio brilos tra la epokoj de historio?
