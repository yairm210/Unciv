Elizabeth = Elizabeto
By the grace of God, your days are numbered. = Per la graco de Dio, viaj tagoj estas kalkulitaj.
We shall never surrender. = Ni neniam kapitulacos.
You have triumphed over us. The day is yours. = Vi triumfis super ni. La tago apartenas al vi.
Watch yourself, your pride will be your downfall. = Gardu vin; via fiereco estos via pereo.
We are pleased to meet you. = Ni ĝojas renkonti vin.
Would you be interested in a trade agreement with England? = Ĉu vi interesiĝus pri komerca interkonsento kun Anglio?
