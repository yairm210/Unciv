Otto von Bismarck = Oto von Bismarck
I cannot wait until ye grow even mightier. Therefore, prepare for war! = Mi ne povas atendi ĝis vi fariĝos eĉ pli potenca. Tial preparu vin por milito!
Corrupted villain! We will bring you into the ground! = Koruptita fiulo! Ni enterigos vin!
Germany has been destroyed. I weep for the future generations. = Germanio estis detruita. Mi ploras pro la estontaj generacioj.
That wild bravado? It's a ticking time bomb, especially when you're all bark and no bite! = Tiu sovaĝa fanfaronado? Ĝi estas tiktakanta bombo, precipe kiam vi nur bojas sed ne mordas!
Guten Tag. In the name of the great German people, I bid you welcome. = Guten Tag. En la nomo de la granda germana popolo, mi bonvenigas vin.
It would be in your best interest, to carefully consider this proposal. = Estus je via propra intereso zorge konsideri ĉi tiun proponon.
What now? = Kio nun?
So, out with it! = Nu, diru ĝin!
Furor Teutonicus = Furor Teutonicus
All hail to Otto von Bismarck, first chancellor of Germany and its empire! During the ancient era, Germany was a land fragmented in several tribes but already showed great promise as the Roman Empire itself struggled to bend the Germans to its will. Germany, as one nation, was slowly built on the ruins of the Holy Roman Empire, and waited 1871 to be finally unified after the glorious victory on France and Napoleon III. The German people are creative, intelligent, industrious and proven to be talented warriors through history. Despite great catastrophes and failures in the first half of the 20th century, Germany can always rely on its people will and strength to be among the greatest and powerful nations in the world. = Ĉia honoro al Oto von Bismarck, unua kanceliero de Germanio kaj ĝia imperio! Dum la antikva epoko, Germanio estis lando fragmentita en plurajn tribojn, sed jam montris grandan promeson dum la Romia Imperio mem luktis por fleksi la Germanojn al sia volo. Germanio, kiel unu nacio, malrapide estis konstruita sur la ruinoj de la Sankta Romia Imperio, kaj atendis ĝis 1871 por fine unuiĝi post la glora venko kontraŭ Francio kaj Napoleono la 3-a. La germana popolo estas kreema, inteligenta, laborema kaj pruviĝis talentaj militistoj tra la historio. Malgraŭ grandaj katastrofoj kaj fiaskoj en la unua duono de la 20-a jarcento, Germanio ĉiam povas fidi je la volo kaj forto de sia popolo por esti inter la plej grandaj kaj potencaj nacioj de la mondo.
Great Prince Bismarck, glory and power are at the heart of the German nation. Your people are bright, and lend you their iron will to lead Germany once again. Will your new empire shine through the ages of history? = Granda Princo Bismarck, gloro kaj potenco estas ĉe la koro de la germana nacio. Via popolo estas brila kaj pruntas al vi sian feran volon por gvidi Germanion denove. Ĉu via nova imperio brilos tra la epokoj de historio?
