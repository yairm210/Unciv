Askia = Askia
You are an abomination to heaven and earth, the chief of ignorant savages! You must be destroyed! = Vi estas abomenaĵo por ĉielo kaj tero, la ĉefo de sensciaj sovaĝuloj! Vi devas esti detruita!
Fool! You have doomed your people to fire and destruction! = Malsaĝulo! Vi kondamnis vian popolon al fajro kaj detruo!
We have been consumed by the fires of hatred and rage. Enjoy your victory in this world - you shall pay a heavy price in the next! = Ni estis konsumitaj de la fajroj de malamo kaj kolero. Ĝuu vian venkon en ĉi tiu mondo — vi pagos pezan prezon en la sekva!
This insult shall cost you. = Ĉi tiu insulto kostos al vi.
I am Askia of the Songhai. We are a fair people - but those who cross us will find only destruction. You would do well to avoid repeating the mistakes others have made in the past. = Mi estas Askia de Songhajo. Ni estas justa popolo — sed tiuj, kiuj kontraŭas nin, trovos nur detruon. Vi farus bone evitante ripeti la erarojn, kiujn aliaj faris en la pasinteco.
Can I interest you in this deal? = Ĉu mi povas interesi vin pri ĉi tiu interkonsento?
River Warlord = Rivera Militestro
Askia, leader of the Songhai people and greatest of all, may God watch your path towards glory! Songhai was under the rule of the mighty West African state of Mali until the middle of the 14th century. Great King Sunni Ali Ber fought for independance, and showed to all Songhai's power, by conquering territories and repelling many foes who sought to destroy the rising kingdom. Ultimately, conquest of the wealthy cities of Timbuktu and Jenne made Songhai an empire with enough economic power to survive for a century, until the empire bowed down before foes with advanced technology - muskets against spearmen. = Askia, gvidanto de la Songhaja popolo kaj plej granda el ĉiuj, Dio gardu vian vojon al gloro! Songhajo estis sub la regado de la potenca okcidentafrika ŝtato Malio ĝis la mezo de la 14-a jarcento. Granda Reĝo Sunni Ali Ber batalis por sendependeco kaj montris al ĉiuj la potencon de Songhajo, konkerante teritoriojn kaj repelante multajn malamikojn, kiuj celis detrui la leviĝantan regnon. Fine, la konkero de la riĉaj urboj Timbuktuo kaj Jenne igis Songhajon imperio kun sufiĉa ekonomia potenco por pluvivi dum jarcento, ĝis la imperio kliniĝis antaŭ malamikoj kun altnivela teknologio — musketoj kontraŭ lancistoj.
King Askia, your people know there's still hope, that the hour of revenge is coming. Give them wealth and power, give them mighty weapons of iron and fire, to destroy any foe, for Songhai to revive! Will your new empire shine through the ages of history? = Reĝo Askia, via popolo scias, ke ankoraŭ ekzistas espero, ke la horo de venĝo venas. Donu al ili riĉecon kaj potencon, donu al ili potencajn armilojn el fero kaj fajro, por detrui ĉiun malamikon, por ke Songhajo reviviĝu! Ĉu via nova imperio brilos tra la epokoj de historio?
