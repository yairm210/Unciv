Sejong = Sejong
Jip-hyun-jun (Hall of Worthies) will no longer tolerate your irksome behavior. We will liberate the citizens under your oppression even with force, and enlighten them! = Jip-hyun-jun (Halo de Induloj) ne plu toleros vian ĝenan konduton. Ni liberigos la civitanojn sub via subpremo eĉ per forto, kaj klerigos ilin!
Foolish, miserable wretch! You will be crushed by this country's magnificent scientific power! = Malsaĝa, mizera fiulo! Vi estos dispremita de la grandioza scienca potenco de ĉi tiu lando!
Now the question is who will protect my people. A dark age has come. = Nun la demando estas, kiu protektos mian popolon. Malluma epoko venis.
Your words reveal more of your own prejudice than any fault in my own. = Viaj vortoj malkaŝas pli da via propra antaŭjuĝo ol iun ajn kulpon en mi.
Welcome to the palace of Choson, stranger. I am the learned King Sejong, who looks after his great people. = Bonvenon al la palaco de Ĉosono, fremdulo. Mi estas la klera Reĝo Sejong, kiu zorgas pri sia granda popolo.
We have many things to discuss and have much to benefit from each other. = Ni havas multajn aferojn por diskuti kaj multe por profiti unu de la alia.
Oh, it's you = Ho, estas vi
Scholars of the Jade Hall = Kleruloj de la Jada Halo
Greetings to you, King Sejong the Great, heir of the Choson Dynasty! Prosperity and benevolence towards the common man are the principles of your reign, and made of you the most beloved Korean king. You always aimed to provide a fair and equal society for all your people, and also to favor knowledge and technological discoveries. Your wisdom and intelligence imbued all the Korean society, and the scholars of the Jade Hall developed Korea's first written language, Hangul, sharing further literature and science to the people after centuries of darkness. = Saluton al vi, Reĝo Sejong la Granda, heredanto de la Ĉosona Dinastio! Prospero kaj bonvolemo al la ordinara homo estas la principoj de via regado, kaj faris vin la plej amata korea reĝo. Vi ĉiam celis provizi justan kaj egalan socion por via tuta popolo, kaj ankaŭ favori scion kaj teknologiajn malkovrojn. Via saĝeco kaj inteligento trapenetris la tutan korean socion, kaj la kleruloj de la Jada Halo evoluigis la unuan skriban lingvon de Koreio, Hangulon, disvastigante pluan literaturon kaj sciencon al la popolo post jarcentoj da mallumo.
Wise Sejong, will you gift your people with the radiance of harmony and knowledge to dispel the darkness once again? Will your new empire shine through the ages of history? = Saĝa Sejong, ĉu vi donos al via popolo la brilon de harmonio kaj scio por denove dispeli la mallumon? Ĉu via nova imperio brilos tra la epokoj de historio?
