Theodora = Teodora
It is always a shame to destroy a thing of beauty. Happily, you are not one. = Ĉiam estas domaĝo detrui belaĵon. Feliĉe, vi ne estas tia.
Now darling, tantrums are most unbecoming. I shall have to teach you a lesson. = Nu, karulo, koleratakoj estas tre maldecaj. Mi devos instrui al vi lecionon.
Like a child playing with toys you are. My people will never love you, nor suffer this indignation gracefully. = Vi estas kiel infano ludanta per ludiloj. Mia popolo neniam amos vin, nek digne toleros ĉi tiun indignon.
My, isn't this a pleasant surprise - what may I call you, oh mysterious stranger? I am Theodora, beloved of Byzantium. = Ho, kia agrabla surprizo — kiel mi nomu vin, ho mistera fremdulo? Mi estas Teodora, amata de Bizanco.
I have heard that you adept at certain kinds of ... interactions. Show me. = Mi aŭdis, ke vi lertas pri certaj specoj de ... interagoj. Montru al mi.
Hello again. = Saluton denove.
Patriarchate of Constantinople = Patriarkejo de Konstantinopolo
Magnificent Empress Theodora, beloved of Byzantium and of Rome, your people salute you! With your beauty and intelligence, you rose up from actress and courtesan to the rank of the most powerful woman in the Roman Empire, as wife of Justinian I. In the late 520's AD, you helped your husband engage in spiritual and legal reforms, promugalting numerous laws to improve women's status and treatment in the empire. You also made of Constantinople the jewel of the Eastern Roman Empire with the restoration and construction of many aqueducts, bridges, and churches, its beauty culminating with the creation of the Hagia Sophia, one of the most splendid pieces of architecture in the world. = Grandioza Imperiestrino Teodora, amata de Bizanco kaj de Romo, via popolo salutas vin! Per via beleco kaj inteligento vi leviĝis de aktorino kaj korteganino al la rango de la plej potenca virino en la Romia Imperio, kiel edzino de Justiniano la 1-a. Fine de la 520-aj jaroj p.K., vi helpis vian edzon entrepreni spiritajn kaj jurajn reformojn, proklamante multajn leĝojn por plibonigi la statuson kaj traktadon de virinoj en la imperio. Vi ankaŭ faris el Konstantinopolo la juvelon de la Orienta Romia Imperio per la restaŭrado kaj konstruado de multaj akveduktoj, pontoj kaj preĝejoj, kies beleco kulminis per la kreo de Hagia Sofia, unu el la plej brilaj arkitekturaĵoj en la mondo.
Beautiful Empress,the Byzantine Empire's magnificence is intact in all memories, and ready to reborn as the new jewel of humankind. Will your new empire shine through the ages of history? = Bela Imperiestrino, la grandiozeco de la Bizanca Imperio restas netuŝita en ĉiuj memoroj kaj pretas renaskiĝi kiel la nova juvelo de la homaro. Ĉu via nova imperio brilos tra la epokoj de historio?
