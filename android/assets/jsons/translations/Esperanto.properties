Pachacuti = Paĉakutio
Resistance is futile! You cannot hope to stand against the mighty Incan empire. If you will not surrender immediately, then prepare for war! = Rezisto estas vana! Vi ne povas esperi stari kontraŭ la potenca Inkaa Imperio. Se vi ne tuj kapitulacos, preparu vin por milito!
Declare war on me?!? You can't, because I declare war on you first! = Deklari militon kontraŭ mi?!? Vi ne povas, ĉar mi deklaras militon kontraŭ vi unue!
How did you darken the sun? I ruled with diligence and mercy—see that you do so as well. = Kiel vi mallumigis la sunon? Mi regis kun diligento kaj kompato — zorgu, ke ankaŭ vi tiel faru.
How are you? You stand before Pachacuti Inca Yupanqui. = Kiel vi fartas? Vi staras antaŭ Paĉakutio Inkaa Jupanki.
The Incan people offer this fair trade. = La Inkaa popolo proponas ĉi tiun justan komercon.
How are you doing? = Kiel vi fartas?
What do you want now? = Kion vi volas nun?
Great Andean Road = Granda Anda Vojo
King Pachacuti Sapa Inca, maker of the world and ruler of Tawantinsuyu and the Inca people, your loyal subjects greet you! In the beginning, the small state of Cusco already showed the Incans were promised for greatness. They won many wars against powerful enemies, relentlessly crushing any army that dared oppose them, and forged a mighty empire stretching from Ecuador to Chile, the greatest ever seen in pre-Columbian America. Not just undaunted soldiers, Inca people were accomplished builders and artists, their magnificient and unequalled culture still fascinating the world today. = Reĝo Paĉakutio Sapa Inkao, farinto de la mondo kaj reganto de Tawantinsuyu kaj de la Inkaa popolo, viaj lojalaj regatoj salutas vin! Komence, la malgranda ŝtato Kusko jam montris, ke la Inkaoj estis destinitaj al grandeco. Ili venkis multajn militojn kontraŭ potencaj malamikoj, senkompate dispremante ĉiun armeon, kiu kuraĝis kontraŭstari ilin, kaj forĝis potencan imperion etendiĝantan de Ekvadoro ĝis Ĉilio, la plej grandan iam viditan en antaŭkolumba Ameriko. Ne nur sentimaj soldatoj, la Inkaa popolo estis lertaj konstruistoj kaj artistoj, kaj ilia grandioza kaj senegala kulturo ankoraŭ fascinas la mondon hodiaŭ.
O Emperor Pachacuti, honor your name of 'Earth Shaker'! Will you once again summon the power of the earth to unite all Incan people under the protection of Sapa Inca, the Son of the Sun? Will your new empire shine through the ages of history? = Ho Imperiestro Paĉakutio, honoru vian nomon de 'Terskuanto'! Ĉu vi denove alvokos la potencon de la tero por unuigi la tutan Inkaan popolon sub la protekto de Sapa Inkao, la Filo de la Suno? Ĉu via nova imperio brilos tra la epokoj de historio?
