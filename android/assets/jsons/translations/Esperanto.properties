Now what is this?! You ask me to add your riches to my great avails. The invitation is accepted. = Nu kio estas ĉi tio?! Vi petas min aldoni viajn riĉaĵojn al miaj grandaj akiroj. La invito estas akceptita.
My people will mourn me not with tears, but with human blood. = Mia popolo priploros min ne per larmoj, sed per homa sango.
Do you know who you're dealing with? = Ĉu vi scias, kun kiu vi traktas?
You are in the presence of Attila, scourge of Rome. Do not let hubris be your downfall as well. = Vi estas en la ĉeesto de Atilo, skurĝo de Romo. Ne lasu arogantecon esti ankaŭ via pereo.
This is better than you deserve, but let it not be said that I am an unfair man. = Ĉi tio estas pli bona ol vi meritas, sed oni ne diru, ke mi estas maljusta viro.
Good day to you. = Bonan tagon al vi.
Scourge of God = Skurĝo de Dio
Great Attila, mighty warrior and leader of the Hunnic empire, your men bow down before you. During the 5th century, you and your brother Bleda have conquered many lands, forged a mighty empire and commanded the most powerful and frightening force of antiquity. You inspired fear to the Roman Emperors themselves, who called you 'Flagellum Dei', the 'Scourge of God', as you took kingdom after kingdom in the Balkans, invaded Eastern Roman Empire, into Gaul and Northern Italy, and planned to conquer Rome itself. Your empire didn't survive long after your death, but your name and your legend have, for millenia to come. = Granda Atilo, potenca militisto kaj gvidanto de la Huna imperio, viaj viroj kliniĝas antaŭ vi. Dum la 5-a jarcento, vi kaj via frato Bleda konkeris multajn landojn, forĝis potencan imperion kaj komandis la plej potencan kaj timigan forton de la antikveco. Vi inspiris timon al la Romiaj Imperiestroj mem, kiuj nomis vin 'Flagellum Dei', la 'Skurĝo de Dio', dum vi prenis regnon post regno en Balkanoj, invadis la Orientan Romian Imperion, Gaŭlion kaj Nordan Italion, kaj planis konkeri Romon mem. Via imperio ne longe pluvivis post via morto, sed via nomo kaj via legendo jes, dum venontaj jarmiloj.
Fearsome General, your mighty hordes are at your command, waiting to crush your foes once again and to conquer all the riches the world has to offer! Will your new empire shine through the ages of history? = Timiga Generalo, viaj potencaj hordoj estas sub via komando, atendante dispremi viajn malamikojn denove kaj konkeri ĉiujn riĉaĵojn, kiujn la mondo havas por proponi! Ĉu via nova imperio brilos tra la epokoj de historio?
