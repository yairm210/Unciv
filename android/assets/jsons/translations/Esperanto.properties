# Capturing a city

What would you like to do with the city of [cityName]? = Kion vi ŝatus fari kun la urbo [cityName]?
Annex = Aneksi
Annexed cities become part of your regular empire. = Aneksitaj urboj fariĝas parto de via regula imperio.
Their citizens generate 2x the unhappiness, unless you build a courthouse. = Iliaj civitanoj kaŭzas duoble da malfeliĉo, krom se vi konstruas juĝejon.
Your civilization may not annex this city. = Via civilizacio ne rajtas aneksi ĉi tiun urbon.
Puppet = Marionetigi
Puppeted cities do not increase your tech or policy cost. = Marionetaj urboj ne pliigas vian teknologian aŭ politikan koston.
You have no control over the the production of puppeted cities. = Vi ne regas la produktadon de marionetaj urboj.
Puppeted cities also generate 25% less Science and Culture. = Marionetaj urboj ankaŭ produktas 25% malpli da scienco kaj kulturo.
A puppeted city can be annexed at any time. = Marioneta urbo povas esti aneksita iam ajn.
Liberate (city returns to [originalOwner]) = Liberigi (urbo revenas al [originalOwner])
Liberating a city returns it to its original owner, giving you a massive relationship boost with them! = Liberigi urbon redonas ĝin al ĝia origina posedanto, donante al vi grandegan plibonigon de rilatoj kun ili!
Raze = Forbruligi
Razing the city annexes it, and starts burning the city to the ground. = Forbruligo de la urbo aneksas ĝin kaj komencas bruligi ĝin ĝis la tero.
Razing the city puppets it, and starts burning the city to the ground. = Forbruligo de la urbo marionetigas ĝin kaj komencas bruligi ĝin ĝis la tero.
The population will gradually dwindle until the city is destroyed. = La loĝantaro iom post iom malkreskos ĝis la urbo estos detruita.
Original capitals and holy cities cannot be razed. = Originaj ĉefurboj kaj sanktaj urboj ne povas esti forbruligitaj.
Destroy = Detrui
Destroying the city instantly razes the city to the ground. = Detrui la urbon tuj forbruligas ĝin ĝis la tero.
Keep it = Konservi ĝin
Remove your troops in our border immediately! = Forigu viajn trupojn el niaj landlimoj tuj!
Sorry. = Pardonon.
Never! = Neniam!
Those lands were not yours to take. This has not gone unnoticed. = Tiuj landoj ne estis viaj por preni. Tio ne pasis nerimarkite.

