Harun al-Rashid = Harun al-Raŝid
The world will be more beautiful without you. Prepare for war. = La mondo estos pli bela sen vi. Preparu vin por milito.
Fool! You will soon regret dearly! I swear it! = Malsaĝulo! Vi baldaŭ amare bedaŭros! Mi ĵuras tion!
You have won, congratulations. My palace is now in your possession, and I beg that you care well for the peacock. = Vi venkis, gratulon. Mia palaco nun estas en via posedo, kaj mi petegas, ke vi bone zorgu pri la pavo.
Our future battle will be glorious. = Nia estonta batalo estos glora.
Welcome foreigner, I am Harun Al-Rashid, Caliph of the Arabs. Come and tell me about your empire. = Bonvenon, fremdulo, mi estas Harun al-Raŝid, Kalifo de la Araboj. Venu kaj rakontu al mi pri via imperio.
Come forth, let's do business. = Venu antaŭen, ni faru negocon.
Peace be upon you. = Paco estu kun vi.
Trade Caravans = Komercaj Karavanoj
Blessings of the Great God be upon you, O great caliph Harun al-Rashid, leader of the mighty Arabian people! The Muslim Empire, the Caliphate, born from chaos after the death of the prophet Muhammad in 632 AD, intended to apply the rule of God to all Earth. And by the will of God, the caliphate reached its full power, ruling Spain, North Africa, the Middle East, Anatolia, the Balkans and Persia, to even surpass the Great Roman Empire. The arts and sciences were a holy gift of Arabia during the Middle Ages, as the infidel lands of Europe delved deep into ignorance and chaos. Lasting for six hundred years, the Caliphate finally fell before the Mongols, the plague of the civilized world. = Benoj de la Granda Dio estu sur vi, ho granda kalifo Harun al-Raŝid, gvidanto de la potenca araba popolo! La islama Imperio, la Kaliflando, naskiĝinta el kaoso post la morto de la profeto Mohamedo en 632 p.K., celis apliki la regadon de Dio al la tuta Tero. Kaj laŭ la volo de Dio, la Kaliflando atingis sian plenan potencon, regante Hispanion, Nordan Afrikon, Mezorienton, Anatolion, Balkanion kaj Persujon, eĉ superante la Grandan Romian Imperion. Artoj kaj sciencoj estis sankta donaco de Arabio dum la Mezepoko, dum la nekredantaj landoj de Eŭropo profundiĝis en nescion kaj kaoson. Daŭrinte sescent jarojn, la Kaliflando fine falis antaŭ la Mongoloj, la plago de la civilizita mondo.
Great Caliph Harun al Rashid, all Arabian people long for greatness! Arabia must be once again the land of arts and knowledge, which under the radiant law of God, will fear no enemy! Will your new empire shine through the ages of history? = Granda Kalifo Harun al-Raŝid, la tuta araba popolo sopiras al grandeco! Arabio denove devas esti la lando de artoj kaj scio, kiu sub la radianta leĝo de Dio timos neniun malamikon! Ĉu via nova imperio brilos tra la epokoj de historio?
