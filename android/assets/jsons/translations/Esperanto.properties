Suleiman I = Sulejmano la 1-a
Your continued insolence and failure to recognize our preeminence leads us to war. = Via daŭra impertinenteco kaj malsukceso rekoni nian superecon kondukas nin al milito.
Good. The world shall witness the incontestable might of my armies and the glory of the Empire. = Bone. La mondo atestos la nekontesteblan potencon de miaj armeoj kaj la gloron de la Imperio.
Ruin! Ruin! Istanbul becomes Iram of the Pillars, remembered only by the melancholy poets. = Ruino! Ruino! Istanbulo fariĝas Iram de la Kolonoj, memorata nur de melankoliaj poetoj.
From the magnificence of Topkapi, the Ottoman nation greets you, stranger! I'm Suleiman, Kayser-I Rum, and I bestow upon you my welcome! = El la grandiozeco de Topkapi, la otomana nacio salutas vin, fremdulo! Mi estas Sulejmano, Kayser-i Rum, kaj mi donas al vi mian bonvenigon!
Let us do business! Would you be interested? = Ni faru negocon! Ĉu vi interesiĝus?
Barbary Corsairs = Barbariaj Korsaroj
O Great Sultan Suleiman, may the God bless you! You are revered for your power, wealth and generosity, and you truly deserves to be called the 'Magnificent'! The Ottoman Empire was born in Bithynia, starting as a small country in Eastern Anatolia in 12th century, then expanded to west into Anatolia. Over the next century, your people vanquished the empire of Byzantium, annexing Turkey and the Balkans, and smartly assimilating all wonders and knowledge of the Byzantine civilization. In the mid 15th century, the Ottomans added Constantinople to their empire, establishing a strategic link between Europe and the Middle East. The Empire would continue to expand for centuries reaching North Africa, Middle East and Eastern Europe at its height, but brutally disappeared in the chaos of the first world war, in early 20th century. = Ho Granda Sultano Sulejmano, Dio benu vin! Vi estas honorata pro via potenco, riĉeco kaj malavareco, kaj vi vere meritas esti nomata la 'Grandioza'! La Otomana Imperio naskiĝis en Bitinio, komenciĝante kiel malgranda lando en orienta Anatolio en la 12-a jarcento, poste vastiĝis okcidenten en Anatolion. Dum la sekva jarcento, via popolo venkis la Bizancan Imperion, aligis Turkion kaj Balkanion, kaj lerte asimilis ĉiujn mirindaĵojn kaj sciojn de la bizanca civilizacio. Meze de la 15-a jarcento, la Otomanoj aldonis Konstantinopolon al sia imperio, starigante strategian ligon inter Eŭropo kaj Mez-Oriento. La Imperio plu vastiĝis dum jarcentoj, atingante Nordan Afrikon, Mez-Oriento kaj Orientan Eŭropon ĉe sia pinto, sed brutale malaperis en la kaoso de la unua mondmilito, komence de la 20-a jarcento.
Mighty Caliph, your people ask you to build again the Empire, to the level of power and glory it once achieved, and beyond! Will you revive the Ottoman golden age? Will your new empire shine through the ages of history? = Potenca Kalifo, via popolo petas vin rekonstrui la Imperion ĝis la nivelo de potenco kaj gloro, kiun ĝi iam atingis, kaj eĉ preter tio! Ĉu vi revivigos la otomanan oran epokon? Ĉu via nova imperio brilos tra la epokoj de historio?
