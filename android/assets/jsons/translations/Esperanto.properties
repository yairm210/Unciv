Congratulations, conqueror. This tribe serves you now. = Gratulon, konkeranto. Ĉi tiu tribo nun servas vin.
Mogadishu = Mogadiŝo

We were too weak to protect ourselves... = Ni estis tro malfortaj por protekti nin...
Quebec City = Kebekurbo

Ragusa = Raguzo

I have to do this, for the sake of progress if nothing else. You must be opposed! = Mi devas fari ĉi tion, almenaŭ pro progreso. Oni devas kontraŭstari vin!
You can see how fruitless this will be for you... right? = Vi povas vidi, kiel vana ĉi tio estos por vi... ĉu ne?
May God grant me these last wishes - peace and prosperity for Brazil. = Dio donu al mi ĉi tiujn lastajn dezirojn — pacon kaj prosperon por Brazilo.
Rio de Janeiro = Rio-de-Ĵanejro

Perhaps, in another world, we could have been friends... = Eble, en alia mondo, ni povus esti amikoj...
Singapore = Singapuro

After thorough deliberation, Australia finds itself at a crossroads. Prepare yourself, for war is upon us. = Post zorga pripensado, Aŭstralio troviĝas ĉe vojkruciĝo. Preparu vin, ĉar milito venas al ni.
We will mobilize every means of resistance to stop this transgression against our nation! = Ni mobilizos ĉiun rimedon de rezisto por haltigi ĉi tiun malobservon kontraŭ nia nacio!
The principles for which we have fought will survive longer than any nation you could ever build. = La principoj, por kiuj ni batalis, pluvivos pli longe ol iu ajn nacio, kiun vi iam povus konstrui.
Sydney = Sidnejo

I will enjoy hearing your last breath as you witness the destruction of your realm! = Mi ĝuos aŭdi vian lastan spiron dum vi atestos la detruon de via regno!
Why do we fight? Because Inanna demands it. Now, witness the power of the Sumerians! = Kial ni batalas? Ĉar Inanna postulas tion. Nun atestu la potencon de la Sumeranoj!
What treachery has struck us? No, what evil? = Kia perfido trafis nin? Ne, kia malbono?
Ur = Ur

In responding to the unstinting malignancy that has heretofore defined your relationship with Canada, we can have no recourse but war! = Responde al la senĉesa maliceco, kiu ĝis nun difinis vian rilaton kun Kanado, ni havas neniun rimedon krom milito!
As we can reach no peaceful resolution with you, Canada must turn, with reluctance, to war. = Ĉar ni ne povas atingi pacan solvon kun vi, Kanado devas, kontraŭvole, turniĝi al milito.
I regret not defending my country to the last, although it was not of use. = Mi bedaŭras, ke mi ne defendis mian landon ĝis la fino, kvankam tio ne utilus.
Vancouver = Vankuvero

You have revealed your purposes a bit too early, my friend... = Vi malkaŝis viajn celojn iom tro frue, mia amiko...
A wrong calculation, on my part. = Malĝusta kalkulo miaflanke.
Venice = Venecio

They will write songs of this.... pray that they shall be in your favor. = Oni verkos kantojn pri ĉi tio.... preĝu, ke ili estu favoraj al vi.
Antwerp = Antverpeno

May the Heavens forgive you for inflicting this humiliation to our people. = La Ĉieloj pardonu vin pro kaŭzo de ĉi tiu humiligo al nia popolo.
Zanzibar = Zanzibaro

How could we fall to the likes of you?! = Kiel ni povis fali antaŭ tiaj kiel vi?!
Almaty = Almato

Let's have a nice little War, shall we? = Ni havu agrablan malgrandan militon, ĉu?
If you need your nose bloodied, we'll happily serve. = Se vi bezonas sangigi vian nazon, ni volonte servos.
The serbian guerilla will never stop haunting you! = La serba gerilo neniam ĉesos hanti vin!
Belgrade = Beogrado

Budapest = Budapeŝto

War lingers in our hearts. Why carry on with a false peace? = Milito restas en niaj koroj. Kial daŭrigi falsan pacon?
You gormless radger! You'll dine on your own teeth before you set foot in Ireland! = Vi seninteligenta frenezulo! Vi manĝos viajn proprajn dentojn antaŭ ol meti piedon en Irlandon!
A lonely wind blows through the highlands today. A dirge for Ireland. Can you hear it? = Soleca vento blovas tra la altebenaĵoj hodiaŭ. Funebra kanto por Irlando. Ĉu vi aŭdas ĝin?
Dublin = Dublino

You shall stain this land no longer with your vileness! To arms, my countrymen - we ride to war! = Vi ne plu makulos ĉi tiun landon per via fieco! Al armiloj, miaj samlandanoj — ni rajdas al milito!
Traitorous man! The Celtic peoples will not stand for such wanton abuse and slander - I shall have your head! = Perfida homo! La keltaj popoloj ne toleros tian senbridan misuzon kaj kalumnion — mi havos vian kapon!
Vile ruler, know that you 'won' this war in name only! = Fia reganto, sciu, ke vi 'venkis' ĉi tiun militon nur laŭnome!
Edinburgh = Edinburgo

So this is how it feels to die... = Do jen kiel sentiĝas morti...
Hanoi = Hanojo

Do you really think you can walk over us so easily? I will not let it happen. Not to Kongo - not to my people! = Ĉu vi vere pensas, ke vi povas tiel facile piedpremi nin? Mi ne lasos tion okazi. Ne al Kongo — ne al mia popolo!
We are no strangers to war. You have strayed from the right path, and now we will correct it. = Milito ne estas fremda al ni. Vi devojiĝis de la ĝusta vojo, kaj nun ni korektos tion.
You are nothing but a glorified barbarian. Cruel, and ruthless. = Vi estas nenio krom glorata barbaro. Kruela kaj senkompata.
M'Banza-Kongo = M'Banza-Kongo

What a fine battle! Sidon is willing to serve you! = Kia bela batalo! Sidono pretas servi vin!
Sidon = Cidono

We never fully trusted you from the start. = Ni neniam plene fidis vin ekde la komenco.
Tyre = Tiro

We don't like your face. To arms! = Ni ne ŝatas vian vizaĝon. Al armiloj!
You will see you have just bitten off more than you can chew. = Vi vidos, ke vi ĵus entreprenis pli ol vi povas trakti.
This ship may sink, but our spirits will linger. = Ĉi tiu ŝipo povas sinki, sed niaj spiritoj restos.
Valletta = Valeto


