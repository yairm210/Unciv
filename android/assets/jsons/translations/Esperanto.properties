Ramesses II = Ramzes la 2-a
You are but a pest on this Earth, prepare to be eliminated! = Vi estas nur parazito sur ĉi tiu Tero; preparu vin por esti ekstermita!
You are a fool who evokes pity. You have brought my hostility upon yourself and your repulsive civilization! = Vi estas malsaĝulo, kiu vekas kompaton. Vi mem venigis mian malamikecon sur vin kaj vian abomenindan civilizacion!
Strike me down and my soul will torment yours forever, you have won nothing. = Faligu min, kaj mia animo turmentos la vian por ĉiam; vi gajnis nenion.
Greetings, I am Ramesses the god. I am the living embodiment of Egypt, mother and father of all civilizations. = Saluton, mi estas Ramzes la dio. Mi estas la viva enkorpigo de Egiptio, patrino kaj patro de ĉiuj civilizacioj.
Generous Egypt makes you this offer. = Malavara Egiptio faras al vi ĉi tiun proponon.
Good day. = Bonan tagon.
Oh, it's you. = Ho, estas vi.
Monument Builders = Monumentaj Konstruistoj
O great Ramesses, Pharaoh of Egypt, bright as the Sun and mighty as the Nile! Lord of all living things, you lead the greatest of all civilizations, which has gifted the world with writing, advanced mathematics, sculpture, and architecture. Egyptian monuments and culture will continue to amaze the world for thousands of years. = Ho granda Ramzes, Faraono de Egiptio, brila kiel la Suno kaj potenca kiel Nilo! Sinjoro de ĉiuj vivantaj estaĵoj, vi gvidas la plej grandan el ĉiuj civilizacioj, kiu donacis al la mondo skribon, altnivelan matematikon, skulptarton kaj arkitekturon. Egiptaj monumentoj kaj kulturo daŭre mirigos la mondon dum miloj da jaroj.
Mighty and eternal Ramesses, Egypt lasted for millenia, whereas other civilisations disappeared into dust after a few centuries. Amun-Ra blesses you again to lead Egypt and its people on the path of light. Will your new empire shine through the ages of history? = Potenca kaj eterna Ramzes, Egiptio daŭris jarmilojn, dum aliaj civilizacioj malaperis en polvon post kelkaj jarcentoj. Amon-Ra denove benas vin por gvidi Egiption kaj ĝian popolon sur la vojo de lumo. Ĉu via nova imperio brilos tra la epokoj de historio?
