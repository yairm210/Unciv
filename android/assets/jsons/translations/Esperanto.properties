########################### Special settings and rules ###########################
# DO NOT TRANSLATE ANY OF THESE LITERALLY
# Unlike the rest of the file, these are rules looked up by a key. Read the individual instructions.

# Equivalent of a space in your language
# If your language doesn't use spaces, just add "" as a translation, otherwise " "
" " = " "

# If the first word in a sentence starts with a capital letter in your language,
# put the english word 'true' behind the '=', otherwise 'false'.
# Don't translate these words to your language, only put 'true' or 'false'.
StartWithCapitalLetter = true

# See the "Trigger notifications" header elsewhere in this file.
# Since each cause can be paired with each effect we need to create the final string by adding them together.
# If your language puts the effect before the cause - like {Gained [2] [Worker] unit(s)} {due to constructing [The Pyramids]} -
# put the english word 'true' behind the '=', otherwise 'false'.
# Don't translate these words to your language, only put 'true' or 'false'. Defaults to 'true'.
EffectBeforeCause = true

# Place conditionals before or after the body of the unique:
# Example: In the unique "+20% Strength <for [unitFilter] units>", should the <for [unitFilter] units>
# be translated before or after the "+20% Strength"?
# It should be translated with only the untranslated english word 'before' or 'after', without the quotes.
ConditionalsPlacement = after

# Reorder conditionals (optional):
# This determines the exact ordering of all conditionals that are to be translated.
# Please see the wiki for details how it works, and what the default is.
# If you use it, make sure to include the `<` `>` brackets for each, use generic placeholders (untranslated),
# each conditional is listed only once, and each is an actual UniqueType as listed in the wiki for modders.
ConditionalsOrder = 

# Diacritics Support:
# See https://yairm210.github.io/Unciv/Translating/Translating/#diacritics-support for details!
# Most languages will not need these, feel free to ignore, or use "" to avoid the "requires translation" mark. Do NOT translate the "key" to the left of the equals sign!
diacritics_support = ""
unicode_block_start_character = ""
unicode_block_end_character = ""
left_joining_diacritics = ""
right_joining_diacritics = ""
left_and_right_joiners = ""

# Fastlane
# These will be automatically copied to the fastlane descriptions used by F-Droid. Their keys are not as usual the english original, please read those directly as linked.

# Documentation: https://f-droid.org/en/docs/Build_Metadata_Reference/#Summary
# English to translate: https://github.com/yairm210/Unciv/blob/master/fastlane/metadata/android/en-US/short_description.txt
Fastlane_short_description = Malfermfonta 4X-strategia civilizaciokonstrua ludo

# Documentation: https://f-droid.org/en/docs/Build_Metadata_Reference/#Description
# English to translate: https://github.com/yairm210/Unciv/blob/master/fastlane/metadata/android/en-US/full_description.txt
Fastlane_full_description = Malfermfonta reimplementado de la plej fama civilizaciokonstrua ludo de ĉiuj tempoj — rapida, malpeza, sen reklamoj, por ĉiam senpaga!\n\nKonstruu vian civilizacion, esploru teknologiojn, vastigu viajn urbojn kaj venku viajn malamikojn!\n\nPetoj? Cimoj? Ĉu vi volas helpi la disvolvon? Cimspurilo de la aplikaĵo <a href="https://github.com/yairm210/Unciv/issues">GitHub-temoj de Unciv</a>\n\nĈu demandoj? Ĉu komentoj? Aliĝu al ni ĉe Discord ĉe <a href="https://discord.gg/bjrB4Xw">Unciv Discord</a> ;)\n\nĈu vi volas helpi traduki la ludon al via lingvo? Vidu <a href="https://yairm210.github.io/Unciv/Translating/Translating/">Vikio por traduki</a>\n\nLa mondo atendas! Ĉu vi konstruos vian civilizacion en imperion, kiu eltenos la provon de la tempo?\n\nLa permeso “plena reta aliro” estas bezonata por uzant-iniciataj elŝutoj kaj por la plurludanta reĝimo. Ĉiuj aliaj listigitaj permesoj estas inkluzivitaj aŭtomate de la API uzata por realigi plurludantajn vicosciigojn. Retaj permesoj estas uzataj por listigi modifaĵojn, elŝuti modifaĵojn, elŝuti muzikon kaj alŝuti/elŝuti plurludantajn ludojn. Neniu alia interreta komunikado estas iniciata de Unciv.


