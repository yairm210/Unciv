Maria Theresa = Maria Tereza
Shame that it has come this far. But ye wished it so. Next time, be so good, choose your words more wisely. = Domaĝe, ke aferoj atingis ĉi tiun punkton. Sed vi tiel deziris. Venontfoje, estu tiel bona kaj elektu viajn vortojn pli saĝe.
What a fool ye are! Ye will end swiftly and miserably. = Kia malsaĝulo vi estas! Vi finiĝos rapide kaj mizere.
The world is pitiful! There's no beauty in it, no wisdom. I am almost glad to go. = La mondo estas kompatinda! En ĝi estas nek beleco nek saĝo. Mi preskaŭ ĝojas foriri.
The archduchess of Austria welcomes your Eminence to... Oh let's get this over with! I have a luncheon at four o'clock. = La arkidukino de Aŭstrio bonvenigas vian Eminenton al... Ho, ni finu ĉi tion! Mi havas tagmanĝeton je la kvara.
I see you admire my new damask. Nobody should say that I am an unjust woman. Let's reach an agreement! = Mi vidas, ke vi admiras mian novan damaskon. Neniu devus diri, ke mi estas maljusta virino. Ni atingu interkonsenton!
Oh, it's ye! = Ho, estas vi!
Diplomatic Marriage = Diplomatia Geedziĝo
Noble and pious Queen Maria Theresa, Holy Roman Empress and sovereign of Austria, the people revere your grace. After the death of your father King Charles VI, you inherited the throne of Austria during difficult economic and military times. But you used your wisdom and unflinching determination to fend off your foes and resolve any obstacles to stability and prosperity. With your husband Francis Stephen at your side as co-ruler, you assured your place as Empress of the Holy Roman Empire. During your reign, you reformed Austria in several domains, as you gifted it with a powerful army, a stable economic model, and an improved educational system. = Nobla kaj pia Reĝino Maria Tereza, Sankta Romia Imperiestrino kaj suverenino de Aŭstrio, la popolo respektas vian gracon. Post la morto de via patro Reĝo Karlo la 6-a, vi heredis la tronon de Aŭstrio dum malfacilaj ekonomiaj kaj militaj tempoj. Sed vi uzis vian saĝon kaj neflekseblan decidemon por forpuŝi viajn malamikojn kaj solvi ĉiujn obstaklojn al stabileco kaj prospero. Kun via edzo Francisko Stefano ĉe via flanko kiel kunreganto, vi certigis vian lokon kiel Imperiestrino de la Sankta Romia Imperio. Dum via regado vi reformis Aŭstrion en pluraj kampoj, donacante al ĝi potencan armeon, stabilan ekonomian modelon kaj plibonigitan edukan sistemon.
O Great Queen, proud and dignified, by the will of God and the Divine right, can you reach the height of prosperity and splendor the kingdom of Austria deserves? Will your new empire shine through the ages of history? = Ho Granda Reĝino, fiera kaj digna, laŭ la volo de Dio kaj la dia rajto, ĉu vi povas atingi la altecon de prospero kaj brilo, kiun la regno de Aŭstrio meritas? Ĉu via nova imperio brilos tra la epokoj de historio?
