Augustus Caesar = Aŭgusto Cezaro
My treasury contains little and my soldiers are getting impatient... (sigh) ...therefore you must die. = Mia trezorejo enhavas malmulton kaj miaj soldatoj fariĝas senpaciencaj... (suspiro) ...tial vi devas morti.
So brave, yet so stupid! If only you had a brain similar to your courage. = Tiel kuraĝa, tamen tiel stulta! Se nur vi havus cerbon similan al via kuraĝo.
The gods have deprived Rome of their favour. We have been defeated. = La dioj senigis Romon je sia favoro. Ni estis venkitaj.
I wasn't sure, but it seems you do have some grit. = Mi ne certis, sed ŝajnas, ke vi ja havas iom da kuraĝa persistemo.
I greet you. I am Augustus, Imperator and Pontifex Maximus of Rome. If you are a friend of Rome, you are welcome. = Mi salutas vin. Mi estas Aŭgusto, Imperatoro kaj Pontifex Maximus de Romo. Se vi estas amiko de Romo, vi estas bonvena.
I offer this, for your consideration. = Mi proponas ĉi tion por via konsidero.
Hail. = Saluton.
What do you want? = Kion vi volas?
The Glory of Rome = La Gloro de Romo
Ave Caesar Augustus, Emperor of Rome and Dominus of the Roman Empire! Your empire was the most powerful and feared of all in Western civilization. The Roman people crafted so brilliantly its culture, law, art, and warfare, that no one could contest the supremacy of Rome. Force and Honor led to glorious conquests, a domination of all the lands from Spain in the west to Syria in the east, even reaching the remote barbarian lands of England and Germany. Roman art and architecture have been praised for millenia and have been envied by all lesser civilizations who have followed. = Ave, Cezaro Aŭgusto, Imperiestro de Romo kaj Dominus de la Romia Imperio! Via imperio estis la plej potenca kaj timata el ĉiuj en okcidenta civilizacio. La romia popolo tiel brile ellaboris sian kulturon, juron, arton kaj militadon, ke neniu povis kontesti la superecon de Romo. Forto kaj Honoro kondukis al gloraj konkeroj, regado super ĉiuj landoj de Hispanio okcidente ĝis Sirio oriente, eĉ atingante la forajn barbarajn landojn de Anglio kaj Germanio. Romia arto kaj arkitekturo estis laŭdataj dum jarmiloj kaj enviataj de ĉiuj malpli grandaj civilizacioj, kiuj sekvis.
O glorious Imperator, your people celebrate you and ask for the glory of Rome! In these times of darkness, the Pax Romana will be a beacon of light for all! Will your new empire shine through the ages of history? = Ho glora Imperatoro, via popolo festas vin kaj petas la gloron de Romo! En ĉi tiuj tempoj de mallumo, la Pax Romana estos lumturo por ĉiuj! Ĉu via nova imperio brilos tra la epokoj de historio?
