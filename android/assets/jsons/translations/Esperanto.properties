#################### Lines from Global Tutorials ####################

Welcome to Unciv!\nBecause this is a complex game, there are basic tasks to help familiarize you with the game.\nThese are completely optional, and you're welcome to explore the game on your own! = Bonvenon al Unciv!\nĈar ĉi tio estas kompleksa ludo, ekzistas bazaj taskoj, kiuj helpos vin konatiĝi kun la ludo.\nIli estas tute nedevigaj, kaj vi rajtas esplori la ludon memstare!

Welcome to Unciv! = Bonvenon al Unciv!
Because this is a complex game, there are some tutorials to help familiarize you with it. These can be disabled in the Options -> Display menu, but please hang on if you're new here! = Ĉar ĉi tio estas kompleksa ludo, ekzistas kelkaj lerniloj, kiuj helpos vin konatiĝi kun ĝi. Ili povas esti malŝaltitaj en la menuo Agordoj -> Ekrano, sed se vi estas nova, bonvolu ne rezigni tuj!
Your first mission is to found your capital city. This is actually an important task because your capital city will probably be your most prosperous. Many game bonuses apply only to your capital city, and it will be the center of your empire. = Via unua misio estas fondi vian ĉefurbon. Tio efektive estas grava tasko, ĉar via ĉefurbo verŝajne estos via plej prospera urbo. Multaj ludaj bonifikoj aplikiĝas nur al via ĉefurbo, kaj ĝi estos la centro de via imperio.
How do you know a city location is appropriate? Luckily, the game has already chosen a good location for you. You can settle in this place, or maybe move a turn to found on a Hill (for Production and defence) or next to a Mountain (to gain access to the Observatory building later on). = Kiel vi scias, ĉu loko por urbo taŭgas? Feliĉe, la ludo jam elektis bonan lokon por vi. Vi povas fondi urbon tie, aŭ eble moviĝi dum unu vico por fondi ĝin sur monteto (por produktado kaj defendo) aŭ apud monto (por poste aliri la konstruaĵon Observejo).
You'll likely want more cities later on. For these cities, you must go and find a good place. Looking for and founding on or near Luxury resources is a good rule of thumb. = Vi verŝajne volos pli da urboj poste. Por tiuj urboj, vi devos trovi bonan lokon. Serĉi kaj fondi urbon sur aŭ proksime de luksaj rimedoj estas bona ĝenerala regulo.
Luxury resources are tiles that have things like Gems, Cotton, or Silk (indicated by a yellow background of the resource icon). These resources make your civilization happy. You should also keep an eye out for resources needed to build units, such as Iron. Cities cannot be built within 3 tiles of existing cities, which is another thing to keep in mind! = Luksaj rimedoj estas kaheloj kun ekzemple Gemoj, Kotono aŭ Silko (indikataj per flava fono de la rimeda bildsimbolo). Tiuj rimedoj feliĉigas vian civilizacion. Vi ankaŭ atentu rimedojn bezonatajn por konstrui unuojn, kiel Fero. Urboj ne povas esti konstruitaj ene de 3 kaheloj de ekzistantaj urboj; tion ankaŭ indas memori!
Cities will house Citizens, which can work tiles up to 3 tiles away from the city. This means you don’t have to settle cities right on or next to good tiles. Let’s say, for example, that you want access to some Iron – but the resource is in a desert area. You don’t have to settle your city in the desert. You can settle a few tiles away in more prosperous lands. Your city will grow and eventually gain access to the resource. You only need to settle right on top of resources if you need them immediately. = En urboj loĝas civitanoj, kiuj povas labori kahelojn ĝis 3 kahelojn for de la urbo. Tio signifas, ke vi ne devas fondi urbojn rekte sur aŭ tuj apud bonaj kaheloj. Ni diru, ekzemple, ke vi volas aliron al iom da Fero — sed la rimedo estas en dezerta areo. Vi ne devas fondi vian urbon en la dezerto. Vi povas fondi ĝin kelkajn kahelojn for, en pli prospera lando. Via urbo kreskos kaj fine akiros aliron al la rimedo. Vi bezonas fondi urbon rekte sur rimedo nur se vi bezonas ĝin tuj.
The first thing coming out of your city depends on the strategy you want to follow, but the 'classic' build order is to build first two Scouts, then a Shrine, and three Settlers, and adopt Tradition, to explore the map quickly (Scouts ignore terrain cost), and to get an early Pantheon (if you're playing with religion enabled). = Kion via urbo unue produktos dependas de la strategio, kiun vi volas sekvi, sed la 'klasika' konstruordo estas unue konstrui du Skoltojn, poste Sanktejon kaj tri Setlantojn, kaj adopti Tradicion, por rapide esplori la mapon (Skoltoj ignoras terenkoston) kaj ricevi fruan Panteonon (se vi ludas kun religio ebligita).
But feel free to experiment with your own build orders! = Sed libere eksperimentu kun viaj propraj konstruordoj!

In your first couple of turns, you will have very little options, but as your civilization grows, so do the number of things requiring your attention. = Dum viaj unuaj kelkaj vicoj, vi havos tre malmultajn eblojn, sed dum via civilizacio kreskas, ankaŭ kreskas la nombro de aferoj postulantaj vian atenton.

Culture and Policies = Kulturo kaj politikoj
Each turn, the culture you gain from all your cities is added to your Civilization's culture.\nWhen you have enough culture, you may pick a Social Policy, each one giving you a certain bonus. = Ĉiun vicon, la kulturo, kiun vi akiras de ĉiuj viaj urboj, aldoniĝas al la kulturo de via civilizacio.\nKiam vi havas sufiĉe da kulturo, vi povas elekti socian politikon; ĉiu donas al vi certan bonifikon.
The policies are organized into branches, with each branch providing a bonus ability when all policies in the branch have been adopted. = La politikoj estas organizitaj en branĉojn, kaj ĉiu branĉo donas kroman kapablon kiam ĉiuj politikoj en la branĉo estas adoptitaj.
With each policy adopted, and with each city built,\n  the cost of adopting another policy rises - so choose wisely! = Kun ĉiu adoptita politiko kaj kun ĉiu konstruita urbo,\n  la kosto por adopti alian politikon altiĝas — do elektu saĝe!

City Expansion = Urba vastiĝo
Once a city has gathered enough Culture, it will expand into a neighboring tile.\nYou have no control over the tile it will expand into, but tiles with resources and higher yields are prioritized. = Post kiam urbo kolektis sufiĉe da kulturo, ĝi vastiĝos al najbara kahelo.\nVi ne regas al kiu kahelo ĝi vastiĝos, sed kaheloj kun rimedoj kaj pli altaj produktokvantoj ricevas prioritaton.
Each additional tile will require more culture, but generally your first cities will eventually expand to a wide tile range. = Ĉiu plia kahelo postulos pli da kulturo, sed ĝenerale viaj unuaj urboj fine vastiĝos al granda kahelareo.
Although your city will keep expanding forever, your citizens can only work 3 tiles away from city center.\nThis should be taken into account when placing new cities. = Kvankam via urbo plu vastiĝos por ĉiam, viaj civitanoj povas labori nur ĝis 3 kahelojn for de la urbocentro.\nTion oni devas konsideri kiam oni lokas novajn urbojn.

Food is the resource fundamental to your Cities', and as a result Nation's, population and health. = Manĝaĵo estas rimedo fundamenta por la loĝantaro kaj sano de viaj urboj kaj, sekve, de via nacio.
Every Citizen in each City consumes Food per turn. Any left over is considered Growth and is stored in the City Center. Once enough accumulates, the City Grows and a new Citizen is added. = Ĉiu civitano en ĉiu urbo konsumas manĝaĵon po vico. Ĉio restanta estas konsiderata kresko kaj estas stokata en la urbocentro. Kiam sufiĉe da ĝi akumuliĝas, la urbo kreskas kaj nova civitano aldoniĝas.
Initially your main source of Food is the City Center itself and working a surrounding tile with a Citizen. You can increase how much is generated by gaining more Citizens to work more tiles, improving the tiles so that they yield more Food, and eventually Buildings and Policies. = Komence viaj ĉefaj fontoj de manĝaĵo estas la urbocentro mem kaj laborado de ĉirkaŭa kahelo per civitano. Vi povas pliigi la produktatan kvanton akirante pli da civitanoj por labori pli da kaheloj, plibonigante kahelojn por ke ili donu pli da manĝaĵo, kaj poste per konstruaĵoj kaj politikoj.
Since a city's number of Citizens, or Population, determines how many tiles a City can work, Food is often the most important Resource. = Ĉar la nombro de civitanoj, aŭ loĝantaro, de urbo determinas kiom da kaheloj urbo povas labori, manĝaĵo ofte estas la plej grava rimedo.

Production is the resource that lets a City Center build new things. = Produktado estas la rimedo, kiu ebligas al urbocentro konstrui novajn erojn.
This can be new Buildings that are added to the City Center, or new Units that can go out across the World Map to advance your Nation's goals. = Temas pri novaj konstruaĵoj aldonataj al la urbocentro, aŭ novaj unuoj, kiuj povas iri tra la mondmapo por antaŭenigi la celojn de via nacio.
Everything you can build has a Production Cost. Every turn each City generates a certain amount of Production and puts it towards whatever is at the top of the Build Queue. Once the total cost is collected, the Building or Unit is built! = Ĉio konstruebla havas produktadkoston. Ĉiun vicon ĉiu urbo produktas certan kvanton da produktado kaj direktas ĝin al tio, kio estas supre en la konstruvico. Kiam la tuta kosto estas kolektita, la konstruaĵo aŭ unuo estas konstruita!
Any excess Production after something is built is overflowed to the next thing the City builds. Up to it's total Production Cost. = Ĉia troa produktado post konstruo transiras al la sekva ero, kiun la urbo konstruas, ĝis la tuta produktadkosto de tiu ero.
Since this determines how quickly you can build more stuff, your Nation's Production Capacity is crucial to it's advancement and survival. = Ĉar tio determinas kiom rapide vi povas konstrui pliajn erojn, la produktada kapablo de via nacio estas kerna por ĝia progresado kaj supervivo.

⍾Science is the resource that unlocks new and exciting Technologies for your Nation. = ⍾Scienco estas la rimedo, kiu malŝlosas novajn kaj interesajn teknologiojn por via nacio.
Once you've Founded your Capital, you'll be prompted to Pick a Technology to Research. = Post kiam vi fondis vian ĉefurbon, oni petos vin elekti teknologion por esplori.
Every Technology costs an amount of ⍾Science. Every turn the ⍾Science your Nation produces is paid towards Researching your chosen Technology. = Ĉiu teknologio kostas kvanton da ⍾Scienco. Ĉiun vicon la ⍾Scienco, kiun via nacio produktas, estas asignata al esplorado de via elektita teknologio.
Once a Technology has it's cost fully paid, you unlock the benefits for your Nation! This could be new Units, Buildings, or other advantages. Any surplus will overflow into the next Technology you pick to Research. = Kiam la kosto de teknologio estas plene pagita, vi malŝlosas ĝiajn avantaĝojn por via nacio! Tio povas esti novaj unuoj, konstruaĵoj aŭ aliaj avantaĝoj. Ĉia pluso transiros al la sekva teknologio, kiun vi elektos esplori.
Researching a Technology in the next Era will advance you into that Era and trigger a notification to other Nations about how amazing you are! = Esplori teknologion en la sekva epoko antaŭenigos vin en tiun epokon kaj ekigos sciigon al aliaj nacioj pri kiom mirinda vi estas!
Since new Technologies tend to give access to better Units, Buildings, and even unlock powerful new Policies, staying ahead of the competition is one of the best ways to secure your Victory! = Ĉar novaj teknologioj ofte donas aliron al pli bonaj unuoj kaj konstruaĵoj, kaj eĉ malŝlosas potencajn novajn politikojn, resti antaŭ la konkurenco estas unu el la plej bonaj manieroj certigi vian venkon!

Ah Gold. The Universal Medium of Exchange. Everyone loves Gold! They say it can't buy Happiness, but nuclear submarines are almost as good. = Ha, oro. La universala interŝanĝrimedo. Ĉiuj amas oron! Oni diras, ke ĝi ne povas aĉeti feliĉon, sed nukleaj submarŝipoj estas preskaŭ same bonaj.
You can earn more Gold from Tiles, Resources, Improvements, and eventually Buildings, Specialists, and Trade Routes. Ancient Ruins, meeting new City-States, and Pillaging are also great sources of Gold. During a Golden Age every Tile that already yields Gold will yield an additional Gold! = Vi povas akiri pli da oro de kaheloj, rimedoj, plibonigoj, kaj poste de konstruaĵoj, specialistoj kaj komercaj vojoj. Antikvaj ruinoj, renkonti novajn urboŝtatojn kaj prirabado ankaŭ estas bonegaj fontoj de oro. Dum Ora Epoko ĉiu kahelo, kiu jam donas oron, donos plian oron!
Gold is how you pay for Building Maintenance, Transportation Upkeep, and Unit Upkeep. If you run out of Gold, first you'll receive penalties to your ⍾Science production, then eventually your Units will start Disbanding as you can't pay their upkeep. = Oro estas tio, per kio vi pagas konstruaĵan prizorgokoston, transportan prizorgokoston kaj unuoprizorgokoston. Se via oro elĉerpiĝas, vi unue ricevos punojn al via produktado de ⍾Scienco; poste viaj unuoj fine komencos esti maldungitaj, ĉar vi ne povas pagi ilian prizorgokoston.
Gold can be used to Buy Buildings and Units, helping bring up a new City or quickly build an Army. It can also buy Tiles to add to your City. It's also used to Upgrade your units from their older, obsolete forms to new, stronger versions. And investing it into a Research Agreement is a great way to convert it into ⍾Science. = Oro povas esti uzata por aĉeti konstruaĵojn kaj unuojn, helpante starigi novan urbon aŭ rapide konstrui armeon. Ĝi ankaŭ povas aĉeti kahelojn por aldoni al via urbo. Ĝi ankaŭ estas uzata por plibonigi viajn unuojn de iliaj malnovaj, malaktualiĝintaj formoj al novaj, pli fortaj versioj. Investi ĝin en esplorinterkonsenton ankaŭ estas bonega maniero konverti ĝin al ⍾Scienco.
Gold is also very valuable in Diplomacy. You can directly Gift Gold to City-States to gain their favor. Use it to balance a Trade Deal with other Nations. Or demand every last drop after a successful war and your enemy sues for peace. = Oro ankaŭ estas tre valora en diplomatio. Vi povas rekte donaci oron al urboŝtatoj por akiri ilian favoron. Uzu ĝin por ekvilibrigi komercan interkonsenton kun aliaj nacioj. Aŭ postulu ĉiun lastan guton post sukcesa milito kiam via malamiko petas pacon.
Ironically, some may consider Gold to be one of the less important Resources. But it's flexible nature and importance to keep your Nation running makes it a precious thing to pay attention to. After all, everyone loves Gold. = Ironie, iuj povas konsideri oron unu el la malpli gravaj rimedoj. Sed ĝia fleksebla naturo kaj graveco por funkciigi vian nacion igas ĝin valora afero atentinda. Finfine, ĉiuj amas oron.
Not to be confused with the Resource of the same name, Gold Ore = Ne konfuzu ĝin kun la samnoma rimedo, Ora erco
Trade Route = Komerca vojo
See also: [param] = Vidu ankaŭ: [param]
Research Agreements = Esploraj Interkonsentoj

As cities grow in size and influence, you have to deal with a happiness mechanic that is no longer tied to each individual city.\nInstead, your entire empire shares the same level of satisfaction.\nAs your cities grow in population you’ll find that it is more and more difficult to keep your empire happy. = Dum urboj kreskas laŭ grandeco kaj influo, vi devas trakti mekanismon de feliĉo, kiu ne plu estas ligita al ĉiu aparta urbo.\nAnstataŭe, via tuta imperio dividas la saman nivelon de kontento.\nDum viaj urboj kreskas je loĝantaro, vi trovos, ke estas pli kaj pli malfacile teni vian imperion feliĉa.
In addition, you can’t even build any city improvements that increase happiness until you’ve done the appropriate research.\nIf your empire’s happiness ever goes below zero the growth rate of your cities will be hurt.\nIf your empire becomes severely unhappy (as indicated by the smiley-face icon at the top of the interface)\n  your armies will have a big penalty slapped on to their overall combat effectiveness. = Krome, vi eĉ ne povas konstrui urbajn plibonigojn, kiuj pliigas feliĉon, ĝis vi faris la taŭgan esploron.\nSe la feliĉo de via imperio iam falas sub nulon, la kreskorapideco de viaj urboj suferos.\nSe via imperio fariĝas severe malfeliĉa (kiel indikite de la ridvizaĝa piktogramo ĉe la supro de la interfaco)\n  viaj armeoj ricevos grandan punon al sia ĝenerala batala efikeco.
This means that it is very difficult to expand quickly in Unciv.\nIt isn’t impossible, but as a new player you probably shouldn't do it.\nSo what should you do? Chill out, scout, and improve the land that you do have by building Workers.\nOnly build new cities once you have found a spot that you believe is appropriate. = Tio signifas, ke estas tre malfacile rapide vastiĝi en Unciv.\nNe estas neeble, sed kiel nova ludanto vi probable ne devus fari tion.\nDo kion vi faru? Trankviliĝu, esploru, kaj plibonigu la teron, kiun vi jam havas, konstruante Laboristojn.\nKonstruu novajn urbojn nur post kiam vi trovis lokon, kiun vi opinias taŭga.

Unhappiness = Malfeliĉo
It seems that your citizens are unhappy!\nWhile unhappy, your civilization will suffer many detrimental effects, increasing in severity as unhappiness gets higher. = Ŝajnas, ke viaj civitanoj estas malfeliĉaj!\nKiam via civilizacio estas malfeliĉa, ĝi suferos multajn malutilajn efikojn, kiuj pliseveriĝas dum malfeliĉo kreskas.
Unhappiness has two main causes: Population and cities.\n  Each city causes 3 unhappiness, and each population, 1 = Malfeliĉo havas du ĉefajn kaŭzojn: loĝantaro kaj urboj.\n  Ĉiu urbo kaŭzas 3 poentojn de malfeliĉo, kaj ĉiu loĝanto, 1
There are 2 main ways to combat unhappiness:\n  by building happiness buildings for your population\n  or by having improved luxury resources within your borders. = Estas 2 ĉefaj manieroj kontraŭbatali malfeliĉon:\n  konstrui konstruaĵojn, kiuj pliigas feliĉon por via loĝantaro\n  aŭ havi plibonigitajn luksajn rimedojn ene de viaj limoj.

You have entered a Golden Age!\nGolden age points are accumulated each turn by the total happiness \n  of your civilization\nWhen in a golden age, culture and production generation increases +20%,\n  and every tile already providing at least one gold will provide an extra gold. = Vi eniris Oran Epokon!\nPoentoj de ora epoko akumuliĝas ĉiun vicon per la tuta feliĉo \n  de via civilizacio\nDum ora epoko, generado de kulturo kaj produktado pliiĝas je +20%,\n  kaj ĉiu kahelo jam provizanta almenaŭ unu oron provizos kroman oron.

Roads and Railroads = Vojoj kaj Fervojoj
Roads reduce the Movement Points required to move between two tiles connected by Roads. = Vojoj reduktas la movpoentojn bezonatajn por moviĝi inter du kaheloj konektitaj per vojoj.
Railroads improve this reduction even more! = Fervojoj reduktas la bezonatajn movpoentojn eĉ pli!
This greatly improves the speed you can get Units around the map. = Tio multe plibonigas la rapidecon, per kiu vi povas movi unuojn ĉirkaŭ la mapo.
Until you research the technology that removes it, Roads do not cross Rivers = Ĝis vi esploras la teknologion, kiu forigas tion, vojoj ne transiras riverojn
Connecting your cities to the capital by Roads and/or Railroads will generate Gold via the Trade Route. = Konekti viajn urbojn al la ĉefurbo per vojoj kaj/aŭ fervojoj generos oron per la komerca vojo.
However, since each Road and Railroad have a Maintenance Cost, it may be more economical to wait until the cities grow and only place where needed. = Tamen, ĉar ĉiu vojo kaj fervojo havas prizorgokoston, povas esti pli ekonomie atendi ĝis la urboj kreskos kaj konstrui ilin nur kie bezonate.

Connecting your cities to the capital by Roads and/or Railroads will generate Gold via the Trade Route. You earn more Gold the more Population the City and your Capital has. = Konekti viajn urbojn al la ĉefurbo per vojoj kaj/aŭ fervojoj generos oron per la komerca vojo. Vi gajnas pli da oro ju pli granda estas la loĝantaro de la urbo kaj de via ĉefurbo.
Note that each road costs 1 Gold Maintenance per turn, and each Railroad costs 2 Gold, so it may be more economical to wait until the cities grow! = Notu, ke ĉiu vojo kostas 1 oron por prizorgado po vico, kaj ĉiu fervojo kostas 2 oron, do povas esti pli ekonomie atendi ĝis la urboj kreskos!
Railroads connecting a city to the Capital also provide a 25% Production Boost to the City, but not the Capital. = Fervojoj konektantaj urbon al la ĉefurbo ankaŭ provizas 25%-an produktadan bonifikon al la urbo, sed ne al la ĉefurbo.
Trade Routes are also connected over Water via certain buildings like the Harbor. As long as there is a chain that can reach the Capital, there's a Trade Route. Look for this symbol in Yellow below the City Name to mean you have an active Trade Route to your Capital. = Komercaj vojoj ankaŭ povas konektiĝi trans akvon per certaj konstruaĵoj kiel la Haveno. Dum ekzistas ĉeno, kiu povas atingi la ĉefurbon, ekzistas komerca vojo. Serĉu ĉi tiun flavan simbolon sub la urbonomo; ĝi signifas, ke vi havas aktivan komercan vojon al via ĉefurbo.
Trade Routes can get broken either by Blockades or by Removing/Pillaging the connecting Road/Railroad chain. = Komercaj vojoj povas rompiĝi aŭ pro blokadoj aŭ pro forigo/prirabado de la konektanta voja/fervoja ĉeno.
City Blockade = Urba blokado

Once you’ve settled 3-4 cities and build universities, you’re probably already 100 to 150 turns into the game.\nNow is a good time to start thinking about how, exactly, you want to win – if you haven’t already. = Post kiam vi fondis 3–4 urbojn kaj konstruis universitatojn, vi probable jam estas 100 ĝis 150 vicojn en la ludo.\nNun estas bona tempo komenci pensi pri kiel, precize, vi volas venki — se vi ankoraŭ ne faris tion.
There are four ways to win in Unciv. They are:\n - Cultural Victory: Complete 5 Social Policy Trees and build the Utopia Project\n - Domination Victory: Conquer the original capital of all other Major civs\n - Science Victory: Be the first to construct a Spaceship\n - Diplomatic Victory: Build the United Nations and win the vote = Estas kvar manieroj venki en Unciv. Ili estas:\n - Kultura venko: kompletigi 5 sociajn politikajn arbojn kaj konstrui la Projekton Utopio\n - Superrega venko: konkeri la originan ĉefurbon de ĉiuj aliaj gravaj civilizacioj\n - Scienca venko: esti la unua, kiu konstruas Kosmoŝipon\n - Diplomatia venko: konstrui la Unuiĝintajn Naciojn kaj gajni la voĉdonon
So to sum it up, these are the basics of Unciv – Found a prosperous first city, expand slowly to manage happiness, and set yourself up for the victory condition you wish to pursue.\nObviously, there is much more to it than that, but it is important not to jump into the deep end before you know how to swim. = Resume, jen la bazoj de Unciv: fondu prosperan unuan urbon, vastiĝu malrapide por regi feliĉon, kaj preparu vin por la venkokondiĉo, kiun vi volas atingi.\nKompreneble estas multe pli ol tio, sed gravas ne salti en profundan akvon antaŭ ol vi scias naĝi.

Enemy City = Malamika urbo
Cities can be conquered by reducing their health to 1, and entering the city with a melee unit.\nSince cities heal each turn, it is best to attack with ranged units and use your melee units to defend them until the city has been defeated! = Urboj povas esti konkeritaj reduktante ilian sanon al 1 kaj enirante la urbon per proksimbatala unuo.\nĈar urboj resaniĝas ĉiun vicon, plej bone estas ataki per distancatakaj unuoj kaj uzi viajn proksimbatalajn unuojn por defendi ilin ĝis la urbo estos venkita!

Luxury Resource = Luksa rimedo
Luxury resources within your domain and with their specific improvement are connected to your trade network.\nEach unique Luxury resource you have adds 5 happiness to your civilization, but extra resources of the same type don't add anything, so use them for trading with other civilizations! = Luksaj rimedoj ene de via teritorio kaj kun sia specifa plibonigo estas konektitaj al via komerca reto.\nĈiu unika luksa rimedo, kiun vi havas, aldonas 5 poentojn de feliĉo al via civilizacio, sed kromaj rimedoj de la sama tipo nenion aldonas, do uzu ilin por komerci kun aliaj civilizacioj!

Strategic Resource = Strategia rimedo
Strategic resources within your domain and with their specific improvement are connected to your trade network.\nStrategic resources allow you to train units and construct buildings that require those specific resources, for example the Horseman requires Horses. = Strategiaj rimedoj ene de via teritorio kaj kun sia specifa plibonigo estas konektitaj al via komerca reto.\nStrategiaj rimedoj permesas al vi trejni unuojn kaj konstrui konstruaĵojn, kiuj postulas tiujn specifajn rimedojn; ekzemple, la Rajdanto postulas Ĉevalojn.
Unlike Luxury Resources, each Strategic Resource on the map provides more than one of that resource.\nThe top bar keeps count of how many unused strategic resources you own.\nA full drilldown of resources is available in the Resources tab in the Overview screen. = Male al luksaj rimedoj, ĉiu strategia rimedo sur la mapo provizas pli ol unu ekzempleron de tiu rimedo.\nLa supra stango kalkulas kiom da neuzataj strategiaj rimedoj vi posedas.\nPlena detaligo de rimedoj disponeblas en la langeto Rimedoj en la superrigarda ekrano.

The city can no longer put up any resistance!\nHowever, to conquer it, you must enter the city with a melee unit = La urbo ne plu povas rezisti!\nTamen, por konkeri ĝin, via unuo devas eniri la urbokahelon.\nProksimbatalaj unuoj povas eniri la urbon, sed distancatakaj unuoj ne povas.

After Conquering = Post konkero
When conquering a city, you can choose to liberate, annex, puppet, or raze the city. = Konkerante urbon, vi povas elekti liberigi, aneksi, marionetigi aŭ forbruligi la urbon.
\nLiberating the city will return it to its original owner, giving you a massive diplomatic boost with them!\n\nAnnexing the city will give you full control over it, but also increase the citizens' unhappiness to 2x!\nThis can be mitigated by building a courthouse in the city, returning the citizen's unhappiness to normal.\n\nPuppeting the city will mean that you have no control on the city's production.\nThe city will not increase your tech or policy cost.\nA puppeted city can be annexed at any time, but annexed cities cannot be returned to a puppeted state!\n\nRazing the city will lower its population by 1 each turn until the city is destroyed!\nYou cannot raze a city that is either the starting capital of a civilization or the holy city of a religion. = \nLiberigi la urbon redonos ĝin al ĝia origina posedanto, donante al vi grandegan diplomatian bonifikon kun ili!\n\nAneksi la urbon donos al vi plenan kontrolon super ĝi, sed ankaŭ duobligos la malfeliĉon de ĝiaj civitanoj!\nTion eblas mildigi konstruante juĝejon en la urbo, kio revenigas la malfeliĉon de la civitanoj al normala nivelo.\n\nMarionetigi la urbon signifas, ke vi ne regos ĝian produktadon.\nLa urbo ne pliigos vian koston de teknologioj aŭ politikoj.\nMarionetigita urbo povas esti aneksita iam ajn, sed aneksitaj urboj ne povas esti redonitaj al marionetigita stato!\n\nForbruligi la urbon malaltigos ĝian loĝantaron je 1 ĉiun vicon ĝis la urbo estos detruita!\nVi ne povas forbruligi urbon, kiu estas aŭ la komenca ĉefurbo de civilizacio aŭ la sankta urbo de religio.

You have encountered a barbarian unit!\nBarbarians attack everyone indiscriminately, so don't let your \n  civilian units go near them, and be careful of your scout! = Vi renkontis barbaran unuon!\nBarbaroj atakas ĉiujn sendistinge, do ne lasu viajn \n  civilajn unuojn proksimiĝi al ili, kaj zorgu pri via skolto!

You have encountered another civilization!\nOther civilizations start out peaceful, and you can trade with them,\n  but they may choose to declare war on you later on = Vi renkontis alian civilizacion!\nAliaj civilizacioj komence estas pacaj, kaj vi povas komerci kun ili,\n  sed ili povas elekti deklari militon kontraŭ vi poste

Injured Units = Vunditaj Unuoj
Injured units deal less damage, but recover after turns that they have been inactive.\nUnits heal 10 health per turn in enemy territory or neutral land,\n  20 inside your territory and 25 in your cities. = Vunditaj unuoj faras malpli da damaĝo, sed resaniĝas post vicoj, dum kiuj ili estis neaktivaj.\nUnuoj resaniĝas je 10 sano po vico en malamika teritorio aŭ neŭtrala tero,\n  je 20 ene de via teritorio kaj je 25 en viaj urboj.

Workers = Laboristoj
Workers are vital to your cities' growth, since only they can construct improvements on tiles.\nImprovements raise the yield of your tiles, allowing your city to produce more and grow faster while working the same amount of tiles! = Laboristoj estas esencaj por la kresko de viaj urboj, ĉar nur ili povas konstrui plibonigojn sur kaheloj.\nPlibonigoj altigas la produktokvanton de viaj kaheloj, permesante al via urbo produkti pli kaj kreski pli rapide dum ĝi laboras la saman nombron da kaheloj!

Embarking = Enŝipiĝo
Once a certain tech is researched, your land units can embark, allowing them to traverse water tiles.\nEntering or leaving water takes the entire turn. = Post kiam certa teknologio estas esplorita, viaj teraj unuoj povas enŝipiĝi, permesante al ili transiri akvajn kahelojn.\nEniri aŭ forlasi akvon bezonas la tutan vicon.
Units are defenseless while embarked (cannot use modifiers), and have a fixed Defending Strength based on your tech Era, so be careful!\nRanged Units can't attack, Melee Units have a Strength penalty, and all have limited vision. = Unuoj estas sendefendaj dum enŝipiĝintaj (ili ne povas uzi modifilojn), kaj havas fiksan defendo-forton bazitan sur via teknologia epoko, do atentu!\nDistancatakaj unuoj ne povas ataki, proksimbatalaj unuoj havas fortopunon, kaj ĉiuj havas limigitan vidon.

Idle Units = Senokupaj Unuoj
Clicking 'Next unit' moves to the next idle unit in the queue (as listed in Overview -> Units). After issuing an order to an unit, if 'Auto Unit Cycle' in Options -> Gameplay is enabled, you will automatically select the next idle unit. = Alklaki 'Sekva unuo' movas al la sekva senokupa unuo en la vico (kiel listigita en Superrigardo -> Unuoj). Post doni ordonon al unuo, se 'Aŭtomata Unuociklo' en Agordoj -> Ludado estas ebligita, vi aŭtomate elektos la sekvan senokupan unuon.
If you don't want to move a unit this turn, you can skip it by clicking 'Next unit' again, or command the unit to 'Skip turn'. = Se vi ne volas movi unuon ĉi-vicon, vi povas preterlasi ĝin alklakante 'Sekva unuo' denove, aŭ ordoni al la unuo 'Preterlasi vicon'.
If you want to disable the 'Next unit' feature entirely, you can toggle it in Options -> Gameplay -> Check for idle units. = Se vi volas tute malebligi la funkcion 'Sekva unuo', vi povas ŝalti/malŝalti ĝin en Agordoj -> Ludado -> Kontroli senokupajn unuojn.
If you'd rather 'Next unit' cycle the units and not mark them as Done, you can change it in the Options -> Gameplay menu. = Se vi preferas, ke 'Sekva unuo' cikligu la unuojn kaj ne marku ilin kiel Faritaj, vi povas ŝanĝi tion en la menuo Agordoj -> Ludado.
You can also cycle through the idle units using the left and right triangles on the Unit Table in the lower left of the screen. Or by default using the Cycle button next to the 'Next Unit' button. = Vi ankaŭ povas trairi la senokupajn unuojn per la maldekstraj kaj dekstraj trianguloj sur la Unuotabelo en la malsupra maldekstra parto de la ekrano. Aŭ defaŭlte per la Cikla butono apud la butono 'Sekva unuo'.

Contact Me = Kontaktu Min
Hi there! If you've played this far, you've probably seen that the game is currently incomplete.\n Unciv is meant to be open-source and free, forever.\n That means no ads or any other nonsense. = Saluton! Se vi ludis ĝis ĉi tie, vi probable vidis, ke la ludo nuntempe estas nekompleta.\n Unciv celas esti malfermfonta kaj senpaga por ĉiam.\n Tio signifas neniujn reklamojn aŭ ian alian sensencaĵon.
What motivates me to keep working on it, \n  besides the fact I think it's amazingly cool that I can,\n  is the support from the players - you guys are the best! = Kio motivas min plu labori pri ĝi, \n  krom la fakto, ke mi pensas, ke estas mirinde mojose, ke mi povas,\n  estas la subteno de la ludantoj — vi ĉiuj estas la plej bonaj!
Every rating and review that I get puts a smile on my face =)\n  So contact me! Send me an email, review, Github issue\n  or mail pigeon, and let's figure out how to make the game \n  even more awesome!\n(Contact info is in the Play Store) = Ĉiu takso kaj recenzo, kiun mi ricevas, ridetigas min =)\n  Do kontaktu min! Sendu al mi retpoŝton, recenzon, GitHub-temon\n  aŭ poŝtkolombon, kaj ni elpensu kiel fari la ludon \n  eĉ pli mirinda!\n(Kontaktinformoj estas en la Play Store)

Pillaging = Prirabado
Military units can pillage improvements, which heals them 25 health and ruins the improvement.\nThe tile can still be worked, but advantages from the improvement - stat bonuses and resources - will be lost.\nWorkers can repair these improvements, which takes less time than building the improvement from scratch.\nPillaging certain improvements will result in your units looting gold from the improvement. = Militaj unuoj povas prirabi plibonigojn, kio resanigas ilin je 25 sano kaj ruinigas la plibonigon.\nLa kahelo ankoraŭ povas esti laborata, sed avantaĝoj de la plibonigo — statistikaj bonifikoj kaj rimedoj — estos perditaj.\nLaboristoj povas ripari ĉi tiujn plibonigojn, kio bezonas malpli da tempo ol konstrui la plibonigon de nulo.\nPrirabado de certaj plibonigoj rezultigos, ke viaj unuoj prirabos oron el la plibonigo.

Experience = Sperto
Units that enter combat gain experience, which can then be used on promotions for that unit.\nUnits gain more experience when in Melee combat than Ranged, and more when attacking than when defending. = Unuoj, kiuj eniras batalon, akiras sperton, kiu poste povas esti uzata por promocioj por tiu unuo.\nUnuoj akiras pli da sperto en proksimbatala batalo ol en distanca batalo, kaj pli kiam ili atakas ol kiam ili defendas.
Units can only gain up to 30 XP from Barbarian units - meaning up to 2 promotions. After that, Barbarian units will provide no experience. = Unuoj povas akiri nur ĝis 30 XP de Barbaraj unuoj — tio signifas ĝis 2 promociojn. Post tio, Barbaraj unuoj ne provizos sperton.

Combat = Batalo
Unit and cities are worn down by combat, which is affected by a number of different values.\nEach unit has a certain 'base' combat value, which can be improved by certain conditions, promotions and locations. = Unuoj kaj urboj estas eluzataj de batalo, kiu estas influita de kelkaj malsamaj valoroj.\nĈiu unuo havas certan 'bazan' batalvaloron, kiu povas esti plibonigita per certaj kondiĉoj, promocioj kaj lokoj.
Units use the 'Strength' value as the base combat value when melee attacking and when defending.\nWhen using a ranged attack, they will the use the 'Ranged Strength' value instead. = Unuoj uzas la valoron 'Forto' kiel la bazan batalvaloron kiam ili proksimbatale atakas kaj kiam ili defendas.\nKiam ili uzas distancatakon, ili anstataŭe uzos la valoron 'Distanca Forto'.
Ranged attacks can be done from a distance, dependent on the 'Range' value of the unit.\nWhile melee attacks allow the defender to damage the attacker in retaliation, ranged attacks do not. = Distancatakoj povas esti faritaj de distanco, depende de la valoro 'Distanco' de la unuo.\nDum proksimbatalaj atakoj permesas al la defendanto damaĝi la atakanton reage, distancatakoj ne faras tion.

Embassies = Ambasadejoj
Establishing an embassy in other players' Capital city shows the location of their Capital, likewise other players who establish an embassy in your Capital can see location of your Capital. = Starigi ambasadejon en la ĉefurbo de aliaj ludantoj montras la lokon de ilia ĉefurbo; same aliaj ludantoj, kiuj starigas ambasadejon en via ĉefurbo, povas vidi la lokon de via ĉefurbo.
Embassies thus allow Spies to be placed in another players' Capital City if Espionage is enabled. = Ambasadejoj tiel permesas, ke spionoj estu metitaj en la ĉefurbon de alia ludanto se spionado estas ebligita.
Mutual embassies are required to allow trading open borders and to sign Research Agreement and Defensive Pact. = Reciprokaj ambasadejoj estas bezonataj por interŝanĝi malfermajn limojn kaj por subskribi esplorinterkonsenton aŭ defendan pakton.
Declaring war on another player or denouncing them will remove embassies from both players' Capitals. You will have to re-establish them to use their effect. = Deklari militon kontraŭ alia ludanto aŭ denunci ilin forigos ambasadejojn el la Ĉefurboj de ambaŭ ludantoj. Vi devos restarigi ilin por uzi ilian efikon.
Re-establishing an embassy after denunciation from either side becomes available next turn, while re-establishing them when at war requires a peace treaty. = Restarigi ambasadejon post denuncado de unu el la flankoj disponeblas la sekvan vicon, dum restarigi ilin dum milito postulas pacinterkonsenton.
Be cautious when accepting embassy from other players because they can spy on your capital, or worse may start planning to attack you. = Estu singarda kiam vi akceptas ambasadejon de aliaj ludantoj, ĉar ili povas spioni vian ĉefurbon, aŭ pli malbone, eble komenci plani ataki vin.
Note that before you can offer an embassy, you need the required Technology. = Notu, ke antaŭ ol vi povas proponi ambasadejon, vi bezonas la postulatan teknologion.
Embassies are available using the Gods and Kings ruleset. = Ambasadejoj disponeblas uzante la regularon Dioj kaj Reĝoj.
Defensive Pacts = Defendaj Paktoj

Open Borders from other player and vice versa allow units to freely pass through their territory. = Malfermaj Limoj de alia ludanto al vi, kaj inverse, permesas al unuoj libere pasi tra la koncerna teritorio.
They also let Missionaries to enter other players' territory without suffering attrition. = Ili ankaŭ permesas al Misiistoj eniri la teritorion de aliaj ludantoj sen suferi elĉerpiĝon.
Open Borders expire depending on game speed and are canceled upon Declaration of War, the closure however takes effect only after war ends and need to be traded again. = Malfermaj Limoj eksvalidiĝas depende de ludrapideco kaj estas nuligitaj post Militdeklaro; tamen la fermo efektiviĝas nur post kiam milito finiĝas, kaj oni devas reintertrakti ilin.
You gain diplomatic boost with other AI player if you both have Open Borders to each other = Vi akiras diplomatian bonifikon kun alia AI-ludanto se vi ambaŭ havas Malfermajn Limojn inter vi
Be cautious when giving Open Borders because other player may settle a City near your lands in an area you are planning to use, they may also use your territory to attack your friends or City State allies. = Estu singarda kiam vi donas Malfermajn Limojn, ĉar alia ludanto povas fondi urbon proksime de viaj teroj en areo, kiun vi planas uzi; ili ankaŭ povas uzi vian teritorion por ataki viajn amikojn aŭ Urboŝtatajn aliancanojn.
Note that before you can offer or accept open borders, both Nations need the required Technology. = Notu, ke antaŭ ol vi povas proponi aŭ akcepti malfermajn limojn, ambaŭ nacioj bezonas la postulatan teknologion.
When playing with the Gods and Kings ruleset mutual embassies need to be established before Open Borders can be traded. = Kiam oni ludas kun la regularo Dioj kaj Reĝoj, reciprokaj ambasadejoj devas esti starigitaj antaŭ ol Malfermaj Limoj povas esti interŝanĝitaj.

In Research Agreements, you and another civilization decide to jointly research technology.\nAt the end of the agreement, you will both receive a 'lump sum' of ⍾Science, which will go towards one of your unresearched technologies. = En Esploraj Interkonsentoj, vi kaj alia civilizacio decidas kune esplori teknologion.\nJe la fino de la interkonsento, vi ambaŭ ricevos 'unufojan sumon' de ⍾Scienco, kiu iros al unu el viaj neesploritaj teknologioj.
The amount of ⍾Science you receive at the end is dependent on the ⍾Science generated by your cities and the other civilization's cities during the agreement - the more, the better! = La kvanto de ⍾Scienco, kiun vi ricevas je la fino, dependas de la ⍾Scienco generita de viaj urboj kaj de la urboj de la alia civilizacio dum la interkonsento — ju pli, des pli bone!
Note that before you can invest in a research agreement, you must have a Declaraction of Friendship, both Nations need the required Technology, and both Nations need enough Gold on hand for the agreement. = Notu, ke antaŭ ol vi povas investi en esplorinterkonsenton, vi devas havi deklaron de amikeco, ambaŭ nacioj devas havi la postulatan teknologion, kaj ambaŭ nacioj devas havi sufiĉe da oro por la interkonsento.
When playing with the Gods and Kings ruleset mutual embassies need to be established before a Research Agreement can be signed. = Kiam oni ludas kun la regularo Dioj kaj Reĝoj, reciprokaj ambasadejoj devas esti starigitaj antaŭ ol Esplora Interkonsento povas esti subskribita.

Defensive pacts allow you and another civ to protect one another from aggressors.\nOnce the defensive pact is signed, you will be drawn into their future defensive wars, just as they will be drawn into your future defensive wars. Declaring war on any Civ will remove all of your defensive pacts. You will have to re-sign them to use their effect. = Defendaj paktoj permesas al vi kaj alia civilizacio protekti unu la alian kontraŭ agresantoj.\nPost kiam la defenda pakto estas subskribita, vi estos entirita en iliajn estontajn defendajn militojn, same kiel ili estos entiritaj en viajn estontajn defendajn militojn. Deklari militon kontraŭ iu ajn civilizacio forigos ĉiujn viajn defendajn paktojn. Vi devos resubskribi ilin por uzi ilian efikon.
Be cautious when signing defensive pacts because they can bring you into wars that you might not want to be in. = Estu singarda kiam vi subskribas defendajn paktojn, ĉar ili povas enigi vin en militojn, kiujn vi eble ne volas partopreni.
The AI is very careful and will not accept defensive pacts with less than 80 influence. = La AI estas tre singarda kaj ne akceptos defendajn paktojn kun malpli ol 80 influo.
Note that before you can sign a defensive pact, you must have a Declaraction of Friendship, and both Nations need the required Technology. = Notu, ke antaŭ ol vi povas subskribi defendan pakton, vi devas havi deklaron de amikeco, kaj ambaŭ nacioj devas havi la postulatan teknologion.
When playing with the Gods and Kings ruleset mutual embassies need to be established before a Defensive Pact can be signed. = Kiam oni ludas kun la regularo Dioj kaj Reĝoj, reciprokaj ambasadejoj devas esti starigitaj antaŭ ol Defenda Pakto povas esti subskribita.

Not all nations are contending with you for victory.\nCity-States are nations that can't win, can't be traded with, and instead confer certain bonuses to friendly civilizations. = Ne ĉiuj nacioj konkurencas kun vi por venko.\nUrboŝtatoj estas nacioj, kiuj ne povas venki, kun kiuj ne eblas komerci, kaj kiuj anstataŭe donas certajn bonifikojn al amikaj civilizacioj.
Instead, diplomatic relations with City-States are determined by Influence - a meter of 'how much the City-State likes you'.\nInfluence can be increased by attacking their enemies, liberating their city, and giving them sums of gold. = Anstataŭe, diplomatiaj rilatoj kun Urboŝtatoj estas determinitaj de Influo — mezurilo de 'kiom multe la Urboŝtato ŝatas vin'.\nInfluo povas esti pliigita atakante iliajn malamikojn, liberigante ilian urbon, kaj donante al ili sumojn da oro.
Certain bonuses are given when you are at above 30 influence.\nWhen you have above 60 Influence, and you have the highest influence with them of all civilizations, you are considered their 'Ally', and gain further bonuses and access to the Luxury and Strategic resources in their lands. = Certaj bonifikoj estas donataj kiam via influo superas 30.\nKiam via Influo superas 60 kaj estas la plej alta inter ĉiuj civilizacioj, vi estas konsiderata ilia 'Aliancano' kaj akiras pliajn bonifikojn kaj aliron al la Luksaj kaj Strategiaj rimedoj en iliaj landoj.

While working the land is good, eventually your Citizens will want to Specialize. = Kvankam labori la teron estas bone, viaj civitanoj fine volos specialiĝi.
Certain Buildings will also provide Specialist Slots. These slots will show up in the Citizen Management within the City Screen under Specialists. Each slot can be filled with a Citizen which will then become a Specialist. = Certaj konstruaĵoj ankaŭ provizos specialistajn ingojn. Tiuj ingoj aperos en la civitana administrado ene de la Urba ekrano sub Specialistoj. Ĉiu ingo povas esti plenigita per civitano, kiu tiam fariĝos specialisto.
Each Specialist will generate a certain amount of yield as indicated to the right of the available slots. = Ĉiu specialisto generos certan produktokvanton, kiel indikite dekstre de la disponeblaj ingoj.
While these are a great way to specialize the yield production of a City outside of the surrounding Tile Yields, Specialists have an additional value. Each one also generates Great Person Points each turn. With enough of them, a new Great Person will join your Nation. = Kvankam ĉi tiuj estas bonega maniero specialigi la produktokvantojn de urbo preter la ĉirkaŭaj kahelaj produktokvantoj, specialistoj havas plian valoron. Ĉiu el ili ankaŭ generas Poentojn de Grandaj Personoj ĉiun vicon. Kun sufiĉe da ili, nova Granda Persono aliĝos al via nacio.
Great People = Grandaj Personoj

Certain buildings, and specialists in cities, generate Great Person points per turn.\nThere are several types of Great People, and their points accumulate separately.\nThe number of points per turn and accumulated points can be viewed in the Overview screen. = Certaj konstruaĵoj kaj specialistoj en urboj generas Poentojn de Grandaj Personoj po vico.\nEstas pluraj specoj de Grandaj Personoj, kaj iliaj poentoj akumuliĝas aparte.\nLa nombro de poentoj po vico kaj akumulitaj poentoj videblas en la Superrigarda ekrano.
Alternatively, the Great Person points breakdown per city can be viewed in each City Screen (see UI Tips article). = Alternative, la detaloj pri Poentoj de Grandaj Personoj laŭ urbo videblas en ĉiu Urba ekrano (vidu la artikolon pri Interfacaj konsiletoj).
Once enough points have been accumulated, a Great Person of that type will be created!\nEach Great Person can construct a certain Great Improvement which gives large yields over time, or immediately consumed to provide a certain bonus now. = Post kiam sufiĉe da poentoj akumuliĝis, Granda Persono de tiu tipo estos kreita!\nĈiu Granda Persono povas konstrui certan Grandan Plibonigon, kiu donas grandajn produktokvantojn dum tempo, aŭ esti tuj konsumita por provizi certan bonifikon nun.
Great Improvements also provide any strategic resources that are under them, so you don't need to worry if resources are revealed underneath your improvements! = Grandaj Plibonigoj ankaŭ provizas ĉiujn strategiajn rimedojn, kiuj troviĝas sub ili, do vi ne bezonas zorgi se rimedoj estas malkaŝitaj sub viaj plibonigoj!

Removing Terrain Features = Forigo de Terenaj Trajtoj
Certain tiles have terrain features - like Flood plains or Forests -  on top of them. Some of these layers, like Jungle, Marsh and Forest, can be removed by workers.\nRemoving the terrain feature does not remove any resources in the tile, and is usually required in order to add improvements exploiting those resources. = Certaj kaheloj havas terenajn trajtojn — kiel Inundaj ebenaĵoj aŭ Arbaroj — sur si. Iuj el tiuj tavoloj, kiel Ĝangalo, Marĉo kaj Arbaro, povas esti forigitaj de laboristoj.\nForigi la terenan trajton ne forigas rimedojn en la kahelo, kaj kutime estas bezonata por aldoni plibonigojn, kiuj ekspluatas tiujn rimedojn.

Natural Wonders, such as the Mt. Fuji, the Rock of Gibraltar and the Great Barrier Reef, are unique, impassable terrain features, masterpieces of mother Nature, which possess exceptional qualities that make them very different from the average terrain.\nThey benefit by giving you large sums of Culture, ⍾Science, Gold or Production if worked by your Cities, which is why you might need to bring them under your empire as soon as possible. = Naturaj mirindaĵoj, kiel Monto Fuĵi, la Ĝibraltara Roko kaj la Granda Barilrifo, estas unikaj, netraireblaj terenaj trajtoj, majstroverkoj de patrino Naturo, kiuj posedas esceptajn kvalitojn, kiuj tre diferencigas ilin de ordinara tereno.\nIli utilas ĉar ili donas al vi grandajn kvantojn da kulturo, ⍾Scienco, oro aŭ produktado se viaj urboj laboras ilin; tial vi eble bezonos enigi ilin en vian imperion kiel eble plej baldaŭ.

Keyboard = Klavaro
If you have a keyboard, some shortcut keys become available. Unit command or improvement picker keys, for example, are shown directly in their corresponding buttons. = Se vi havas klavaron, kelkaj klavkombinoj fariĝas disponeblaj. Klavoj por unuo-ordonoj aŭ elektiloj de plibonigoj, ekzemple, montriĝas rekte en siaj koncernaj butonoj.
On the world screen the hotkeys are as follows: = Sur la monda ekrano la klavkombinoj estas jenaj:
Space or 'N' - Next unit or turn\n'E' - Empire overview (last viewed page)\n'+', '-' - Zoom in / out\nHome - center on capital or open its City Screen if already centered = Spaco aŭ 'N' - Sekva unuo aŭ vico\n'E' - Superrigardo de imperio (laste vidita paĝo)\n'+', '-' - Zomi enen / eksteren\nHome - centri al ĉefurbo aŭ malfermi ĝian Urban ekranon se jam centrite
F1 - Open Civilopedia\nF2 - Empire overview Trades\nF3 - Empire overview Units\nF4 - Empire overview Diplomacy\nF5 - Social policies\nF6 - Technologies\nF7 - Empire overview Cities\nF8 - Victory Progress\nF9 - Empire overview Stats\nF10 - Empire overview Resources\nF11 - Quicksave\nF12 - Quickload = F1 - Malfermi Civilopedion\nF2 - Superrigardo de Imperio: Komercoj\nF3 - Superrigardo de Imperio: Unuoj\nF4 - Superrigardo de Imperio: Diplomatio\nF5 - Sociaj politikoj\nF6 - Teknologioj\nF7 - Superrigardo de Imperio: Urboj\nF8 - Venka Progreso\nF9 - Superrigardo de Imperio: Statistikoj\nF10 - Superrigardo de Imperio: Rimedoj\nF11 - Rapida konservado\nF12 - Rapida ŝargo
Ctrl-R - Toggle tile resource display\nCtrl-Y - Toggle tile yield display\nCtrl-O - Game options\nCtrl-S - Save game\nCtrl-L - Load game\nCtrl-U - Toggle UI (World Screen only) = Ctrl-R - Ŝalti/malŝalti montradon de kahelaj rimedoj\nCtrl-Y - Ŝalti/malŝalti montradon de kahelaj produktokvantoj\nCtrl-O - Ludaj agordoj\nCtrl-S - Konservi ludon\nCtrl-L - Ŝargi ludon\nCtrl-U - Ŝalti/malŝalti interfacon (nur Monda ekrano)
All of these can be reassigned. = Ĉiuj ĉi tiuj povas esti reasignitaj.

This is where you spend most of your time playing Unciv. See the world, control your units, access other screens from here. = Jen kie vi pasigas plejparton de via tempo ludante Unciv. Vidu la mondon, regu viajn unuojn, kaj aliru aliajn ekranojn de ĉi tie.
①: The menu button - civilopedia, save, load, options... = ①: La menuobutono - civilopedio, konservi, ŝargi, agordoj...
②: The player/nation whose turn it is - click for diplomacy overview. = ②: La ludanto/nacio kies vico estas - alklaku por diplomatia superrigardo.
③: The Technology Button - shows the tech tree which allows viewing or researching technologies. = ③: La teknologia butono - montras la teknologian arbon, kiu permesas vidi aŭ esplori teknologiojn.
④: The Social Policies Button - shows enacted and selectable policies, and with enough culture points you can enact new ones. = ④: La butono de sociaj politikoj - montras adoptitajn kaj elekteblajn politikojn, kaj kun sufiĉe da kulturaj poentoj vi povas adopti novajn.
⑤: The Diplomacy Button - shows the diplomacy manager where you can talk to other civilizations. = ⑤: La diplomatia butono - montras la diplomatian administrilon, kie vi povas paroli kun aliaj civilizacioj.
⑥: Unit Action Buttons - while a unit is selected its possible actions appear here. = ⑥: Butonoj de agoj de unuoj - dum unuo estas elektita, ĝiaj eblaj agoj aperas ĉi tie.
⑦: The unit/city info pane - shows information about a selected unit or city. = ⑦: La informpanelo de unuo/urbo - montras informojn pri elektita unuo aŭ urbo.
⑧: The name (and unit icon) of the selected unit or city, with current health if wounded. Clicking a unit name or icon will open its civilopedia entry. = ⑧: La nomo (kaj unuopiktogramo) de la elektita unuo aŭ urbo, kun aktuala sano se vundita. Alklako al unuonomo aŭ piktogramo malfermos ĝian civilopedian eniron.
⑨: The arrow buttons allow jumping to the next/previous idle unit. = ⑨: La sagobutonoj permesas salti al la sekva/antaŭa senokupa unuo.
⑩: For a selected unit, its promotions appear here, and clicking leads to the promotions screen for that unit. = ⑩: Por elektita unuo, ĝiaj promocioj aperas ĉi tie, kaj alklako kondukas al la promocia ekrano por tiu unuo.
⑪: Remaining/per turn movement points, strength and experience / XP needed for promotion. For cities, you get its combat strength. = ⑪: Restantaj/po-vicaj movpoentoj, forto kaj sperto / XP bezonata por promocio. Por urboj, vi ricevas ĝian batalforton.
⑫: This button closes the selected unit/city info pane. = ⑫: Ĉi tiu butono fermas la informpanelon de elektita unuo/urbo.
⑬: This pane appears when you order a unit to attack an enemy. On top are attacker and defender with their respective base strengths. = ⑬: Ĉi tiu panelo aperas kiam vi ordonas al unuo ataki malamikon. Supre estas atakanto kaj defendanto kun siaj respektivaj bazaj fortoj.
⑭: Below that are strength bonuses or penalties and health bars projecting before / after the attack. = ⑭: Sub tio estas fortobonifikoj aŭ punoj kaj sanstangoj projektitaj antaŭ / post la atako.
⑮: The Attack Button - let blood flow! = ⑮: La atakbutono - lasu sangon flui!
⑯: The minimap shows an overview over the world, with known cities, terrain and fog of war. Clicking will position the main map. = ⑯: La minimapo montras superrigardon de la mondo, kun konataj urboj, tereno kaj nebulo de milito. Alklako poziciigos la ĉefan mapon.
⑰: To the side of the minimap are display feature toggling buttons - tile yield, worked indicator, show/hide resources. These mirror setting on the options screen and are hidden if you deactivate the minimap. = ⑰: Flanke de la minimapo estas butonoj por ŝalti/malŝalti montrajn funkciojn — kahela produktokvanto, laborata indikilo, montri/kaŝi rimedojn. Ĉi tiuj spegulas agordojn en la ekrano de agordoj kaj estas kaŝitaj se vi malaktivigas la minimapon.
⑱: Tile information for the selected hex - current or potential yield, terrain, effects, present units, city located there and such. Where appropriate, clicking a line opens the corresponding civilopedia entry. = ⑱: Kahelaj informoj por la elektita seslatero - aktuala aŭ ebla produktokvanto, tereno, efikoj, ĉeestantaj unuoj, urbo tie troviĝanta kaj simile. Kie taŭge, alklaki linion malfermas la koncernan civilopedian eniron.
⑲: Notifications - what happened during the last 'next turn' phase. Some are clickable to show a relevant place on the map, some even show several when you click repeatedly. = ⑲: Sciigoj - kio okazis dum la lasta fazo de 'sekva vico'. Iuj estas alklakeblaj por montri koncernan lokon sur la mapo, kaj iuj eĉ montras plurajn lokojn kiam vi alklakas ripete.
⑳: The Next Turn Button - unless there are things to do, in which case the label changes to 'next unit', 'pick policy' and so on. = ⑳: La butono 'Sekva vico' — krom se estas farendaĵoj; tiam la etikedo ŝanĝiĝas al 'sekva unuo', 'elektu politikon' kaj tiel plu.
㉑: The Multiplayer Button - Here you can easily check your active multiplayer games. = ㉑: La plurludanta butono - ĉi tie vi povas facile kontroli viajn aktivajn plurludantajn ludojn.
ⓐ: The overview button leads to the empire overview screen with various tabs (the last one viewed is remembered) holding vital information about the state of your civilization in the world. = ⓐ: La superrigarda butono kondukas al la ekrano de imperia superrigardo kun diversaj langetoj (la laste vidita estas memorata) enhavantaj esencajn informojn pri la stato de via civilizacio en la mondo.
ⓑ: The ♪Culture icon shows accumulated ♪Culture and ♪Culture needed for the next policy - in this case, the exclamation mark tells us a next policy can be enacted. Clicking is another way to the policies manager. = ⓑ: La piktogramo ♪Kulturo montras akumulitan ♪Kulturon kaj ♪Kulturon bezonatan por la sekva politiko - en ĉi tiu kazo, la krisigno diras al ni, ke sekva politiko povas esti adoptita. Alklako estas alia vojo al la politikadministrilo.
ⓒ: Your known strategic resources are displayed here with the available (usage already deducted) number - click to go to the resources overview screen. = ⓒ: Viaj konataj strategiaj rimedoj montriĝas ĉi tie kun la disponebla nombro (uzo jam dekalkulita) - alklaku por iri al la rimeda superrigarda ekrano.
ⓓ: Happiness/unhappiness balance and either golden age with turns left or accumulated happiness with amount needed for a golden age is shown next to the smiley. Clicking also leads to the resources overview screen as luxury resources are a way to improve happiness. = ⓓ: Ekvilibro de feliĉo/malfeliĉo kaj aŭ ora epoko kun restantaj vicoj aŭ akumulita feliĉo kun kvanto bezonata por ora epoko montriĝas apud la ridetulo. Alklako ankaŭ kondukas al la rimeda superrigarda ekrano, ĉar luksaj rimedoj estas maniero plibonigi feliĉon.
ⓔ: The ⍾Science icon shows the number of ⍾Science points produced per turn. Clicking leads to the technology tree. = ⓔ: La piktogramo ⍾Scienco montras la nombron de ⍾Sciencaj poentoj produktataj po vico. Alklako kondukas al la teknologia arbo.
ⓕ: Number of turns played with translation into calendar years. Click to see the victory overview. = ⓕ: Nombro de luditaj vicoj kun traduko al kalendaraj jaroj. Alklaku por vidi la venkan superrigardon.
ⓖ: The number of gold coins in your treasury and income. Clicks lead to the Stats overview screen. = ⓖ: La nombro de ormoneroj en via trezorejo kaj enspezo. Alklakoj kondukas al la Statistika superrigarda ekrano.
ⓗ: The quantity of ☮Faith your citizens have generated, or 'off' if religion is disabled. Clicking it makes you go to the religion overview screen. = ⓗ: La kvanto de ☮Kredo, kiun viaj civitanoj generis, aŭ 'malŝaltita' se religio estas malebligita. Alklako igas vin iri al la religia superrigarda ekrano.
ⓧ: In the center of all this - the world map! Here, the "X" marks a spot outside the map. Yes, unless the wrap option was used, Unciv worlds are flat. Don't worry, your ships won't fall off the edge. = ⓧ: En la centro de ĉio ĉi - la mondmapo! Ĉi tie la "X" markas lokon ekster la mapo. Jes, krom se la ĉirkaŭvolva opcio estis uzata, Unciv-mondoj estas plataj. Ne zorgu, viaj ŝipoj ne falos de la rando.
ⓨ: By the way, here's how an empire border looks like - it's in the national colours of the nation owning the territory. = ⓨ: Cetere, jen kiel aspektas imperia limo - ĝi estas en la naciaj koloroj de la nacio posedanta la teritorion.
ⓩ: And this is the red targeting circle that led to the attack pane back under ⑬. = ⓩ: Kaj jen la ruĝa celcirklo, kiu kondukis al la atakpanelo sub ⑬.
What you don't see: The phone/tablet's back button will pop the question whether you wish to leave Unciv and go back to Real Life. On desktop versions, you can use the ESC key. = Kion vi ne vidas: La malantaŭa butono de telefono/tabulkomputilo aperigos la demandon ĉu vi volas forlasi Unciv kaj reveni al la reala vivo. En labortablaj versioj, vi povas uzi la ESC-klavon.

When at later stages of the game, you might have a lot of units but only a little to do. To help you we have implemented an AutoPlay feature that lets you use the AI to play part or all of your turn. = Kiam vi estas en pli postaj etapoj de la ludo, vi eble havas multajn unuojn sed nur malmulton por fari. Por helpi vin, ni efektivigis aŭtoludan funkcion, kiu ebligas uzi AI-on por ludi parton aŭ la tuton de via vico.
To enable AutoPlay, go to options and open the AutoPlay tab and press "Show AutoPlay button". = Por ebligi Aŭtoludon, iru al Agordoj, malfermu la langeton Aŭtoludo, kaj premu "Montri la butonon Aŭtoludo".
Clicking on the AutoPlay button opens a popup menue for choosing to AutoPlay parts or all of your turn. = Alklako al la Aŭtoludo-butono malfermas ŝprucmenuon por elekti aŭtoludi partojn aŭ la tuton de via vico.
Clicking Start AutoPlay in the pop-up menue or long pressing the AutoPlay button begins the multi-turn AutoPlay. This will play your next turns as if you were an AI. = Alklako al Komenci Aŭtoludon en la ŝprucmenuo aŭ longa premo de la Aŭtoludo-butono komencas la plurvican aŭtoludon. Tio ludos viajn sekvajn vicojn kvazaŭ AI ludus por vi.
To cancel multi-turn AutoPlay you can press the AutoPlay button, next turn button or open the options menue. = Por nuligi plurvican aŭtoludon, vi povas premi la Aŭtoludo-butonon, la butonon de sekva vico, aŭ malfermi la menuon Agordoj.
Multi-turn AutoPlay is not advised on harder difficulty levels as your AI will not play better against an AI with modifiers. = Plurvica aŭtoludo ne estas konsilinda ĉe pli malfacilaj niveloj, ĉar la AI ludanta por vi ne ludos pli bone kontraŭ AI kun modifiloj.
Multi-turn AutoPlay for multiplayer is not yet supported. = Plurvica aŭtoludo por plurludado ankoraŭ ne estas subtenata.

After building a shrine, your civilization will start generating ☮Faith. = Post konstruo de sanktejo, via civilizacio komencos generi ☮Kredon.
When enough ☮Faith has been generated, you will be able to found a pantheon. = Kiam sufiĉe da ☮Kredo estas generita, vi povos fondi panteonon.
A pantheon will provide a small bonus for your civilization that will apply to all cities that have it as a majority religion. = Panteono provizos malgrandan bonifikon por via civilizacio, kiu aplikiĝos al ĉiuj urboj, kiuj havas ĝin kiel plimultan religion.
Each civilization can only choose a single pantheon belief, and each pantheon can only be chosen once. = Ĉiu civilizacio povas elekti nur unu solan panteonan kredideon, kaj ĉiu panteono povas esti elektita nur unufoje.
Generating more ☮Faith will allow you to found a religion. = Generi pli da ☮Kredo permesos al vi fondi religion.

Keep generating ☮Faith, and eventually a great prophet will be born in one of your cities. = Daŭre generu ☮Kredon, kaj fine granda profeto naskiĝos en unu el viaj urboj.
This great prophet can be used for multiple things: Constructing a holy site, founding a religion and spreading your religion. = Ĉi tiu granda profeto povas esti uzata por pluraj aferoj: konstrui sanktan lokon, fondi religion kaj disvastigi vian religion.
When founding your religion, you may choose another two beliefs. The founder belief will only apply to you, while the follower belief will apply to all cities following your religion. = Fondante vian religion, vi povas elekti aliajn du kredideojn. La kredideo de fondinto validos nur por vi, dum la kredideo de sekvantoj validos por ĉiuj urboj sekvantaj vian religion.
Additionally, the city where you used your great prophet will become the holy city of that religion. = Krome, la urbo kie vi uzis vian grandan profeton fariĝos la sankta urbo de tiu religio.
Once you have founded a religion, great prophets will keep being born every so often, though the amount of Faith☮ you have to save up will be higher. = Post kiam vi fondis religion, grandaj profetoj plu naskiĝos de tempo al tempo, kvankam la kvanto de Kredo☮, kiun vi devas ŝpari, estos pli alta.
One of these great prophets can then be used to enhance your religion. = Unu el ĉi tiuj grandaj profetoj tiam povas esti uzata por plifortigi vian religion.
This will allow you to choose another follower belief, as well as an enhancer belief, that only applies to you. = Tio permesos al vi elekti alian kredideon de sekvantoj, same kiel plifortigan kredideon, kiu validas nur por vi.
Do take care founding a religion soon, only about half the players in the game are able to found a religion! = Zorgu fondi religion baldaŭ; nur ĉirkaŭ duono de la ludantoj en la ludo kapablas fondi religion!

Religion inside cities = Religio ene de urboj
When founding a city, it won't follow a religion immediately. = Fondante urbon, ĝi ne tuj sekvos religion.
The religion a city follows depends on the total pressure each religion has within the city. = La religio, kiun urbo sekvas, dependas de la totala premo, kiun ĉiu religio havas ene de la urbo.
Followers are allocated in the same proportions as these pressures, and these followers can be viewed in the City Screen. = Sekvantoj estas disdividitaj laŭ la samaj proporcioj kiel tiuj premoj, kaj ĉi tiuj sekvantoj videblas en la Urba ekrano.
You are allowed to check religious followers and pressures in cities you do not own by selecting them. = Vi rajtas kontroli religiajn sekvantojn kaj premojn en urboj, kiujn vi ne posedas, elektante ilin.
In both places, a tap/click on the icon of a religion will show detailed information with its effects. = En ambaŭ lokoj, frapo/alklako sur la piktogramo de religio montros detalajn informojn kun ĝiaj efikoj.
Based on this, you can get a feel for which religions have a lot of pressure built up in the city, and which have almost none. = Surbaze de tio, vi povas ekhavi impreson pri kiuj religioj havas multe da premo akumulita en la urbo, kaj kiuj havas preskaŭ nenion.
The city follows a religion if a majority of its population follows that religion, and will only then receive the effects of Follower and Pantheon beliefs of that religion. = La urbo sekvas religion se plimulto de ĝia loĝantaro sekvas tiun religion, kaj nur tiam ricevos la efikojn de la kredideoj de sekvantoj kaj panteonaj kredideoj de tiu religio.

Spreading Religion = Disvastigado de Religio
Spreading religion happens naturally, but can be sped up using missionaries or great prophets. = Disvastigado de religio okazas nature, sed povas esti rapidigita uzante misiistojn aŭ grandajn profetojn.
Missionaries can be bought in cities following a major religion, and will take the religion of that city. = Misiistoj povas esti aĉetitaj en urboj sekvantaj gravan religion, kaj ili prenos la religion de tiu urbo.
So do take care where you are buying them! If another civilization has converted one of your cities to their religion, missionaries bought there will follow their religion. = Do zorgu kie vi aĉetas ilin! Se alia civilizacio konvertis unu el viaj urboj al sia religio, misiistoj aĉetitaj tie sekvos ilian religion.
Great prophets always have your religion when they appear, even if they are bought in cities following other religions, but captured great prophets do retain their original religion. = Grandaj profetoj ĉiam havas vian religion kiam ili aperas, eĉ se ili estas aĉetitaj en urboj sekvantaj aliajn religiojn, sed kaptitaj grandaj profetoj ja retenas sian originan religion.
Both great prophets and missionaries are able to spread religion to cities when they are inside its borders, even cities of other civilizations. = Kaj grandaj profetoj kaj misiistoj povas disvastigi religion al urboj kiam ili estas ene de iliaj limoj, eĉ al urboj de aliaj civilizacioj.
These two units can even enter tiles of civilizations with whom you don't have an open borders agreement! = Ĉi tiuj du unuoj eĉ povas eniri kahelojn de civilizacioj kun kiuj vi ne havas interkonsenton pri malfermaj limoj!
But do take care, missionaries will lose 250 religious strength each turn they end while in foreign lands. = Sed zorgu: misiistoj perdos 250 religian forton ĉiun vicon, kiun ili finas en fremdaj landoj.
This diminishes their effectiveness when spreading religion, and if their religious strength ever reaches 0, they have lost their faith and disappear. = Tio malpliigas ilian efikecon dum disvastigado de religio, kaj se ilia religia forto iam atingas 0, ili perdis sian kredon kaj malaperas.
When you do spread your religion, the religious strength of the unit is added as pressure for that religion. = Kiam vi ja disvastigas vian religion, la religia forto de la unuo estas aldonita kiel premo por tiu religio.
Cities also passively add pressure of their majority religion to nearby cities. = Urboj ankaŭ pasive aldonas premon de sia plimulta religio al proksimaj urboj.
Each city provides +6 pressure per turn to all cities within 10 tiles, though the exact amount of pressure depends on the game speed. = Ĉiu urbo provizas +6 premon po vico al ĉiuj urboj ene de 10 kaheloj, kvankam la ĝusta kvanto de premo dependas de la ludrapideco.
This pressure can also be seen in the City Screen, and gives you an idea of how religions in your cities will evolve if you don't do anything. = Ĉi tiu premo ankaŭ videblas en la Urba ekrano, kaj donas al vi ideon pri kiel religioj en viaj urboj evoluos se vi faras nenion.
Holy cities also provide +30 pressure of the religion founded there to themselves, making it very difficult to effectively convert a holy city. = Sanktaj urboj ankaŭ provizas +30 premon de la religio fondita tie al si mem, kio tre malfaciligas efike konverti sanktan urbon.
Lastly, before founding a religion, new cities you settle will start with 200 pressure for your pantheon. = Fine, antaŭ fondo de religio, novaj urboj, kiujn vi fondas, komencos kun 200 da premo por via panteono.
This way, all your cities will starting following your pantheon as long as you haven't founded a religion yet. = Tiel ĉiuj viaj urboj komencos sekvi vian panteonon tiel longe kiel vi ankoraŭ ne fondis religion.

Inquisitors = Inkvizitoroj
Inquisitors are the last religious unit, and their strength is removing other religions. = Inkvizitoroj estas la lasta religia unuo, kaj ilia forto estas forigi aliajn religiojn.
They can remove all other religions from one of your own cities, removing any pressures built up. = Ili povas forigi ĉiujn aliajn religiojn el unu el viaj propraj urboj, forigante ĉiujn akumulitajn premojn.
Great prophets also have this ability, and remove all other religions in the city when spreading their religion. = Grandaj profetoj ankaŭ havas ĉi tiun kapablon, kaj forigas ĉiujn aliajn religiojn en la urbo kiam ili disvastigas sian religion.
Often this results in the city immediately converting to their religion = Ofte tio rezultigas, ke la urbo tuj konvertiĝas al ilia religio
Additionally, when an inquisitor is stationed in or directly next to a city center, units of other religions cannot spread their faith there, though natural spread is unaffected. = Krome, kiam inkvizitoro estas postenigita en aŭ rekte apud urbocentro, unuoj de aliaj religioj ne povas disvastigi sian kredon tie, kvankam natura disvastiĝo ne estas tuŝata.

The Mayan unique ability, 'The Long Count', comes with a side effect: = La unika kapablo de la Majaoj, 'La Longa Kalkulo', venas kun kromefiko:
Once active, the game's year display will use mayan notation. = Post aktiviĝo, la jarmontrado de la ludo uzos majaan notacion.
The Maya measured time in days from what we would call 11th of August, 3114 BCE. A day is called K'in, 20 days are a Winal, 18 Winals are a Tun, 20 Tuns are a K'atun, 20 K'atuns are a B'ak'tun, 20 B'ak'tuns a Piktun, and so on. = La Majaoj mezuris tempon per tagoj ekde tio, kion ni nomus la 11-an de aŭgusto 3114 a.K. Tago nomiĝas K'in, 20 tagoj estas Winal, 18 Winaloj estas Tun, 20 Tunoj estas K'atun, 20 K'atunoj estas B'ak'tun, 20 B'ak'tunoj estas Piktun, kaj tiel plu.
Unciv only displays ය B'ak'tuns, ඹ K'atuns and ම Tuns (from left to right) since that is enough to approximate gregorian calendar years. The Maya numerals are pretty obvious to understand. Have fun deciphering them! = Unciv montras nur ය B'ak'tun-ojn, ඹ K'atun-ojn kaj ම Tun-ojn (de maldekstre dekstren), ĉar tio sufiĉas por proksimigi gregoriajn kalendarajn jarojn. La majaaj numeraloj estas sufiĉe evidentaj por kompreni. Amuziĝu deĉifrante ilin!

Your cities will periodically demand different luxury goods to satisfy their desire for new things in life. = Viaj urboj periode postulos diversajn luksajn varojn por kontentigi sian deziron al novaj aferoj en la vivo.
If you manage to acquire the demanded luxury by trade, expansion, or conquest, the city will celebrate We Love The King Day for 20 turns. = Se vi sukcesos akiri la postulatan luksaĵon per komerco, ekspansio aŭ konkero, la urbo festos Tagon Ni Amas la Reĝon dum 20 vicoj.
During the We Love The King Day, the city will grow 25% faster. = Dum la Tago Ni Amas la Reĝon, la urbo kreskos 25% pli rapide.
This means exploration and trade is important to grow your cities! = Tio signifas, ke esplorado kaj komerco gravas por kreskigi viajn urbojn!

Air Combat and Interception = Aera batalo kaj interkapto
Air Combat is very similar to normal Combat, with a few wrinkles. Damage is still dealt using the same equations based on the relative Strength of the Attacking and Defending Unit. = Aera batalo tre similas al normala batalo, kun kelkaj apartaĵoj. Damaĝo ankoraŭ estas farata per la samaj ekvacioj bazitaj sur la relativa forto de la atakanta kaj defendanta unuo.
However, before the Attacker and Defender fight, there is an added combat phase called Interception. If there is any unit with Interception Range that covers the target attacked tile, then it will attempt to Intercept the Attacking Air Unit. If multiple units can Intercept, the one with higher Intercept chance does it. = Tamen antaŭ ol la atakanto kaj defendanto batalas, aldoniĝas batalfazo nomata Interkapto. Se ekzistas unuo kun interkapta distanco, kiu kovras la celitan kahelon, ĝi provos interkapti la atakantan aeran unuon. Se pluraj unuoj povas interkapti, tion faras tiu kun pli alta ŝanco de interkapto.
Generally Land/Naval Units have an Intercept Range of 2 Tiles, and Air Units have an Intercept Range of their Attack Range. = Ĝenerale teraj/maraj unuoj havas interkaptan distancon de 2 kaheloj, kaj aeraj unuoj havas interkaptan distancon egalan al sia atakdistanco.
Ground and Naval Units don't require movement points to Intercept, just Attacks. Air Units cannot have moved nor attacked in the preceding turn. = Teraj kaj maraj unuoj ne bezonas movpoentojn por interkapti, nur atakojn. Aeraj unuoj ne rajtas esti moviĝintaj nek atakintaj en la antaŭa vico.
The Intercepting Unit rolls to see if it hits. Whether it hits or not costs an Attack, and most units (without Promotions) can only Attack Once per Nation's Turn. It does NOT cost Movement Points, but Air Units that have used their Movement cannot Intercept between turns. = La interkaptanta unuo ĵetas por vidi ĉu ĝi trafas. Ĉu ĝi trafas aŭ ne, tio kostas atakon, kaj plej multaj unuoj (sen promocioj) povas ataki nur unufoje dum la vico de nacio. Tio NE kostas movpoentojn, sed aeraj unuoj, kiuj jam uzis sian moviĝon, ne povas interkapti inter vicoj.
If the Intercepting Unit Hits, it deals damage according to the Combat Strength calculation to the Attacking Air Unit, potentially with any Strength Bonuses that apply to Interception. It does not receive damage from the Attacking Air Unit. = Se la interkaptanta unuo trafas, ĝi kaŭzas damaĝon laŭ la kalkulo de batalforto al la atakanta aera unuo, eventuale kun ajnaj fortobonifikoj aplikeblaj al interkapto. Ĝi ne ricevas damaĝon de la atakanta aera unuo.
After Interception resolves, the Attacking Air Unit and the Defending Unit in the targeted tile do Combat as normal, with damage dealt to both sides. = Post kiam interkapto finiĝas, la atakanta aera unuo kaj la defendanta unuo en la celata kahelo batalas normale, kun damaĝo farata al ambaŭ flankoj.
To help deal with Interceptions, see Air Sweeps. = Por helpi trakti Interkaptojn, vidu Aerajn Traserĉojn.

Air Sweeps = Aeraj Traserĉoj
Fighter units are able to perform Air Sweeps over a tile helping clear out potential enemy Air, Sea, or Land Interceptions that can reach that tile. = Ĉasaviadilaj unuoj povas fari aerajn traserĉojn super kahelo, helpante forigi eblajn malamikajn aerajn, marajn aŭ terajn interkaptojn, kiuj povas atingi tiun kahelon.
While this Action will take an Attack, the benefit is drawing out Interceptions to help protect your other Air Units. Especially your Bombers. = Kvankam ĉi tiu ago kostos atakon, la avantaĝo estas elvoki interkaptojn por helpi protekti viajn aliajn aerajn unuojn, precipe viajn bombaviadilojn.
Your unit will always draw an Interception, if one can reach the target tile, even if the Intercepting unit has a chance to miss. = Via unuo ĉiam elvokos interkapton, se unu povas atingi la celkahelon, eĉ se la interkaptanta unuo havas ŝancon maltrafi.
If the Interceptor is not an Air Unit (eg Land or Sea), the Air Sweeping unit and Interceptor take no damage! = Se la interkaptanto ne estas aera unuo (ekz. tera aŭ mara), la aera traserĉa unuo kaj la interkaptanto ne ricevas damaĝon!
If the Interceptor is an Air Unit, the two units will damage each other in a straight fight with no Interception bonuses. And only the Attacking Air Sweep Unit gets any Air Sweep strength bonuses. = Se la interkaptanto estas aera unuo, la du unuoj damaĝos unu la alian en rekta batalo sen interkaptaj bonifikoj. Kaj nur la atakanta aera traserĉa unuo ricevas ajnajn fortobonifikojn de aera traserĉo.

Fortify, Guard, Withdraw = Fortikigi, Gardi, Retiriĝi
Most Land units have the ability to Fortify. As they spend time without moving, they will slowly gain a Fortification Bonus to their Combat Strength representing digging in and preparing in case of an attack. = Plej multaj teraj unuoj havas la kapablon Fortikigi. Dum ili pasigas tempon sen moviĝi, ili malrapide akiros fortikigan bonifikon al sia batalforto, reprezentante enfosiĝon kaj prepariĝon kaze de atako.
Some units have the ability to Withdraw before a melee attack is struck. However, perhaps you wish for them to stand their ground to protect a particular tile. If you do, then give them the Guard command and they will stay fixed until they die or you give them fresh orders. = Kelkaj unuoj havas la kapablon Retiriĝi antaŭ ol proksimbatala atako trafas. Tamen, eble vi volas, ke ili tenu sian pozicion por protekti specifan kahelon. Se jes, donu al ili la ordonon Gardi, kaj ili restos fiksitaj ĝis ili mortos aŭ ĝis vi donos al ili novajn ordonojn.
This is NOT the same as Fortify but they will still gain the Fortification Bonus. They will simply not utilize their Withdraw ability. Fortified units with the Withdraw ability will try to flee when attacked. = Tio NE estas la sama kiel Fortikigi, sed ili ankoraŭ ricevos la fortikigan bonifikon. Ili simple ne uzos sian kapablon Retiriĝi. Fortikigitaj unuoj kun la kapablo Retiriĝi provos fuĝi kiam ili estos atakitaj.

City Tile Blockade = Blokado de Urbaj Kaheloj
One of your tiles is blocked by an enemy: when an enemy unit stands on a tile you own, the tile will not produce yields and cannot be worked by a city this turn. City will reallocate population from a blocked tile automatically. = Unu el viaj kaheloj estas blokita de malamiko: kiam malamika unuo staras sur kahelo posedata de vi, la kahelo ne produktos produktokvantojn kaj ne povos esti laborata de urbo dum ĉi tiu vico. La urbo aŭtomate reasignos loĝantaron de blokita kahelo.
Enemy military land units block tiles they are standing on. Enemy military naval units additionally block adjacent water tiles. To protect your tiles from blockade, place a friendly military unit on it or fight off invaders. = Malamikaj militaj teraj unuoj blokas la kahelojn, sur kiuj ili staras. Malamikaj militaj maraj unuoj krome blokas apudajn akvajn kahelojn. Por protekti viajn kahelojn kontraŭ blokado, metu amikan militan unuon sur ilin aŭ forpelu invadantojn.

One of your cities is under a naval blockade! When all adjacent water tiles of a coastal city are blocked - city loses harbor connection to all other cities, including capital. Make sure to de-blockade cities by deploying friendly military naval units to fight off invaders. = Unu el viaj urboj estas sub mara blokado! Kiam ĉiuj apudaj akvaj kaheloj de marborda urbo estas blokitaj, la urbo perdas havenan konekton al ĉiuj aliaj urboj, inkluzive de la ĉefurbo. Nepre ĉesigu blokadon de urboj deplojante amikajn militajn marajn unuojn por forpeli invadantojn.

Spies! = Spionoj!
The first time a civ reaches the Renaissance era each nation gets one spy. Every time a civ reaches an era afterwards they get one more spy. = La unuan fojon kiam civilizacio atingas la Renesancan epokon, ĉiu nacio ricevas unu spionon. Ĉiufoje kiam civilizacio poste atingas epokon, ĝi ricevas unu plian spionon.
Spies can be sent out to foreign cities to steal technology, rigging elections or stage coups. Place them in your own cities to do counter-intelligence work. = Spionoj povas esti senditaj al fremdaj urboj por ŝteli teknologion, manipuli elektojn aŭ aranĝi puĉojn. Metu ilin en viajn proprajn urbojn por fari kontraŭspionadan laboron.
Only one spy per civ is allowed in each city. Spies that are not in any city are on vacation in your spy hideout. = Nur unu spiono por ĉiu civilizacio estas permesata en ĉiu urbo. Spionoj, kiuj ne estas en iu urbo, ferias en via spiona kaŝejo.
Spies set up in cities of major civilizations will try to steal technology at a rate which is based off of the science production in the city. Succeeding to steal technology will level up your spy. Failing to succeed will level up the defending spy if it is present. = Spionoj starigitaj en urboj de gravaj civilizacioj provos ŝteli teknologion kun rapideco bazita sur la scienca produktado en la urbo. Sukcesa ŝtelo de teknologio nivelaltigos vian spionon. Malsukceso nivelaltigos la defendan spionon, se ĝi ĉeestas.
Spies set in city-states will try to rig the elections in order to gain influence and reduce the influence of other civilizations. Only one spy partaking in rigging the election can win. = Spionoj starigitaj en urboŝtatoj provos manipuli la elektojn por akiri Influon kaj redukti la Influon de aliaj civilizacioj. Nur unu spiono partoprenanta en la manipulado de elekto povas venki.
A spy that is rigging an election in a city-state may also stage a coup. The likelihood of success for the coup depends on your relative influence to the current ally of the city-state, your spy level, and the level of the spy that the current ally has in the city-state if present. Succeeding a coup will make you their new ally and reduce the influence of all other civs. Failing a coup will kill your spy and level up the defending spy if present. = Spiono, kiu manipulas elekton en urboŝtato, ankaŭ povas aranĝi puĉon. La probableco de sukceso por la puĉo dependas de via relativa Influo kompare kun la nuna aliancano de la urboŝtato, de la nivelo de via spiono, kaj de la nivelo de la spiono, kiun la nuna aliancano havas en la urboŝtato, se ĝi ĉeestas. Sukcesa puĉo igos vin ilia nova aliancano kaj reduktos la Influon de ĉiuj aliaj civilizacioj. Malsukcesa puĉo mortigos vian spionon kaj nivelaltigos la defendan spionon, se ĝi ĉeestas.
Spies that are set up in your own cities will be conducting counter-intelligence. They reduce the success chance of other spies trying to steal your technology. = Spionoj starigitaj en viaj propraj urboj faros kontraŭspionadon. Ili reduktas la sukcesŝancon de aliaj spionoj provantaj ŝteli vian teknologion.
Spies at a higher rank have a higher chance of success. The max rank a spy can reach is rank 3. After a spy is killed it will revive after a certain amount of turns back at rank 1. = Spionoj je pli alta rango havas pli altan ŝancon sukcesi. La maksimuma rango, kiun spiono povas atingi, estas rango 3. Post kiam spiono estas mortigita, ĝi reviviĝos post certa nombro da vicoj denove je rango 1.
Building buildings like the constabulary and police station will reduce the technology steal rate of spies in that city. = Konstruaĵoj kiel la konstabulejo kaj policejo reduktos la rapidecon de teknologioŝtelado fare de spionoj en tiu urbo.
Espionage is available using the Gods and Kings ruleset. To enable it in a new game click advanced settings, then click on the Enable Espionage option. = Spionado disponeblas uzante la regularon Dioj kaj Reĝoj. Por ebligi ĝin en nova ludo, alklaku altnivelajn agordojn, poste alklaku la opcion Ebligi Spionadon.

Keyboard Bindings = Klavkombinoj
Limitations = Limigoj
This is a work in progress. = Laboro ankoraŭ daŭras.
For technical reasons, only direct keys or Ctrl-Letter combinations can be used. = Pro teknikaj kialoj, nur rektaj klavoj aŭ Ctrl-literaj kombinoj povas esti uzataj.
Using the Keys page = Uzado de la paĝo Klavoj
Each binding has a button with an image looking like this: = Ĉiu klavkombino havas butonon kun bildo aspektanta tiel:
While hovering the mouse over the key button, you can press a desired key directly to assign it. = Dum la musmontrilo estas super la klavbutono, vi povas premi deziratan klavon rekte por asigni ĝin.
Double-click the image to reset the binding to default. = Duoble alklaku la bildon por restarigi la klavkombinon al defaŭlto.
Bindings mapped to their default keys are displayed in gray, those reassigned by you in white. = Klavkombinoj mapitaj al siaj defaŭltaj klavoj montriĝas grize; tiuj, kiujn vi reasignis, montriĝas blanke.
Conflicting assignments are marked red. Conflicts can exist across categories, like World Screen / Unit Actions. Note that at the moment, the game does not prevent saving conflicting assignments, though the result may be unexpected. = Konfliktaj asignoj estas markitaj ruĝe. Konfliktoj povas ekzisti trans kategorioj, kiel Monda ekrano / Agoj de unuoj. Notu, ke nuntempe la ludo ne malhelpas konservi konfliktajn asignojn, kvankam la rezulto povas esti neatendita.
For discussion about missing entries, see the linked github issue. = Por diskuto pri mankantaj enskriboj, vidu la ligitan GitHub-temon.

Welcome to the Civilopedia! = Bonvenon al la Civilopedio!
Here you can find information - general help, rules, and what makes up the game world. = Ĉi tie vi povas trovi informojn — ĝeneralan helpon, regulojn, kaj tion, kio konsistigas la ludmondon.
How to find information = Kiel trovi informojn
Select categories with the buttons on top of the screen. Also up there is the button to leave Civilopedia and go back to where you were before. = Elektu kategoriojn per la butonoj ĉe la supro de la ekrano. Ankaŭ tie supre troviĝas la butono por forlasi Civilopedion kaj reiri al kie vi estis antaŭe.
Each category has a list of entries on the left of the screen, sorted alphabetically (with few exceptions). Clicking an entry will update the center pane were you are currently reading this. = Ĉiu kategorio havas liston de enskriboj maldekstre de la ekrano, ordigitaj alfabete (kun malmultaj esceptoj). Alklaki enskribon ĝisdatigos la centran panelon, kie vi nun legas ĉi tion.
Lines can link to other Civilopedia entries, they are marked with a chain link symbol like this one. You can click anywhere on the line to follow the link. = Linioj povas ligi al aliaj enskriboj de la Civilopedio; ili estas markitaj per ĉenliga simbolo kiel ĉi tiu. Vi povas alklaki ie ajn sur la linio por sekvi la ligon.
The current category is special - all articles on general concepts are here. It is called 'Tutorials' because you can revisit these here, too. = La nuna kategorio estas speciala — ĉiuj artikoloj pri ĝeneralaj konceptoj estas ĉi tie. Ĝi nomiĝas 'Lerniloj', ĉar vi ankaŭ povas reveni al ĉi tiuj ĉi tie.
What information can I find = Kiajn informojn mi povas trovi
The data shown is not dependent on your current game's situation, e.g. bonuses for the nation you are playing or difficulty modifiers will not affect the numbers. = La montrataj datumoj ne dependas de la situacio de via nuna ludo; ekz. bonifikoj por la nacio, kiun vi ludas, aŭ malfacilecaj modifiloj ne influos la nombrojn.
However, it will reflect the mods you are playing! The combination of base ruleset and extension mods you select define the rules of a game, what objects exist and how they interact, and the Civilopedia mirrors these rules. = Tamen ĝi reflektos la modifaĵojn, kiujn vi ludas! La kombino de baza regularo kaj etendaj modifaĵoj, kiujn vi elektas, difinas la regulojn de ludo, kiuj objektoj ekzistas kaj kiel ili interagas, kaj la Civilopedio spegulas tiujn regulojn.
If you opened the Civilopedia from the main menu, the "Ruleset" will be that of the last game you started. = Se vi malfermis la Civilopedion el la ĉefa menuo, la "Regularo" estos tiu de la lasta ludo, kiun vi komencis.
Letters can select categories, and when there are multiple categories matching the same letter, you can press that repeatedly to cycle between these. = Literoj povas elekti kategoriojn, kaj kiam pluraj kategorioj kongruas kun la sama litero, vi povas premi ĝin ripete por trairi ilin cikle.
The arrow keys allow navigation as well - left/right for categories, up/down for entries. = La sagoklavoj ankaŭ permesas navigadon — maldekstre/dekstre por kategorioj, supren/suben por enskriboj.

UI Tips = Konsiletoj pri Interfaco
World screen = Monda ekrano
Skip all units to end a turn quickly = Preterpasi ĉiujn unuojn por rapide fini vicon
Right-click or long press the "Next unit" button to open a popup menu which allows to end a turn without having to cycle through all units. If some units are automated, a dedicated button is available to move them before ending the turn. = Dekstre alklaku aŭ longe premu la butonon "Sekva unuo" por malfermi ŝprucmenuon, kiu permesas fini vicon sen devi trairi ĉiujn unuojn. Se kelkaj unuoj estas aŭtomatigitaj, aparta butono disponeblas por movi ilin antaŭ ol fini la vicon.
Toggle notification list display = Ŝalti/malŝalti montradon de sciigolisto
On the World screen, swipe the notification list to the right to temporarily hide it. Click the "Bell" button to display them again. = Sur la Monda ekrano, ŝovu la sciigoliston dekstren por provizore kaŝi ĝin. Alklaku la butonon "Sonorilo" por montri ĝin denove.
The default state for the notification list can be set in Options > Display > UI - Notifications on world screen. = La defaŭlta stato de la sciigolisto povas esti agordita en Agordoj > Ekrano > Interfaco - Sciigoj sur monda ekrano.
Entering a City Screen quickly = Rapide eniri urban ekranon
You can Right-click or long press a city button on the World screen. The result is the same as tapping it twice - once to select and move the button, again to trigger a reaction: show the City Screen (if the city is yours to inspect), or offer the foreign city info popup. = Vi povas dekstre alklaki aŭ longe premi urbobutonon sur la Monda ekrano. La rezulto estas sama kiel frapi ĝin dufoje — unufoje por elekti kaj movi la butonon, denove por ekigi reagon: montri la Urban ekranon (se la urbo estas via por inspekti), aŭ montri la informan ŝprucfenestron pri fremda urbo.
Upgrade multiple units of the same type = Plibonigi plurajn unuojn de la sama tipo
On the World screen, select an unit that can be upgraded, then right-click or long press the "Upgrade" button to open a popup menu allowing to upgrade all units of this type at once. = Sur la Monda ekrano, elektu unuon, kiu povas esti plibonigita, poste dekstre alklaku aŭ longe premu la butonon "Plibonigi" por malfermi ŝprucmenuon, kiu permesas plibonigi ĉiujn unuojn de ĉi tiu tipo samtempe.
In the Units overview, the same upgrade menu is available by clicking the unit icon in the "Upgrade" column. When an unit is upgradeable, the icon is lit if conditions are met (enough gold and/or resources), otherwise it is dimmed. = En la superrigardo de Unuoj, la sama pliboniga menuo disponeblas alklakante la unuo-ikonon en la kolumno "Plibonigi". Kiam unuo estas plibonigebla, la ikono estas lumigita se kondiĉoj estas plenumitaj (sufiĉe da oro kaj/aŭ rimedoj); alie ĝi estas malheligita.
Additional controls for the construction queue = Pliaj regiloj por la konstrua vico
Right-click or long press a construction item to open a popup menu with additional controls, allowing to manage production of the same item in all cities, by issuing the commands from the same City Screen. = Dekstre alklaku aŭ longe premu konstruotan eron por malfermi ŝprucmenuon kun pliaj regiloj, kiuj permesas administri produktadon de la sama ero en ĉiuj urboj per ordonoj el la sama Urba ekrano.
The "Disable" option moves an item to a separated "Disabled" tab, preventing its automatic queueing by the "Auto-assign city production" option. To move a disabled item back to its initial place, enter again the popup menu, and choose "Enable". = La opcio "Malebligi" movas eron al aparta langeto "Malebligita", malhelpante ĝian aŭtomatan envicigon per la opcio "Aŭtomate asigni urban produktadon". Por remeti malebligitan eron al ĝia komenca loko, denove malfermu la ŝprucmenuon kaj elektu "Ebligi".
Disabled items are set globally and persistent: they are not reset in a new game, or by restarting Unciv. = Malebligitaj eroj estas agorditaj tutmonde kaj persiste: ili ne estas restarigitaj en nova ludo aŭ per rekomenco de Unciv.
Show Great Person Points breakdown = Montri detalojn pri poentoj de Grandaj Personoj
In the right sidepanel, click a Great People row to display the details of Great Person Points (GPP) accumulated each turn by the current city, for this type of Great People. = En la dekstra flankpanelo, alklaku vicon de Grandaj Personoj por montri la detalojn de Poentoj de Grandaj Personoj akumulitaj ĉiun vicon de la nuna urbo por ĉi tiu tipo de Grandaj Personoj.
Click any of the Great People icons to display all GPP accumulated each turn by the current city, for all types of Great People. = Alklaku iun ajn el la piktogramoj de Grandaj Personoj por montri ĉiujn Poentojn de Grandaj Personoj akumulitajn ĉiun vicon de la nuna urbo por ĉiuj tipoj de Grandaj Personoj.
Tech screen = Teknologia ekrano
Queue multiple technologies in different branches = Envicigi plurajn teknologiojn en malsamaj branĉoj
On the Tech screen, right-click or long press a technology to automatically queue it, even if this tech is in another branch than the item currently researched. Prerequisite techs to research will also be automatically queued. = Sur la Teknologia ekrano, dekstre alklaku aŭ longe premu teknologion por aŭtomate envicigi ĝin, eĉ se ĉi tiu teknologio estas en alia branĉo ol la nun esplorata ero. Antaŭkondiĉaj teknologioj esplorendaj ankaŭ estos aŭtomate envicigitaj.
Right-click or long press multiple techs to append them to the research queue, whatever their branch is. = Dekstre alklaku aŭ longe premu plurajn teknologiojn por aldoni ilin al la esplora vico, kia ajn estas ilia branĉo.
Overview screens = Superrigardaj ekranoj
Reveal known resources on world screen = Malkaŝi konatajn rimedojn sur la monda ekrano
In the Resources overview, click on a resource icon to center the world screen on tiles already discovered and providing this resource. = En la superrigardo de Rimedoj, alklaku rimedan piktogramon por centri la mondan ekranon sur kaheloj jam malkovritaj kaj provizantaj ĉi tiun rimedon.
Alternatively, click on the "Unimproved" number to center the world screen only on owned (by you or your allied City-states) tiles where the resource is not improved. = Alternative, alklaku la nombron "Neplibonigita" por centri la mondan ekranon nur sur posedataj kaheloj (de vi aŭ viaj aliancitaj Urboŝtatoj), kie la rimedo ne estas plibonigita.
If more than one tile is available, click repeatedly on the notification to cycle through all of them. = Se pli ol unu kahelo disponeblas, alklaku ripete la sciigon por trairi ĉiujn.
Show diagram line colors = Montri kolorojn de diagramaj linioj
In Politics overview > Show diagram, you can click anywhere inside the diagram to display a table listing all relationship line colors and their meaning. = En Superrigardo de politiko > Montri diagramon, vi povas alklaki ie ajn interne de la diagramo por montri tabelon listigantan ĉiujn kolorojn de rilataj linioj kaj ilian signifon.
Reading "Toast" popups = Legado de ŝprucaj sciigoj
"Toasts" can be clicked to make them stay on the screen for easier reading. = Ŝprucaj sciigoj povas esti alklakitaj por resti sur la ekrano por pli facila legado.
Click it again to close (or use the close button). = Alklaku ĝin denove por fermi (aŭ uzu la fermbutonon).
Miscellaneous = Diversaĵoj
External links = Eksteraj ligiloj
External links support right-click or long press to copy the link to the clipboard instead of launching the browser. = Eksteraj ligiloj subtenas dekstran alklakon aŭ longan premon por kopii la ligon al la tondujo anstataŭ lanĉi la retumilon.
Example: The 'Open Github page' button on the Mod management screen. = Ekzemplo: la butono 'Malfermi GitHub-paĝon' sur la ekrano de administrado de modifaĵoj.
View change log = Vidi ŝanĝprotokolon
After updating, you might want to see what has changed. The "About" in "Options" has the version number linked to the change log. You can also see that info by clicking the version number on the main menu. = Post ĝisdatigo, vi eble volos vidi kio ŝanĝiĝis. En "Agordoj", la sekcio "Pri" havas la versionumeron ligitan al la ŝanĝprotokolo. Vi ankaŭ povas vidi tiun informon alklakante la versionumeron en la ĉefa menuo.

Differences from Civilization V = Diferencoj de Civilization V
Production Focus\nIn Civilization V, the Food yield in a city is calculated first, then population grows by consuming stored food (growth), then production is calculated, and so on one by one the other stats are calculated. Thus, citizens can produce yields in the same turn as they are born. The city focus is set to Production to assign the newborn citizen to a hill so they'll contribute Production, and then manually reassigned to a growth tile on the next turn. Alternatively, you can set city focus to Gold (e.g. with Cerro de Potosi), Faith (e.g. with Mount Sinai) or whatever gains the most yields. In Unciv, citizens only start producing yields on the next turn, so you can ignore this whole concept. = Produktada fokuso\nEn Civilization V, la produktokvanto de Manĝaĵo en urbo estas kalkulata unue; poste la loĝantaro kreskas konsumante stokitan manĝaĵon (kresko); poste produktado estas kalkulata, kaj tiel plu por la aliaj statistikoj. Tial civitanoj povas produkti produktokvantojn en la sama vico kiam ili naskiĝas. La urba fokuso estas agordita al Produktado por asigni la novnaskitan civitanon al monteto, por ke ĝi kontribuu Produktadon, kaj poste oni mane reasignas ĝin al kreskokahelo en la sekva vico. Alternative, vi povas agordi urban fokuson al Oro (ekz. kun Cerro de Potosi), Kredo (ekz. kun Monto Sinajo) aŭ al tio, kio donas la plej multajn produktokvantojn. En Unciv, civitanoj komencas produkti produktokvantojn nur en la sekva vico, do vi povas ignori ĉi tiun tutan koncepton.
Science Queueing\nIn Civilization V, Science yield is calculated after production, so if you finish an item and have Science (or Gold) queued as a perpetual construction, the Production overflow from item will be converted into Science (or Gold), but the Production is not consumed, as this will only happen again on the next turn. By immediately swapping out your perpetual construction for an item on the next turn, you'll get this Science (or Gold) for free. This doesn't apply to Unciv, so don't bother. = Envicigo de scienco\nEn Civilization V, scienca produktokvanto estas kalkulata post produktado. Do, se vi finas eron kaj havas Sciencon (aŭ Oron) envicigitan kiel konstantan konstruaĵon, la produktada plusfluo de la ero estos konvertita en Sciencon (aŭ Oron), sed la Produktado ne estas konsumita, ĉar tio denove okazos nur en la sekva vico. Se tuj en la sekva vico vi anstataŭigas vian konstantan konstruaĵon per ero, vi ricevos ĉi tiun Sciencon (aŭ Oron) senpage. Ĉi tio ne aplikiĝas al Unciv, do ne necesas zorgi pri tio.
Double Aqueducts\nIn Civilization V, the game sells existing copies of the building for you before providing a free copy of the building. So, if you build an aqueduct in a city, and then in the turn of adopting Tradition Complete you sell a cheap building (e.g a shrine) beforehand, the game is unable to sell more than 1 building per turn, and thus you'll keep your aqueduct, together with the new free aqueduct. Not applicable to Unciv. = Duoblaj akveduktoj\nEn Civilization V, la ludo vendas ekzistantajn kopiojn de la konstruaĵo por vi antaŭ ol provizi senpagan kopion de la konstruaĵo. Do, se vi konstruas akvedukton en urbo, kaj poste dum la vico de adopto de Tradicio Kompletigita vi vendas malmultekostan konstruaĵon (ekz. sanktejon) antaŭe, la ludo ne povas vendi pli ol 1 konstruaĵon po vico, kaj tial vi konservos vian akvedukton kune kun la nova senpaga akvedukto. Ĉi tio ne aplikiĝas al Unciv.
Legalism Oxford\nIn Civilization V, national wonders such as Oxford University are considered culture buildings, so you can get them for free with Legalism. Not applicable to Unciv. = Leĝismo Oksfordo\nEn Civilization V, naciaj mirindaĵoj kiel Universitato de Oksfordo estas konsiderataj kulturaj konstruaĵoj, do vi povas ricevi ilin senpage per Leĝismo. Ĉi tio ne aplikiĝas al Unciv.
Roads and Forts\nIn Civilization V, you can't use roads and forts in enemy territory. In Unciv, you can use them, so instead of mindlessly constructing them everywhere when at war, you need to decide if and when they'll benefit you more than your opponents. = Vojoj kaj fortikaĵoj\nEn Civilization V, vi ne povas uzi vojojn kaj fortikaĵojn en malamika teritorio. En Unciv, vi povas uzi ilin, do anstataŭ senpripense konstrui ilin ĉie dum milito, vi devas decidi ĉu kaj kiam ili pli utilos al vi ol al viaj kontraŭuloj.
Citizen Conversion\nIn Civilization V, a citizen is born religious if the parent city is already converted. This is not the case in Unciv, which can lead to temporary deconversion of a city when it grows. = Konvertiĝo de civitanoj\nEn Civilization V, civitano naskiĝas religia se la gepatra urbo jam estas konvertita. Tio ne okazas en Unciv, kio povas konduki al provizora malkonvertiĝo de urbo kiam ĝi kreskas.
Unassigned Citizens\nIn Civilization V, unassigned citizens are considered specialists, and subject to the same type of bonuses (e.g. Korea's ability). It can be worthwhile to leave citizens unassigned, instead of being assigned to a tile. Not applicable to Unciv. = Neasignitaj civitanoj\nEn Civilization V, neasignitaj civitanoj estas konsiderataj specialistoj kaj ricevas la samtipajn bonifikojn (ekz. la kapablo de Koreio). Povas valori lasi civitanojn neasignitaj anstataŭ asigni ilin al kahelo. Ĉi tio ne aplikiĝas al Unciv.
Settler Construction\nIn Civilization V, cities can't starve when constructing settlers, so you can assign all citizens to production tiles and none to food tiles. In Unciv, citizens keep consuming two food per turn. = Konstruado de setlanto\nEn Civilization V, urboj ne povas malsati dum konstruado de setlantoj, do vi povas asigni ĉiujn civitanojn al produktadaj kaheloj kaj neniun al manĝaĵaj kaheloj. En Unciv, civitanoj plu konsumas po du unuojn da Manĝaĵo po vico.
Water Melee Attack\nAs result of a Discord poll, Water Melee units can attack military land units on the shore, unlike in Civilization V. = Akva proksimbatala atako\nRezulte de Discord-enketo, akvaj proksimbatalaj unuoj povas ataki militajn terajn unuojn sur la bordo, male al Civilization V.
Tile improvements\nIn Civilzation V, workers start working on an improvement-under-construction at the beginning of movement. Unciv changes this, to allow players to assign workers to tiles, and then reconsider and change improvement or move them elsewhere. = Kahelaj plibonigoj\nEn Civilization V, laboristoj komencas labori pri konstruata plibonigo ĉe la komenco de moviĝo. Unciv ŝanĝas ĉi tion por permesi al ludantoj asigni laboristojn al kaheloj, kaj poste rekonsideri kaj ŝanĝi la plibonigon aŭ movi ilin aliloken.
Forest and Jungle Visibility\nIn Unciv, forests and jungles are visible 1 tile outside visibility range. In Civilization V, this is the behaviour of hills and mountains, but not of forests and jungles, yet jungle and forest can block hills, and hill + forest can block mountain, indicating they're on the same elevation. This is considered to be a bug in the otherwise well-structured visibility logic in Civilization V. = Videbleco de arbaroj kaj ĝangaloj\nEn Unciv, arbaroj kaj ĝangaloj estas videblaj 1 kahelon ekster videbleca distanco. En Civilization V, ĉi tio estas la konduto de montetoj kaj montoj, sed ne de arbaroj kaj ĝangaloj; tamen ĝangalo kaj arbaro povas bloki montetojn, kaj monteto + arbaro povas bloki monton, indikante ke ili estas je la sama alteco. Ĉi tio estas konsiderata cimo en la alie bone strukturita videbleca logiko de Civilization V.
City razing\nIn Civilization V, the player can never raze any of the cities he/she founded. Not applicable to Unciv. = Forbruligado de urboj\nEn Civilization V, la ludanto neniam povas forbruligi iun el la urboj, kiujn li/ŝi fondis. Ĉi tio ne aplikiĝas al Unciv.

Founding Cities\nThe Settler is a unit that can found a new city. You can build a Settler unit in a city with at least 2 population, and then move them to a good location to found a new city. This will usually be your main way of acquiring more cities. = Fondado de urboj\nLa Setlanto estas unuo, kiu povas fondi novan urbon. Vi povas konstrui Setlanton en urbo kun almenaŭ 2 loĝantaro, kaj poste movi ĝin al bona loko por fondi novan urbon. Ĉi tio kutime estos via ĉefa maniero akiri pli da urboj.
Food conversion to Production\nDuring the construction of a Settler, the city will not grow. Instead, the 1st, 2nd, 4th, and from there on every 4th, excess Food (Growth) is converted into Production, with the rest of the excess Food being lost. = Konvertiĝo de Manĝaĵo al Produktado\nDum konstruado de Setlanto, la urbo ne kreskos. Anstataŭe, la 1-a, 2-a, 4-a, kaj poste ĉiu 4-a troa Manĝaĵo (Kresko) estas konvertita en Produktadon, dum la resto de la troa Manĝaĵo perdiĝas.

