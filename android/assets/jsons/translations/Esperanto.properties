You've behaved yourself very badly, you know it. Now it's payback time. = Vi kondutis tre malbone, kaj vi scias tion. Nun venis la tempo por repago.
You've mistaken my passion for a weakness, you'll regret about this. = Vi misprenis mian pasion por malforto; vi bedaŭros tion.
We were defeated, so this makes me your prisoner. I suppose there are worse fates. = Ni estis venkitaj, do tio faras min via kaptito. Mi supozas, ke ekzistas pli malbonaj sortoj.
Fine then. It's your call. = Bone do. Estas via decido.
I greet you, stranger! If you are as intelligent and tactful as you are attractive, we'll get along just fine. = Mi salutas vin, fremdulo! Se vi estas tiel inteligenta kaj taktoplena kiel vi estas alloga, ni tre bone interkompreniĝos.
How would you like it if I propose this kind of exchange? = Kiel plaĉus al vi, se mi proponus ĉi tian interŝanĝon?
Hello! = Saluton!
What do you need?! = Kion vi bezonas?!
Siberian Riches = Siberiaj Riĉaĵoj
Hail to Imperial Majesty Catherine, Empress of all Russians. Living in the largest country in the world, from the Pacific Ocean in the east to the Baltic Sea in the west, your people endured wars, droughts, and many disasters, imbuing the Russian society with heroism and tenacity, and producing artists and scientists among the best in the world. Russia is a powerful empire which rightfully claims its place in the world concert of superpowers. = Saluton al Imperiestra Moŝto Katarina, Imperiestrino de ĉiuj Rusoj. Loĝante en la plej granda lando de la mondo, de Pacifiko oriente ĝis Balta Maro okcidente, via popolo eltenis militojn, sekecojn kaj multajn katastrofojn, plenigante rusan socion per heroeco kaj persistemo, kaj produktante artistojn kaj sciencistojn inter la plej bonaj en la mondo. Rusio estas potenca imperio, kiu prave postulas sian lokon en la monda koncerto de superpotencoj.
Empress Catherine, your people are eager for Russian glory, to revive the sacred light of the Motherland. Will your new empire shine through the ages of history? = Imperiestrino Katarina, via popolo sopiras al rusa gloro, por revivigi la sanktan lumon de la Patrio. Ĉu via nova imperio brilos tra la epokoj de historio?
