Boudicca = Budiko
You shall stain this land no longer with your vileness! To arms, my countrymen. We ride to war! = Vi ne plu makulos ĉi tiun landon per via fieco! Al armiloj, miaj samlandanoj. Ni rajdas al milito!
Traitorous man! The Celtic peoples will not stand for such wanton abuse and slander - I shall have your balls! = Perfida viro! La keltaj popoloj ne toleros tian senbridan misuzon kaj kalumnion — mi havos viajn testikojn!
Vile ruler, know you have won this war in name alone. Your cities lie buried and your troops defeated. I have my own victory. = Fia reganto, sciu, ke vi gajnis ĉi tiun militon nur laŭnome. Viaj urboj kuŝas enterigitaj kaj viaj trupoj venkitaj. Mi havas mian propran venkon.
Don't forget who you're dealing with. Arrogant moves can get you in danger. = Ne forgesu, kun kiu vi traktas. Arogantaj agoj povas meti vin en danĝeron.
I am Boudicca, Queen of the Celts. Let no-one underestimate me! = Mi estas Budiko, Reĝino de la Keltoj. Neniu subtaksu min!
Let us join our forces together and reap the rewards. = Ni kunigu niajn fortojn kaj rikoltu la rekompencojn.
God has given good to you. = Dio donis bonon al vi.
Druidic Lore = Druida Scio
May glory and honor always be upon you, Warrior Queen! In a time dominated by men, you successfully claimed the throne and the power, but also valiantly defied the mighty Roman Empire. Punished and humiliated by the hand of the Roman bloody invaders, you united your people and led a terrible revolt, to seek revenge. Many legions fell under your fierce attacks and you burned the city of London with your anger. While the Romans still kept ownership of your land after your final defeat, your actions nonetheless showed Rome that this land could never be fully conquered, making Nero himself consider to withdraw all troops and leaving Britain forever. = Gloro kaj honoro ĉiam estu sur vi, Militista Reĝino! En tempo regata de viroj, vi sukcese postulis la tronon kaj potencon, sed ankaŭ brave defiis la potencan Roman Imperion. Punita kaj humiligita de la mano de la sangaj romiaj invadantoj, vi unuigis vian popolon kaj gvidis teruran ribelon por serĉi venĝon. Multaj legioj falis sub viaj furiozaj atakoj, kaj vi bruligis la urbon Londono per via kolero. Kvankam la Romianoj ankoraŭ posedis vian landon post via fina malvenko, viaj agoj tamen montris al Romo, ke ĉi tiu lando neniam povus esti plene konkerita, igante Neronon mem konsideri retiri ĉiujn trupojn kaj forlasi Brition por ĉiam.
O raging lioness, will you lead the Celts again under the glory of your name, to spread the fires of liberty, and achieve a final victory? Will your new empire shine through the ages of history? = Ho furioza leonino, ĉu vi denove gvidos la Keltojn sub la gloro de via nomo, por disvastigi la fajrojn de libereco kaj atingi finan venkon? Ĉu via nova imperio brilos tra la epokoj de historio?
