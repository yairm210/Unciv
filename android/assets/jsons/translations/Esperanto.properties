Your wanton aggression leaves us no choice. Prepare for war! = Via senbrida agreso lasas al ni neniun elekton. Preparu vin por milito!
You have mistaken our love of peace for weakness. You shall regret this! = Vi misprenis nian amon al paco por malforto. Vi bedaŭros tion!
The day...is yours. I hope you will be merciful in your triumph. = La tago... apartenas al vi. Mi esperas, ke vi estos kompatema en via triumfo.
The people of the United States of America welcome you. = La popolo de Usono bonvenigas vin.
Is the following trade of interest to you? = Ĉu la jena komerco interesas vin?
Well? = Nu?
Manifest Destiny = Manifesta Destino
President Washington, we salute you and the proud American civilization! Freed from the British dominion in the 18th century, then cleansed and reborn after a terrible civil war, the United States nation was ready to play its great role in the 20th century. At the height of its power, triumphant after two terrible world wars, United States of America, a land of immigration, opportunities, optimism and determination, has risen above all other weakening nations, unable to equal such power. = Prezidanto Vaŝingtono, ni salutas vin kaj la fieran amerikan civilizacion! Liberigita de brita regado en la 18-a jarcento, poste purigita kaj renaskita post terura enlanda milito, la usona nacio estis preta ludi sian grandan rolon en la 20-a jarcento. Ĉe la pinto de sia potenco, triumfinte post du teruraj mondmilitoj, Usono, lando de enmigrado, ŝancoj, optimismo kaj decidemo, leviĝis super ĉiuj aliaj malfortiĝantaj nacioj, kiuj ne povis egali tian potencon.
President Washington, will you show to the world the legitimacy of the American way of life, and spread the flame of liberty to all mankind? Will your new empire shine through the ages of history? = Prezidanto Vaŝingtono, ĉu vi montros al la mondo la legitimecon de la usona vivmaniero kaj disvastigos la flamon de libereco al la tuta homaro? Ĉu via nova imperio brilos tra la epokoj de historio?
